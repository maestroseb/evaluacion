<script>
/**
 * Lógica de cliente. Habla con el backend Apps Script vía google.script.run.
 *
 * Modelo:
 *   - Clase = lista de alumnado + curso (reutilizable).
 *   - Evaluación = una clase aplicada a un área.
 */
var App = (function () {
  var estado = null;        // {usuario, areas, clases, evaluaciones}
  var claseActual = null;
  var evalActual = null;
  var claseCache = {};      // claseId -> grupo completo (con alumnado)
  var enVuelo = {};         // ids con un prefetch en curso (evita duplicados)

  /**
   * Logotipo tipográfico: en la marca (sidebar y topbar móvil), la última
   * palabra interna en mayúscula se pinta en el color de acento
   * ("Evalu|Anda"). Es genérico: otra instancia ("EvaluMur"…) hereda el
   * efecto sin tocar nada; sin mayúscula interna, todo el nombre va en acento.
   */
  function decorarMarca() {
    [].forEach.call(document.querySelectorAll('.marca-txt, .topbar-marca'), function (el) {
      var t = el.textContent.trim();
      var m = /^(.*[a-záéíóúüñ0-9])([A-ZÁÉÍÓÚÜÑ][\wáéíóúüñ]*)$/.exec(t);
      if (m) el.innerHTML = esc(m[1]) + '<span class="marca-acento">' + esc(m[2]) + '</span>';
      else el.innerHTML = '<span class="marca-acento">' + esc(t) + '</span>';
    });
  }

  // ---------- arranque ----------
  function iniciar() {
    setupModalNoScroll();
    setupTeclado();
    restaurarSidebar();
    decorarMarca();
    window.addEventListener('resize', ajustarAltoRejillas); // giro / cambio de tamaño
    // Guardado de última hora: intenta persistir y, si quedan cambios en vuelo,
    // pide confirmación al navegador para dar tiempo a que la petición llegue.
    window.addEventListener('beforeunload', function (e) {
      var pendiente = notasDirty || notasEnCurso;
      flushNotas();
      if (pendiente) { e.preventDefault(); e.returnValue = ''; }
    });
    setupHistorial();
    llamar('getEstadoInicial', [], function (e) {
      estado = e;
      // Cabecera de cuenta: si Google nos da el nombre, se muestra arriba y el
      // correo pasa a la línea pequeña de debajo; si no, se queda el correo
      // arriba y "Profesorado" debajo, como antes.
      var nombre = (e.nombre && e.nombre.trim()) || '';
      var principal = nombre || e.usuario;
      var elNombre = document.getElementById('usuario');
      elNombre.textContent = principal;
      elNombre.title = e.usuario;
      if (nombre) {
        var elSub = document.getElementById('perfil-sub');
        elSub.textContent = e.usuario;
        elSub.title = e.usuario;
      }
      document.getElementById('perfil-avatar').textContent = iniciales(principal);
      document.getElementById('cargando').hidden = true;
      activarRubricasSiFlag_(); // revela el módulo de rúbricas si el usuario lo tiene
      activarPlannerSiFlag_();  // ídem con el planificador (en pruebas)
      refrescarModuloCriterios_(); // módulo «Criterios» según el toggle FP del curso activo
      pintarSelectorCurso();
      // Si la URL trae una vista (recarga o enlace copiado), se restaura;
      // si no, se abre la lista de clases como siempre.
      try {
        google.script.url.getLocation(function (loc) {
          var p = (loc && loc.parameter) || {};
          if (p.v) { ultimoEstadoHist = claveHist_(p); restaurarVista(p); }
          else irAEvaluaciones();
        });
      } catch (err) { irAEvaluaciones(); }
      precargarEvaluaciones(); // en 2º plano: abrir cada clase será instantáneo
      // Copia de seguridad automática en 2º plano (no retrasa el arranque).
      llamarSilencioso('respaldoAutomatico', [], function () {});
    });
  }

  // ---------- navegación ----------
  var SECCIONES = ['vista-evaluaciones', 'vista-clases', 'vista-clase',
    'vista-evaluacion', 'vista-unidad', 'vista-resumen', 'vista-papelera', 'vista-rubricas',
    'vista-planner', 'vista-criterios'];
  var vistaActual = null; // vista visible: descarta respuestas tardías del servidor
  function mostrar(id) {
    flushNotas(); // guarda notas pendientes de la unidad al cambiar de vista
    vistaActual = id;
    SECCIONES.forEach(function (s) { document.getElementById(s).hidden = (s !== id); });
    cerrarSelectorNivel(); // ningún selector flotante entre vistas
    document.getElementById('app').scrollTop = 0; // cada vista empieza arriba
    // (además estabiliza la medición de ajustarAltoRejillas)
    // Resalta la sección activa en barra lateral y tab bar (por data-nav).
    var clave =
      (id === 'vista-clases' || id === 'vista-clase') ? 'clases' :
      (id === 'vista-papelera') ? 'papelera' :
      (id === 'vista-rubricas') ? 'rubricas' :
      (id === 'vista-planner') ? 'planner' :
      (id === 'vista-criterios') ? 'criterios' :
      (id === 'vista-evaluaciones' || id === 'vista-evaluacion' ||
       id === 'vista-unidad' || id === 'vista-resumen') ? 'eval' : '';
    ['eval', 'clases', 'papelera', 'rubricas', 'planner', 'criterios'].forEach(function (k) {
      [].forEach.call(document.querySelectorAll('[data-nav="' + k + '"]'), function (el) {
        el.classList.toggle('activo', k === clave);
      });
    });
    // El curso académico solo aplica a Clases, Grupos y Planificador; en
    // Rúbricas y Papelera se oculta el selector (una rúbrica se reutiliza entre
    // cursos). La barra de búsqueda se cierra al cambiar de vista.
    var tb = document.querySelector('.topbar');
    if (tb) {
      tb.classList.toggle('sin-curso', clave === 'rubricas' || clave === 'papelera' || clave === 'criterios');
      cerrarBuscador_();
    }
    cerrarSidebar(); // en móvil, cierra el panel tras navegar
  }

  /** Despliega u oculta el buscador colapsado (lupa) de la barra en móvil. */
  function toggleBuscador() {
    var tb = document.querySelector('.topbar');
    if (!tb) return;
    var abrir = !tb.classList.contains('buscando');
    tb.classList.toggle('buscando', abrir);
    var inp = document.getElementById('buscador');
    if (abrir) { inp.focus(); }
    else if (inp && inp.value) { inp.value = ''; filtrar(''); }
  }
  /** Cierra el buscador desplegado y limpia el filtro si había texto. */
  function cerrarBuscador_() {
    var tb = document.querySelector('.topbar');
    if (!tb || !tb.classList.contains('buscando')) return;
    tb.classList.remove('buscando');
    var inp = document.getElementById('buscador');
    if (inp && inp.value) { inp.value = ''; filtrar(''); }
  }
  function irAEvaluaciones() { registrarHistorial({ v: 'evaluaciones' }); evalActual = null; setTitulo('Clases'); mostrar('vista-evaluaciones'); pintarEvaluaciones(); }
  function irAClases() { registrarHistorial({ v: 'clases' }); claseActual = null; setTitulo('Grupos'); mostrar('vista-clases'); pintarClases(); }

  // ---------- historial del navegador (flechas atrás/adelante) ----------
  // Apps Script corre en un iframe: google.script.history sincroniza el
  // historial y la URL de la página madre. Cada vista registra un estado
  // {v, id, eid}; las flechas del navegador lo restauran, y la URL con
  // parámetros permite recargar la página sin perder la pantalla actual.
  var navegandoHistorial = false; // true mientras restauramos: no re-registrar
  var ultimoEstadoHist = '';      // clave del último estado registrado (dedupe)

  function claveHist_(st) { return [st.v || '', st.id || '', st.eid || ''].join('|'); }

  /** Registra la vista actual en el historial (push; replace la primera vez). */
  function registrarHistorial(st) {
    if (navegandoHistorial) return;
    var clave = claveHist_(st);
    if (clave === ultimoEstadoHist) return; // repintado de la misma vista
    var primera = (ultimoEstadoHist === '');
    ultimoEstadoHist = clave;
    var params = { v: st.v };
    if (st.id) params.id = st.id;
    if (st.eid) params.eid = st.eid;
    try {
      if (primera) google.script.history.replace(st, params, null);
      else google.script.history.push(st, params, null);
    } catch (e) { /* fuera del iframe de Apps Script (pruebas locales) */ }
  }

  /** Engancha las flechas atrás/adelante del navegador. */
  function setupHistorial() {
    try {
      google.script.history.setChangeHandler(function (e) {
        var st = (e && e.state) || {};
        if (!st.v && e && e.location && e.location.parameter) st = e.location.parameter;
        if (!st.v) st = { v: 'evaluaciones' };
        ultimoEstadoHist = claveHist_(st);
        restaurarVista(st);
      });
    } catch (e) { /* sin soporte de historial: la app funciona igual */ }
  }

  /** Reconstruye una vista a partir de un estado del historial. */
  function restaurarVista(st) {
    navegandoHistorial = true;
    try {
      switch (st.v) {
        case 'clases': irAClases(); break;
        case 'papelera': irAPapelera(); break;
        case 'rubricas':
          if (estado.flags && estado.flags.rubricas) irARubricas(); else irAEvaluaciones();
          break;
        case 'planner':
          if (estado.flags && estado.flags.planner) irAPlanner(); else irAEvaluaciones();
          break;
        case 'criterios': {
          var xc = cursoActivo_();
          if (xc && xc.config && xc.config.fp) irACriterios(); else irAEvaluaciones();
          break;
        }
        case 'clase':
          if (claseCache[st.id] || claseDe(st.id)) abrirClase(st.id);
          else irAClases(); // ya no existe (borrado / otro curso)
          break;
        case 'evaluacion': abrirEvaluacion(st.id); break;
        case 'unidad': conEvaluacion_(st.eid, function () { abrirUnidad(st.id); }); break;
        case 'resumen': conEvaluacion_(st.id, function () { verResumen(); }); break;
        default: irAEvaluaciones();
      }
    } finally {
      navegandoHistorial = false;
    }
  }

  /** Garantiza que evalActual es la evaluación dada antes de ejecutar cb. */
  function conEvaluacion_(evalId, cb) {
    if (!evalId) { if (evalActual) cb(); else irAEvaluaciones(); return; }
    if (evalActual && evalActual.evalId === evalId) return cb();
    if (evalCache[evalId]) { evalActual = evalCache[evalId]; return cb(); }
    llamarSilencioso('getEvaluacionCompleta', [evalId], function (ev) {
      evalCache[evalId] = ev;
      evalActual = ev;
      cb();
    });
  }

  // ---------- curso académico (multi-curso en un solo cuaderno) ----------
  /** "2025-2026" → "2025-26" (solo para MOSTRAR; el valor guarda el completo). */
  function cursoCorto_(acad) {
    return String(acad || '').replace(/^(\d{4})-\d{2}(\d{2})$/, '$1-$2');
  }

  /**
   * Rellena los selectores de curso con los cursos con datos. Hay más de uno:
   * el de la barra superior (escritorio) y los de las cabeceras de Clases y
   * Grupos (móvil); se pintan todos a la vez para que siempre coincidan.
   */
  function pintarSelectorCurso() {
    if (!estado || !estado.cursos) return;
    var c = estado.cursos;
    var html = (c.lista || []).map(function (x) {
      return '<option value="' + esc(x.id) + '"' + (x.id === c.activo ? ' selected' : '') +
        '>' + esc(etiquetaCurso_(x)) + '</option>';
    }).join('');
    [].forEach.call(document.querySelectorAll('.curso-select'), function (sel) {
      sel.innerHTML = html;
    });
  }

  /** Ficha (objeto) del curso activo, o null. */
  function cursoActivo_() {
    if (!estado || !estado.cursos) return null;
    var id = estado.cursos.activo;
    var m = (estado.cursos.lista || []).filter(function (x) { return x.id === id; });
    return m[0] || null;
  }

  /** Etiqueta visible de un curso: su título personalizado o, si no, el año. */
  function etiquetaCurso_(x) {
    return (x.nombre && x.nombre.trim()) ? x.nombre.trim() : cursoCorto_(x.anio || x.id);
  }

  /** Cambia el curso activo: recarga Clases y Grupos ya filtrados del servidor. */
  function cambiarCurso(curso) {
    if (!curso || (estado.cursos && curso === estado.cursos.activo)) return;
    recargarDatosCurso(curso);
  }

  /**
   * Recarga siempre del servidor los datos del curso indicado y repinta. A
   * diferencia de cambiarCurso, no ignora el caso "mismo curso activo" (lo usa
   * la promoción, que puede crear el grupo dentro del curso ya activo).
   */
  function recargarDatosCurso(curso) {
    llamar('cambiarCurso', [curso], function (r) {
      estado.cursos = r.cursos;
      estado.clases = r.clases;
      estado.evaluaciones = r.evaluaciones;
      invalidarCaches();
      pintarSelectorCurso();
      refrescarModuloCriterios_(); // el módulo depende del curso ahora activo
      irAEvaluaciones(); // vuelve a la lista de clases del curso elegido
      precargarEvaluaciones();
    });
  }

  // ---------- editar / crear curso académico (título, calendario, config) ----------
  /** Desplegable de años académicos alrededor del natural (evita erratas al teclear). */
  function selectAnioHtml_(sel) {
    var nat = (estado.cursos && estado.cursos.actual) || '';
    var base = parseInt((nat.match(/^(\d{4})/) || [])[1], 10) || new Date().getFullYear();
    var anios = [];
    for (var y = base + 2; y >= base - 4; y--) anios.push(y + '-' + (y + 1));
    if (sel && anios.indexOf(sel) < 0) anios.unshift(sel); // conserva uno fuera de rango
    return '<select id="cur-anio">' + anios.map(function (a) {
      return '<option value="' + esc(a) + '"' + (a === sel ? ' selected' : '') + '>' + esc(a) + '</option>';
    }).join('') + '</select>';
  }

  /** Abre el panel del curso ACTIVO para retitularlo o ajustar su calendario. */
  function editarCursoUI() {
    var x = cursoActivo_();
    if (!x) return;
    // El calendario (inicio/fin/festivos) vive en su pestaña; lo traemos para
    // editarlo en el mismo panel. Si ya está en caché para este curso, directo.
    if (calendarioCache && calendarioCache.cursoAcademico === x.id) {
      abrirModalCurso_(x, false, calendarioCache);
    } else {
      llamar('getCalendario', [x.id], function (c) {
        calendarioCache = c; abrirModalCurso_(x, false, c);
      });
    }
  }

  /** Abre el panel en blanco para CREAR otro curso (p. ej. un 2º centro). */
  function nuevoCursoUI() {
    abrirModalCurso_({ id: '', anio: (estado.cursos && estado.cursos.actual) || '',
      nombre: '', config: {} }, true, { inicio: '', fin: '', festivos: [] });
  }

  function abrirModalCurso_(x, esNuevo, cal) {
    cal = cal || { inicio: '', fin: '', festivos: [] };
    calDraft = (cal.festivos || []).map(function (f) {
      return { desde: f.desde, hasta: f.hasta || f.desde, nombre: f.nombre || '' };
    }).sort(function (a, b) { return a.desde < b.desde ? -1 : a.desde > b.desde ? 1 : 0; });
    var cuerpo =
      '<label>Año académico' + selectAnioHtml_(x.anio || '') + '</label>' +
      '<label>Título (opcional)' +
        '<input id="cur-nombre" type="text" value="' + esc(x.nombre || '') + '" ' +
          'placeholder="p. ej. FP Cocina · IES Los Álamos" autocomplete="off"></label>' +
      '<div class="campo-crit"><span class="etq">Calendario del curso</span>' +
        '<div class="cal-rango">' +
          '<label>Inicio<input id="cal-inicio" type="date" value="' + esc(cal.inicio || '') + '"></label>' +
          '<label>Fin <span class="opcional">(opcional)</span>' +
            '<input id="cal-fin" type="date" value="' + esc(cal.fin || '') + '"></label>' +
        '</div>' +
      '</div>' +
      '<p class="ayuda">Si dejas el fin vacío, el curso se toma como abierto hasta final de curso. ' +
        'Sirve para sugerir fechas saltando findes y festivos y marcar los días no lectivos.</p>' +
      '<div class="campo-crit"><span class="etq">Festivos y vacaciones</span>' +
        '<div id="cal-festivos">' + htmlFestivos_() + '</div>' +
        '<button type="button" class="btn cal-add" onclick="App.calAddFestivo()">+ Añadir festivo</button>' +
      '</div>' +
      '<label class="check check-suelto"><input id="cur-fp" type="checkbox"' +
        ((x.config && x.config.fp) ? ' checked' : '') + '> Criterios propios (FP u otras enseñanzas)</label>' +
      '<p class="ayuda">Activa un módulo «Criterios» bajo el Planificador para añadir tus propios ' +
        'criterios (en FP, sus RA y pesos). Solo aparece en este curso.</p>';
    var opts = { sinFoco: true, ancho: true };
    if (!esNuevo) opts.accionExtra =
      '<button type="button" class="btn" onclick="App.nuevoCursoUI()">+ Otro curso</button>';
    abrirModal(esNuevo ? 'Nuevo curso académico' : 'Curso académico', cuerpo, 'Guardar',
      function () { guardarCursoUI_(x, esNuevo); }, opts);
  }

  function guardarCursoUI_(x, esNuevo) {
    var anio = val('cur-anio').trim(); // viene de un desplegable: siempre "YYYY-YYYY"
    var inicio = val('cal-inicio'), fin = val('cal-fin');
    if (inicio && fin && fin < inicio) {
      return aviso('El fin del curso es anterior al inicio.');
    }
    leerFestivosDraft_();
    var cfg = x.config || {};
    cfg.fp = document.getElementById('cur-fp').checked;
    var payload = {
      id: esNuevo ? '' : x.id,
      anio: anio,
      nombre: val('cur-nombre').trim(),
      config: cfg,
      calendario: {
        inicio: inicio, fin: fin,
        festivos: calDraft.filter(function (f) { return f.desde; }).map(function (f) {
          return { desde: f.desde, hasta: f.hasta || f.desde, nombre: f.nombre };
        })
      }
    };
    botonModalCargando('Guardando…');
    llamar('guardarCurso', [payload], function (r) {
      estado.cursos = r.cursos;
      estado.clases = r.clases;
      estado.evaluaciones = r.evaluaciones;
      invalidarCaches();
      calendarioCache = r.calendario || null; // tras invalidar, refresca el calendario del curso activo
      pintarSelectorCurso();
      refrescarModuloCriterios_(); // muestra/oculta el módulo según el toggle FP del curso
      cerrarModal();
      // Al crear un curso nuevo vamos a su lista de clases; al editar, nos
      // quedamos donde estábamos (si es el planificador, lo repintamos con el
      // calendario ya actualizado) para no expulsar al profe de su vista.
      if (!esNuevo && vistaActual === 'vista-planner') pintarPlanner();
      else { irAEvaluaciones(); precargarEvaluaciones(); }
      avisoOk(esNuevo ? 'Curso creado.' : 'Curso actualizado.');
    });
  }

  // ---------- criterios propios: módulo revelado por el toggle FP del curso ----------
  var criteriosBloques = []; // último resumen pintado (para borrar por índice)

  /** Muestra/oculta el módulo «Criterios» según el toggle FP del curso activo. */
  function refrescarModuloCriterios_() {
    var x = cursoActivo_();
    var on = !!(x && x.config && x.config.fp);
    [].forEach.call(document.querySelectorAll('.solo-crit'), function (el) { el.hidden = !on; });
    // Si estabas en el módulo y el nuevo curso no lo tiene, sal a las clases.
    if (!on && vistaActual === 'vista-criterios') irAEvaluaciones();
  }

  function irACriterios() {
    registrarHistorial({ v: 'criterios' });
    setTitulo('Criterios propios');
    mostrar('vista-criterios');
    pintarCriterios();
  }

  function pintarCriterios() {
    var cont = document.getElementById('lista-criterios');
    cont.innerHTML = '<div class="aviso">Cargando…</div>';
    llamar('getMapaPropio', [], function (bloques) {
      criteriosBloques = bloques || [];
      if (!criteriosBloques.length) {
        cont.innerHTML = '<div class="vacio">Aún no has añadido criterios propios. ' +
          'Pulsa «+ Importar» y pégalos desde tu hoja de cálculo.</div>';
        return;
      }
      cont.innerHTML = criteriosBloques.map(function (b, i) {
        return '<div class="tarjeta-crit"><div class="tc-info">' +
          '<b>' + esc(b.area || '—') + '</b>' +
          '<span class="meta">' + esc(b.curso) + ' · ' + b.numRA + ' RA · ' + b.numCriterios + ' criterios</span>' +
          '</div><button class="btn" onclick="App.abrirPesosUI(' + i + ')">' + svgUI('lapiz') + ' Pesos</button>' +
          '<button class="btn peligro btn-icono" title="Eliminar bloque" aria-label="Eliminar bloque" ' +
          'onclick="App.borrarMapaPropioUI(' + i + ')">' + svgUI('papelera') + '</button></div>';
      }).join('');
    });
  }

  /** Filas de ejemplo del importador (separadas por tabulador, como en una hoja). */
  var EJEMPLO_IMP_ = [
    ['1º Cocina', 'Procesos básicos', 'RA1: Recepciona materias primas', '30', 'RA1.a', 'Identifica las materias primas', '60'],
    ['1º Cocina', 'Procesos básicos', 'RA1: Recepciona materias primas', '30', 'RA1.b', 'Comprueba el etiquetado', '40']
  ];
  /** Rellena el cuadro del importador con el ejemplo (para verlo con sus tabuladores). */
  function pegarEjemploImp() {
    var t = document.getElementById('mp-texto');
    if (t) t.value = EJEMPLO_IMP_.map(function (f) { return f.join('\t'); }).join('\n');
  }

  function abrirImportarCriterios() {
    var cab = ['curso', 'área', 'RA', 'peso RA', 'código', 'texto', 'peso criterio'];
    var chips = function (cols) {
      return '<span class="imp-cols">' + cols.map(function (c) {
        return '<i>' + c + '</i>';
      }).join('') + '</span>';
    };
    var ejemplo = '<table class="imp-tabla"><thead><tr>' +
      cab.map(function (c) { return '<th>' + c + '</th>'; }).join('') +
      '</tr></thead><tbody>' +
      EJEMPLO_IMP_.map(function (f) {
        return '<tr>' + f.map(function (v) { return '<td>' + esc(v) + '</td>'; }).join('') + '</tr>';
      }).join('') + '</tbody></table>';
    abrirModal('Importar criterios',
      '<p class="ayuda">Prepara los criterios en tu hoja de cálculo (Excel, Sheets…), ' +
        '<b>una fila por criterio</b>, y copia y pega aquí las filas: las columnas llegan ' +
        'separadas por tabulador ya solas. Orden de las columnas:</p>' +
      '<div class="imp-fmt"><span class="etq">Con RA y pesos (FP)</span>' +
        chips(cab) + '</div>' +
      '<div class="imp-fmt"><span class="etq">Sin RA (estilo Primaria)</span>' +
        chips(['curso', 'área', 'código', 'texto']) + '</div>' +
      '<div class="imp-fmt"><span class="etq">Ejemplo con RA (dos criterios del mismo RA) · ' +
        '<button type="button" class="link" onclick="App.pegarEjemploImp()">insertar en el cuadro' +
        '</button></span><div class="imp-ej-scroll">' + ejemplo + '</div></div>' +

  /** Siguiente curso académico ("2024-2025" -> "2025-2026"), o '' si no encaja. */
  function siguienteCurso_(acad) {
    var m = /^(\d{4})-(\d{4})$/.exec(acad || '');
    if (!m) return '';
    return (parseInt(m[1], 10) + 1) + '-' + (parseInt(m[2], 10) + 1);
  }

  /** Inicial (mayúscula) de un texto, para los iconos de color. */
  function inicial(s) { return String(s || '?').trim().charAt(0).toUpperCase() || '?'; }

  /** Título visible de una clase: su nombre propio o, si no, el área. */
  function tituloEval(ev) { return (ev && ev.nombre) ? ev.nombre : (ev ? ev.area : ''); }

  function invalidarCaches() {
    evalCache = {}; rejillaCache = {}; claseCache = {}; enVuelo = {};
    // El planner se recarga al reabrir (sesiones, unidades, criterios y calendario).
    sesionesCache = null; planUnidadesCache = null; critEvaluadosCache = null; calendarioCache = null;
  }

  /**
   * Descarta de la caché las evaluaciones de una clase (tras editar su nombre
   * o su alumnado): al abrirlas se volverán a pedir ya actualizadas.
   */
  function invalidarEvalsDeClase(claseId) {
    Object.keys(evalCache).forEach(function (id) {
      var ev = evalCache[id];
      if (ev && ev.clase && ev.clase.claseId === claseId) delete evalCache[id];
    });
  }

  // ---------- carga anticipada (prefetch) ----------
  /** Llamada al backend que ignora errores (para prefetch en 2º plano). */
  function llamarSilencioso(fn, args, ok) {
    google.script.run.withSuccessHandler(ok).withFailureHandler(function () {})
      [fn].apply(google.script.run, args || []);
  }
  function prefetch_(id, fn, cache) {
    if (!id || cache[id] || enVuelo[id]) return;
    enVuelo[id] = 1;
    llamarSilencioso(fn, [id], function (r) { cache[id] = r; delete enVuelo[id]; });
  }
  function prefetchEval(id) { prefetch_(id, 'getEvaluacionCompleta', evalCache); }
  function prefetchClase(id) { prefetch_(id, 'obtenerClase', claseCache); }
  function prefetchRejilla(id) { if (!arrastreAct && !arrastre) prefetch_(id, 'getRejilla', rejillaCache); }

  /**
   * Precarga en 2º plano las clases del curso (evaluación + unidades) para que
   * abrirlas sea instantáneo. En el móvil no hay "pasar el ratón", así que el
   * prefetch por hover nunca se dispara: esta precarga escalonada (una petición
   * cada 400 ms, para no acaparar el cupo de llamadas) es la que hace el trabajo.
   */
  function precargarEvaluaciones() {
    var ids = ((estado && estado.evaluaciones) || []).slice(0, 10)
      .map(function (ev) { return ev.evalId; })
      .filter(function (id) { return id && !evalCache[id] && !enVuelo[id]; });
    ids.forEach(function (id, i) {
      setTimeout(function () { prefetchEval(id); }, 400 * i);
    });
  }

  /** Precarga las rejillas de las unidades de la evaluación abierta. */
  function precargarRejillas() {
    var ids = ((evalActual && evalActual.unidades) || []).slice(0, 8)
      .map(function (u) { return u.unidadId; })
      .filter(function (id) { return id && !rejillaCache[id] && !enVuelo[id]; });
    ids.forEach(function (id, i) {
      setTimeout(function () {
        if (!arrastreAct && !arrastre) prefetch_(id, 'getRejilla', rejillaCache);
      }, 400 * i);
    });
  }

  /**
   * Ajusta la altura de las tablas de notas (rejilla y resumen) al hueco REAL
   * de pantalla: desde donde empieza la tabla hasta la tab bar inferior (en
   * móvil) o el borde de la ventana. Así la tabla aprovecha todo el alto
   * disponible aunque la cabecera ocupe una o dos líneas, y el scroll queda
   * dentro de la tabla (con su cabecera sticky), no en la página.
   */
  function ajustarAltoRejillas() {
    [].forEach.call(document.querySelectorAll('.rejilla-cont'), function (el) {
      if (!el.offsetParent) return; // la vista está oculta
      var top = el.getBoundingClientRect().top;
      var tab = document.querySelector('.tabbar');
      var tabAlto = (tab && getComputedStyle(tab).display !== 'none')
        ? tab.getBoundingClientRect().height : 0;
      var alto = window.innerHeight - top - tabAlto - 10; // 10px de respiro
      if (alto > 160) el.style.maxHeight = alto + 'px';
    });
  }

  /** Fija el título de la barra superior y limpia el buscador al cambiar de vista. */
  function setTitulo(t) {
    var e = document.getElementById('topbar-titulo');

    } else {

    }

    document.getElementById('sidebar').classList.remove('abierta');
    document.getElementById('velo').classList.remove('visible');
  }
  function restaurarSidebar() {
    try {
      if (localStorage.getItem('sidebar-colapsada') === '1' && !esMovil()) {
        document.getElementById('sidebar').classList.add('colapsada');
      }
    } catch (e) {}
  }

  // Categorías de la papelera, en orden de aparición.
  var PAPELERA_CATS = [
    { tipo: 'grupo', titulo: 'Grupos' },
    { tipo: 'clase', titulo: 'Clases' },
    { tipo: 'unidad', titulo: 'Unidades' },
    { tipo: 'actividad', titulo: 'Actividades evaluables' },

  function pintarPapelera(items) {
    var cont = document.getElementById('lista-papelera');
    if (!items.length) { cont.innerHTML = '<div class="vacio">La papelera está vacía.</div>'; return; }
    // Reparte por categoría conservando el orden recibido (más reciente primero).
    var porTipo = {};
    items.forEach(function (it) { (porTipo[it.tipo] = porTipo[it.tipo] || []).push(it); });
    var cats = PAPELERA_CATS.slice();
    // Cualquier tipo no previsto va a una categoría «Otros» al final.
    Object.keys(porTipo).forEach(function (t) {
      if (!cats.some(function (c) { return c.tipo === t; })) cats.push({ tipo: t, titulo: 'Otros' });
    });
    cont.innerHTML = cats.filter(function (c) { return (porTipo[c.tipo] || []).length; })
      .map(function (c) {
        var tarjetas = porTipo[c.tipo].map(function (it) {
          return '<div class="tarjeta tarjeta-color" style="border-left-color:var(--texto-3)">' +
            '<h3>' + esc(it.etiqueta) + '</h3>' +

            'onclick="App.restaurarItem(\'' + it.papeleraId + '\')">Restaurar</button></div>' +
            '</div>';

        return '<section class="papelera-cat"><h2 class="papelera-cat-tit">' + esc(c.titulo) +
          ' <span class="papelera-cat-num">' + porTipo[c.tipo].length + '</span></h2>' +

  /** Descarga un objeto como archivo JSON. */
  function descargarJson_(d, nombre) {
    var blob = new Blob([JSON.stringify(d, null, 1)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nombre;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  /** Pide un archivo .json al usuario y entrega el objeto parseado a cb. */
  function pedirJson_(cb) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,application/json';
    inp.onchange = function () {
      var f = inp.files[0]; if (!f) return;
      var rd = new FileReader();
      rd.onload = function () {
        var datos;
        try { datos = JSON.parse(rd.result); } catch (e) { return aviso('Archivo no válido.'); }
        cb(datos);
      };
      rd.readAsText(f);
    };
    inp.click();
  }

  /** Fuerza una copia de seguridad en Drive ahora mismo (además de la diaria). */
  function copiaAhoraUI() {
    llamar('copiaDeSeguridadAhora', [], function (r) {

    });
  }

  function exportarDatos() {
    llamar('getExportacion', [], function (d) {
      descargarJson_(d, 'evaluacion-copia-' + String(d.fecha || '').slice(0, 10) + '.json');
      avisoOk('Copia descargada.');
    });
  }
  function pedirImportar() {
    pedirJson_(function (datos) {
      if (datos.tipo === 'traspaso') {
        return aviso('Ese archivo es un traspaso de grupos: usa "Recibir grupos".');
      }
      confirmar('Restaurar copia',
        'Esto SUSTITUIRÁ todos tus datos actuales por los del archivo. Se hace una copia de seguridad antes. ¿Continuar?',
        'Restaurar', function () {
          llamar('importarDatos', [datos], function () {
            invalidarCaches();
            llamar('getEstadoInicial', [], function (e) {
              estado = e; cerrarModal(); irAEvaluaciones(); avisoOk('Datos restaurados.');
            });
          });
        });
    });
  }

          .map(function (c) { return c.value; });

        botonModalCargando('Preparando…');

  /** Recibir un archivo de traspaso: añade sus grupos al cuaderno propio. */
  function recibirGruposUI() {
    pedirJson_(function (datos) {
      if (datos.tipo !== 'traspaso' || !datos.clases || !datos.clases.length) {
        return aviso('Ese archivo no es un traspaso de grupos. Para una copia completa usa "Restaurar desde archivo".');
      }
      var resumen = datos.clases.map(function (c) {
        return '<li><b>' + esc(c.nombre) + '</b> · ' + esc(c.curso) +
          ' · ' + (c.alumnos || []).length + ' alumnos/as' +
          (c.cursoAcademico ? ' · ' + esc(c.cursoAcademico) : '') + '</li>';
      }).join('');
      // Grupos propios que coinciden en nombre y curso con los del archivo
      // (p. ej. re-importar un traspaso, o recibir una versión más reciente):
      // importar SIEMPRE añade, así que se ofrece archivar los antiguos para
      // no verlos duplicados. Nada se sobrescribe ni se pierde.
      var coincidentes = [], vistosC = {};
      datos.clases.forEach(function (c) {
        estado.clases.forEach(function (m) {
          if (m.archivado || vistosC[m.claseId]) return;
          if (String(m.nombre).trim().toLowerCase() === String(c.nombre || '').trim().toLowerCase() &&
              m.curso === c.curso) {
            vistosC[m.claseId] = true;
            coincidentes.push(m);
          }
        });
      });
      var avisoDup = coincidentes.length
        ? '<p class="mensaje aviso-peligro">Ya tienes ' + coincidentes.length + ' grupo(s) con el ' +
          'mismo nombre y curso (' + esc(coincidentes.map(function (m) { return m.nombre; }).join(', ')) +
          '). El traspaso se añade aparte: no se fusiona ni sobrescribe nada.</p>' +
          '<label class="check check-suelto"><input type="checkbox" id="f-archivar-viejos" checked> ' +
          'Archivar mis grupos coincidentes al recibir (los nuevos quedan a la vista; ' +
          'los antiguos, en «Archivados»)</label>'
        : '';
      abrirModal('Recibir grupos',
        '<p class="mensaje">Traspaso de <b>' + esc(datos.de || 'otra persona') + '</b>' +
        (datos.fecha ? ' (' + esc(fechaCorta(datos.fecha)) + ')' : '') + ' con:</p>' +
        '<ol class="pasos">' + resumen + '</ol>' +
        '<p class="mensaje">Se <b>añadirán</b> a tu cuaderno con sus clases, unidades y notas. ' +
        'Tus grupos actuales no se tocan.</p>' + avisoDup,
        'Recibir grupos',
        function () {
          botonModalCargando('Recibiendo…');
          var chk = document.getElementById('f-archivar-viejos');
          var archivarIds = (chk && chk.checked)
            ? coincidentes.map(function (m) { return m.claseId; }) : [];
          llamar('importarGrupos', [datos, archivarIds], function (r) {
            invalidarCaches();
            llamar('getEstadoInicial', [], function (e) {
              estado = e; cerrarModal(); irAEvaluaciones();
              var otroCurso = (r.cursos || []).filter(function (c) {
                return c && estado.cursos && c !== estado.cursos.activo;
              });
              avisoOk('Recibidos ' + r.grupos + ' grupo(s) y ' + r.clases + ' clase(s).' +
                (archivarIds.length ? ' Tus ' + archivarIds.length + ' antiguos quedan archivados.' : '') +
                (otroCurso.length ? ' Ojo: alguno está en el curso ' + otroCurso[0] + '.' : ''));
            });
          });
        });
    });
  }

  // ---------- evaluaciones ----------
  /** ¿La clase está fuera de la vista? (archivada ella o su grupo). */
  function evalOculta_(ev) { return !!(ev.archivado || ev.grupoArchivado); }

  function tarjetaEval_(ev, archivada) {
    var col = ev.color || 'var(--acento)';
    return '<div class="clase-card' + (archivada ? ' archivada' : '') + '" data-id="' + ev.evalId +
      '" style="--c:' + col + '" tabindex="0" role="button" ' +
      'onmouseenter="App.prefetchEval(\'' + ev.evalId + '\')" ' +
      'onclick="App.abrirEvaluacion(\'' + ev.evalId + '\')">' +
      '<div class="clase-card-head">' +
        '<span class="clase-card-ico">' + iconoSvg(ev.icono) + '</span>' +
        '<h3>' + esc(tituloEval(ev)) + '</h3>' +
        (archivada
          ? '<button class="btn btn-restaurar" title="Restaurar (volver a la vista)" ' +
            'onclick="event.stopPropagation();App.restaurarEval(\'' + ev.evalId + '\')">' +
            svgUI('restaurar') + ' Restaurar</button>'
          : '<span class="cc-grip" title="Arrastra para reordenar" ' +
            'onpointerdown="App.dragEval(event)" onclick="event.stopPropagation()">⠿</span>') +
      '</div>' +
      '<div class="clase-card-body">' +
        (ev.claseId
          ? '<div class="cc-meta"><b>' + ev.numAlumnos + '</b> alumnos/as</div>' +
            '<div class="cc-meta">' + esc(ev.claseNombre) + ' · ' + esc(ev.curso) + '</div>'
          : '<div class="cc-meta cc-sin-grupo">Sin grupo — pulsa para asignarlo</div>') +
      '</div>' +
      '</div>';
  }

  function pintarEvaluaciones() {
    var cont = document.getElementById('lista-evaluaciones');
    var activas = estado.evaluaciones.filter(function (e) { return !evalOculta_(e); });
    // Archivadas SUELTAS: las ocultas por su grupo se restauran restaurando el grupo.
    var archivadas = estado.evaluaciones.filter(function (e) {
      return e.archivado && !e.grupoArchivado;
    });
    if (!activas.length && !archivadas.length) {
      cont.innerHTML = '<div class="vacio">Aún no tienes clases. ' +
        'Crea una eligiendo un grupo y un área.</div>';
      return;
    }
    var h = activas.map(function (ev) { return tarjetaEval_(ev, false); }).join('');
    if (!activas.length) h += '<div class="vacio">No tienes clases a la vista (están archivadas).</div>';
    cont.innerHTML = h;
    pintarArchivadas_(cont, archivadas.map(function (ev) { return tarjetaEval_(ev, true); }));
  }

  /** Añade tras la lista la sección plegada «Archivados (N)» con sus tarjetas. */
  function pintarArchivadas_(cont, tarjetas, claseRejilla) {
    var prev = cont.parentNode.querySelector('.bloque-archivados');
    if (prev) prev.remove();
    if (!tarjetas.length) return;
    cont.insertAdjacentHTML('afterend',
      '<details class="bloque-archivados"><summary>' + svgUI('archivar') +
      ' Archivados <span class="contador">(' + tarjetas.length + ')</span></summary>' +
      '<div class="' + (claseRejilla || 'tarjetas') + '">' + tarjetas.join('') + '</div></details>');
  }

  // Paleta de colores predefinidos para las clases (por área).
  var COLORES = ['#5b5bd6', '#2e7d57', '#d1453b', '#e08e0b', '#0e7490',
    '#9333ea', '#db2777', '#475569'];
  function swatchesHtml(sel) {
    return '<div class="swatches">' + COLORES.map(function (c) {
      return '<span class="swatch' + (c === sel ? ' sel' : '') + '" data-color="' + c + '" ' +
        'style="background:' + c + '" onclick="App.elegirColor(this)"></span>';
    }).join('') + '</div>';
  }
  function elegirColor(el) {
    [].forEach.call(document.querySelectorAll('.swatch'), function (s) { s.classList.remove('sel'); });
    el.classList.add('sel');
  }
  function colorElegido() {
    var s = document.querySelector('.swatch.sel');
    return s ? s.dataset.color : '';
  }

  // ---------- catálogo de iconos SVG (curado; se guarda solo el id) ----------
  // Trazos con stroke="currentColor" para teñirlos (blanco en la tarjeta,
  // color de acento en el selector). NUNCA se admite SVG del usuario (XSS).
  var ICONOS = {
    libro:       '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',

    personas:    '<circle cx="9" cy="8" r="3.2"/><path d="M2.6 20a6.4 6.4 0 0 1 12.8 0"/><path d="M16.5 5.3a3.2 3.2 0 0 1 0 5.4"/><path d="M18 13.4A6.4 6.4 0 0 1 21.4 20"/>'
  };
  var ICONO_DEFECTO = 'libro';

  /** Devuelve el marcado <svg> de un icono por id (con fallback seguro). */
  function iconoSvg(id) {
    var p = ICONOS[id] || ICONOS[ICONO_DEFECTO];
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
      'stroke-linecap="round" stroke-linejoin="round">' + p + '</svg>';
  }
  /** Cuadrícula de iconos para el modal (uno seleccionable). */
  function iconosHtml(sel) {
    sel = sel || ICONO_DEFECTO;
    return '<div class="iconos-grid">' + Object.keys(ICONOS).map(function (id) {
      return '<button type="button" class="icono-opt' + (id === sel ? ' sel' : '') +
        '" data-ico="' + id + '" title="' + id + '" onclick="App.elegirIcono(this)">' +
        iconoSvg(id) + '</button>';
    }).join('') + '</div>';
  }
  function elegirIcono(el) {
    [].forEach.call(document.querySelectorAll('.icono-opt'), function (b) { b.classList.remove('sel'); });
    el.classList.add('sel');
  }
  function iconoElegido() {
    var s = document.querySelector('.icono-opt.sel');
    return s ? s.dataset.ico : ICONO_DEFECTO;
  }

  // ---------- iconos SVG de interfaz (botones de la app) ----------
  // Separados del catálogo ICONOS a propósito: aquel alimenta el selector de
  // iconos de las tarjetas y estos NO deben aparecer ahí. Trazo currentColor;
  // el tamaño y el estilo de línea los da la clase .svg-ico (ver estilos).
  var ICONOS_UI = {
    lapiz:     '<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/>',
    duplicar:  '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
    papelera:  '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
    equis:     '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    check:     '<polyline points="20 6 9 17 4 12"/>',
    descargar: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
    restaurar: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
    guardar:   '<path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>',
    info:      '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
    ojo:       '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
    expandir:  '<polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/>',
    contraer:  '<polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/>',
    archivar:  '<polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/>',
    enlace:    '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
    chevron:   '<polyline points="9 6 15 12 9 18"/>'
  };
  /** Icono SVG de interfaz por id. */
  function svgUI(id) {
    return '<svg class="svg-ico" viewBox="0 0 24 24" aria-hidden="true">' +
      (ICONOS_UI[id] || '') + '</svg>';
  }

  function nuevaEvaluacion() {
    // Los grupos archivados no se ofrecen: primero se restauran.
    var grupos = estado.clases.filter(function (c) { return !c.archivado; });
    if (!grupos.length) {
      confirmar('Sin grupos', 'Primero necesitas un grupo de alumnado. ¿Crear un grupo ahora?',
        'Crear grupo', nuevaClase);
      return;
    }
    var optClases = grupos.map(function (c) {
      return '<option value="' + c.claseId + '">' + esc(c.nombre + ' · ' + c.curso) + '</option>';
    }).join('');

    abrirModal('Nueva clase',
      '<label>Grupo' +
      '<select id="f-clase" onchange="App.claseCambiada()">' + optClases + '</select></label>' +
      '<label>Área' +
      '<select id="f-area"></select></label>' +
      '<label>Nombre de la clase' +
      '<input id="f-eval-nombre" type="text" placeholder="Opcional; por defecto, el área"></label>' +
      '<div class="campo-crit"><span class="etq">Color</span>' + swatchesHtml(COLORES[0]) + '</div>' +
      '<div class="campo-crit"><span class="etq">Icono</span>' + iconosHtml(ICONO_DEFECTO) + '</div>' +
      '<p class="ayuda">El curso lo aporta el grupo; aquí eliges el área a evaluar.</p>',
      'Crear clase',
      function () {
        var claseId = val('f-clase');
        var area = val('f-area');
        if (!claseId || !area) return aviso('Elige grupo y área.');
        botonModalCargando('Creando…');
        llamar('crearEvaluacion',
          [{ claseId: claseId, area: area, nombre: val('f-eval-nombre'),
             color: colorElegido(), icono: iconoElegido() }],
          function (ev) {
          estado.evaluaciones.push({
            evalId: ev.evalId, claseId: ev.clase.claseId, area: ev.area,
            color: ev.color, icono: ev.icono, nombre: ev.nombre,
            claseNombre: ev.clase.nombre, curso: ev.curso,
            numAlumnos: ev.clase.alumnos.length, creado: ev.creado
          });
          cerrarModal();
          abrirEvaluacionCargada(ev);
        });
      });
    claseCambiada(); // rellena áreas para el primer grupo
  }

  /** Al cambiar la clase, recargamos las áreas de su curso. */
  function claseCambiada() {
    var clase = claseDe(val('f-clase'));
    document.getElementById('f-area').innerHTML =
      opcionesAreas(clase ? clase.curso : '');
  }

  var evalCache = {}; // evalId -> evaluación (con clase y alumnos)
  var evalActiva = null; // última clase abierta (descarta respuestas tardías)
  var avisoAlumnosPara = null; // evalId cuyo grupo vacío hay que avisar al cargar (una vez)

  function abrirEvaluacion(evalId) {
    // Clase sin grupo aún: no se abre el detalle; se pide asignar/crear grupo.
    var r = evalDe_(evalId);
    if (r && !r.claseId) { asignarGrupoUI(evalId); return; }
    avisoAlumnosPara = evalId; // al cargar el detalle, se avisa si el grupo no tiene alumnado
    evalActiva = evalId;
    if (evalCache[evalId]) {
      // Instantáneo desde caché (precarga o visita anterior), sin ir al servidor.
      abrirEvaluacionCargada(evalCache[evalId]);
      return;
    }
    mostrar('vista-evaluacion');
    // Cabecera al instante con lo que ya sabemos de la tarjeta: nombre, grupo
    // e icono (evita el hueco en blanco mientras responde el servidor).
    document.getElementById('eval-titulo').textContent = r ? tituloEval(r) : '';
    document.getElementById('eval-meta').textContent =
      r ? (r.claseNombre + ' · ' + r.curso + ' · ' + r.numAlumnos + ' alumnos/as') : '';
    var ico = document.getElementById('eval-ico');
    ico.innerHTML = r ? iconoSvg(r.icono) : '';
    ico.style.background = (r && r.color) || '';
    document.getElementById('lista-unidades').innerHTML = spinner();
    // Evaluación + unidades en UNA llamada (antes eran dos viajes secuenciales).
    llamar('getEvaluacionCompleta', [evalId], function (ev) {
      evalCache[evalId] = ev;
      // Si ya navegaste a otro sitio (u otra clase), la respuesta tardía solo
      // actualiza la caché: NUNCA debe devolverte a esta vista.
      if (vistaActual !== 'vista-evaluacion' || evalActiva !== evalId) return;
      abrirEvaluacionCargada(ev);
    });
  }
  function abrirEvaluacionCargada(ev) {
    registrarHistorial({ v: 'evaluacion', id: ev.evalId });
    if (!ev.unidades) ev.unidades = [];
    evalCache[ev.evalId] = ev; // p. ej. al llegar desde "crear evaluación"
    evalActual = ev;
    setTitulo('Clases');
    mostrar('vista-evaluacion');
    document.getElementById('eval-titulo').textContent = tituloEval(ev);
    var ico = document.getElementById('eval-ico');
    ico.innerHTML = iconoSvg(ev.icono);
    ico.style.background = ev.color || '';
    document.getElementById('eval-meta').textContent =
      ev.clase.nombre + ' · ' + ev.curso + ' · ' + ev.clase.alumnos.length + ' alumnos/as';
    pintarUnidades();
    precargarRejillas(); // las unidades se abrirán al instante
    // Aviso (una sola vez por entrada): grupo asociado pero sin alumnado.
    if (avisoAlumnosPara === ev.evalId) {
      avisoAlumnosPara = null;
      if (ev.clase && ev.clase.claseId && !(ev.clase.alumnos || []).length) avisarSinAlumnos_(ev);
    }
  }

  // ---------- completar una clase sin grupo / sin alumnado ----------
  /** Modal para asignar (o crear) el grupo de una clase que aún no lo tiene. */
  function asignarGrupoUI(evalId, preGroupId) {
    var r = evalDe_(evalId);
    var grupos = (estado.clases || []).filter(function (c) { return !c.archivado; });
    var opts = '<option value="">— Elegir grupo —</option>' +
      grupos.map(function (c) {
        return '<option value="' + c.claseId + '"' + (c.claseId === preGroupId ? ' selected' : '') +
          '>' + esc(c.nombre + ' · ' + c.curso) + '</option>';
      }).join('') +
      '<option value="__nuevo__">➕ Crear grupo nuevo…</option>';
    abrirModal('Clase sin grupo',
      '<p class="ayuda">La clase «' + esc(r ? tituloEval(r) : '') + '» todavía no tiene grupo de ' +
        'alumnado. Elige un grupo (o crea uno) y el área que vas a evaluar.</p>' +
      '<label>Grupo<select id="ag-grupo" onchange="App.agGrupoCambiado(\'' + evalId + '\')">' +
        opts + '</select></label>' +
      '<label>Área<select id="ag-area"></select></label>',
      'Asociar', function () { confirmarAsociarGrupo_(evalId); }, { sinFoco: true });
    agGrupoCambiado(evalId); // rellena las áreas del grupo preseleccionado (si lo hay)
  }

  /** Al cambiar el grupo del modal: si es «crear nuevo», lanza el alta; si no, recarga áreas. */
  function agGrupoCambiado(evalId) {
    var v = val('ag-grupo');
    if (v === '__nuevo__') {
      // Crea el grupo con el flujo normal y vuelve aquí con él ya elegido.
      nuevaClase(function (cl) { asignarGrupoUI(evalId, cl.claseId); });
      return;
    }
    var cl = claseDe(v);
    document.getElementById('ag-area').innerHTML = opcionesAreas(cl ? cl.curso : '');
  }

  function confirmarAsociarGrupo_(evalId) {
    var claseId = val('ag-grupo');
    var area = val('ag-area');
    if (!claseId || claseId === '__nuevo__') return aviso('Elige un grupo.');
    if (!area) return aviso('Elige el área que vas a evaluar.');
    botonModalCargando('Asociando…');
    llamar('asociarGrupoEvaluacion', [evalId, claseId, area], function (ev) {
      var r = evalDe_(evalId), cl = claseDe(claseId);
      if (r) {
        r.claseId = claseId; r.area = ev.area; r.nombre = ev.nombre; r.sinGrupo = false;
        r.claseNombre = cl ? cl.nombre : ''; r.curso = cl ? cl.curso : '';
        r.numAlumnos = cl ? (cl.numAlumnos || 0) : 0;
      }
      delete evalCache[evalId]; // se recargará ya con su grupo
      cerrarModal();
      avisoOk('Clase asociada al grupo.');
      abrirEvaluacion(evalId); // abre el detalle (y avisa si el grupo está sin alumnado)
    });
  }

  /** Aviso al entrar en una clase cuyo grupo aún no tiene alumnado. */
  function avisarSinAlumnos_(ev) {
    var cl = ev.clase;
    abrirModal('Grupo sin alumnado',
      '<p class="mensaje">El grupo «' + esc(cl.nombre) + '» de esta clase todavía no tiene ' +
        'alumnado. Puedes incluirlo ahora o dejarlo para más adelante.</p>',

  // ---------- reordenar tarjetas arrastrando (genérico; ratón y táctil) ----------
  // La tarjeta arrastrada se levanta y sigue al puntero; las demás se apartan.
  var arrastre = null; // { el, cont, sel, persist, moved, offX, offY }

  function dragInicio(e, sel, persist) {
    if (e.button != null && e.button !== 0) return; // solo botón principal
    e.preventDefault(); e.stopPropagation();
    var el = e.currentTarget.closest(sel);
    if (!el) return;
    var r = el.getBoundingClientRect();
    arrastre = { el: el, cont: el.parentNode, sel: sel, persist: persist,
      moved: false, offX: e.clientX - r.left, offY: e.clientY - r.top };
    el.classList.add('arrastrando');
    document.body.classList.add('reordenando');
    if (el.setPointerCapture) { try { el.setPointerCapture(e.pointerId); } catch (x) {} }
    document.addEventListener('pointermove', dragMueve);
    document.addEventListener('pointerup', dragFin, true);
  }
  function dragMueve(e) {
    if (!arrastre) return;
    arrastre.moved = true;
    var el = arrastre.el;
    var destino = tarjetaBajoPunto_(arrastre.cont, arrastre.sel, e.clientX, e.clientY, el);
    if (destino) {
      var r = destino.getBoundingClientRect();
      var despues = e.clientX > (r.left + r.width / 2);
      var ref = despues ? destino.nextSibling : destino;
      if (ref !== el && ref !== el.nextSibling) arrastre.cont.insertBefore(el, ref);
    }
    el.style.transform = 'none';
    var nr = el.getBoundingClientRect();
    el.style.transform = 'translate(' + (e.clientX - arrastre.offX - nr.left) + 'px,' +
      (e.clientY - arrastre.offY - nr.top) + 'px)';
  }
  function dragFin() {
    document.removeEventListener('pointermove', dragMueve);
    document.removeEventListener('pointerup', dragFin, true);
    if (!arrastre) return;
    var a = arrastre; arrastre = null;
    a.el.style.transform = '';
    a.el.classList.remove('arrastrando');
    document.body.classList.remove('reordenando');
    if (!a.moved) return;
    // Evita que el "click" posterior al soltar abra la tarjeta.
    var swallow = function (ev) { ev.stopPropagation(); ev.preventDefault(); quitar(); };
    var quitar = function () { document.removeEventListener('click', swallow, true); };
    document.addEventListener('click', swallow, true);
    setTimeout(quitar, 350);
    var ids = [].map.call(a.cont.querySelectorAll(a.sel), function (c) { return c.dataset.id; });
    a.persist(ids);
  }
  /** Tarjeta (del selector) cuyo rectángulo contiene el punto (excluyendo una). */
  function tarjetaBajoPunto_(cont, sel, x, y, excluir) {
    var cards = cont.querySelectorAll(sel);
    for (var i = 0; i < cards.length; i++) {
      if (cards[i] === excluir) continue;
      var r = cards[i].getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return cards[i];
    }
    return null;
  }
  /** Reordena arr (en sitio) para seguir el orden de ids (por la clave dada). */
  function reordenarArray_(arr, ids, clave) {
    var by = {};
    arr.forEach(function (x) { by[x[clave]] = x; });
    var out = ids.map(function (id) { return by[id]; }).filter(Boolean);
    arr.forEach(function (x) { if (ids.indexOf(x[clave]) < 0) out.push(x); });
    arr.length = 0; Array.prototype.push.apply(arr, out);
  }

  // Entradas por tipo de tarjeta (asa ⠿):
  function gripDown(e) { // unidades
    dragInicio(e, '.tarjeta-unidad', function (ids) {

  function dragEval(e) { // tarjetas de clase (evaluaciones)

    });

  function dragGrupo(e) { // tarjetas de grupo (solo dentro de su sección de curso)
    dragInicio(e, '.grupo-card', function (ids) {
      reordenarArray_(estado.clases, ids, 'claseId');
      llamar('reordenarClases', [ids], function () {});

  /**
   * Eliminar desde una clase: pregunta el alcance (solo esta clase, o el grupo
   * entero con TODAS sus clases), con aviso claro de lo que arrastra cada opción.
   */
  function eliminarEvaluacionActual() {
    var ev = evalActual;
    var claseId = ev.clase ? ev.clase.claseId : null;
    var grupoNombre = ev.clase ? ev.clase.nombre : '';
    var n = claseId ? evalsDeGrupo_(claseId).length : 0;
    abrirModal('Eliminar…',
      '<div class="campo-crit alcance-modal">' +
      '<label><input type="radio" name="f-alcance" value="clase" checked ' +
        'onchange="App.avisoAlcanceEliminar()"> Solo esta clase («' + esc(tituloEval(ev)) + '»)</label>' +
      (claseId && n
        ? '<label><input type="radio" name="f-alcance" value="grupo" ' +
          'onchange="App.avisoAlcanceEliminar()"> El grupo «' + esc(grupoNombre) +
          '» entero, con sus ' + n + ' clase(s)</label>'
        : '') +
      '</div>' +
      '<p class="mensaje" id="aviso-alcance">Se elimina solo esta clase (área) con sus unidades ' +
      'y notas. El grupo y su alumnado se conservan.</p>',
      'Eliminar',
      function () {
        botonModalCargando('Eliminando…');
        if (alcanceElegido_() === 'grupo') { cerrarModal(); eliminarGrupoEntero_(claseId); return; }
        var id = ev.evalId;
        // Borrado optimista: se sale YA de la pantalla y el servidor trabaja
        // detrás. Si el borrado falla, se restaura la tarjeta y se avisa.
        var pos = -1, borrada = null;
        estado.evaluaciones.forEach(function (e, i) { if (e.evalId === id) { pos = i; borrada = e; } });
        estado.evaluaciones = estado.evaluaciones.filter(function (e) { return e.evalId !== id; });
        delete evalCache[id];
        cerrarModal();
        irAEvaluaciones();
        google.script.run
          .withSuccessHandler(function () { avisoOk('Clase eliminada.'); })
          .withFailureHandler(function (err) {
            if (borrada) estado.evaluaciones.splice(pos < 0 ? 0 : pos, 0, borrada);
            if (vistaActual === 'vista-evaluaciones') pintarEvaluaciones();
            aviso('No se pudo eliminar la clase: ' + ((err && err.message) || 'error'));
          })
          .eliminarEvaluacion(id);
      });
  }

  /** Actualiza el aviso del modal de eliminar según el alcance marcado. */
  function avisoAlcanceEliminar() {
    var p = document.getElementById('aviso-alcance');
    if (!p) return;
    if (alcanceElegido_() === 'grupo') {
      p.className = 'mensaje aviso-peligro';
      p.innerHTML = '⚠️ Se eliminarán el grupo, su alumnado y <b>todas</b> sus clases con sus ' +
        'notas. Quedan un tiempo en la papelera. Si solo quieres quitarlo de la vista, usa Archivar.';
    } else {
      p.className = 'mensaje';
      p.textContent = 'Se elimina solo esta clase (área) con sus unidades y notas. ' +
        'El grupo y su alumnado se conservan.';

  function alcanceElegido_() {
    var m = document.querySelector('input[name="f-alcance"]:checked');
    return m ? m.value : 'clase';
  }

  /** Clases (evaluaciones) de un grupo en el curso activo. */
  function evalsDeGrupo_(claseId) {
    return estado.evaluaciones.filter(function (e) { return e.claseId === claseId; });
  }

  /** Borrado optimista del grupo con TODAS sus clases (cascada en el servidor). */
  function eliminarGrupoEntero_(claseId) {
    estado.clases = estado.clases.filter(function (c) { return c.claseId !== claseId; });
    estado.evaluaciones = estado.evaluaciones.filter(function (e) {
      if (e.claseId !== claseId) return true;
      delete evalCache[e.evalId];
      return false;
    });
    delete claseCache[claseId];
    irAEvaluaciones();
    google.script.run
      .withSuccessHandler(function () {
        avisoOk('Grupo y clases eliminados (recuperables un tiempo en la papelera).');
      })
      .withFailureHandler(function (err) {
        aviso('No se pudo eliminar el grupo: ' + ((err && err.message) || 'error'));
        // Recarga el estado del servidor: recupera lo que quedara a medias.
        llamar('getEstadoInicial', [], function (e) {
          estado = e;
          if (vistaActual === 'vista-evaluaciones') pintarEvaluaciones();
          if (vistaActual === 'vista-clases') pintarClases();
        });
      })
      .eliminarClaseConTodo(claseId);
  }

  // ---------- archivar: quitar de la vista sin eliminar ----------
  /**
   * Archivar desde una clase: pregunta el alcance (solo esta clase, o el grupo
   * con todas sus clases). Si la clase ya está archivada, ofrece restaurarla.

  function archivarEvalUI() {

    var reg = null;
    estado.evaluaciones.forEach(function (e) { if (e.evalId === ev.evalId) reg = e; });
    if (reg && reg.archivado) {
      confirmar('Restaurar clase', 'Esta clase está archivada. ¿Devolverla a la vista?',
        'Restaurar', function () { restaurarEval(ev.evalId); });
      return;
    }
    var claseId = ev.clase ? ev.clase.claseId : null;
    var grupoNombre = ev.clase ? ev.clase.nombre : '';
    var n = claseId ? evalsDeGrupo_(claseId).length : 0;
    abrirModal('Archivar…',
      '<p class="mensaje">Archivar quita de la vista <b>sin borrar nada</b>. Se restaura ' +
      'cuando quieras desde la sección «Archivados», al pie de cada lista.</p>' +
      '<div class="campo-crit alcance-modal">' +
      '<label><input type="radio" name="f-alcance" value="clase" checked> ' +
        'Solo esta clase («' + esc(tituloEval(ev)) + '»)</label>' +
      (claseId && n
        ? '<label><input type="radio" name="f-alcance" value="grupo"> El grupo «' +
          esc(grupoNombre) + '» con sus ' + n + ' clase(s)</label>'
        : '') +
      '</div>',
      'Archivar',
      function () {

        if (alcanceElegido_() === 'grupo') {

          });
        } else {
          llamar('archivarEvaluacion', [ev.evalId, true], function () {

            cerrarModal(); irAEvaluaciones();
            avisoOk('Clase archivada.');
          });
        }
      });
  }

  /** Archivar el grupo actual (con sus clases). Si ya está archivado, restaurar. */
  function archivarGrupoUI() {

  /** Marca en el estado local el grupo (y sus clases) como archivado o no. */
  function marcarGrupoArchivado_(claseId, si) {
    estado.clases.forEach(function (c) { if (c.claseId === claseId) c.archivado = si; });

  // ---------- selección de unidades que entran en las medias (por clase) ----------
  /** Ids seleccionados (localStorage), o null = todas. */
  function resumenUdSel_(evalId) {
    try {
      var v = JSON.parse(localStorage.getItem('resumen-uds-' + evalId));
      return (Array.isArray(v) && v.length) ? v : null;
    } catch (e) { return null; }
  }
  /** Guarda la selección; si están TODAS marcadas, se borra la clave (= todas). */
  function guardarResumenUdSel_(evalId, ids, total) {
    try {
      if (!ids.length || ids.length >= total) localStorage.removeItem('resumen-uds-' + evalId);
      else localStorage.setItem('resumen-uds-' + evalId, JSON.stringify(ids));
    } catch (e) {}
  }
  function actualizarBtnResumenUds_() {
    var btn = document.getElementById('resumen-uds-btn');
    if (!btn || !resumenData) return;
    var nUsadas = (resumenData.unidades || []).length;
    var nTot = (resumenData.unidadesTodas || resumenData.unidades || []).length;
    btn.textContent = (nUsadas < nTot) ? ('Unidades (' + nUsadas + '/' + nTot + ') ▾') : 'Unidades ▾';
  }
  /** Abre/cierra el menú de unidades y lo puebla con las casillas. */
  function toggleResumenUds(ev) {
    if (ev) ev.stopPropagation();
    var menu = document.getElementById('resumen-uds-menu');
    if (!menu || !resumenData) return;
    if (!menu.hidden) { menu.hidden = true; return; }
    // Cerrar al pulsar fuera (como el menú de config del planificador).
    setTimeout(function () { document.addEventListener('click', cerrarResumenUdsFuera_); }, 0);
    var todas = resumenData.unidadesTodas || resumenData.unidades || [];
    var usadas = {};
    (resumenData.unidades || []).forEach(function (u) { usadas[u.unidadId] = true; });
    menu.innerHTML =
      '<div class="pcfg-group"><span class="pcfg-tit">Unidades en las medias</span>' +
      '<div class="ru-acc"><button type="button" class="link" onclick="App.resumenUdsTodas(true)">Todas</button>' +
      '<button type="button" class="link" onclick="App.resumenUdsTodas(false)">Ninguna</button></div>' +
      todas.map(function (u) {
        return '<label class="check ru-item"><input type="checkbox" class="ru-chk" value="' +
          esc(u.unidadId) + '"' + (usadas[u.unidadId] ? ' checked' : '') +
          ' onchange="App.resumenUdCambiada()"> ' + esc(u.nombre) + '</label>';
      }).join('') + '</div>';
    menu.hidden = false;
  }
  function cerrarResumenUdsFuera_(ev) {
    if (ev && ev.target && ev.target.closest && ev.target.closest('.resumen-uds-wrap')) return;
    var menu = document.getElementById('resumen-uds-menu');
    if (menu) menu.hidden = true;
    document.removeEventListener('click', cerrarResumenUdsFuera_);
  }
  /** Marca/desmarca todas las casillas del menú y aplica. */
  function resumenUdsTodas(si) {
    [].forEach.call(document.querySelectorAll('#resumen-uds-menu .ru-chk'), function (c) { c.checked = si; });
    resumenUdCambiada();
  }
  /** Recoge la selección del menú, la guarda y recarga el resumen. */
  function resumenUdCambiada() {
    var todas = (resumenData && resumenData.unidadesTodas) || [];
    var ids = [];
    [].forEach.call(document.querySelectorAll('#resumen-uds-menu .ru-chk'), function (c) {
      if (c.checked) ids.push(c.value);
    });
    guardarResumenUdSel_(evalActual.evalId, ids, todas.length);
    cargarResumen_();
  }

  /** Cabecera compacta de un RA: "RA1" de "RA1: Recepciona…" (o el texto entero). */
  function raCorto_(ra) {
    var m = /^([A-Za-z]{1,4}\s?\d+)\s*[:.\-–]/.exec(ra || '');
    return m ? m[1] : ra;
  }

  function pintarResumen() {
    ajustarAltoRejillas(); // la cabecera ya está pintada: mide el hueco real
    var cont = document.getElementById('resumen-cont');
    var R = resumenData;
    if (!R.criterios.length && !R.unidades.length) {
      cont.innerHTML = '<div class="vacio">Aún no hay datos. Crea unidades y evalúa actividades.</div>';
      return;
    }
    var verUds = document.getElementById('ver-unidades-resumen').checked;
    var uds = verUds ? R.unidades : [];

    var h = '<table class="rejilla"><thead><tr>' +
      '<th class="idx">#</th><th class="esq">Alumno/a</th><th class="al-corto"></th>';
    uds.forEach(function (u) {
      h += '<th class="act" title="Nota de la unidad">' +
        '<span class="act-nom">' + esc(u.nombre) + '</span></th>';
    });
    h += '<th class="nota sep">FINAL</th>';
    // «Acumulada» (opcional): lo no evaluado cuenta 0 — lo asegurado hoy.
    var chkAcum = document.getElementById('ver-acumulada-resumen');
    var verAcum = !!(chkAcum && chkAcum.checked && R.finalAcum);
    if (verAcum) h += '<th class="nota sep" title="Si lo no evaluado contara 0">ACUM.</th>';
    // Columnas por RA (solo FP: criterios propios agrupados; nota ponderada).
    var ras = R.ras || [];
    ras.forEach(function (ra) {
      h += '<th class="crit-col ra-col" title="' + esc(ra) + '">' + esc(raCorto_(ra)) + '</th>';
    });
    R.criterios.forEach(function (cod) {
      h += '<th class="crit-col" title="' + esc(infoCritR(cod).completo) + '">' + esc(cod) + '</th>';
    });
    h += '</tr></thead><tbody>';

    R.alumnos.forEach(function (al, i) {
      h += '<tr><td class="idx">' + (i + 1) + '</td>' + celdaAlumno(al.nombre);
      uds.forEach(function (u) {
        h += celdaNum((R.unidadNota[al.id] || {})[u.unidadId]);
      });
      h += celdaNum(R.final[al.id], ' nota sep');
      if (verAcum) h += celdaNum(R.finalAcum[al.id], ' nota sep');
      ras.forEach(function (ra) {
        h += celdaNum((R.raNota && R.raNota[al.id] || {})[ra], ' crit-col ra-col');
      });
      R.criterios.forEach(function (cod) {
        h += celdaNum((R.critGlobal[al.id] || {})[cod], ' crit-col');
      });
      h += '</tr>';
    });
    h += '</tbody></table>';
    cont.innerHTML = h;
  }

  function celdaNum(n, extra) {
    var g = claseNota(n);
    return '<td class="num' + (extra || '') + (g ? ' ' + g : '') + '">' +
      fmtNota(n, resumenData && resumenData.curso) + '</td>';
  }

  /** ¿El nivel del grupo es de Infantil? (añade etiquetas a las notas). */
  function esInfantil_(curso) {
    return String(curso || '').toLowerCase().indexOf('infantil') >= 0;
  }
  /** Etiqueta de la escala Infantil para una nota 0-10 (cortes entre niveles). */
  function etiquetaInfantil(n) {
    if (n == null) return '';
    return n < 3 ? 'POC' : n < 5 ? 'REG' : n < 7 ? 'ADE' : n < 9 ? 'BUE' : 'EXC';
  }
  /** Nota formateada; en grupos de Infantil añade su etiqueta ("8,2 BUE"). */
  function fmtNota(n, curso) {
    if (n == null) return '';
    return esInfantil_(curso) ? fmt(n) + ' ' + etiquetaInfantil(n) : fmt(n);
  }

  /**
   * Devuelve la clase de color (semáforo) según la nota:
   * top ≥8,5 · alta ≥7 · media ≥6 · baja ≥5 · suspenso <5.
   */
  function claseNota(n) {
    if (n == null) return '';
    if (n < 5) return 'g-susp';
    if (n < 6) return 'g-baja';
    if (n < 7) return 'g-media';
    if (n < 8.5) return 'g-alta';
    return 'g-top';
  }

  /** Iniciales (1-2 letras) a partir de un nombre "Apellidos, Nombre" o email. */
  function iniciales(nombre) {
    var s = String(nombre || '').split('@')[0].replace(/[.,_-]+/g, ' ');
    var p = s.trim().split(/\s+/).filter(Boolean);
    if (!p.length) return '–';
    return (p[0].charAt(0) + (p[1] ? p[1].charAt(0) : '')).toUpperCase();
  }

  /** Color estable (hash → paleta) para el avatar de cada alumno/a. */
  function colorAvatar(nombre) {
    var h = 0, s = String(nombre || '');
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return COLORES[h % COLORES.length];
  }

  /**
   * Nombre corto para pantallas pequeñas: el alias si lo hay ("Ye, Xin Yi
   * (Sofía)" → "Sofía"), si no el nombre de pila ("García, María" → "María"),
   * y si no hay coma, la primera palabra.
   */
  function nombreCorto(nombre) {
    var s = String(nombre || '');
    var m = /\(([^)]+)\)/.exec(s);
    if (m && m[1].trim()) return m[1].trim();
    var coma = s.indexOf(',');
    if (coma >= 0) return s.slice(coma + 1).replace(/\([^)]*\)/g, '').trim();
    return s.trim().split(/\s+/)[0] || '';
  }

  /** Celda izquierda con avatar de iniciales + nombre (rejilla y resumen). */
  function celdaAlumno(nombre) {
    return '<td class="esq" title="' + esc(nombre) + '"><span class="mini-avatar" style="background:' +
      colorAvatar(nombre) + '">' + esc(iniciales(nombre)) + '</span>' +
      '<span class="al-nom">' + esc(nombre) + '</span></td>' +
      // Columna extra SOLO móvil con el nombre corto. No es sticky a propósito:
      // al hacer scroll horizontal se va con las notas y queda fijo solo el avatar.
      '<td class="al-corto" title="' + esc(nombre) + '">' + esc(nombreCorto(nombre)) + '</td>';
  }
  function infoCritR(cod) {
    var v = (resumenData.criteriosInfo || {})[cod] || {};
    var completo = v.descripcion ? (cod + '. ' + v.descripcion) : (cod + '. ' + (v.texto || ''));
    return { completo: completo };
  }

  /** Copia el resumen (alumno + nota global de cada criterio) para Séneca. */
  function copiarResumenSeneca() {
    var R = resumenData;
    if (!R || !R.criterios.length) return aviso('No hay criterios evaluados todavía.');
    var lineas = [['Alumno'].concat(R.criterios).join('\t')];
    R.alumnos.forEach(function (al) {
      var fila = [nombreSeneca(al.nombre)];
      R.criterios.forEach(function (cod) {
        var n = (R.critGlobal[al.id] || {})[cod];
        fila.push(n == null ? '' : n.toFixed(2).replace('.', ','));
      });
      lineas.push(fila.join('\t'));
    });
    copiarAlPortapapeles(lineas.join('\n'),
      'Resumen copiado: ' + R.alumnos.length + ' alumnos/as y ' + R.criterios.length + ' criterios.');
  }

  // ---------- unidad: rejilla de evaluación ----------
  var rejilla = null;       // {unidad, alumnos, actividades, criteriosInfo, items}
  var rejillaCache = {};    // unidadId -> rejilla (carga instantánea al volver)
  var unidadActiva = null;  // unidad que se está viendo (descarta respuestas tardías)
  var inputs2d = [];        // matriz [fila][colActividad] -> <input>

  function abrirUnidad(unidadId) {
    registrarHistorial({ v: 'unidad', id: unidadId, eid: evalActual ? evalActual.evalId : '' });
    unidadActiva = unidadId;   // marca la unidad que se está abriendo
    setTitulo('Clases');
    mostrar('vista-unidad');
    document.getElementById('volver-unidad').onclick = function () {
      abrirEvaluacionCargada(evalActual);
    };
    var u = (evalActual.unidades || []).filter(function (x) { return x.unidadId === unidadId; })[0];
    pintarTituloUnidad_(u ? u.nombre : '');

    if (rejillaCache[unidadId]) {            // pinta al instante desde caché
      rejilla = rejillaCache[unidadId];
      pintarUnidadActual();
    } else {
      document.getElementById('unidad-meta').textContent = '';
      document.getElementById('rejilla-cont').innerHTML = spinner();
    }
    // Refresca desde el servidor, pero SOLO tras guardar lo pendiente (para no
    // sobrescribir ediciones sin persistir con datos antiguos).
    flushNotas(function () {
      llamar('getRejilla', [unidadId], function (r) {
        rejillaCache[unidadId] = r;                 // la caché siempre se actualiza
        // Descarta si ya abriste otra unidad O si saliste de la vista de unidad
        // (repintar en diferido cambiaría el título de la barra superior).
        if (unidadId !== unidadActiva || vistaActual !== 'vista-unidad') return;
        rejilla = r;
        pintarUnidadActual();
      });
    });
  }

  /** Título de la vista de unidad: "Clase | Unidad", todo en una línea. */
  function pintarTituloUnidad_(nombreUnidad) {
    document.getElementById('unidad-titulo').innerHTML =
      esc(tituloEval(evalActual)) + ' <span class="sep-titulo">|</span> ' +
      esc(nombreUnidad || '');
    document.getElementById('unidad-meta').textContent = '';
  }

  function pintarUnidadActual() {
    setTitulo('Clases');
    pintarTituloUnidad_(rejilla.unidad.nombre);
    pintarRejilla();
  }

  /**
   * Copia al portapapeles (TSV) el alumnado y la nota de cada criterio de la
   * unidad, listo para pegar en Séneca (Autonotas) o en una hoja de cálculo.
   * Formato: Alumno <tab> LCL.x.y.z <tab> ... con 2 decimales y coma.
   */
  function copiarSeneca() {
    if (!rejilla || !rejilla.actividades.length) {
      return aviso('Esta unidad no tiene actividades evaluadas.');
    }
    var crits = criteriosUsados();
    var lineas = [['Alumno'].concat(crits).join('\t')];
    rejilla.alumnos.forEach(function (al) {
      var fila = [nombreSeneca(al.nombre)];
      crits.forEach(function (cod) {
        var n = notaCriterio(al.id, cod);
        fila.push(n == null ? '' : n.toFixed(2).replace('.', ','));
      });
      lineas.push(fila.join('\t'));
    });
    copiarAlPortapapeles(lineas.join('\n'),
      'Copiado para Séneca: ' + rejilla.alumnos.length + ' alumnos/as y ' + crits.length + ' criterios.');
  }

  /** Explica el botón "Copiar para Séneca" y enlaza la extensión Autonotas. */
  function infoSeneca() {
    var url = 'https://chromewebstore.google.com/detail/autonotas-séneca/fgghhpmbkdhdgnnboeckhhnnjiknnkak?hl=es';
    abrirModal('Copiar para Séneca',
      '<p class="mensaje">El botón <b>Copiar para Séneca</b> copia al portapapeles, en columnas, ' +

      '<p class="mensaje">Está pensado para usarse con la extensión de Chrome ' +

      '<li>Instala la extensión <b>Autonotas Séneca</b>.</li>' +
      '<li>Aquí, pulsa <b>Copiar para Séneca</b>.</li>' +

      'Abrir Autonotas Séneca en Chrome Web Store ↗</a></p>',
      'Entendido', cerrarModal);
  }

  /**
   * Nombre "oficial" para Séneca: quita el pseudónimo entre paréntesis.
   * "Ye, Xin Yi (Sofía)" -> "Ye, Xin Yi". No altera el nombre guardado ni el
   * que ve el profe; solo lo que se copia/empareja.
   */
  function nombreSeneca(nombre) {
    return String(nombre || '').replace(/\([^)]*\)/g, '').replace(/\s+/g, ' ').trim();
  }

  function copiarAlPortapapeles(texto, mensajeOk) {
    var ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.position = 'fixed'; ta.style.top = '-1000px'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    if (ok) avisoOk(mensajeOk);
    else copiarManual(texto);
  }

  /** Si el navegador bloquea la copia automática, mostramos el texto para copiar. */
  function copiarManual(texto) {
    abrirModal('Copiar para Séneca',
      '<p class="ayuda">Selecciona todo (Ctrl/Cmd+A) y copia (Ctrl/Cmd+C):</p>' +
      '<textarea id="f-copia" rows="12" readonly></textarea>',
      'Hecho', cerrarModal);
    var t = document.getElementById('f-copia');
    t.value = texto; t.focus(); t.select();
  }


  function nuevaActividad() { modalActividad(null); }
  function editarActividadUI(id) { modalActividad(actDe(id)); }

  /**
   * Criterios cubiertos por OTRAS actividades/unidades (sin contar la actividad
   * en edición: su estado lo dictan las casillas del modal, EN VIVO). Se guarda
   * al construir la lista para que criterioCambiado() actualice las etiquetas.
   */
  var critCubiertosBase = {};

  /**
   * Construye la lista de criterios con casillas. Etiqueta como «no evaluado»
   * los que no cubre nadie más NI están marcados; marcar/desmarcar una casilla
   * actualiza la etiqueta al momento (criterioCambiado).
   */
  function listaCriteriosHtml(sel, excluirActId) {
    sel = sel || [];
    var info = rejilla.criteriosInfo;
    critCubiertosBase = {};
    (rejilla.asignadosFuera || []).forEach(function (c) { critCubiertosBase[c] = true; });
    (rejilla.actividades || []).forEach(function (a) {
      if (excluirActId && a.actividadId === excluirActId) return;
      (a.criterios || []).forEach(function (c) { critCubiertosBase[c] = true; });
    });
    var pendientes = 0;
    var html = Object.keys(info).sort(cmpCodigo).map(function (cod) {
      var c = infoCrit(cod);
      var marcado = sel.indexOf(cod) >= 0;
      var noAsig = !critCubiertosBase[cod] && !marcado;
      if (noAsig) pendientes++;
      return '<label class="crit' + (noAsig ? ' pendiente' : '') + '" title="' + esc(c.completo) + '">' +
        '<input type="checkbox" value="' + esc(cod) + '"' + (marcado ? ' checked' : '') +
        ' onchange="App.criterioCambiado(this)">' +
        '<span class="crit-txt"><b>' + esc(cod) + '</b> ' + esc(c.texto) +
        (noAsig ? ' <span class="tag-pend">no evaluado</span>' : '') + '</span></label>';
    }).join('');
    return { html: html || '<i>No hay criterios para esta área.</i>', pendientes: pendientes };
  }

  /** Al (des)marcar una casilla de criterio: etiqueta y contador al momento. */
  function criterioCambiado(input) {
    var lab = input.closest('label.crit');
    if (!lab) return;
    var pend = !input.checked && !critCubiertosBase[input.value];
    lab.classList.toggle('pendiente', pend);
    var chip = lab.querySelector('.tag-pend');
    if (pend && !chip) {
      lab.querySelector('.crit-txt').insertAdjacentHTML('beforeend',
        ' <span class="tag-pend">no evaluado</span>');
    } else if (!pend && chip) {
      chip.remove();
    }
    var n = document.querySelectorAll('.lista-crit label.crit.pendiente').length;
    var p = document.getElementById('nota-pendientes');
    if (p) p.innerHTML = notaPendientesTxt_(n);
  }

  function notaPendientes(p) {
    return '<p class="ayuda" id="nota-pendientes">' + notaPendientesTxt_(p) + '</p>';
  }
  function notaPendientesTxt_(p) {
    return p > 0
      ? 'Quedan <b>' + p + '</b> criterios por evaluar en el curso.'
      : svgUI('check') + ' Todos los criterios de la clase están ya asignados a alguna actividad.';
  }

  /** Modal compartido para crear o editar una actividad. act=null → crear. */
  function modalActividad(act) {
    var sel = act ? act.criterios : [];
    var lista = listaCriteriosHtml(sel, act && act.actividadId);
    var tipoSel = act ? tipoDe(act) : 'items';
    var esInformativa = !!(act && !(act.criterios || []).length);
    rubActSelId_ = act ? (act.rubricaId || '') : '';
    rubActMap_ = (act && act.rubMap) ? act.rubMap.slice() : [];
    rubActModo_ = rubActMap_.length ? 'indicador' : 'global';
    rubActDef_ = null;
    // La opción "Rúbrica" solo aparece para quien tenga la bandera.
    var conRubrica = !!(estado.flags && estado.flags.rubricas);
    var opcionesTipo = Object.keys(TIPOS_ACT).filter(function (id) {
      return id !== 'rubrica' || conRubrica;
    }).map(function (id) {
      return '<label class="tipo-opt"><input type="radio" name="f-act-tipo" value="' + id + '"' +
        (id === tipoSel ? ' checked' : '') + ' onchange="App.tipoActCambiado()">' +
        TIPOS_ACT[id].etiqueta + '</label>';
    }).join('');

    var borrar = act
      ? '<div class="acciones-modal">' +
        '<button type="button" class="link" onclick="App.duplicarActividadUI(\'' + act.actividadId + '\')">Duplicar</button>' +
        '<button type="button" class="link-peligro" onclick="App.eliminarActividadUI(\'' + act.actividadId + '\')">Eliminar actividad</button>' +
        '</div>'
      : '';

    abrirModal(act ? 'Editar actividad' : 'Nueva actividad',
      '<label>Nombre de la actividad' +
      '<input id="f-act-nombre" type="text" placeholder="Ej.: Dictado 1" value="' +
        (act ? esc(act.nombre) : '') + '"></label>' +
      '<div class="campo-crit"><span class="etq">Tipo de columna</span>' +
      '<div class="tipos-act">' + opcionesTipo + '</div></div>' +
      '<label id="l-act-items"><span id="l-act-items-txt">Nº de ítems a evaluar</span>' +
      '<input id="f-act-items" class="campo-corto" type="number" min="0" step="0.5" ' +
      'placeholder="10" value="' + (act && act.numItems ? act.numItems : '') + '"></label>' +
      '<label id="l-act-rubrica" hidden>Rúbrica' +
      '<select id="f-act-rubrica" onchange="App.rubricaActCambiada()">' +
        '<option value="">— Elegir rúbrica —</option></select></label>' +
      '<div id="l-act-rub-modo" class="campo-crit" hidden>' +
        '<span class="etq">Criterios de la rúbrica</span>' +
        '<div class="rub-modo">' +
          '<label><input type="radio" name="f-rub-modo" value="global" ' +
            'onchange="App.rubActModoCambiado()"> Global (toda la rúbrica)</label>' +
          '<label><input type="radio" name="f-rub-modo" value="indicador" ' +
