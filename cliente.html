    // para que "Crear grupo" no se dispare con el textarea aún vacío.
    copiaAlumnosEnCurso = true;
    ta.disabled = true;
    ta.placeholder = 'Cargando alumnado…';
    google.script.run
      .withSuccessHandler(function (cl) {
        claseCache[id] = cl;
        copiaAlumnosEnCurso = false;
        ta.disabled = false; ta.placeholder = 'Apellidos, Nombre';
        // Solo si el modal sigue abierto y sigue elegido ese mismo grupo.
        var sel = document.getElementById('f-copiar');
        if (sel && sel.value === id) rellenar(cl);
      })
      .withFailureHandler(function (err) {
        copiaAlumnosEnCurso = false;
        ta.disabled = false; ta.placeholder = 'Apellidos, Nombre';
        aviso('No se pudo cargar el alumnado a copiar: ' + ((err && err.message) || 'error'));
      })
      .obtenerClase(id);
  }

  var claseActiva = null; // último grupo abierto (descarta respuestas tardías)

  function abrirClase(claseId) {
    claseActiva = claseId;
    setTitulo('Grupos');
    mostrar('vista-clase');
    if (claseCache[claseId]) {
      abrirClaseCargada(claseCache[claseId]); // instantáneo desde caché
    } else {
      claseActual = null;
      // Pinta la cabecera al instante con lo que ya tenemos (evita "clic muerto").
      var r = claseDe(claseId);
      document.getElementById('clase-titulo').textContent = r ? r.nombre : '';
      document.getElementById('clase-meta').textContent = r ? r.curso : '';
      document.getElementById('num-alumnos').textContent = r ? ('(' + (r.numAlumnos || 0) + ')') : '';
      var ico = document.getElementById('clase-ico');
      if (r) { ico.textContent = inicial(r.nombre); ico.style.background = r.color || colorAvatar(r.nombre); }
      document.getElementById('lista-alumnos').innerHTML = spinner(); // feedback de carga
    }
    // Refresca siempre desde el servidor y actualiza la caché.
    llamar('obtenerClase', [claseId], function (cl) {
      claseCache[claseId] = cl;
      // Si ya navegaste a otro sitio (u otro grupo), la respuesta tardía solo
      // actualiza la caché: NUNCA debe devolverte a esta vista.
      if (vistaActual !== 'vista-clase' || claseActiva !== claseId) return;
      abrirClaseCargada(cl);
    });
  }
  function abrirClaseCargada(cl) {
    registrarHistorial({ v: 'clase', id: cl.claseId });
    claseActual = cl;
    setTitulo('Grupos');
    mostrar('vista-clase');
    document.getElementById('clase-titulo').textContent = cl.nombre;
    document.getElementById('clase-meta').textContent = cl.curso;
    var ico = document.getElementById('clase-ico');
    ico.textContent = inicial(cl.nombre);
    ico.style.background = cl.color || colorAvatar(cl.nombre);
    pintarAlumnos();
  }
  function pintarAlumnos() {
    var lista = claseActual.alumnos || [];
    document.getElementById('num-alumnos').textContent = '(' + lista.length + ')';
    var ol = document.getElementById('lista-alumnos');
    ol.innerHTML = lista.length
      ? lista.map(function (a) {
          return '<li><span class="mini-avatar" style="background:' + colorAvatar(a.nombre) +
            '">' + esc(iniciales(a.nombre)) + '</span>' + esc(a.nombre) + '</li>';
        }).join('')
      : '<div class="vacio">Sin alumnado. Pulsa "Editar lista" para añadirlo.</div>';
  }
  function editarAlumnos() {
    var texto = (claseActual.alumnos || []).map(function (a) { return a.nombre; }).join('\n');
    abrirModal('Editar alumnado',
      '<label>Un alumno/a por línea' +
      '<textarea id="f-alumnos" rows="12">' + esc(texto) + '</textarea></label>' +
      '<p class="ayuda">Se conservan las notas del alumnado que no cambie de nombre. ' +
      'Si quitas a alguien y más adelante lo vuelves a añadir con el mismo nombre ' +
      '(p. ej. un alumno que se va unos meses y vuelve), recupera sus notas. ' +
      'Escribe cada línea como <b>Apellidos, Nombre</b>, igual que en Séneca, para que la ' +
      'exportación de notas por criterios encaje sin retoques.</p>' +
      '<p class="ayuda"><b>Alias opcional</b> entre paréntesis: «Ye, Xin Yi (Sofía)». La app lo ' +
      'usa para mostrar (en el móvil se ve el alias) y al copiar para Séneca se ignora, así que ' +
      'añadirlo o quitarlo no afecta a las notas.</p>',
      'Guardar',
      function () {
        var nuevos = fusionarAlumnos(claseActual.alumnos || [], claseActual.bajas || [],
          parsearLista(val('f-alumnos')));
        botonModalCargando('Guardando…');
        llamar('actualizarAlumnosClase', [claseActual.claseId, nuevos], function (cl) {
          var c = claseDe(cl.claseId); if (c) c.numAlumnos = cl.alumnos.length;
          claseCache[cl.claseId] = cl;
          invalidarEvalsDeClase(cl.claseId); // el nº de alumnos cambió
          cerrarModal();
          abrirClaseCargada(cl);
        });
      });
  }
  /** Modal para editar el grupo actual: nombre, color e icono. */
  function editarClaseUI() {
    var cl = claseActual;
    abrirModal('Editar grupo',
      '<label>Nombre del grupo' +
      '<input id="f-nombre" type="text" value="' + esc(cl.nombre) + '"></label>' +
      '<div class="campo-crit"><span class="etq">Color</span>' + swatchesHtml(cl.color || COLORES[0]) + '</div>' +
      '<div class="campo-crit"><span class="etq">Icono</span>' + iconosHtml(cl.icono || 'personas') + '</div>' +
      '<p class="ayuda">El curso y el alumnado no se cambian aquí.</p>',
      'Guardar cambios',
      function () {
        var nombre = val('f-nombre').trim();
        if (!nombre) return aviso('Pon un nombre al grupo.');
        var payload = { nombre: nombre, color: colorElegido(), icono: iconoElegido() };
        botonModalCargando('Guardando…');
        llamar('editarClase', [cl.claseId, payload], function (act) {
          claseCache[cl.claseId] = act;
          invalidarEvalsDeClase(cl.claseId); // el nombre del grupo cambió
          estado.clases.forEach(function (c) {
            if (c.claseId === cl.claseId) { c.nombre = act.nombre; c.color = act.color; c.icono = act.icono; }
          });
          cerrarModal();
          abrirClaseCargada(act); // repinta la cabecera
          avisoOk('Grupo actualizado.');
        });
      });
  }

  function eliminarClaseActual() {
    var n = evalsDeGrupo_(claseActual.claseId).length;
    // Con clases asociadas ya no se bloquea: se avisa y se elimina en cascada.
    if (n > 0) {
      confirmar('Eliminar grupo',
        '⚠️ El grupo «' + claseActual.nombre + '» tiene ' + n + ' clase(s). Se eliminarán el ' +
        'grupo, su alumnado y TODAS sus clases con sus notas (quedan un tiempo en la papelera). ' +
        'Si solo quieres quitarlo de la vista, usa Archivar.',
        'Eliminar todo', function () { eliminarGrupoEntero_(claseActual.claseId); });
      return;
    }
    confirmar('Eliminar grupo', '¿Eliminar el grupo "' + claseActual.nombre + '"?',
      'Eliminar', function () {
        var id = claseActual.claseId;
        // Borrado optimista: se sale YA de la pantalla y el servidor trabaja
        // detrás. Si falla (p. ej. el grupo tiene clases asociadas), se
        // restaura la tarjeta y se muestra el motivo.
        var pos = -1, borrado = null;
        estado.clases.forEach(function (c, i) { if (c.claseId === id) { pos = i; borrado = c; } });
        estado.clases = estado.clases.filter(function (c) { return c.claseId !== id; });
        delete claseCache[id];
        irAClases();
        google.script.run
          .withSuccessHandler(function () { avisoOk('Grupo eliminado.'); })
          .withFailureHandler(function (err) {
            if (borrado) estado.clases.splice(pos < 0 ? 0 : pos, 0, borrado);
            if (vistaActual === 'vista-clases') pintarClases();
            aviso('No se pudo eliminar el grupo: ' + ((err && err.message) || 'error'));
          })
          .eliminarClase(id);
      });
  }

  /** Etiqueta de etapa de un nivel: "3º Primaria" → "Primaria"; "Infantil" → "Infantil". */
  function etapaDe_(nivel) {
    var e = String(nivel || '').replace(/^\s*\d+\s*º?\s*/, '').trim();
    return e || String(nivel || '').trim();
  }

  /**
   * Siguiente nivel del alumnado ("4º Primaria" → "5º Primaria"), o el mismo.
   * Solo busca DENTRO de la misma etapa: con varias etapas en el mapa, "3º
   * Primaria" no debe saltar a "4º ESO" por compartir dígito.
   */
  function siguienteNivel_(nivel) {
    var m = /^\s*(\d+)/.exec(nivel || '');
    if (!m) return nivel; // Infantil u otros sin número: sin salto automático
    var buscado = String(parseInt(m[1], 10) + 1);
    var etapa = etapaDe_(nivel);
    var niveles = cursosDisponibles();
    for (var i = 0; i < niveles.length; i++) {
      var mm = /^\s*(\d+)/.exec(niveles[i]);
      if (mm && mm[1] === buscado && etapaDe_(niveles[i]) === etapa) return niveles[i];
    }
    return nivel; // no hay nivel superior en la etapa (p. ej. 6º): se queda igual
  }

  /**
   * Opciones de un selector de nivel/curso, agrupadas por etapa (optgroup)
   * cuando el mapa tiene más de una (Infantil/Primaria/ESO/Bachillerato…).
   */
  function opcionesCursosHtml(sel) {
    function opt(c) {
      return '<option value="' + esc(c) + '"' + (c === sel ? ' selected' : '') +
        '>' + esc(c) + '</option>';
    }
    var cursos = cursosDisponibles();
    var etapas = [], por = {};
    cursos.forEach(function (c) {
      var e = etapaDe_(c);
      if (!por[e]) { por[e] = []; etapas.push(e); }
      por[e].push(c);
    });
    if (etapas.length < 2) return cursos.map(opt).join('');
    return etapas.map(function (e) {
      return '<optgroup label="' + esc(e) + '">' + por[e].map(opt).join('') + '</optgroup>';
    }).join('');
  }

  /** Duplica el grupo actual en otro curso académico (estructura, sin notas). */
  function promocionarGrupoUI() {
    var cl = claseActual;
    // El activo puede ser un curso con título (id opaco): para sugerir el
    // siguiente año se usa su AÑO, no el id.
    var xa = cursoActivo_();
    var sugeridoAcad = siguienteCurso_((xa && xa.anio) || (estado.cursos && estado.cursos.activo) || '') || '';
    var nivelActual = cl.curso || '';
    var sugeridoNivel = siguienteNivel_(nivelActual);
    var optNiveles = opcionesCursosHtml(sugeridoNivel);
    abrirModal('Promocionar grupo',
      '<p class="ayuda">Crea una copia de «' + esc(cl.nombre) + '» en otro curso académico, ' +
      'con sus clases, unidades y actividades pero <b>sin notas</b>. El alumnado se copia para ' +
      'que ajustes altas y bajas del nuevo curso.</p>' +
      '<label>Curso académico de destino' +
      '<input id="f-curso-acad" type="text" value="' + esc(sugeridoAcad) + '" placeholder="2025-2026"></label>' +
      '<label>Nivel del alumnado el próximo curso' +
      '<select id="f-nivel-destino">' + optNiveles + '</select></label>' +
      '<p class="ayuda">Si el alumnado <b>sube de nivel</b> (p. ej. de ' + esc(nivelActual) +
      ' al siguiente), los criterios se reasignan al nivel nuevo (LCL.4.4.1 → LCL.5.4.1). ' +
      'Los que no tengan equivalente quedan marcados como <b>no evaluados</b> para que los revises.</p>',
      'Promocionar',
      function () {

        if (!/^\d{4}-\d{4}$/.test(destino)) return aviso('Escribe el curso como 2025-2026.');
        botonModalCargando('Promocionando…');

              ' criterio(s) sin equivalente en ' + nivel + ': revísalos.');

            avisoOk('Grupo promocionado a ' + destino + '.');

          recargarDatosCurso(destino); // salta al curso destino (aunque sea el activo) para ver el resultado
        });
      });
  }

  // ---------- mapa: cursos y áreas ----------
  function cursosDisponibles() {
    var vistos = {}, out = [];
    (estado.areas || []).forEach(function (a) {
      if (!vistos[a.curso]) { vistos[a.curso] = true; out.push(a.curso); }
    });
    return out;
  }
  function areasDe(curso) {
    return (estado.areas || []).filter(function (a) { return a.curso === curso; })
      .map(function (a) { return a.area; });
  }
  function opcionesAreas(curso) {
    var ph = '<option value="" selected>— Seleccionar área —</option>';
    if (!curso) return ph;
    var areas = areasDe(curso);
    if (!areas.length) return ph;
    return ph + areas.map(function (a) {
      return '<option value="' + esc(a) + '">' + esc(a) + '</option>';
    }).join('');
  }
  function claseDe(id) {
    return (estado.clases || []).filter(function (c) { return c.claseId === id; })[0] || null;
  }

  // ---------- alumnos: parseo y fusión ----------
  function parsearLista(texto) {
    return String(texto || '').split('\n')
      .map(function (l) { return l.replace(/\s+/g, ' ').trim(); })
      .filter(function (l) { return l.length; })
      .map(function (nombre) { return { nombre: nombre }; });
  }
  function fusionarAlumnos(previos, bajas, nuevos) {
    var porNombre = {}, porBase = {};
    previos.forEach(function (a) {
      porNombre[a.nombre] = a.id;
      var base = nombreSeneca(a.nombre);
      if (!(base in porBase)) porBase[base] = a.id; // el primero gana
    });
    // Las bajas (alumnado retirado antes) solo rellenan los huecos que dejen
    // los presentes: re-añadir el mismo nombre = reincorporación con sus notas.
    (bajas || []).forEach(function (a) {
      if (!(a.nombre in porNombre)) porNombre[a.nombre] = a.id;
      var base = nombreSeneca(a.nombre);
      if (!(base in porBase)) porBase[base] = a.id;
    });
    return nuevos.map(function (a) {
      // Empareja por nombre exacto y, si no, por nombre sin pseudónimo, para
      // conservar las notas al añadir o quitar el "(alias)".
      var id = porNombre[a.nombre] || porBase[nombreSeneca(a.nombre)];
      return id ? { id: id, nombre: a.nombre } : { nombre: a.nombre };
    });
  }

  // ---------- modal ----------
  var accionModal = null;
  function abrirModal(titulo, cuerpoHtml, textoAceptar, onAceptar, opts) {
    document.getElementById('modal-titulo').textContent = titulo;
    // Contenido extra en la barra de título (p. ej. el selector de Tipo de la sesión).
    var extra = document.getElementById('modal-cab-extra');
    if (extra) extra.innerHTML = (opts && opts.cabExtra) || '';
    // Acción extra a la izquierda de los botones (p. ej. la papelera de la sesión).
    var accExtra = document.getElementById('modal-acc-extra');
    if (accExtra) accExtra.innerHTML = (opts && opts.accionExtra) || '';
    var cuerpo = document.getElementById('modal-cuerpo');
    cuerpo.innerHTML = cuerpoHtml;
    cuerpo.scrollTop = 0; // el cuerpo conserva el scroll del modal anterior: siempre arriba
    // Privacidad en equipos compartidos: se desactiva el autocompletado del
    // NAVEGADOR en los campos del modal (nombres de alumnado, títulos…), para
    // que no ofrezca lo que otro profe tecleó antes en el mismo navegador. No
    // afecta a los datos de la app (que viven aislados en el Drive de cada uno).
    [].forEach.call(cuerpo.querySelectorAll('input, textarea'), function (el) {
      el.setAttribute('autocomplete', 'off');
    });
    var b = document.getElementById('modal-aceptar');
    b.textContent = textoAceptar; b.disabled = false;
    // Texto del botón secundario (por defecto «Cancelar»; el editor de sesión,
    // que autoguarda, usa «Cerrar» para no dar falsa sensación de descartar).
    var bc = document.getElementById('modal-cancelar');
    if (bc) bc.textContent = (opts && opts.textoCancelar) || 'Cancelar';
    accionModal = onAceptar;
    b.onclick = function () { if (accionModal) accionModal(); };
    // Modal ancho (p. ej. el editor de rúbricas) en pantallas grandes.
    var m = document.querySelector('.modal');
    if (m) m.classList.toggle('modal-ancho', !!(opts && opts.ancho));
    document.getElementById('modal-fondo').hidden = false;
    // Lleva el foco al primer campo del modal (o al botón de aceptar).
    // Con sinFoco no se enfoca nada: en el móvil, enfocar un campo de texto
    // abre el teclado (molesto p. ej. al editar una actividad ya creada).
    if (opts && opts.sinFoco) return;
    var f = document.querySelector('#modal-cuerpo input, #modal-cuerpo select, #modal-cuerpo textarea');
    (f || b).focus();
  }

  /**
   * Evita el "salto" por auto-scroll cuando, al hacer clic, un control del modal
   * recibe el foco (casillas de criterio, botones, swatches). Prevenimos el foco
   * con ratón —el clic sigue funcionando—; los campos de texto se dejan intactos.
   * Se engancha una sola vez al contenedor del modal.
   */
  function setupModalNoScroll() {
    var m = document.querySelector('.modal');
    if (!m) return;
    m.addEventListener('mousedown', function (e) {
      var t = e.target;
      if (t.closest('label.crit') || t.closest('button') ||
          (t.classList && t.classList.contains('swatch'))) {
        e.preventDefault();
      }
    });
  }

  /**
   * Teclado global: Escape cierra el modal, Tab queda atrapado dentro del
   * modal mientras esté abierto, y Enter/Espacio activan los elementos
   * navegables que no son <button> (enlaces del menú, flechas de volver,
   * tarjetas con tabindex).
   */
  function setupTeclado() {
    // El selector de nivel se cierra tocando fuera de él.
    document.addEventListener('pointerdown', function (e) {
      var pop = document.getElementById('pop-nivel');
      if (pop.hidden) return;
      if (pop.contains(e.target)) return;
      if (popNivelTd && popNivelTd.contains(e.target)) return; // la propia celda
      cerrarSelectorNivel();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !document.getElementById('pop-nivel').hidden) {
        cerrarSelectorNivel(); e.preventDefault(); return;
      }
      var modalAbierto = !document.getElementById('modal-fondo').hidden;
      if (modalAbierto) {
        if (e.key === 'Escape') { cerrarModal(); e.preventDefault(); }
        else if (e.key === 'Tab') atraparFoco(e);
        return;
      }
      if (e.key !== 'Enter' && e.key !== ' ') return;
      var t = e.target;
      if (t && t.matches &&
          t.matches('a.item-lat, a.tab, a.volver-icono, .clase-card, .grupo-card, .tarjeta-unidad, td.celda-check, td.celda-escala, td.celda-texto, td.celda-desglose, td.celda-rubrica, td.celda-rub-ind, td.celda-rub-global, td.celda-sub')) {
        e.preventDefault(); // evita el scroll de Espacio
        t.click();
      }
    });
  }

  /** Mantiene el Tab dando vueltas dentro del modal (trampa de foco). */
  function atraparFoco(e) {
    var m = document.querySelector('.modal');
    var focos = [].filter.call(
      m.querySelectorAll('button, input, select, textarea, a[href]'),
      function (el) { return !el.disabled && el.offsetParent !== null; });
    if (!focos.length) return;
    var primero = focos[0], ultimo = focos[focos.length - 1];
    if (e.shiftKey && document.activeElement === primero) { ultimo.focus(); e.preventDefault(); }
    else if (!e.shiftKey && document.activeElement === ultimo) { primero.focus(); e.preventDefault(); }
  }

  function confirmar(titulo, mensaje, textoAceptar, onSi) {

    if (rubEvalSel) persistirEvaluador_();

  // ---------- escala de niveles ----------
  // La "nota" del nivel es su PUNTUACIÓN tal cual (la que trae la rúbrica, p. ej.
  // 4, 3, 2, 1). No se reescala a 0–10 al crear: esa conversión se hace al
  // evaluar en el cuaderno, según la puntuación global que sostenga la actividad.
  /** Puntos por defecto ascendentes (1..n): mínimo abajo, máximo arriba. */
  function puntosPorDefecto_(n) {
    var out = [];
    for (var i = 0; i < n; i++) out.push(i + 1);
    return out;
  }
  function nivelesPorDefecto_() {
    var etqs = ['Insuficiente', 'Suficiente', 'Bien', 'Excelente'];
    return etqs.map(function (e, i) { return { etiqueta: e, valor: i + 1 }; });
  }

  // ---------- importar pegando (portado de maestroseb/rubricas: smartParse) ----------
  /** Quita marcas de negrita/cursiva de Markdown: **x**, *x*, __x__, _x_. */
  function rubStripMd_(raw) {
    return raw.replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*(.+?)\*/g, '$1')
      .replace(/__(.+?)__/g, '$1').replace(/(?<!\w)_(.+?)_(?!\w)/g, '$1');
  }
  /** Divide una línea CSV respetando comillas ("a, b" = una sola celda). */
  function parseCSVLine_(line) {
    var out = [], cur = '', q = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (q) {
        if (ch === '"' && line[i + 1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { q = false; }
        else { cur += ch; }
      } else if (ch === '"') { q = true; }
      else if (ch === ',') { out.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    out.push(cur.trim());
    return out;
  }
  /** Divide una fila de tabla Markdown: | a | b | … (sin los bordes vacíos). */
  function parsePipeLine_(line) {
    return line.split('|').map(function (c) { return c.trim(); })
      .filter(function (c, i, arr) {
        if (i === 0 && c === '') return false;
        if (i === arr.length - 1 && c === '') return false;
        return true;
      });
  }
  /**
   * Texto concatenado (celdas pegadas sin separador, típico al copiar una tabla
   * ya renderizada): corta donde un carácter de fin de celda pega con una
   * mayúscula sin espacio (algo que no ocurre en prosa normal).
   */
  function tryParseConcatenated_(lines) {
    var cellBound = /(?<=[a-záéíóúüñ.!?)\]"…0-9])(?=[A-ZÁÉÍÓÚÜÑ¿¡])/;
    var work = lines;
    if (lines.length === 1 && lines[0].length > 300) {
      var parts = lines[0].split(/(?<=[.!?])(?=\d+[.)]\s)/);
      if (parts.length >= 3) work = parts.map(function (s) { return s.trim(); }).filter(Boolean);
    }
    if (work.length < 2) return null;
    var head = work[0].split(cellBound).map(function (s) { return s.trim(); }).filter(Boolean);
    if (head.length < 3) return null;
    var n = head.length, rows = [head];
    for (var i = 1; i < work.length; i++) {
      var p = work[i].split(cellBound).map(function (s) { return s.trim(); }).filter(Boolean);
      if (p.length === n) rows.push(p);
      else if (p.length > n) { var r = p.slice(0, n - 1); r.push(p.slice(n - 1).join('')); rows.push(r); }
      else return null;
    }
    return rows.length >= 2 ? { rows: rows, separator: 'concatenado' } : null;
  }
  /** Detecta separador y devuelve {rows, separator}. Orden: tab, |, CSV, concatenado. */
  function smartParse_(raw) {
    raw = rubStripMd_(raw);
    var lines = raw.split('\n').map(function (l) { return l.trim(); })
      .filter(function (l) { return l && !/^[\s|:-]+$/.test(l); });
    if (!lines.length) return { rows: [], separator: null };
    if (lines[0].split('\t').length >= 3) {
      return { rows: lines.map(function (l) { return l.split('\t').map(function (c) { return c.trim(); }); }), separator: 'tab' };
    }
    if (lines[0].indexOf('|') >= 0 && parsePipeLine_(lines[0]).length >= 3) {
      return { rows: lines.map(parsePipeLine_), separator: 'markdown' };
    }
    if (parseCSVLine_(lines[0]).length >= 3) {
      return { rows: lines.map(parseCSVLine_), separator: 'csv' };
    }
    var concat = tryParseConcatenated_(lines);
    if (concat) return concat;
    return { rows: lines.map(function (l) { return [l]; }), separator: null };
  }
  /** ¿La 1ª fila es cabecera? (heurística del repo: palabra clave, «(N)» o nivel). */
  function detectHeader_(rows) {
    if (rows.length < 2) return { hasHeader: false, headerRow: null, dataRows: rows };
    var first = rows[0];
    var clavePrimera = /^(criterio|criterion|categor|aspecto|indicador|dimensi)/i.test(first[0] || '');
    var conPuntos = first.slice(1).some(function (c) { return /\(\d+\)/.test(c); });
    var conNivel = first.slice(1).some(function (c) {
      return /^(\d+\s*[–—-]\s*)?(excelente|sobresaliente|notable|bien|bueno|suficiente|insuficiente|regular|bajo|alto|medio|avanzado|competente|b[aá]sico|iniciado|en proceso|satisfactorio|conseguido|logrado|excellent|good|fair|poor|needs|beginning|developing|proficient|exemplary)/i
        .test(String(c).replace(/\s*\(\d+\)\s*$/, ''));
    });
    var hay = clavePrimera || conPuntos || conNivel;
    return { hasHeader: hay, headerRow: hay ? first : null, dataRows: hay ? rows.slice(1) : rows };
  }
  /**
   * Extrae nombre y puntos de la cabecera de un nivel. Admite «Excelente (4)»,
   * «Excelente (4 pts)», «Excelente (4 puntos)», «4 – Excelente» y «1. Insuf».
   */
  function parseLevelHeader_(cell) {
    var s = String(cell).trim();
    var mp = s.match(/^(.+?)\s*\(\s*(\d+(?:[.,]\d+)?)\s*(?:pts?|puntos?|points?|p)?\s*\)\s*$/i);
    if (mp) return { name: mp[1].trim(), pts: parseFloat(mp[2].replace(',', '.')) };
    var mx = s.match(/^(\d+(?:[.,]\d+)?)\s*[–—\-.]\s*(.+)$/);
    if (mx) return { name: mx[2].trim(), pts: parseFloat(mx[1].replace(',', '.')) };
    return { name: s, pts: null };
  }
  /**
   * Puntos de cada nivel TAL CUAL vienen en la rúbrica (no se reescala aquí: la
   * conversión a nota /10 se hace al evaluar en el cuaderno). Los niveles sin
   * puntos se rellenan con enteros descendentes; sin ningún punto, 1..n.
   */
  function puntosNiveles_(puntos, hayPuntos, n) {
    if (!hayPuntos) return puntosPorDefecto_(n);
    return puntos.map(function (p, i) { return (p != null) ? p : (n - i); });
  }
  /** Tabla pegada → {niveles, indicadores}. null si no hay datos válidos. */
  function parsearRubricaPegada(texto) {
    var raw = String(texto || '').trim();
    if (!raw) return null;
    var pr = smartParse_(raw);
    if (!pr.rows.length || pr.rows[0].length < 2) return null;
    var dh = detectHeader_(pr.rows);
    if (!dh.dataRows.length) return null;
    var maxCols = 0;
    dh.dataRows.forEach(function (r) { if (r.length > maxCols) maxCols = r.length; });
    var numLevels = maxCols - 1;
    if (numLevels < 2) return null;
    var etiquetas = [], puntos = [], hayPuntos = false;
    for (var i = 0; i < numLevels; i++) {
      if (dh.headerRow) {
        var pl = parseLevelHeader_(dh.headerRow[i + 1] || ('Nivel ' + (i + 1)));
        etiquetas.push(pl.name || ('Nivel ' + (i + 1)));
        puntos.push(pl.pts); if (pl.pts != null) hayPuntos = true;
      } else { etiquetas.push('Nivel ' + (i + 1)); puntos.push(null); }
    }
    var vals = puntosNiveles_(puntos, hayPuntos, numLevels);
    var niveles = etiquetas.map(function (et, i2) { return { etiqueta: et, valor: vals[i2] }; });
    var indicadores = dh.dataRows.map(function (r) {
      var celdas = r.slice(1, 1 + numLevels);
      while (celdas.length < numLevels) celdas.push('');
      return { texto: r[0] || '', peso: 1, criterios: [], celdas: celdas };
    }).filter(function (ind) { return ind.texto; });
    if (!indicadores.length) return null;
    return { niveles: niveles, indicadores: indicadores };
  }

  /**
   * Convierte lo pegado en la rejilla. Se llama al vuelo (evento input), así que
   * es silencioso: si aún no hay tabla válida, deja la rejilla como está; si el
   * textarea queda vacío, la tabla desaparece (como en el repo).
   */
  function detectarRubricaPegada(silencioso) {
    var ta = document.getElementById('rub-pegar-ta');
    var txt = ta ? ta.value : '';
    if (!txt.trim()) {
      if (rubricaEnEdicion.indicadores.length) {
        rubricaEnEdicion.indicadores = [];
        renderRubGrid_();
      }
      return;
    }
    var parsed = parsearRubricaPegada(txt);
    if (!parsed) {
      if (silencioso !== true) {
        aviso('No he podido leer una tabla. Pega filas con columnas (tabulador, «|», ' +
          'coma) o una tabla copiada tal cual.');
      }
      return;
    }
    rubricaEnEdicion.niveles = parsed.niveles;
    rubricaEnEdicion.indicadores = parsed.indicadores;
    equalizarPesos_(); // pesos iniciales a partes iguales (suman 100%)
    renderRubGrid_();
    if (silencioso !== true) {
      avisoOk('Rúbrica cargada: ' + parsed.indicadores.length + ' indicadores, ' +
        parsed.niveles.length + ' niveles.');
    }
  }

  // ---------- crear / editar (rejilla editable; tabla solo tras cargar datos) ----------
  function nuevaRubrica() {
    // La rúbrica es contenido puro (indicadores, niveles, puntos, pesos). Los
    // criterios de evaluación se eligen al crear la actividad, no aquí, para que
    // una misma rúbrica sirva en cualquier curso/área.
    rubricaEnEdicion = { nombre: '', niveles: nivelesPorDefecto_(), indicadores: [] };
    abrirModalRubrica_('Nueva rúbrica', 'Crear rúbrica', null);
  }

  function editarRubricaUI(id) {
    llamar('obtenerRubrica', [id], function (r) {
      var niveles = (r.niveles || []).map(function (n) {
        return { etiqueta: n.etiqueta, valor: n.valor };
      });
      var indicadores = (r.indicadores || []).map(function (ind) {
        var celdas = (ind.celdas || []).slice(0, niveles.length);
        while (celdas.length < niveles.length) celdas.push('');
        return { texto: ind.texto, peso: ind.peso || 1, celdas: celdas };
      });
      rubricaEnEdicion = { nombre: r.nombre, niveles: niveles, indicadores: indicadores };
      abrirModalRubrica_('Editar rúbrica', 'Guardar cambios', id);
    });
  }

  function abrirModalRubrica_(titulo, textoAceptar, id) {
    abrirModal(titulo,
      '<div class="rub-editor">' +
        '<label>Nombre de la rúbrica' +
        '<input id="rub-nombre" type="text" placeholder="Ej.: Exposición oral" value="' +
          esc(rubricaEnEdicion.nombre) + '"></label>' +
        '<label>Pegar rúbrica (ChatGPT, Excel, Sheets, Markdown, CSV)' +
          '<textarea id="rub-pegar-ta" rows="4" placeholder="Pega aquí una tabla y se ' +
            'convierte sola abajo…"></textarea></label>' +
        '<p class="ayuda">1ª columna → indicadores; cabecera → niveles. Los puntos de cada ' +
          'nivel se toman de la rúbrica («Excelente (4 pts)» o «4 – Excelente»); la nota /10 ' +
          'se calcula al evaluar en el cuaderno.</p>' +
        '<div id="rub-grid"></div>' +
      '</div>',
      textoAceptar,
      function () { guardarRubrica_(id); },
      { sinFoco: !!id, ancho: true });
    renderRubGrid_();
    // Se convierte al pegar o teclear (sin botón), con un pequeño debounce.
    var ta = document.getElementById('rub-pegar-ta');
    if (ta) ta.addEventListener('input', function () {
      clearTimeout(rubPegarTimer);
      rubPegarTimer = setTimeout(function () { detectarRubricaPegada(true); }, 200);
    });
  }

  /** Empieza una rúbrica vacía a mano (revela la rejilla con una fila). */
  function empezarRubricaEnBlanco() {
    var e = rubricaEnEdicion;
    if (!e.niveles.length) e.niveles = nivelesPorDefecto_();
    e.indicadores = [{ texto: '', peso: 100, criterios: [],
      celdas: e.niveles.map(function () { return ''; }) }];
    renderRubGrid_();
  }

  /** Botón «Limpiar datos»: vacía lo pegado y la rejilla, y vuelve al estado inicial. */
  function limpiarRubrica() {
    rubricaEnEdicion.niveles = nivelesPorDefecto_();
    rubricaEnEdicion.indicadores = [];
    var ta = document.getElementById('rub-pegar-ta');
    if (ta) { ta.value = ''; }
    renderRubGrid_();
    if (ta) ta.focus();
  }

  /** Vuelca la rejilla al borrador. Si no hay tabla, solo lee el nombre. */
  function leerRubGrid_() {
    var e = rubricaEnEdicion;
    var nom = document.getElementById('rub-nombre');
    if (nom) e.nombre = nom.value;
    if (!document.querySelector('#rub-grid table')) return; // estado sin datos
    var niveles = [].map.call(document.querySelectorAll('#rub-grid .nivel-etq'), function (el) {
      var j = Number(el.dataset.j);
      var v = document.querySelector('#rub-grid .nivel-val[data-j="' + j + '"]');
      return { etiqueta: el.value, valor: Number(v && v.value) || 0 };
    });
    var indicadores = [].map.call(document.querySelectorAll('#rub-grid .ind-txt'), function (el) {
      var i = Number(el.dataset.i);
      var peso = document.querySelector('#rub-grid .ind-peso[data-i="' + i + '"]');
      var prev = e.indicadores[i] || {};
      var celdas = niveles.map(function (_, j) {
        var c = document.querySelector('#rub-grid .celda[data-i="' + i + '"][data-j="' + j + '"]');
        return c ? (c.textContent || '').trim() : '';
      });
      return { texto: (el.textContent || '').trim(),
        peso: peso ? (Number(peso.value) || 0) : (prev.peso || 0),
        celdas: celdas };
    });
    e.niveles = niveles;
    e.indicadores = indicadores;
  }

  function renderRubGrid_() {
    var e = rubricaEnEdicion;
    var cont = document.getElementById('rub-grid');
    // Sin datos: como en el repo, no se muestra ninguna tabla.
    if (!e.indicadores.length) {
      cont.innerHTML = '<div class="rub-vacio">Pega una rúbrica arriba y aparecerá aquí para ' +
        'editarla. <button type="button" class="link" onclick="App.empezarRubricaEnBlanco()">' +
        'o empezar en blanco</button></div>';
      return;
    }
    var cab = '<tr><th class="rg-corner">Indicador · peso</th>' +
      e.niveles.map(function (n, j) {
        return '<th class="rg-nivel"><div class="rg-nivel-row">' +
          '<input class="nivel-etq" data-j="' + j + '" type="text" placeholder="Nivel" value="' +
            esc(n.etiqueta) + '">' +
          '<input class="nivel-val" data-j="' + j + '" type="number" step="1" min="0" ' +
            'title="Puntos del nivel" value="' + esc(n.valor) + '">' +
          '<button type="button" class="rg-x" title="Quitar nivel" ' +
            'onclick="App.rubQuitarNivel(' + j + ')">&times;</button>' +
          '</div></th>';
      }).join('') +
      '<th class="rg-add"><button type="button" class="mini-x" title="Añadir nivel" ' +
        'onclick="App.rubAnadirNivel()">+</button></th></tr>';
    rubPesosManual = {}; // rejilla reconstruida: todos los pesos vuelven a "auto"
    var cuerpo = e.indicadores.map(function (ind, i) {
      var celdas = e.niveles.map(function (n, j) {
        return '<td class="rg-celda"><div class="celda" contenteditable="true" data-i="' + i +
          '" data-j="' + j + '">' + esc((ind.celdas && ind.celdas[j]) || '') + '</div></td>';
      }).join('');
      return '<tr><th class="rg-ind">' +
        '<div class="ind-txt" contenteditable="true" data-i="' + i + '">' + esc(ind.texto) + '</div>' +
        '<div class="rg-sub">' +
          '<span class="ind-peso-wrap"><input class="ind-peso" data-i="' + i + '" type="number" ' +
            'min="0" max="100" value="' + esc(pesoEntero_(ind.peso)) + '" ' +
            'onchange="App.rubPesoCambiado(this)"><span class="ind-peso-pct">%</span></span>' +
          '<button type="button" class="rg-x" title="Quitar indicador" ' +
            'onclick="App.rubQuitarIndicador(' + i + ')">&times;</button>' +
        '</div></th>' + celdas + '<td></td></tr>';
    }).join('');
    // Fila de total de pesos (verde al 100%, rojo si no).
    var total = pesoTotal_();
    cuerpo += '<tr class="rg-total-row"><th class="rg-ind"><div id="rub-peso-total" class="peso-total">' +
      '<span class="peso-total-val ' + (total === 100 ? 'ok' : 'err') + '">' + total + '%</span>' +
      '</div></th><td colspan="' + (e.niveles.length + 1) + '"></td></tr>';
    cont.innerHTML =
      '<div class="rg-top"><span class="etq">Rúbrica</span>' +
        '<button type="button" class="btn rub-limpiar" onclick="App.limpiarRubrica()">' +
          svgUI('papelera') + ' Limpiar datos</button></div>' +
      '<div class="rg-scroll"><table class="rubrica-grid"><thead>' + cab + '</thead>' +
      '<tbody>' + cuerpo + '</tbody></table></div>' +
      '<div class="acciones-modal"><button type="button" class="btn rub-add" ' +
        'onclick="App.rubAnadirIndicador()">+ Añadir indicador</button></div>';
  }

  function rubAnadirNivel() {
    leerRubGrid_();
    // El nuevo nivel toma el punto siguiente al mayor existente.
    var mx = 0;
    rubricaEnEdicion.niveles.forEach(function (n) { if ((Number(n.valor) || 0) > mx) mx = Number(n.valor); });
    rubricaEnEdicion.niveles.push({ etiqueta: '', valor: mx + 1 });
    rubricaEnEdicion.indicadores.forEach(function (ind) { ind.celdas.push(''); });
    renderRubGrid_();
  }
  function rubQuitarNivel(j) {
    leerRubGrid_();
    rubricaEnEdicion.niveles.splice(j, 1);
    rubricaEnEdicion.indicadores.forEach(function (ind) { ind.celdas.splice(j, 1); });
    renderRubGrid_();
  }
  function rubAnadirIndicador() {
    leerRubGrid_();
    rubricaEnEdicion.indicadores.push({ texto: '', peso: 0, criterios: [],
      celdas: rubricaEnEdicion.niveles.map(function () { return ''; }) });
    equalizarPesos_();
    renderRubGrid_();
  }
  function rubQuitarIndicador(i) {
    leerRubGrid_();
    rubricaEnEdicion.indicadores.splice(i, 1);
    equalizarPesos_();
    renderRubGrid_();
  }

  // ---------- pesos por indicador (% sobre 100, estilo RubricApp) ----------
  function pesoEntero_(p) { return Math.round(Number(p) || 0); }
  function pesoTotal_() {
    return rubricaEnEdicion.indicadores.reduce(function (s, ind) { return s + pesoEntero_(ind.peso); }, 0);
  }
  /** Reparte los pesos a partes iguales sumando 100 (el último absorbe el resto). */
  function equalizarPesos_() {
    var inds = rubricaEnEdicion.indicadores, n = inds.length;
    if (!n) return;
    var eq = Math.round(100 / n);
    inds.forEach(function (ind, i) { ind.peso = (i === n - 1) ? (100 - eq * (n - 1)) : eq; });
  }
  /**
   * Peso editado a mano (como RubricApp): se fija ese peso y el resto (los no
   * fijados) reparten 100 − suma_manual a partes iguales. Actualiza el total en
   * vivo sin repintar la rejilla (para no perder el foco).
   */
  function rubPesoCambiado(input) {
    var idx = Number(input.dataset.i);
    var inds = rubricaEnEdicion.indicadores;
    var val = Math.max(0, Math.min(100, parseInt(input.value, 10) || 0));
    input.value = val;
    inds[idx].peso = val;
    rubPesosManual[idx] = true;
    var manualSum = 0;
    Object.keys(rubPesosManual).forEach(function (k) { manualSum += pesoEntero_(inds[k] && inds[k].peso); });
    var auto = inds.map(function (_, i) { return i; }).filter(function (i) { return !rubPesosManual[i]; });
    if (auto.length) {
      var restante = 100 - manualSum;
      var cada = Math.floor(restante / auto.length);
      var resto = restante - cada * auto.length;
      auto.forEach(function (i, pos) {
        var w = Math.max(0, cada + (pos === auto.length - 1 ? resto : 0));
        inds[i].peso = w;
        var el = document.querySelector('#rub-grid .ind-peso[data-i="' + i + '"]');
        if (el) el.value = w;
      });
    }
    actualizarPesoTotal_();
  }
  function actualizarPesoTotal_() {
    var el = document.getElementById('rub-peso-total');
    if (!el) return;
    var total = pesoTotal_();
    el.innerHTML = '<span class="peso-total-val ' + (total === 100 ? 'ok' : 'err') + '">' + total + '%</span>';
  }

  // ---------- guardar / duplicar / eliminar ----------
  function guardarRubrica_(id) {
    leerRubGrid_();
    var e = rubricaEnEdicion;
    var nombre = (e.nombre || '').trim();
    if (!nombre) return aviso('Pon un nombre a la rúbrica.');
    var indicadores = e.indicadores.filter(function (ind) { return (ind.texto || '').trim(); });
    if (!indicadores.length) return aviso('Añade al menos un indicador.');
    var niveles = e.niveles.filter(function (n) { return (n.etiqueta || '').trim(); });
    if (niveles.length < 2) return aviso('La escala necesita al menos dos niveles.');
    // Alinea las celdas de cada indicador con el nº de niveles (evita descuadres
    // si se añadieron/quitaron niveles tras pegar una tabla).
    indicadores.forEach(function (ind) { ind.celdas = (ind.celdas || []).slice(0, niveles.length); });
    // La rúbrica no lleva criterios: se eligen al crear la actividad.
    var payload = { nombre: nombre, indicadores: indicadores, niveles: niveles, criterios: [] };
    botonModalCargando('Guardando…');
    if (id) {
      llamar('editarRubrica', [id, payload], function (r) {
        actualizarRubricaCache_(r); cerrarModal(); pintarRubricas(); avisoOk('Rúbrica guardada.');
      });
    } else {
      llamar('crearRubrica', [payload], function (r) {
        if (!rubricasCache) rubricasCache = [];
        rubricasCache.push(ligera_(r)); cerrarModal(); pintarRubricas(); avisoOk('Rúbrica creada.');
      });
    }
  }
  /** Convierte una rúbrica completa a la forma ligera de la lista del banco. */
  function ligera_(r) {
    return { rubricaId: r.rubricaId, nombre: r.nombre,
      numIndicadores: (r.indicadores || []).length, numNiveles: (r.niveles || []).length,
      criterios: r.criterios || [], creado: r.creado, orden: r.orden };
  }
  function actualizarRubricaCache_(r) {
    if (!rubricasCache) { rubricasCache = [ligera_(r)]; return; }
    for (var i = 0; i < rubricasCache.length; i++) {
      if (rubricasCache[i].rubricaId === r.rubricaId) { rubricasCache[i] = ligera_(r); return; }
    }
    rubricasCache.push(ligera_(r));
  }
  function duplicarRubricaUI(id) {
    llamar('duplicarRubrica', [id], function (r) {
      if (!rubricasCache) rubricasCache = [];
      rubricasCache.push(ligera_(r)); pintarRubricas(); avisoOk('Rúbrica duplicada.');
    });
  }
  function eliminarRubricaUI(id) {
    var r = (rubricasCache || []).filter(function (x) { return x.rubricaId === id; })[0];
    confirmar('Eliminar rúbrica',
      'La rúbrica «' + ((r && r.nombre) || '') + '» irá a la papelera. ¿Continuar?',
      'Eliminar', function () {
        llamar('eliminarRubrica', [id], function () {
          rubricasCache = (rubricasCache || []).filter(function (x) { return x.rubricaId !== id; });
          pintarRubricas(); avisoOk('Rúbrica movida a la papelera.');
        });
      });
  }

  // ================= PLANIFICADOR (sesiones) =================
  // Todo este módulo solo es alcanzable si estado.flags.planner es true: la
  // entrada de la sidebar nace oculta y solo se revela para quien tenga la
  // bandera. El resto del profesorado no ve nada.
  //
  // Una sesión es contenido compartido (título, descripción, criterios) con
  // ASIGNACIONES por clase: la misma planificación sirve para 3ºA y 3ºB, y
  // cada asignación lleva su fecha y su estado (cada grupo va a su ritmo).
  var sesionesCache = null;       // todas las sesiones (null = aún no cargadas)
  var plannerModoActual = 'semana'; // 'semana' | 'mes' | 'clase'
  var plannerLayout = 'grupo';      // en semana: 'grupo' (grupos × días) | 'horario' (por hora)
  var plannerLunes = lunesDe_(new Date()); // lunes de la semana visible
  var plannerMes = new Date(new Date().getFullYear(), new Date().getMonth(), 1); // mes visible
  var plannerDia = new Date();      // día visible (vista «Día», por defecto en móvil)

  /**
   * La entrada del Planificador es VISIBLE por defecto (el módulo es público):
   * así la tab bar sale completa desde el primer pintado, sin esperar al
   * estado. Solo se oculta si el estado llega sin la bandera.
   */
  function activarPlannerSiFlag_() {
    var tiene = !!(estado && estado.flags && estado.flags.planner);
    [].forEach.call(document.querySelectorAll('.solo-planner'), function (el) {
      el.hidden = !tiene;
    });
    if (!tiene) return;
    // Vista y layout con los que arranca (preferencia; en móvil, Día por defecto).
    plannerModoActual = vistaDefecto_();
    try {
      var lay = localStorage.getItem('planner-layout');
      if (lay === 'grupo' || lay === 'horario') plannerLayout = lay;
    } catch (e) {}
    // Precarga en segundo plano: cuando el profe entre al planificador, sus
    // datos (sesiones, unidades, calendario) ya suelen estar en caché y la
    // vista sale poblada a la primera, sin pantalla de carga.
    cargarPlannerDatos_(function () {
      var v = document.getElementById('vista-planner');
      if (v && !v.hidden) pintarPlanner(); // si ya está dentro, refresca
    });
    // Pulsar en cualquier sitio FUERA del panel de edición guarda lo pendiente
    // y lo repinta (mismo espíritu que cerrar el modal tocando fuera). Se excluyen
    // los clics dentro de un modal (p. ej. el de confirmar borrado), que no deben
    // disparar guardados a destiempo.
    document.addEventListener('click', function (ev) {
      if (!editorSesionCtx || !editorSesionCtx.enPanel) return;
      var t = ev.target;
      if (!t.closest) return;
      if (t.closest('.pl-uni-detail') || t.closest('.modal, .modal-fondo')) return;
      autoguardarSesion_({ pintar: true });
    });
  }

  var planUnidadesCache = null;   // unidades de planificación (por materia)
  var critEvaluadosCache = null;  // códigos de criterio ya asignados a alguna actividad
  var calendarioCache = null;     // calendario del curso activo {inicio, fin, festivos}

  function irAPlanner() {
    registrarHistorial({ v: 'planner' });
    setTitulo('Planificador');
    mostrar('vista-planner');
    if (sesionesCache && planUnidadesCache && critEvaluadosCache && calendarioCache) {
      pintarPlanner(); return;
    }
    // Arranque «positivo»: la rejilla se pinta YA con las clases y sus huecos
    // (salen del estado, que ya está cargado) y las sesiones aparecen encima en
    // cuanto llegan. Nada de quedarse mirando una ruleta sobre fondo vacío.
    pintarPlanner();
    cargarPlannerDatos_(pintarPlanner);
  }

  var plannerCargaCbs = null; // callbacks esperando la carga en curso (null = ninguna)
  /** Carga sesiones, unidades, criterios evaluados y calendario (los que falten). */
  function cargarPlannerDatos_(cb) {
    // Si ya hay una carga en vuelo (p. ej. la precarga del arranque), no se
    // duplican las peticiones: el callback se suma a la espera.
    if (plannerCargaCbs) { plannerCargaCbs.push(cb); return; }
    plannerCargaCbs = [cb];
    var pend = 0;
    function done() {
      if (--pend > 0) return;
      var cbs = plannerCargaCbs; plannerCargaCbs = null;
      cbs.forEach(function (f) { f(); });
    }
    function pedir(fn, args, set, vacio) {
      pend++;
      google.script.run.withSuccessHandler(function (l) { set(l != null ? l : vacio); done(); })
        .withFailureHandler(function () { set(vacio); done(); })[fn].apply(google.script.run, args || []);
    }
    if (!sesionesCache) pedir('listarSesiones', [], function (l) { sesionesCache = l; }, []);
    if (!planUnidadesCache) pedir('listarPlanUnidades', [], function (l) { planUnidadesCache = l; }, []);
    if (!critEvaluadosCache) pedir('criteriosEvaluados', [], function (l) { critEvaluadosCache = l; }, []);
    if (!calendarioCache) {
      pedir('getCalendario', [(estado.cursos && estado.cursos.activo) || ''],
        function (c) { calendarioCache = c; }, { inicio: '', fin: '', festivos: [] });
    }
    if (pend === 0) {
      var cbs = plannerCargaCbs; plannerCargaCbs = null;
      cbs.forEach(function (f) { f(); });
    }
  }

  // ---------- días lectivos (calendario del curso) ----------
  function esFestivo_(iso) {
    var f = (calendarioCache && calendarioCache.festivos) || [];
    return f.some(function (r) { return iso >= r.desde && iso <= (r.hasta || r.desde); });
  }
  /** Día lectivo: L–V, dentro del curso (si está definido) y no festivo. */
  function esLectivo_(iso) {
    var dia = diaSemanaIso_(iso);
    if (dia < 0 || dia > 4) return false;
    var c = calendarioCache || {};
    if (c.inicio && iso < c.inicio) return false;
    if (c.fin && iso > c.fin) return false;
    return !esFestivo_(iso);
  }
  /** Nombre del festivo de una fecha (para el tooltip), o ''. */
  function festivoNombre_(iso) {
    var f = (calendarioCache && calendarioCache.festivos) || [];
    for (var i = 0; i < f.length; i++) {
      if (iso >= f[i].desde && iso <= (f[i].hasta || f[i].desde)) return f[i].nombre || 'Festivo';
    }
    return '';
  }
  function unidadPlanDe_(id) {
    return (planUnidadesCache || []).filter(function (u) { return u.unidadId === id; })[0];
  }

  // ---------- fechas ----------
  function lunesDe_(d) {
    var x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    x.setDate(x.getDate() - (x.getDay() + 6) % 7); // getDay(): 0=domingo
    return x;
  }
  /** Fecha local → 'YYYY-MM-DD' (sin pasar por UTC, que cambia de día). */
  function isoLocal_(d) {
    function p(n) { return (n < 10 ? '0' : '') + n; }
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  }
  var DIAS_SEM = ['lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado', 'domingo'];
  var MESES = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
  function fechaCorta_(iso) {
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(iso || '');
    if (!m) return '';
    return Number(m[3]) + ' ' + MESES[Number(m[2]) - 1];
  }
  /** Fecha corta con año: «5 oct 2026». */
  function fechaConAnio_(iso) {
    var m = /^(\d{4})-/.exec(iso || '');
    return fechaCorta_(iso) + (m ? ' ' + m[1] : '');
  }

  function plannerModo(modo) {
    autoguardarSesion_();   // si estabas editando en el panel de Unidades, guarda antes
    // Al cambiar de vista, el panel de Unidades no conserva la sesión abierta:
    // al volver a Unidades aparecerá vacío hasta que se pulse otra sesión.
    sesUnidadSel = ''; panelNuevoUid = '';
    plannerModoActual = modo;
    pintarPlanner();
  }
  /** Conmuta el layout de la vista semanal: grupos × días o por horario. */
  function setPlannerLayout(layout) {
    plannerLayout = layout;
    try { localStorage.setItem('planner-layout', layout); } catch (e) {}
    pintarPlanner();
  }

  /** Vista con la que arranca el planificador (preferencia; móvil → Día). */
  function vistaDefecto_() {
    var v;
    try { v = localStorage.getItem('planner-vista-def'); } catch (e) {}
    if (v === 'dia' || v === 'semana' || v === 'mes') return v;
    return esMovil() ? 'dia' : 'semana';
  }
  /** Fija la vista por defecto (preferencia) y salta a ella. */
  function setVistaDefecto(modo) {
    try { localStorage.setItem('planner-vista-def', modo); } catch (e) {}
    plannerModo(modo); // como cualquier cambio de vista: autoguarda y limpia el panel
  }
  /** Abre/cierra el menú de configuración del planificador. */
  function togglePlannerConfig(ev) {
    if (ev) ev.stopPropagation();
    var m = document.getElementById('planner-config-menu');
    if (!m) return;
    var abrir = m.hidden;
    m.hidden = !abrir;
    if (abrir) {
      sincronizarConfigMenu_();
      setTimeout(function () { document.addEventListener('click', cerrarConfigFuera_); }, 0);
    }
  }
  function cerrarConfigFuera_(ev) {
    var wrap = document.querySelector('.planner-config-wrap');
    // Dentro del wrap el menú se mantiene (las opciones de vista se toggean sin
    // cerrarlo); solo Calendario/Horario (.pcfg-item) lo cierran al abrir su modal.
    if (wrap && wrap.contains(ev.target) && !ev.target.closest('.pcfg-item')) return;
    cerrarConfigMenu_();
  }
  function cerrarConfigMenu_() {
    var m = document.getElementById('planner-config-menu');
    if (m) m.hidden = true;
    document.removeEventListener('click', cerrarConfigFuera_);
  }
  /** Mueve la semana visible (+1/-1) o vuelve a la actual (0). */
  function plannerSemana(delta) {
    if (delta === 0) plannerLunes = lunesDe_(new Date());
    else plannerLunes.setDate(plannerLunes.getDate() + delta * 7);
    pintarPlanner();
  }
  /** Mueve el día visible (+1/-1) o vuelve a hoy (0). Salta findes y festivos. */
  function plannerDiaNav(delta) {
    if (delta === 0) { plannerDia = new Date(); }
    else {
      var d = new Date(plannerDia);
      // Avanza al menos un día y salta sábados/domingos (findes no lectivos).
      do { d.setDate(d.getDate() + delta); } while (d.getDay() === 0 || d.getDay() === 6);
      plannerDia = d;
    }
    pintarPlanner();
  }
  /** Pulsar la etiqueta de fecha abre el selector nativo (viajar rápido). */
  function abrirSelectorFecha() {
    var inp = document.getElementById('planner-fecha-inp');
    if (!inp) return;
    var base = plannerModoActual === 'dia' ? plannerDia
      : plannerModoActual === 'mes' ? plannerMes : plannerLunes;
    inp.value = isoLocal_(base);
    if (inp.showPicker) { try { inp.showPicker(); return; } catch (e) {} }
    inp.focus(); inp.click(); // navegadores sin showPicker
  }
  /** Fecha elegida en el selector: las tres vistas saltan a ella. */
  function plannerFechaElegida(v) {
    var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(v || '');
    if (!m) return;
    var d = new Date(+m[1], +m[2] - 1, +m[3]);
    plannerDia = d;
    plannerLunes = lunesDe_(d);
    plannerMes = new Date(d.getFullYear(), d.getMonth(), 1);
    pintarPlanner();
  }
  /** Mueve el mes visible (+1/-1) o vuelve al actual (0). */
  function plannerMesNav(delta) {
    if (delta === 0) plannerMes = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
    else plannerMes = new Date(plannerMes.getFullYear(), plannerMes.getMonth() + delta, 1);
    pintarPlanner();
  }

  // ---------- resolución de clases ----------
  function evalDe_(evalId) {
    return (estado.evaluaciones || []).filter(function (e) { return e.evalId === evalId; })[0];
  }
  /** Clases reales donde se puede programar: las visibles del curso activo. */
  function evalsProgramables_() {
    return (estado.evaluaciones || []).filter(function (e) {
      return !e.archivado && !e.grupoArchivado;
    });
  }
  // Solo el nombre de la clase (el profe ya suele incluir el grupo en él, p. ej.
  // "Lengua 3º B"): no repetimos el grupo detrás para no duplicarlo.
  function etiquetaEval_(ev) {
    return tituloEval(ev);
  }
  /**
   * Las "clases" con las que trabaja el planificador: las clases (evaluaciones)
   * visibles del curso activo, tengan grupo o no. Forma común:
   * {id, etiqueta, color, horario, sinGrupo}.
   */
  function clasesPlanner_() {
    return evalsProgramables_().map(function (ev) {
      return { id: ev.evalId, etiqueta: etiquetaEval_(ev), color: ev.color || '',
        icono: ev.icono || '', horario: ev.horario || [], sinGrupo: !ev.claseId };
    });
  }
  /** Icono de la clase, pequeño y en su color (identifica mejor que un punto). */
  function icoClase_(c) {
    return '<span class="pl-clase-ico" style="color:' + (c.color || 'var(--acento)') + '">' +
      iconoSvg(c.icono || ICONO_DEFECTO) + '</span>';
  }
  function clasePlannerDe_(id) {
    return clasesPlanner_().filter(function (c) { return c.id === id; })[0];
  }
  function etiquetaClase_(id) {
    var c = clasePlannerDe_(id);
    if (!c) return '(clase de otro curso)';
    return c.etiqueta + (c.sinGrupo ? ' · sin grupo' : '');
  }
  /** Color de la clase (el definido al crearla), o el acento por defecto. */
  function colorClase_(evalId) {
    var c = clasePlannerDe_(evalId);
    return (c && c.color) || 'var(--acento)';
  }

  // ---------- pintado ----------
  function pintarPlanner() {
    var modo = plannerModoActual;
    var dia = (modo === 'dia'), semana = (modo === 'semana'), mes = (modo === 'mes'),
        unidades = (modo === 'unidades');
    document.getElementById('planner-modo-dia').classList.toggle('activo', dia);
    document.getElementById('planner-modo-semana').classList.toggle('activo', semana);
    document.getElementById('planner-modo-mes').classList.toggle('activo', mes);
    document.getElementById('planner-modo-unidades').classList.toggle('activo', unidades);
    document.getElementById('planner-nav-dia').hidden = !dia;
    document.getElementById('planner-nav-semana').hidden = !semana;
    document.getElementById('planner-nav-mes').hidden = !mes;
    var navU = document.getElementById('planner-nav-unidades');
    if (navU) navU.hidden = !unidades;
    sincronizarConfigMenu_();
    document.getElementById('planner-cont').innerHTML =
      dia ? htmlDia_() : semana ? htmlSemana_() : mes ? htmlMes_() : htmlUnidades_();
    // En Unidades con panel (PC), cablea el editor recién pintado si hay algo abierto.
    if (unidades && plannerConPanel_() && document.getElementById('ses-desc-body')) {
      montarEditorSesion_();
    }
  }

  /** Marca las opciones activas del menú de configuración (vista y layout). */
  function sincronizarConfigMenu_() {
    var def = document.getElementById('pcfg-def');
    if (def) [].forEach.call(def.querySelectorAll('.pcfg-opt'), function (b, i) {
      b.classList.toggle('activo', ['dia', 'semana', 'mes'][i] === vistaDefecto_());
    });
    var lay = document.getElementById('pcfg-lay');
    if (lay) [].forEach.call(lay.querySelectorAll('.pcfg-opt'), function (b, i) {
      b.classList.toggle('activo', ['grupo', 'horario'][i] === plannerLayout);
    });
  }

  // ---------- horario semanal por clase ----------
  // Guardado en cada evaluación ([{dia:0-6, hora}], 0 = lunes): la vista
  // semanal lo cruza con las sesiones para enseñar los huecos sin planificar.
  var DIA_CHIPS = ['L', 'M', 'X', 'J', 'V', 'S', 'D'];
  var DIAS_LECTIVOS = 5; // el editor de horario solo ofrece L–V (no hay clase en finde)
  var horarioDraft = null; // {evalId: [{dia,hora}]} mientras el modal está abierto

  function horaDia_(c, dia) {
    var h = c.horario.filter(function (x) { return x.dia === dia; })[0];
    return (h && h.hora) || '';
  }

  function abrirHorario() {
    horarioDraft = {};
    clasesPlanner_().forEach(function (c) {
      horarioDraft[c.id] = c.horario.map(function (h) {
        return { dia: h.dia, hora: h.hora || '' };
      });
    });
    abrirModal('Horario semanal',
      '<p class="ayuda">Marca los días que toca cada clase (y su hora, si quieres). La vista ' +
        'semanal usará el horario para enseñarte, día a día, las clases sin sesión planificada, ' +
        'y al asignar una sesión se sugerirá la próxima fecha que le toque. Si aún no has ' +
        'creado tus grupos, añade abajo <b>una clase con su nombre</b> (p. ej. «Lengua · 3ºA»): ' +
        'aparece ya en «Clases» y le asignas el grupo y el alumnado cuando quieras.</p>' +
      '<div id="planner-horario">' + htmlHorario_() + '</div>',
      'Guardar horario', guardarHorariosUI_, { sinFoco: true });
  }

  function htmlHorario_() {
    var clases = clasesPlanner_();
    var h = clases.map(function (c) {
      var dias = horarioDraft[c.id] || [];
      var chips = DIA_CHIPS.slice(0, DIAS_LECTIVOS).map(function (etq, d) {
        var act = dias.some(function (x) { return x.dia === d; });
        return '<button type="button" class="planner-chip-dia' + (act ? ' activo' : '') +
          '" onclick="App.horToggleDia(\'' + c.id + '\',' + d + ')">' + etq + '</button>';
      }).join('');
      var horas = dias.map(function (x) {
        return '<label class="planner-hora"><span class="planner-hora-dia">' + DIA_CHIPS[x.dia] +
          '</span><input type="time" class="planner-hora-inp" data-eval="' + c.id +
          '" data-dia="' + x.dia + '" value="' + esc(x.hora) + '"></label>';
      }).join('');
      return '<div class="planner-hor-clase">' +
        '<div class="planner-hor-cab"><div class="planner-hor-nombre">' +
          esc(etiquetaClase_(c.id)) + '</div></div>' +
        '<div class="planner-hor-dias">' + chips + '</div>' +
        (horas ? '<div class="planner-hor-horas">' + horas + '</div>' : '') +
      '</div>';
    }).join('');
    if (!clases.length) {
      h = '<div class="vacio">Aún no tienes clases: añade abajo una clase con su nombre para ' +
        'montar tu horario y empezar a planificar. Aparecerá también en «Clases», donde le ' +
        'asignas el grupo y el alumnado cuando quieras.</div>';
    }
    h += '<div class="planner-prov-add">' +
      '<input id="prov-nombre" type="text" placeholder="Ej.: Lengua · 3ºA" ' +
        'onkeydown="if(event.key===\'Enter\'){event.preventDefault();App.crearClaseHorario();}">' +
      '<button type="button" class="btn" onclick="App.crearClaseHorario()">+ Añadir clase</button>' +
    '</div>';
    return h;
  }

  /** Crea una clase real SIN grupo desde el horario (se completa luego en «Clases»). */
  function crearClaseHorario() {
    var inp = document.getElementById('prov-nombre');
    var nombre = ((inp && inp.value) || '').trim();
    if (!nombre) return aviso('Escribe el nombre de la clase (p. ej. «Lengua · 3ºA»).');
    leerHorasDraft_(); // el repintado no debe perder horas ya escritas
    var btn = document.querySelector('.planner-prov-add .btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Añadiendo…'; }
    if (inp) inp.disabled = true;
    llamarConFallo_('crearEvaluacion', [{ nombre: nombre }],
      function (ev) {
        estado.evaluaciones.push({
          evalId: ev.evalId, claseId: '', area: ev.area || '', nombre: ev.nombre,
          color: ev.color || '', icono: ev.icono || '', claseNombre: '', curso: '',
          numAlumnos: 0, horario: [], creado: ev.creado, sinGrupo: true
        });
        horarioDraft[ev.evalId] = [];
        document.getElementById('planner-horario').innerHTML = htmlHorario_(); // recrea botón/input
        var nuevo = document.getElementById('prov-nombre');
        if (nuevo) nuevo.focus();
      },
      function (err) {
        if (btn) { btn.disabled = false; btn.textContent = '+ Añadir clase'; }
        if (inp) inp.disabled = false;
        aviso('No se pudo crear la clase: ' + err);
      });
  }

  // ---------- calendario del curso (inicio/fin + festivos) ----------
  var calDraft = null; // festivos en edición mientras el modal está abierto

  function htmlFestivos_() {
    if (!calDraft.length) return '<div class="planner-vacio">Sin festivos añadidos.</div>';
    return calDraft.map(function (f, i) {
      return '<div class="cal-fest-fila">' +
        '<input type="text" class="cal-fest-nombre" data-i="' + i + '" value="' + esc(f.nombre) +
          '" placeholder="Nombre (p. ej. Navidad)">' +
        '<input type="date" class="cal-fest-desde" data-i="' + i + '" value="' + esc(f.desde) +
          '" title="Desde" onchange="App.calHastaPorDefecto_(' + i + ')">' +
        '<input type="date" class="cal-fest-hasta" data-i="' + i + '" value="' + esc(f.hasta) + '" title="Hasta (opcional)">' +
        '<button type="button" class="btn peligro btn-icono" title="Quitar" ' +
          'onclick="App.calQuitarFestivo(' + i + ')">' + svgUI('papelera') + '</button>' +
      '</div>';
    }).join('');
  }
  function leerFestivosDraft_() {
    [].forEach.call(document.querySelectorAll('#cal-festivos .cal-fest-fila'), function (fila, i) {
      if (!calDraft[i]) return;
      var d = fila.querySelector('.cal-fest-desde'), h = fila.querySelector('.cal-fest-hasta'),
          n = fila.querySelector('.cal-fest-nombre');
      calDraft[i].desde = d ? d.value : '';
      calDraft[i].hasta = h ? h.value : '';
      calDraft[i].nombre = n ? n.value : '';
    });
  }
  function calAddFestivo() {
    leerFestivosDraft_();
    calDraft.push({ desde: '', hasta: '', nombre: '' });
    document.getElementById('cal-festivos').innerHTML = htmlFestivos_();
  }
  /** Al fijar «desde» de un festivo, propone el mismo día como «hasta» (si vacío). */
  function calHastaPorDefecto_(i) {
    var fila = document.querySelectorAll('#cal-festivos .cal-fest-fila')[i];
    if (!fila) return;
    var d = fila.querySelector('.cal-fest-desde'), h = fila.querySelector('.cal-fest-hasta');
    if (d && h && d.value && !h.value) h.value = d.value;
  }
  function calQuitarFestivo(i) {
    leerFestivosDraft_();
    calDraft.splice(i, 1);
    document.getElementById('cal-festivos').innerHTML = htmlFestivos_();
  }
  // ---------- compartir con familias (calendario de Google por clase) ----------
  var famCalIds = {}; // evalId -> calendarId ya publicado

  /** Enlaces públicos a partir del id del calendario (misma fórmula que el server). */
  function enlacesDeCalId_(calId) {
    var cid = btoa(calId).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    return {
      verUrl: 'https://calendar.google.com/calendar/embed?src=' + encodeURIComponent(calId) + '&ctz=Europe%2FMadrid',
      addUrl: 'https://calendar.google.com/calendar/r?cid=' + cid,
      icalUrl: 'https://calendar.google.com/calendar/ical/' + encodeURIComponent(calId) + '/public/basic.ics'
    };
  }
  function famAccHtml_(evalId) {
    var calId = famCalIds[evalId];
    var links = calId
      ? '<span class="fam-links">' +
          '<button class="btn" onclick="App.copiarEnlaceFamilias_(\'' + evalId + '\')">' +
            svgUI('enlace') + ' Copiar enlace</button>' +
          '<a class="btn" href="' + enlacesDeCalId_(calId).verUrl + '" target="_blank" rel="noopener">Ver</a>' +
        '</span>'
      : '';
    return links +
      '<button class="btn' + (calId ? '' : ' primario') + '" id="fam-btn-' + evalId + '" ' +
      'onclick="App.publicarClaseCalendar(\'' + evalId + '\')">' + (calId ? 'Actualizar' : 'Publicar') + '</button>';
  }
  function abrirCompartirFamilias() {
    var clases = clasesPlanner_();
    if (!clases.length) return aviso('Primero crea alguna clase (desde «Horario»).');
    abrirModal('Compartir con familias',
      '<p class="ayuda">Publica las sesiones de una clase en un calendario de Google (público) y ' +
        'comparte el enlace con las familias. Es de solo lectura para ellas y se actualiza cuando ' +
        'pulses «Actualizar».</p>' +
      '<label class="check fam-auto"><input type="checkbox" id="fam-auto-chk" ' +
        'onchange="App.toggleAutoFamilias_(this)"> Actualizar automáticamente cada día ' +
        '(a las 14:00 y a las 02:00)</label>' +
      '<div id="fam-lista">' + spinner() + '</div>', 'Cerrar', function () { cerrarModal(); },
      { sinFoco: true, ancho: true });
    llamar('estadoAutoCalSync', [], function (activo) {
      var chk = document.getElementById('fam-auto-chk'); if (chk) chk.checked = !!activo;
    });
    llamar('estadoCalendariosClases', [], function (mapa) {
      famCalIds = mapa || {};
      var cont = document.getElementById('fam-lista');
      if (!cont) return;
      cont.innerHTML = clases.map(function (c) {
        return '<div class="fam-fila" id="fam-' + c.id + '">' +
          '<span class="fam-nom">' + icoClase_(c) + esc(etiquetaClase_(c.id)) + '</span>' +
          '<span class="fam-acc">' + famAccHtml_(c.id) + '</span></div>';
      }).join('');
    });
  }
  function publicarClaseCalendar(evalId) {
    var btn = document.getElementById('fam-btn-' + evalId);
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-inline"></span> Publicando…'; }
    llamarConFallo_('sincronizarClaseCalendar', [evalId],
      function (r) {
        famCalIds[evalId] = r.calendarId;
        var fila = document.getElementById('fam-' + evalId);
        if (fila) fila.querySelector('.fam-acc').innerHTML = famAccHtml_(evalId);
        avisoOk('Publicado: ' + r.n + ' sesión(es). Ya puedes compartir el enlace.');
      },
      function (err) {
        if (btn) { btn.disabled = false; btn.innerHTML = 'Publicar'; }
        aviso('No se pudo publicar: ' + err);
      });
  }
  function copiarEnlaceFamilias_(evalId) {
    var calId = famCalIds[evalId];
    if (calId) copiarAlPortapapeles(enlacesDeCalId_(calId).verUrl,
      'Enlace copiado: compártelo con las familias (verán el calendario de la clase).');
  }
  function toggleAutoFamilias_(chk) {
    chk.disabled = true;
    llamarConFallo_('activarAutoCalSync', [chk.checked],
      function () {
        chk.disabled = false;
        avisoOk(chk.checked
          ? 'Actualización automática activada (14:00 y 02:00).'
          : 'Actualización automática desactivada.');
      },
      function (err) { chk.disabled = false; chk.checked = !chk.checked; aviso('No se pudo cambiar: ' + err); });
  }

  /** Vuelca las horas escritas al borrador (antes de repintar o guardar). */
  function leerHorasDraft_() {
    [].forEach.call(document.querySelectorAll('.planner-hora-inp'), function (inp) {
      (horarioDraft[inp.dataset.eval] || []).forEach(function (h) {
        if (h.dia === Number(inp.dataset.dia)) h.hora = inp.value;
      });
    });
  }

  function horToggleDia(evalId, dia) {
    leerHorasDraft_(); // no perder horas ya escritas al repintar
    var lista = horarioDraft[evalId] || (horarioDraft[evalId] = []);
    var idx = -1;
    lista.forEach(function (h, i) { if (h.dia === dia) idx = i; });
    if (idx >= 0) lista.splice(idx, 1);
    else {
      lista.push({ dia: dia, hora: '' });
      lista.sort(function (a, b) { return a.dia - b.dia; });
    }
    document.getElementById('planner-horario').innerHTML = htmlHorario_();
  }

  function guardarHorariosUI_() {
    leerHorasDraft_();
    botonModalCargando('Guardando…');
    llamar('guardarHorarios', [horarioDraft], function () {
      // Refleja lo guardado en el estado local (sin recargar del servidor).
      (estado.evaluaciones || []).forEach(function (ev) {
        if (horarioDraft[ev.evalId]) ev.horario = horarioDraft[ev.evalId];
      });
      cerrarModal(); pintarPlanner(); avisoOk('Horario guardado.');
    });
  }

  /**
   * Fecha sugerida para programar la clase evalId: parte de la última sesión de
   * la unidad (si se pasa unidadId y hay alguna con fecha en esa clase; si no,
   * de hoy) y avanza al siguiente día que toque según su horario — o, sin
   * horario, al siguiente día lectivo (salta findes y festivos).
   */
  function fechaSugerida_(evalId, unidadId) {
    // Última fecha de esa clase dentro de la unidad (la «sesión anterior»).
    var base = '';
    if (unidadId) {
      (sesionesCache || []).forEach(function (s) {
        if (s.unidadId !== unidadId) return;
        (s.asignaciones || []).forEach(function (a) {
          if (a.evalId === evalId && a.fecha && a.fecha > base) base = a.fecha;
        });
      });
    }
    var d;
    if (base) { var p = base.split('-'); d = new Date(+p[0], +p[1] - 1, +p[2]); }
    else { d = new Date(); d.setDate(d.getDate() - 1); } // sin anterior: desde hoy
    var c = clasePlannerDe_(evalId);
    var dias = ((c && c.horario) || []).map(function (h) { return h.dia; });
    for (var i = 0; i < 120; i++) {
      d.setDate(d.getDate() + 1);
      var iso = isoLocal_(d);
      if (!esLectivo_(iso)) continue;
      if (!dias.length || dias.indexOf(diaSemanaIso_(iso)) >= 0) return iso;
    }
    return '';
  }

  /** Al marcar una clase sin fecha en el modal de sesión, sugiere la próxima que le toque. */
  function horChkCambiada(chk) {
    if (!chk.checked) return;
    var f = document.querySelector('.planner-asig-fecha[data-eval="' + chk.dataset.eval + '"]');
    if (!f || f.value) return;
    var sel = document.getElementById('ses-unidad');
    var iso = fechaSugerida_(chk.dataset.eval, (sel && sel.value) || '');
    if (iso) f.value = iso;
  }

  /** Entradas {ses, asig} de todas las sesiones (una por asignación). */
  function entradasPlanner_() {
    var out = [];
    (sesionesCache || []).forEach(function (s) {
      (s.asignaciones || []).forEach(function (a) { out.push({ ses: s, asig: a }); });
    });
    return out;
  }

  // ---------- rejilla semanal (grupos × días / por horario) ----------
  /** Índice del día de la semana (0 = lunes) de una fecha 'YYYY-MM-DD'. */
  function diaSemanaIso_(iso) {
    var p = String(iso || '').split('-');
    if (p.length !== 3) return -1;
    return (new Date(+p[0], +p[1] - 1, +p[2]).getDay() + 6) % 7;
  }
  /** Hora (del horario) de una clase en un día de la semana; '' si no tiene. */
  function horaClaseDia_(evalId, dia) {
    var c = clasePlannerDe_(evalId);
    return c ? horaDia_(c, dia) : '';
  }

  /** Contexto común de la semana visible: días lectivos (L–V) y sus sesiones. */
  function semanaCtx_() {
    var lunes = new Date(plannerLunes);
    var isos = [];
    for (var i = 0; i < DIAS_LECTIVOS; i++) {
      var d = new Date(lunes); d.setDate(d.getDate() + i);
      isos.push(isoLocal_(d));
    }
    var enSemana = {};
    isos.forEach(function (x) { enSemana[x] = true; });
    var porClaseFecha = {}; // 'evalId|iso' -> [entrada] (sesiones de clase)
    var eventos = {};       // iso -> [entrada] (tipo evento, sin grupo → fila OTROS)
    var avisos = [];        // entradas tipo aviso de la semana (banda superior)
    entradasPlanner_().forEach(function (en) {
      var a = en.asig;
      if (!a || !a.fecha || !enSemana[a.fecha]) return;
      var tipo = en.ses.tipo || 'clase';
      if (tipo === 'aviso') { avisos.push(en); return; }
      if (tipo === 'evento' || !a.evalId) { (eventos[a.fecha] = eventos[a.fecha] || []).push(en); return; }
      var k = a.evalId + '|' + a.fecha;
      (porClaseFecha[k] = porClaseFecha[k] || []).push(en);
    });
    return { isos: isos, porClaseFecha: porClaseFecha, eventos: eventos, avisos: avisos,
      hoy: isoLocal_(new Date()) };
  }

  /** Banda superior de recordatorios (tipo aviso) de la semana. */
  function htmlAvisosBanda_(avisos) {
    if (!avisos || !avisos.length) return '';
    return '<div class="pl-avisos"><span class="pl-avisos-tit">No olvidar</span>' +
      avisos.map(function (en) {
        return '<button class="pl-aviso" onclick="App.editarSesionUI(\'' + en.ses.sesionId +
          '\')" title="' + esc(en.ses.descripcion || '') + '">' +
          esc(en.ses.titulo || 'Aviso') +
          (en.asig && en.asig.fecha ? ' · ' + fechaCorta_(en.asig.fecha) : '') + '</button>';
      }).join('') + '</div>';
  }

  /**
   * Tarjeta de sesión para las celdas del calendario (estilo Planboard):
   * cabecera con el color de la clase (título + hora/grupo) y, si conPreview,
   * cuerpo con la descripción enriquecida (respeta saltos, listas y enlaces).
   */
  function chipSesion_(en, conClase, conPreview) {
    var s = en.ses, a = en.asig;
    var tipo = s.tipo || 'clase';
    // Con clase (vistas Día y por horario): la CLASE va en grande y debajo la
    // hora con el título de la sesión (la jornada se lee por clases).
    var principal = s.titulo || 'Sin título', sub = '';
    if (conClase && a) {
      if (tipo !== 'clase') {
        sub = '<span class="pl-chip-sub">' + (tipo === 'evento' ? 'Evento' : 'Aviso') + '</span>';
      } else {
        var hora = horaClaseDia_(a.evalId, diaSemanaIso_(a.fecha));
        principal = etiquetaClase_(a.evalId);
        sub = '<span class="pl-chip-sub">' + (hora ? esc(hora) + ' · ' : '') +
          esc(s.titulo || 'Sin título') + '</span>';
      }
    }
    var obs = (a && a.observaciones)
      ? '<span class="pl-chip-obs" title="' + esc(a.observaciones) + '">' + svgUI('lapiz') + '</span>'
      : '';
    // Color de la clase (el definido al crearla): borde y teñido de la cabecera.
    var col = (tipo === 'clase' && a && a.evalId) ? colorClase_(a.evalId) : 'var(--acento)';
    var arr = (tipo !== 'aviso')
      ? ' ondragstart="App.dragSesionIni(event,\'' + s.sesionId + '\',\'' +
        ((a && a.evalId) || '') + '\')" ondragend="App.dragSesionFin(event)"'
      : '';
    var grip = (tipo !== 'aviso')
      ? '<span class="pl-chip-grip" title="Arrastrar" onpointerdown="App.gripSesionDown(event)">⠿</span>'
      : '';
    // Previsualización: descripción con su formato (solo donde cabe: día y, en
    // PC, semana). Al pulsar la tarjeta (cabecera o cuerpo) se edita; los enlaces
    // del cuerpo siguen funcionando (editarSesionDesde_ los respeta).
    var descHtml = descInicialHtml_(s.descripcion || '');
    var edit = 'onclick="App.editarSesionDesde_(event,\'' + s.sesionId + '\')"';
    // El cuerpo blanco se pinta SIEMPRE (aunque no haya descripción, como una
    // línea en blanco): todas las tarjetas comparten silueta y altura.
    var preview = '<div class="pl-chip-desc rt-render">' + descHtml + '</div>';
    // El onclick va en la TARJETA entera: cabecera, cuerpo o zona en blanco,
    // todo abre el editor (los enlaces del cuerpo siguen funcionando).
    return '<div class="pl-chip' + (tipo === 'evento' ? ' pl-chip-evento' : '') +
        '" style="border-color:' + col + '"' + arr + ' ' + edit + '>' +
      '<div class="pl-chip-cab" style="background:' + col + '"' +
        ' title="' + esc(s.titulo || 'Sin título') +
        (a && a.observaciones ? ' — ' + esc(a.observaciones) : '') + '">' +
        grip +
        '<span class="pl-chip-txt"><span class="pl-chip-tit">' + esc(principal) +
          obs + '</span>' + sub + '</span>' +
      '</div>' + preview +
    '</div>';
  }

  /** Hueco «+ Planificar» compacto (clase que toca ese día sin sesión). */
  function huecoCelda_(evalId, iso, conEtq) {
    return '<button class="pl-hueco" title="Planificar" ' +
      'onclick="App.nuevaSesion(\'' + evalId + '\',\'' + iso + '\')">+' +
      (conEtq ? ' ' + esc(etiquetaClase_(evalId)) : '') + '</button>';
  }

  // ---------- vista diaria ----------
  /** Una sola jornada: clases del día (sesión o hueco) ordenadas por hora. */
  function htmlDia_() {
    var iso = isoLocal_(plannerDia);
    var idx = diaSemanaIso_(iso); // 0 = lunes
    var etq = document.getElementById('planner-dia-etq');
    if (etq) {
      etq.textContent = DIAS_SEM[idx] + ' ' + fechaConAnio_(iso);
    }
    // Reparte las entradas del día en clases, eventos y avisos.
    var porClase = {}, eventos = [], avisos = [];
    entradasPlanner_().forEach(function (en) {
      var a = en.asig;
      if (!a || a.fecha !== iso) return;
      var tipo = en.ses.tipo || 'clase';
      if (tipo === 'aviso') { avisos.push(en); return; }
      if (tipo === 'evento' || !a.evalId) { eventos.push(en); return; }
      (porClase[a.evalId] = porClase[a.evalId] || []).push(en);
    });
    var fest = festivoNombre_(iso);
    var bloques = [];
    clasesPlanner_().forEach(function (c) {
      var ens = porClase[c.id] || [];
      var hora = horaDia_(c, idx);
      if (ens.length) {
        ens.forEach(function (en) { bloques.push({ hora: hora, html: chipSesion_(en, true, true) }); });
      } else if (c.horario.some(function (h) { return h.dia === idx; })) {
        bloques.push({ hora: hora, html: huecoCelda_(c.id, iso, true) });
      }
    });
    eventos.forEach(function (en) { bloques.push({ hora: '99:98', html: chipSesion_(en, true, true) }); });
    bloques.sort(function (a, b) {
      var ha = a.hora || '99:99', hb = b.hora || '99:99';
      return ha < hb ? -1 : ha > hb ? 1 : 0;
    });
    var cuerpo = bloques.length
      ? bloques.map(function (b) { return b.html; }).join('')
      : '<div class="vacio">' + (fest ? esc(fest) + ' · no lectivo' :
          'Nada planificado este día.') + '</div>';
    return htmlAvisosBanda_(avisos) +
      '<div class="pl-dia' + (fest ? ' pl-nolect' : '') + '">' + cuerpo + '</div>';
  }

  function htmlSemana_() {
    var ctx = semanaCtx_();
    document.getElementById('planner-semana-etq').textContent =
      'Semana del ' + fechaCorta_(ctx.isos[0]) + ' al ' + fechaCorta_(ctx.isos[ctx.isos.length - 1]);
    var grid = (plannerLayout === 'horario') ? htmlSemanaHorario_(ctx) : htmlSemanaGrupo_(ctx);
    // Tira inferior de sesiones sin programar (sin asignaciones o sin fecha).
    // UNA entrada por sesión, aunque tenga varias asignaciones sin fecha (si no,
    // la misma sesión salía repetida).
    var sueltas = [];
    (sesionesCache || []).forEach(function (s) {
      if (!(s.asignaciones || []).length) { sueltas.push({ ses: s, asig: null }); return; }
      var sinFecha = s.asignaciones.filter(function (a) { return !a.fecha; });
      if (sinFecha.length) sueltas.push({ ses: s, asig: sinFecha[0] });
    });
    var extra = sueltas.length
      ? '<div class="planner-dia pl-sueltas"><h3>Sin programar</h3>' +
        sueltas.map(function (en) { return lineaSesion_(en); }).join('') + '</div>'
      : '';
    return htmlAvisosBanda_(ctx.avisos) + grid + extra;
  }

  /** ¿Hay algún evento en la semana? (para decidir si se pinta la fila OTROS). */
  function hayEventos_(ctx) {
    return ctx.isos.some(function (iso) { return (ctx.eventos[iso] || []).length; });
  }

  /** Atributos de una celda que acepta soltar sesiones (arrastrar). */
  function dropAttrs_(evalId, iso) {
    return ' ondragover="App.dragSesionSobre(event)" ondragleave="App.dragSesionFuera(event)"' +
      ' ondrop="App.dragSesionSuelta(event,\'' + (evalId || '') + '\',\'' + iso + '\')"';
  }

  /** Rejilla grupos × días: una fila por clase, una columna por día lectivo. */
  function htmlSemanaGrupo_(ctx) {
    var clases = clasesPlanner_();
    if (!clases.length) {
      return '<div class="vacio">Aún no tienes clases. Añade una desde el botón «Horario».</div>';
    }
