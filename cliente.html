  // ---------- mapa: cursos y áreas ----------
  function cursosDisponibles() {
    var vistos = {}, out = [];
    (estado.areas || []).forEach(function (a) {
      if (!vistos[a.curso]) { vistos[a.curso] = true; out.push(a.curso); }
    });
    return out;
  }
  function areasDe(curso) {
    return (estado.areas || []).filter(function (a) { return a.curso === curso; })
      .map(function (a) { return a.area; });
  }
  function opcionesAreas(curso) {
    var ph = '<option value="" selected>— Seleccionar área —</option>';
    if (!curso) return ph;
    var areas = areasDe(curso);
    if (!areas.length) return ph;
    return ph + areas.map(function (a) {
      return '<option value="' + esc(a) + '">' + esc(a) + '</option>';
    }).join('');
  }
  function claseDe(id) {
    return (estado.clases || []).filter(function (c) { return c.claseId === id; })[0] || null;
  }

  // ---------- alumnos: parseo y fusión ----------
  function parsearLista(texto) {
    return String(texto || '').split('\n')
      .map(function (l) { return l.replace(/\s+/g, ' ').trim(); })
      .filter(function (l) { return l.length; })
      .map(function (nombre) { return { nombre: nombre }; });
  }
  function fusionarAlumnos(previos, bajas, nuevos) {
    var porNombre = {}, porBase = {};
    previos.forEach(function (a) {
      porNombre[a.nombre] = a.id;
      var base = nombreSeneca(a.nombre);
      if (!(base in porBase)) porBase[base] = a.id; // el primero gana
    });
    // Las bajas (alumnado retirado antes) solo rellenan los huecos que dejen
    // los presentes: re-añadir el mismo nombre = reincorporación con sus notas.
    (bajas || []).forEach(function (a) {
      if (!(a.nombre in porNombre)) porNombre[a.nombre] = a.id;
      var base = nombreSeneca(a.nombre);
      if (!(base in porBase)) porBase[base] = a.id;
    });
    return nuevos.map(function (a) {
      // Empareja por nombre exacto y, si no, por nombre sin pseudónimo, para
      // conservar las notas al añadir o quitar el "(alias)".
      var id = porNombre[a.nombre] || porBase[nombreSeneca(a.nombre)];
      return id ? { id: id, nombre: a.nombre } : { nombre: a.nombre };
    });
  }

  // ---------- modal ----------
  var accionModal = null;
  function abrirModal(titulo, cuerpoHtml, textoAceptar, onAceptar, opts) {
    document.getElementById('modal-titulo').textContent = titulo;
    document.getElementById('modal-cuerpo').innerHTML = cuerpoHtml;
    var b = document.getElementById('modal-aceptar');
    b.textContent = textoAceptar; b.disabled = false;
    accionModal = onAceptar;
    b.onclick = function () { if (accionModal) accionModal(); };
    document.getElementById('modal-fondo').hidden = false;
    // Lleva el foco al primer campo del modal (o al botón de aceptar).
    // Con sinFoco no se enfoca nada: en el móvil, enfocar un campo de texto
    // abre el teclado (molesto p. ej. al editar una actividad ya creada).
    if (opts && opts.sinFoco) return;
    var f = document.querySelector('#modal-cuerpo input, #modal-cuerpo select, #modal-cuerpo textarea');
    (f || b).focus();
  }

  /**
   * Evita el "salto" por auto-scroll cuando, al hacer clic, un control del modal
   * recibe el foco (casillas de criterio, botones, swatches). Prevenimos el foco
   * con ratón —el clic sigue funcionando—; los campos de texto se dejan intactos.
   * Se engancha una sola vez al contenedor del modal.
   */
  function setupModalNoScroll() {
    var m = document.querySelector('.modal');
    if (!m) return;
    m.addEventListener('mousedown', function (e) {
      var t = e.target;
      if (t.closest('label.crit') || t.closest('button') ||
          (t.classList && t.classList.contains('swatch'))) {
        e.preventDefault();
      }
    });
  }

  /**
   * Teclado global: Escape cierra el modal, Tab queda atrapado dentro del
   * modal mientras esté abierto, y Enter/Espacio activan los elementos
   * navegables que no son <button> (enlaces del menú, flechas de volver,
   * tarjetas con tabindex).
   */
  function setupTeclado() {
    // El selector de nivel se cierra tocando fuera de él.
    document.addEventListener('pointerdown', function (e) {
      var pop = document.getElementById('pop-nivel');
      if (pop.hidden) return;
      if (pop.contains(e.target)) return;
      if (popNivelTd && popNivelTd.contains(e.target)) return; // la propia celda
      cerrarSelectorNivel();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !document.getElementById('pop-nivel').hidden) {
        cerrarSelectorNivel(); e.preventDefault(); return;
      }
      var modalAbierto = !document.getElementById('modal-fondo').hidden;
      if (modalAbierto) {
        if (e.key === 'Escape') { cerrarModal(); e.preventDefault(); }
        else if (e.key === 'Tab') atraparFoco(e);
        return;
      }
      if (e.key !== 'Enter' && e.key !== ' ') return;
      var t = e.target;
      if (t && t.matches &&
          t.matches('a.item-lat, a.tab, a.volver-icono, .clase-card, .tarjeta-unidad, td.celda-check, td.celda-escala, td.celda-texto')) {
        e.preventDefault(); // evita el scroll de Espacio
        t.click();
      }
    });
  }

  /** Mantiene el Tab dando vueltas dentro del modal (trampa de foco). */
  function atraparFoco(e) {
    var m = document.querySelector('.modal');
    var focos = [].filter.call(
      m.querySelectorAll('button, input, select, textarea, a[href]'),
      function (el) { return !el.disabled && el.offsetParent !== null; });
    if (!focos.length) return;
    var primero = focos[0], ultimo = focos[focos.length - 1];
    if (e.shiftKey && document.activeElement === primero) { ultimo.focus(); e.preventDefault(); }
    else if (!e.shiftKey && document.activeElement === ultimo) { primero.focus(); e.preventDefault(); }
  }

  /** Diálogo de confirmación propio (sustituye al confirm() nativo). */
  function confirmar(titulo, mensaje, textoAceptar, onSi) {
    abrirModal(titulo, '<p class="mensaje">' + esc(mensaje) + '</p>',
      textoAceptar, function () { cerrarModal(); onSi(); });
  }
  function botonModalCargando(txt) {
    var b = document.getElementById('modal-aceptar'); b.disabled = true; b.textContent = txt;
  }
  function cerrarModal() { document.getElementById('modal-fondo').hidden = true; accionModal = null; }
  function cerrarModalFuera(ev) {
    if (ev.target === document.getElementById('modal-fondo')) cerrarModal();
  }

  // ---------- utilidades ----------
  function llamar(fn, args, ok) {
    google.script.run.withSuccessHandler(ok)
      .withFailureHandler(function (err) { aviso(err.message); })
      [fn].apply(google.script.run, args || []);
  }
  function val(id) { return document.getElementById(id).value; }

  var toastTimer = null;
  function aviso(msg) {
    var b = document.getElementById('modal-aceptar'); if (b) b.disabled = false;
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast error';
    t.hidden = false;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.hidden = true; }, 4000);
  }
  function avisoOk(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast'; t.hidden = false;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { t.hidden = true; }, 4000);
  }
  function ocultarToast() {
    clearTimeout(toastTimer);
    document.getElementById('toast').hidden = true;
  }
  function spinner() { return '<div class="spinner-wrap"><div class="spinner"></div></div>'; }
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;'); // también en atributos con comillas
  }

  return {
    iniciar: iniciar,
    irAEvaluaciones: irAEvaluaciones, irAClases: irAClases,
    toggleSidebar: toggleSidebar, cerrarSidebar: cerrarSidebar, filtrar: filtrar,
    irAPapelera: irAPapelera, restaurarItem: restaurarItem, vaciarPapeleraUI: vaciarPapeleraUI,
    abrirCopia: abrirCopia, exportarDatos: exportarDatos, pedirImportar: pedirImportar,
    compartirGruposUI: compartirGruposUI, recibirGruposUI: recibirGruposUI,
    nuevaEvaluacion: nuevaEvaluacion, claseCambiada: claseCambiada,
    elegirColor: elegirColor, elegirIcono: elegirIcono,
    abrirEvaluacion: abrirEvaluacion, editarEvaluacionUI: editarEvaluacionUI,
    eliminarEvaluacionActual: eliminarEvaluacionActual,
    nuevaUnidad: nuevaUnidad, abrirUnidad: abrirUnidad,
    editarUnidadUI: editarUnidadUI, gripDown: gripDown,
    dragEval: dragEval, dragGrupo: dragGrupo,
    clonarUnidad: clonarUnidad, eliminarUnidad: eliminarUnidad,
    copiarSeneca: copiarSeneca, infoSeneca: infoSeneca,
    verResumen: verResumen, pintarResumen: pintarResumen, copiarResumenSeneca: copiarResumenSeneca,
    nuevaActividad: nuevaActividad,
    editarActividadUI: editarActividadUI, eliminarActividadUI: eliminarActividadUI,
    duplicarActividadUI: duplicarActividadUI, variasActividades: variasActividades,
    anadirFilaAct: anadirFilaAct, quitarFilaAct: quitarFilaAct,
    pintarRejilla: pintarRejilla, actDown: actDown,
    ciclarCheck: ciclarCheck, sumarContador: sumarContador, tipoActCambiado: tipoActCambiado,
    abrirSelectorNivel: abrirSelectorNivel, elegirNivel: elegirNivel,
    abrirEditorTexto: abrirEditorTexto,
    prefetchEval: prefetchEval, prefetchClase: prefetchClase, prefetchRejilla: prefetchRejilla,
    nuevaClase: nuevaClase, copiarDeClase: copiarDeClase,
    abrirClase: abrirClase, editarClaseUI: editarClaseUI, editarAlumnos: editarAlumnos,
    eliminarClaseActual: eliminarClaseActual, promocionarGrupoUI: promocionarGrupoUI,
    cambiarCurso: cambiarCurso,
    cerrarModal: cerrarModal, cerrarModalFuera: cerrarModalFuera
  };
})();

window.addEventListener('load', App.iniciar);
</script>
