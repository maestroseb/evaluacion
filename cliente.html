            'onchange="App.rubActModoCambiado()"> Por indicador</label>' +
        '</div></div>' +
      '<div id="l-act-rub-ind" class="campo-crit" hidden></div>' +
      '<label class="check check-suelto"><input type="checkbox" id="f-act-info"' +
        (esInformativa ? ' checked' : '') + ' onchange="App.tipoActCambiado()"> ' +
        'Columna informativa (no cuenta para nota)</label>' +
      '<div id="bloque-crit" class="campo-crit"><span class="etq">Criterios asociados</span>' +
      notaPendientes(lista.pendientes) +
      '<div class="lista-crit">' + lista.html + '</div>' +
      // Debajo de la lista: la opción depende de los criterios que marques.
      '<label class="check check-suelto" id="l-act-desglose"><input type="checkbox" ' +
        'id="f-act-desglose"' + (act && act.desglose ? ' checked' : '') + '> ' +
        'Nota independiente por criterio (si marcas varios)</label>' +
      '</div>' +
      borrar,
      act ? 'Guardar cambios' : 'Crear actividad',
      function () {
        var nombre = val('f-act-nombre').trim();
        var tipo = tipoActElegido();
        var informativa = document.getElementById('f-act-info').checked || tipo === 'texto';
        var numItems = Number(val('f-act-items')) || 0;
        var criterios = informativa ? [] : [].slice.call(
          document.querySelectorAll('.lista-crit input:checked')
        ).map(function (c) { return c.value; });
        var rubricaId = tipo === 'rubrica' ? val('f-act-rubrica') : '';
        // Criterios de la rúbrica: global (lista marcada) o por indicador
        // (un criterio por fila → rubMap; los criterios de la columna son los
        // distintos no vacíos).
        var rubMap = [];
        if (tipo === 'rubrica' && rubActModoElegido_() === 'indicador') {
          rubMap = [].map.call(document.querySelectorAll('#l-act-rub-ind .f-ind-crit'),
            function (s) { return s.value || ''; });
          criterios = rubMap.filter(function (c, i, a) { return c && a.indexOf(c) === i; });
        }
        if (!nombre) return aviso('Pon nombre a la actividad.');
        if (tipo === 'items' && !(numItems > 0)) return aviso('El nº de ítems debe ser mayor que 0.');
        if (tipo === 'rubrica' && !rubricaId) return aviso('Elige una rúbrica para la columna.');
        // La rúbrica puede no llevar criterios (informativa); el resto sí los exige.
        if (!informativa && !criterios.length && tipo !== 'rubrica') {
          return aviso('Marca al menos un criterio, o marca la actividad como informativa.');
        }
        // Nota por criterio: solo con 2+ criterios y tipos que puntúan por valor.
        // La rúbrica gestiona lo suyo aparte (global / por indicador), sin desglose.
        var desglose = !informativa && tipo !== 'contador' && tipo !== 'texto' && tipo !== 'rubrica' &&
          criterios.length > 1 &&
          !!(document.getElementById('f-act-desglose') || {}).checked;
        var payload = { nombre: nombre, criterios: criterios, numItems: numItems,
          tipo: tipo, desglose: desglose, rubricaId: rubricaId, rubMap: rubMap };
        botonModalCargando('Guardando…');
        if (act) {
          llamar('editarActividad', [act.actividadId, payload], function () {
            act.nombre = nombre; act.criterios = criterios;
            act.numItems = numItems; act.tipo = tipo; act.desglose = desglose;
            act.rubricaId = rubricaId; act.rubMap = rubMap;
            if (desglose) repartirDesgloseLocal_(act.actividadId, criterios);
            cerrarModal(); pintarRejilla();
          });
        } else {
          llamar('crearActividad', [rejilla.unidad.unidadId, payload], function (nueva) {
            rejilla.actividades.push(nueva);
            cerrarModal(); pintarRejilla();
          });
        }
      },
      // Al editar, sin foco inicial: que el móvil no abra el teclado solo.
      { sinFoco: !!act });
    tipoActPrevio = null;  // modal recién abierto: sin arrastre del anterior
    tipoActCambiado();     // ajusta campos visibles al tipo inicial
  }

  function tipoActElegido() {
    var m = document.querySelector('input[name="f-act-tipo"]:checked');
    return m ? m.value : 'items';
  }

  var tipoActPrevio = null; // último tipo visto en el modal (para el check informativa)

  /** Adapta el modal al tipo elegido: campo de ítems/máximo y bloque de criterios. */
  function tipoActCambiado() {
    var tipo = tipoActElegido();
    var lab = document.getElementById('l-act-items');
    var txt = document.getElementById('l-act-items-txt');
    if (lab) lab.hidden = (tipo !== 'items' && tipo !== 'contador');
    if (txt) {
      txt.textContent = (tipo === 'contador')
        ? 'Máximo del contador (opcional: con máximo y criterios cuenta como nota)'
        : 'Nº de ítems a evaluar';
    }
    // Selector de rúbrica: solo en tipo "rubrica". Al mostrarlo, se puebla del banco.
    var rub = document.getElementById('l-act-rubrica');
    if (rub) {
      rub.hidden = (tipo !== 'rubrica');
      if (tipo === 'rubrica') poblarRubricasActSelect_(rubActSelId_);
    }
    // Modo de criterios de la rúbrica (global / por indicador) y su bloque.
    var rubModo = document.getElementById('l-act-rub-modo');
    if (rubModo) rubModo.hidden = (tipo !== 'rubrica');
    if (tipo === 'rubrica') {
      asegurarRubActDef_();
      renderRubActCrit_();
    } else {
      var ri = document.getElementById('l-act-rub-ind');
      if (ri) { ri.hidden = true; ri.innerHTML = ''; }
      var bq = document.getElementById('bloque-crit');
      if (bq) bq.hidden = false;
    }
    var info = document.getElementById('f-act-info');
    var bloque = document.getElementById('bloque-crit');
    if (info) {
      if (tipo === 'texto') {
        // Una observación nunca puntúa: informativa fija y sin desmarcar.
        info.checked = true; info.disabled = true;
      } else {
        info.disabled = false;
        // Al salir de Observación se desmarca: lo normal es que la columna
        // cuente, salvo que el docente la marque expresamente.
        if (tipoActPrevio === 'texto') info.checked = false;
      }
    }
    tipoActPrevio = tipo;
    if (bloque && info) bloque.classList.toggle('apagado', info.checked);
    // El desglose por criterio solo aplica a tipos que puntúan por valor y
    // a columnas que cuentan para la nota.
    var desg = document.getElementById('l-act-desglose');
    if (desg) {
      desg.hidden = (tipo === 'contador' || tipo === 'texto' || tipo === 'rubrica' || (info && info.checked));
    }
  }

  var rubActSelId_ = ''; // rúbrica elegida en el editor de columna (para preseleccionar)
  var rubActDef_ = null; // definición completa de esa rúbrica (indicadores, niveles…)
  var rubActMap_ = [];   // criterio por indicador (modo por indicador)
  var rubActModo_ = 'global'; // 'global' | 'indicador'

  /** Puebla el <select> de rúbricas del editor (carga el banco si hace falta). */
  function poblarRubricasActSelect_(selId) {
    var sel = document.getElementById('f-act-rubrica');
    if (!sel) return;
    function fill(list) {
      sel.innerHTML = '<option value="">— Elegir rúbrica —</option>' + (list || []).map(function (r) {
        return '<option value="' + r.rubricaId + '"' + (r.rubricaId === selId ? ' selected' : '') +
          '>' + esc(r.nombre) + '</option>';
      }).join('');
    }
    if (rubricasCache) fill(rubricasCache);
    else llamar('listarRubricas', [], function (list) { rubricasCache = list || []; fill(rubricasCache); });
  }

  /** Carga la definición de la rúbrica elegida (si aún no está) y repinta. */
  function asegurarRubActDef_() {
    var id = rubActSelId_;
    if (!id) { rubActDef_ = null; return; }
    if (rubActDef_ && rubActDef_.rubricaId === id) return;
    llamar('obtenerRubrica', [id], function (r) {
      rubActDef_ = r;
      var n = (r.indicadores || []).length;
      while (rubActMap_.length < n) rubActMap_.push('');
      rubActMap_ = rubActMap_.slice(0, n);
      if (tipoActElegido() === 'rubrica') renderRubActCrit_();
    });
  }

  function rubActModoElegido_() {
    var m = document.querySelector('input[name="f-rub-modo"]:checked');
    return m ? m.value : 'global';
  }
  function rubActModoCambiado() {
    rubActModo_ = rubActModoElegido_();
    renderRubActCrit_();
  }

  /** Opciones de criterio del área de la clase (para el modo por indicador). */
  function opcionesCritArea_(sel) {
    var cods = Object.keys(rejilla.criteriosInfo || {}).sort(cmpCodigo);
    return '<option value="">— Criterio —</option>' + cods.map(function (cod) {
      var c = infoCrit(cod);
      return '<option value="' + esc(cod) + '"' + (cod === sel ? ' selected' : '') + '>' +
        esc(cod) + ' · ' + esc(c.texto) + '</option>';
    }).join('');
  }

  /** Pinta el bloque de criterios de la rúbrica según el modo elegido. */
  function renderRubActCrit_() {
    var bloque = document.getElementById('bloque-crit');
    var indCont = document.getElementById('l-act-rub-ind');
    var esInd = (rubActModo_ === 'indicador');
    var radio = document.querySelector('input[name="f-rub-modo"][value="' + rubActModo_ + '"]');
    if (radio) radio.checked = true;
    if (bloque) bloque.hidden = esInd; // en global se usa la lista de siempre
    if (!indCont) return;
    indCont.hidden = !esInd;
    if (!esInd) { indCont.innerHTML = ''; return; }
    if (!rubActDef_) { indCont.innerHTML = '<p class="ayuda">Cargando indicadores…</p>'; return; }
    indCont.innerHTML = '<span class="etq">Criterio de cada indicador</span>' +
      (rubActDef_.indicadores || []).map(function (ind, i) {
        return '<div class="rub-ind-fila"><span class="rub-ind-nom">' + esc(ind.texto) + '</span>' +
          '<select class="f-ind-crit" data-i="' + i + '">' +
          opcionesCritArea_(rubActMap_[i] || '') + '</select></div>';
      }).join('');
  }

  /** Al elegir una rúbrica, se carga su definición; el mapa por indicador se limpia. */
  function rubricaActCambiada() {
    rubActSelId_ = val('f-act-rubrica');
    rubActDef_ = null;
    rubActMap_ = [];
    asegurarRubActDef_();
    renderRubActCrit_();
  }


  function duplicarActividadUI(id) {
    botonModalCargando('Duplicando…');
    llamar('duplicarActividad', [id], function (nueva) {
      rejilla.actividades.push(nueva);
      cerrarModal(); pintarRejilla();
    });
  }

  function eliminarActividadUI(id) {
    var act = actDe(id);
    confirmar('Eliminar actividad',
      'Se eliminará "' + act.nombre + '" y sus notas. ¿Continuar?', 'Eliminar',
      function () {
        llamar('eliminarActividad', [id], function () {
          rejilla.actividades = rejilla.actividades.filter(function (a) { return a.actividadId !== id; });
          delete rejilla.items[id];
          cerrarModal(); pintarRejilla();
        });
      });
  }

  // ---------- crear varias actividades de golpe ----------
  function variasActividades() {
    var lista = listaCriteriosHtml([]);

    abrirModal('Crear varias actividades',
      '<div class="campo-crit"><span class="etq">Criterios (se aplican a todas)</span>' +
      notaPendientes(lista.pendientes) +
      '<div class="lista-crit">' + lista.html + '</div></div>' +
      '<span class="etq">Actividades</span>' +
      '<div id="filas-act">' + filaActHtml() + filaActHtml() + filaActHtml() + '</div>' +
      '<button type="button" class="link" onclick="App.anadirFilaAct()">+ Añadir fila</button>' +
      '<p class="ayuda">Deja en blanco las filas que no uses. Puedes asignar criterios distintos editando cada actividad después.</p>',
      'Crear todas',
      function () {
        var criterios = [].slice.call(document.querySelectorAll('.lista-crit input:checked'))
          .map(function (c) { return c.value; });
        if (!criterios.length) return aviso('Marca al menos un criterio.');
        var lista = [], error = false;
        [].slice.call(document.querySelectorAll('#filas-act .fila-act')).forEach(function (f) {
          var nombre = f.querySelector('.fa-nombre').value.trim();
          var items = Number(f.querySelector('.fa-items').value);
          if (!nombre && !f.querySelector('.fa-items').value) return; // fila vacía
          if (!nombre) { error = 'Falta el nombre en alguna actividad.'; return; }
          if (!(items > 0)) { error = 'El nº de ítems debe ser mayor que 0 en "' + nombre + '".'; return; }
          lista.push({ nombre: nombre, criterios: criterios, numItems: items });
        });
        if (error) return aviso(error);
        if (!lista.length) return aviso('Añade al menos una actividad (nombre y nº de ítems).');
        botonModalCargando('Creando ' + lista.length + '…');
        llamar('crearActividades', [rejilla.unidad.unidadId, lista], function (nuevas) {
          nuevas.forEach(function (a) { rejilla.actividades.push(a); });
          cerrarModal(); pintarRejilla();
        });
      });
  }
  function filaActHtml() {
    return '<div class="fila-act">' +
      '<input class="fa-nombre" type="text" placeholder="Nombre de la actividad">' +
      '<input class="fa-items" type="number" min="1" step="0.5" placeholder="Ítems">' +
      '<button type="button" class="icono peligro" title="Quitar" onclick="App.quitarFilaAct(this)">' + svgUI('equis') + '</button>' +
      '</div>';
  }
  function anadirFilaAct() {
    document.getElementById('filas-act').insertAdjacentHTML('beforeend', filaActHtml());
  }
  function quitarFilaAct(btn) {
    var f = btn.parentNode;
    if (f && f.parentNode.children.length > 1) f.parentNode.removeChild(f);
  }

  /**
   * Pinta la tabla alumnos × actividades. Orden de columnas:
   * # | Alumno | actividades… | Nota (global) | criterios (resumen, a la derecha).
   */
  // ---------- columnas expandibles (estilo iDoceo): rúbrica y multinota ----------
  var rubExpandido = {}; // actividadId -> true si la columna está expandida
  /** ¿La columna se puede desplegar en subcolumnas? (rúbrica o multinota). */
  function esExpandible_(a) {
    return (tipoDe(a) === 'rubrica' && !!rubDef_(a)) ||
      (!!a.desglose && (a.criterios || []).length > 0 && tipoDe(a) !== 'rubrica');
  }
  function esRubExp_(a) {
    return tipoDe(a) === 'rubrica' && rubExpandido[a.actividadId] && rubDef_(a);
  }
  /** Columna multinota (desglose) desplegada en una subcolumna por criterio. */
  function esDesExp_(a) {
    return !!a.desglose && (a.criterios || []).length > 0 &&
      tipoDe(a) !== 'rubrica' && rubExpandido[a.actividadId];
  }
  var rubCerrando = {}; // actividadId -> true mientras corre la animación de plegado
  function toggleRubExpand(e, actId) {
    if (e) e.stopPropagation();
    var a = actDe(actId);
    if (!a || !esExpandible_(a) || rubCerrando[actId]) return;
    if (rubExpandido[actId]) { plegarConAnimacion_(actId); return; }
    rubExpandido[actId] = true;
    pintarRejilla();
  }

  /**
   * Pliega con la animación INVERSA a la de desplegar: las ramas se deslizan
   * de vuelta hacia la columna principal (las de fuera primero) y, al terminar,
   * se repinta la rejilla ya plegada.
   */
  function plegarConAnimacion_(actId) {
    var els = document.querySelectorAll(
      '#rejilla-cont th.act-sub[data-act="' + actId + '"],' +
      '#rejilla-cont td.celda-rub-ind[data-act="' + actId + '"],' +
      '#rejilla-cont td.celda-sub[data-act="' + actId + '"]');
    var fin = function () {
      delete rubCerrando[actId];
      rubExpandido[actId] = false;
      pintarRejilla();
    };
    if (!els.length) { fin(); return; }
    rubCerrando[actId] = true;
    // El ancho de una COLUMNA de tabla no se puede transicionar con fiabilidad
    // (iOS lo aplica a saltos); el ancho de su CONTENIDO sí. Así que el
    // contenido de cada celda se envuelve al vuelo en un .cel-anim y es ese
    // envoltorio el que estrecha a 0: la columna lo sigue fotograma a
    // fotograma y las contiguas entran deslizándose, cerrando el abanico.
    var max = 0;
    [].forEach.call(els, function (el) {
      var d = parseInt(el.style.getPropertyValue('--rub-d'), 10) || 0;
      if (d > max) max = d;
      var w = el.querySelector('.cel-anim');
      if (!w) {
        w = document.createElement('span');
        w.className = 'cel-anim';
        while (el.firstChild) w.appendChild(el.firstChild);
        el.appendChild(w);
      }
      w.style.width = w.offsetWidth + 'px'; // punto de partida de la transición
    });
    // Reflujo: consolida los anchos fijados antes de lanzar la transición.
    void document.body.offsetWidth;
    [].forEach.call(els, function (el) {
      // Retardo invertido respecto al de apertura (la última rama pliega
      // primero) y COMPRIMIDO a la mitad: al cerrar, el ancho recorre todo su
      // trayecto animado (al abrir aparece de golpe), así que a igual ritmo se
      // percibía más lento.
      var d = parseInt(el.style.getPropertyValue('--rub-d'), 10) || 0;
      el.style.setProperty('--rub-dc', Math.round((max - d) / 2) + 'ms');
      el.classList.add('rub-plegando');
    });
    // La banda de la columna principal se desvanece A LA VEZ que llega la
    // rama más cercana (no después, con el repintado): mismo retardo que ella.
    var prim = document.querySelector('#rejilla-cont th.act-rub-prim[data-act="' + actId + '"]');
    if (prim) {
      prim.style.transitionDelay = Math.round(max / 2) + 'ms';
      prim.classList.add('rub-plegando-prim');
    }
    // El repintado llega cuando todo mide ya cero: no cambia nada visible.
    setTimeout(fin, Math.round(max / 2) + 250);
  }

  /** Asa de arrastre (⠿): el ÚNICO sitio desde el que se reordena la columna. */
  function gripAct_(actId) {
    return '<span class="grip-act" title="Arrastra para reordenar" ' +
      'onpointerdown="App.actDown(event,\'' + actId + '\')" onclick="event.stopPropagation()">⠿</span>';
  }
  /** Botón de editar la actividad (no arrastra ni expande). */
  function editAct_(actId) {
    return '<button class="edit-act" title="Editar actividad" onpointerdown="event.stopPropagation()" ' +
      'onclick="event.stopPropagation();App.editarActividadUI(\'' + actId + '\')">' + svgUI('lapiz') + '</button>';
  }

  /**
   * Cabecera principal de una columna expandida (rúbrica o multinota): el MISMO
   * contenido de tres líneas que plegada —así el ancho no cambia al desplegar—,
   * con el chevron apuntando hacia dentro (plegar).
   */
  function cabeceraPrincipal_(a) {
    return '<th class="act act-rub-col act-rub-prim" data-act="' + a.actividadId + '" ' +
      'title="' + esc(a.nombre + ' · toca para plegar') + '" ' +
      'onclick="App.toggleRubExpand(event,\'' + a.actividadId + '\')">' +
      gripAct_(a.actividadId) + editAct_(a.actividadId) +
      '<span class="rub-exp-ico">' + svgUI('contraer') + '</span>' +
      cabCuerpo_(a) + '</th>';
  }
  /** Retardo escalonado del deslizamiento de la columna k al expandir. */
  function rubDelay_(k) { return ' style="--rub-d:' + (k * 35) + 'ms"'; }

  /** Sub-cabecera (rama) con el texto en vertical, dentro de una columna expandida. */
  function subCabecera_(a, k, n, etiq, titulo) {
    var fin = (k === n - 1);
    return '<th class="act act-sub' + (k === 0 ? ' act-sub-ini' : '') + (fin ? ' act-sub-fin' : '') +
      '" data-act="' + a.actividadId + '"' + rubDelay_(k) + ' ' +
      'title="' + esc(titulo) + '" ' +
      'onclick="App.toggleRubExpand(event,\'' + a.actividadId + '\')">' +
      '<span class="rub-rama-vert">' + esc(etiq) + '</span></th>';
  }

  /** Cabecera de una actividad: 1 columna (normal/contraída) o principal + N (expandida). */
  function cabeceraAct_(a) {
    if (esRubExp_(a)) {
      var def = rubDef_(a), inds = def.indicadores || [], n = inds.length;
      return cabeceraPrincipal_(a) + inds.map(function (ind, k) {
        return subCabecera_(a, k, n, ind.texto, a.nombre + ' · ' + ind.texto);
      }).join('');
    }
    if (esDesExp_(a)) {
      var crits = a.criterios || [], m = crits.length;
      return cabeceraPrincipal_(a) + crits.map(function (cod, k) {
        return subCabecera_(a, k, m, cod, a.nombre + ' · ' + cod + ': ' + infoCrit(cod).texto);
      }).join('');
    }
    var exp = esExpandible_(a);
    // Las columnas desplegables se tocan para expandir; el resto no lleva onclick.
    return '<th class="act' + (exp ? ' act-rub-col' : '') + '" data-act="' + a.actividadId + '" ' +
      'title="' + esc(exp ? (a.nombre + ' · toca para desplegar') : a.criterios.join(', ')) + '" ' +
      (exp ? 'onclick="App.toggleRubExpand(event,\'' + a.actividadId + '\')" ' : '') + '>' +
      gripAct_(a.actividadId) + editAct_(a.actividadId) +
      (exp ? '<span class="rub-exp-ico">' + svgUI('expandir') + '</span>' : '') +
      cabCuerpo_(a) + '</th>';
  }

  /** Cuerpo de la cabecera de actividad: nombre+tipo centrados en vertical y
      los criterios en su propia banda, pegados abajo (línea del chevron). */
  function cabCuerpo_(a) {
    return '<span class="act-cab">' +
      '<span class="act-centro">' +
        '<span class="act-nom">' + esc(a.nombre) + '</span>' +
        '<small class="act-meta">' + esc(metaTipo_(a)) + '</small>' +
      '</span>' +
      '<small class="act-crits">' + esc(metaCrits_(a)) + '</small></span>';
  }

  /** Celdas de una actividad para un alumno: 1 (normal) o global + N (rúbrica expandida). */
  function celdasAct_(a, c, r, alId) {
    if (esRubExp_(a)) {
      var def = rubDef_(a), maxP = rubMaxPts_(def);
      var picks = valorItem(a.actividadId, alId);
      if (!picks || typeof picks !== 'object') picks = {};
      // Columna principal: la nota global de la rúbrica (se queda al expandir).
      // Doble toque = evaluador completo; plegar, solo desde la cabecera.
      var ng = notaRubricaGlobal_(a, alId), gCls = claseNota(ng);
      var principal = '<td class="celda celda-rub-global' + (gCls ? ' ' + gCls : '') + '" data-act="' +
        a.actividadId + '" data-al="' + alId + '" tabindex="0" role="button" ' +
        'title="Nota global · doble toque para evaluar con la rúbrica" ' +
        'onclick="App.tapRubCelda(this)">' +
        (ng == null ? '·' : fmtNota(ng, evalActual && evalActual.curso)) + '</td>';
      // Sub-celdas: el VALOR (puntos) del nivel elegido en cada indicador.
      var gamas = gamasNiveles_(def);
      var subs = (def.indicadores || []).map(function (ind, k) {
        var lvl = picks[k];
        var niv = (lvl != null) ? (def.niveles || [])[Math.round(lvl) - 1] : null;
        var g = niv ? (gamas[Math.round(lvl) - 1] || '') : '';
        return '<td class="celda celda-rub-ind' + (g ? ' ' + g : '') + '" data-act="' + a.actividadId +
          '" data-al="' + alId + '" data-ind="' + k + '"' + rubDelay_(k) + ' tabindex="0" role="button" ' +
          'aria-label="Elegir nivel" title="' + (niv ? esc(niv.etiqueta) : 'Sin valorar') + '" ' +
          'onclick="App.abrirSelectorNivelRub(this)">' + (niv ? esc(niv.valor) : '·') + '</td>';
      }).join('');
      return principal + subs;
    }
    if (esDesExp_(a)) {
      // Columna principal: la media /10 de la actividad (se queda al expandir).
      // Sin semáforo de color: las multinota van sobrias, como las columnas
      // normales (el color queda para la columna NOTA y las rúbricas).
      var nm = notaActividad(a, alId);
      var princ = '<td class="celda celda-rub-global celda-des-prim' +
        '" data-act="' + a.actividadId + '" data-al="' + alId + '" tabindex="0" role="button" ' +
        'title="Media · toca para plegar" ' +
        'onclick="App.toggleRubExpand(event,\'' + a.actividadId + '\')">' +
        (nm == null ? '·' : fmtNota(nm, evalActual && evalActual.curso)) + '</td>';
      // Sub-celdas: una por criterio, con el editor propio del tipo base.
      var subd = (a.criterios || []).map(function (cod, k) {
        return celdaSubDesglose_(a, cod, alId, k);
      }).join('');
      return princ + subd;
    }
    return celdaValor(a, c, r, alId);
  }

  /** Sub-celda de una columna multinota expandida: editor del tipo base para un criterio. */
  function celdaSubDesglose_(a, cod, alId, k) {
    var tipo = tipoDe(a);
    var v = valorCod_(a.actividadId, alId, cod);
    var comun = 'data-act="' + a.actividadId + '" data-al="' + alId + '" data-cod="' + esc(cod) +
      '"' + rubDelay_(k);
    if (tipo === 'check') {
      var cls = v === 1 ? ' si' : (v === 0 ? ' no' : '');
      return '<td class="celda celda-sub celda-check' + cls + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Alternar check" ' +
        'onclick="App.ciclarCheck(this)">' + iconoCheck_(v) + '</td>';
    }
    if (tipo === 'escala' || tipo === 'escalaInf') {
      var niv = TIPOS_ACT[tipo].niveles[Math.round(v) - 1] || null;
      var g = niv ? claseNota(niv.nota) : '';
      return '<td class="celda celda-sub celda-escala' + (g ? ' ' + g : '') + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Elegir nivel" ' +
        'title="' + (niv ? esc(niv.nombre) : 'Sin valorar') + '" ' +
        'onclick="App.abrirSelectorNivel(this)">' + (niv ? niv.cod : '·') + '</td>';
    }
    if (tipo === 'contador') {
      return '<td class="celda celda-sub celda-cont" ' + comun + '>' +
        '<button type="button" class="cont-btn" aria-label="Restar" ' +
        'onclick="App.sumarContador(this,-1)">−</button>' +
        '<span class="cont-val">' + (v == null ? '·' : fmt(v)) + '</span>' +
        '<button type="button" class="cont-btn" aria-label="Sumar" ' +
        'onclick="App.sumarContador(this,1)">+</button></td>';
    }
    // items y nota: input numérico (no entra en la navegación 2D de la rejilla).
    // El TD lleva data-act y el retardo (los usa la animación de plegado); el
    // input, sus datos de edición (los lee commitSubInput).
    return '<td class="celda celda-sub" data-act="' + a.actividadId + '"' + rubDelay_(k) + '>' +
      '<input type="text" inputmode="decimal" class="celda-sub-inp" ' + comun +
      ' value="' + (v == null ? '' : fmt(v)) + '"></td>';
  }

  /** Valor de una celda; con `cod` (multinota) devuelve el de ese criterio. */
  function valorCod_(actId, alId, cod) {
    var v = valorItem(actId, alId);
    if (cod == null || cod === '') return v;
    return (v && typeof v === 'object') ? (v[cod] != null ? v[cod] : null) : null;
  }
  /** Fija (o borra) el valor de una celda; con `cod` escribe dentro del objeto multinota. */
  function fijarCod_(actId, alId, cod, nv) {
    if (cod == null || cod === '') { fijarValor(actId, alId, nv); return; }
    var prev = valorItem(actId, alId), obj = {};
    if (prev && typeof prev === 'object') Object.keys(prev).forEach(function (k) { obj[k] = prev[k]; });
    if (nv == null || nv === '') delete obj[cod]; else obj[cod] = nv;
    fijarValor(actId, alId, Object.keys(obj).length ? obj : null);
  }
  /**
   * Espejo local del reparto del servidor al guardar con desglose: las notas
   * ÚNICAS ya puestas pasan a {criterio: nota} con la misma nota en todos, para
   * verlas en las subcolumnas y ajustar solo las que difieran.
   */
  function repartirDesgloseLocal_(actId, criterios) {
    var m = rejilla.items[actId];
    if (!m || !criterios.length) return;
    Object.keys(m).forEach(function (alId) {
      if (typeof m[alId] !== 'number') return;
      var obj = {};
      criterios.forEach(function (cod) { obj[cod] = m[alId]; });
      m[alId] = obj;
    });
  }
  /** Repinta la celda de nota global de una rúbrica expandida (fila del alumno). */
  function refrescarGlobalRub_(actId, alId) {
    var td = document.querySelector('#rejilla-cont td.celda-rub-global[data-act="' + actId +
      '"][data-al="' + alId + '"]');
    if (!td) return;
    var a = actDe(actId), n = a ? notaRubricaGlobal_(a, alId) : null;
    td.className = td.className.replace(/\bg-\w+/g, '').trim();
    var g = claseNota(n); if (g) td.classList.add(g);
    td.textContent = (n == null ? '·' : fmtNota(n, evalActual && evalActual.curso));
  }
  /** Repinta la celda principal (media) de una columna multinota expandida. */
  function refrescarMediaDesglose_(actId, alId) {
    var td = document.querySelector('#rejilla-cont td.celda-des-prim[data-act="' + actId +
      '"][data-al="' + alId + '"]');
    if (!td) return;
    var a = actDe(actId), n = a ? notaActividad(a, alId) : null;
    td.textContent = (n == null ? '·' : fmtNota(n, evalActual && evalActual.curso));
  }

  /**
   * Gama de color de cada nivel de una rúbrica, por su RANGO (no por su nota
   * absoluta): se ordenan por puntuación y se reparten las gamas según cuántos
   * niveles haya, de modo que niveles contiguos nunca comparten color. Con 4:
   * verde / amarillo / naranja / rojo (el verde claro se salta: se confundía
   * con el verde). Con 5 entran las cinco gamas; con más, se interpola.
   * Devuelve gama[i] = clase g-* del nivel i (mismo orden que def.niveles).
   * La comparten el evaluador, las celdas de indicador y el selector flotante.
   */
  function gamasNiveles_(def) {
    var niveles = (def && def.niveles) || [];
    var pal = niveles.length <= 2 ? ['g-top', 'g-susp']
      : niveles.length === 3 ? ['g-top', 'g-media', 'g-susp']
      : niveles.length === 4 ? ['g-top', 'g-media', 'g-baja', 'g-susp']
      : ['g-top', 'g-alta', 'g-media', 'g-baja', 'g-susp'];
    var gama = [];
    niveles.map(function (n, j) { return { j: j, v: Number(n.valor) || 0 }; })
      .sort(function (a, b) { return b.v - a.v; })
      .forEach(function (o, r) {
        gama[o.j] = pal[niveles.length <= pal.length ? r
          : Math.round(r * (pal.length - 1) / (niveles.length - 1))];
      });
    return gama;
  }

  // ---------- evaluador de rúbrica completa (doble toque en la celda) ----------
  var rubTapUlt = { clave: null, t: 0 }; // último toque en una celda de rúbrica
  var rubEvalSel = null; // { actId, alId, picks } en edición dentro del modal

  /** Doble toque en la celda principal de una rúbrica → evaluador completo. */
  function tapRubCelda(td) {
    var clave = td.dataset.act + '|' + td.dataset.al;
    var ahora = Date.now();
    if (rubTapUlt.clave === clave && (ahora - rubTapUlt.t) < 400) {
      rubTapUlt.clave = null;
      abrirEvaluadorRubrica_(td.dataset.act, td.dataset.al);
      return;
    }
    rubTapUlt = { clave: clave, t: ahora };
  }

  /**
   * Modal con la rúbrica COMPLETA (indicadores × niveles, con sus descripciones)
   * para evaluar a un alumno/a tocando casillas, como en RubricApp. Una casilla
   * por indicador; tocar la elegida la quita. La nota global se recalcula en vivo.
   */
  function abrirEvaluadorRubrica_(actId, alId) {
    var act = actDe(actId), def = rubDef_(act);
    if (!act || !def) return;
    var alumnos = rejilla.alumnos || [], al = null, idx = -1;
    alumnos.forEach(function (a, i) { if (a.id === alId) { al = a; idx = i; } });
    var prev = valorItem(actId, alId);
    var picks = {};
    if (prev && typeof prev === 'object') {
      Object.keys(prev).forEach(function (k) { picks[k] = prev[k]; });
    }
    rubEvalSel = { actId: actId, alId: alId, picks: picks };
    var niveles = def.niveles || [];
    var gNivel = gamasNiveles_(def);
    var cab = '<tr><th class="rg-corner">Indicador · peso</th>' + niveles.map(function (n, j) {
      return '<th class="' + gNivel[j] + '">' + esc(n.etiqueta) +
        ' <span class="ver-pts">(' + esc(n.valor) + ')</span></th>';
    }).join('') + '</tr>';
    var cuerpo = (def.indicadores || []).map(function (ind, i) {
      var celdas = niveles.map(function (n, j) {
        var sel = Math.round(picks[i]) === j + 1;
        return '<td class="rub-eval-celda ' + gNivel[j] + (sel ? ' sel' : '') + '" data-ind="' + i +
          '" data-lvl="' + (j + 1) + '" tabindex="0" role="button" ' +
          'onclick="App.marcarNivelEvaluador(this)">' +
          esc((ind.celdas && ind.celdas[j]) || '') + '</td>';
      }).join('');
      return '<tr><th class="rg-ind">' + esc(ind.texto) +
        ' <span class="rg-peso">' + pesoEntero_(ind.peso) + '%</span></th>' + celdas + '</tr>';
    }).join('');
    // Barra de alumno: anterior / nombre / siguiente (se guarda al cambiar).
    var nav = '<div class="rub-eval-nav">' +
      '<button type="button" class="btn"' + (idx > 0 ? '' : ' disabled') +
        ' onclick="App.cambiarAlumnoEvaluador(-1)" aria-label="Alumno anterior">' +
        '‹<span class="rub-nav-txt"> Anterior</span></button>' +
      '<span class="rub-eval-alumno">' + (al ? esc(al.nombre) : '') + '</span>' +
      '<button type="button" class="btn"' + (idx >= 0 && idx < alumnos.length - 1 ? '' : ' disabled') +
        ' onclick="App.cambiarAlumnoEvaluador(1)" aria-label="Alumno siguiente">' +
        '<span class="rub-nav-txt">Siguiente </span>›</button>' +
      '</div>';
    abrirModal(act.nombre,
      nav +
      '<p class="ayuda">Nota global: <b id="rub-eval-nota">' + notaEvaluador_() + '</b> ' +
      '<span id="rub-eval-cont" class="ayuda-inline">' + contadorEvaluador_() + '</span></p>' +
      '<div class="rg-scroll"><table class="rubrica-grid rubrica-ver rubrica-evaluar"><thead>' +
      cab + '</thead><tbody>' + cuerpo + '</tbody></table></div>',
      'Guardar',
      guardarEvaluadorRubrica_,
      { ancho: true, sinFoco: true });
  }

  /** Guarda al alumno actual y abre el anterior/siguiente en el evaluador. */
  function cambiarAlumnoEvaluador(delta) {
    var s = rubEvalSel;
    if (!s) return;
    var alumnos = rejilla.alumnos || [], idx = -1;
    alumnos.forEach(function (a, i) { if (a.id === s.alId) idx = i; });
    var nuevo = alumnos[idx + delta];
    if (!nuevo) return;
    persistirEvaluador_();
    abrirEvaluadorRubrica_(s.actId, nuevo.id);
  }

  /** Nota global /10 de la selección en curso del evaluador (o —). */
  function notaEvaluador_() {
    var act = actDe(rubEvalSel.actId), def = act && rubDef_(act);
    var n = def ? notaRubrica_(def, rubEvalSel.picks, null) : null;
    return n == null ? '—' : fmtNota(n, evalActual && evalActual.curso);
  }

  /** «n/m indicadores» evaluados: deja claro cuándo la nota aún es parcial. */
  function contadorEvaluador_() {
    var act = actDe(rubEvalSel.actId), def = act && rubDef_(act);
    if (!def) return '';
    var total = (def.indicadores || []).length;
    var hechos = Object.keys(rubEvalSel.picks).length;
    return '(' + hechos + '/' + total + ' indicadores)';
  }

  /** Marca (o desmarca) un nivel en el evaluador: una casilla por indicador. */
  function marcarNivelEvaluador(td) {
    if (!rubEvalSel) return;
    var i = Number(td.dataset.ind), lvl = Number(td.dataset.lvl);
    var ya = Math.round(rubEvalSel.picks[i]) === lvl;
    [].forEach.call(td.parentNode.querySelectorAll('.rub-eval-celda'), function (c) {
      c.classList.remove('sel');
    });
    if (ya) { delete rubEvalSel.picks[i]; }
    else { rubEvalSel.picks[i] = lvl; td.classList.add('sel'); }
    var n = document.getElementById('rub-eval-nota');
    if (n) n.textContent = notaEvaluador_();
    var c = document.getElementById('rub-eval-cont');
    if (c) c.textContent = contadorEvaluador_();
  }

  /** Botón Guardar del evaluador: persiste y cierra. */
  function guardarEvaluadorRubrica_() {
    persistirEvaluador_();
    cerrarModal();
  }

  /**
   * Vuelca la selección en curso del evaluador al estado local y programa el
   * guardado. La llama Guardar, el cambio de alumno y también cerrarModal():
   * cerrar tocando fuera (o con Escape) NUNCA pierde lo último marcado.
   */
  function persistirEvaluador_() {
    var s = rubEvalSel;
    rubEvalSel = null;
    if (!s || !rejilla) return;
    var vacio = !Object.keys(s.picks).length;
    fijarValor(s.actId, s.alId, vacio ? null : s.picks);
    pintarRejilla(); // refresca la celda (y las sub-celdas si está expandida)
    programarGuardadoNotas();
  }

  /** Selector de nivel para una celda de indicador de rúbrica. */
  function abrirSelectorNivelRub(td) {
    var act = actDe(td.dataset.act), def = rubDef_(act);
    if (!def) return;
    var k = Number(td.dataset.ind), niveles = def.niveles || [], gamas = gamasNiveles_(def);
    var picks = valorItem(td.dataset.act, td.dataset.al);
    var cur = (picks && typeof picks === 'object') ? picks[k] : null;
    var pop = document.getElementById('pop-nivel');
    popNivelTd = td;
    pop.innerHTML = niveles.map(function (niv, i) {
      var g = gamas[i] || '';
      return '<button type="button" class="pop-nivel-opt' + (Math.round(cur) === i + 1 ? ' sel' : '') +
        (g ? ' ' + g : '') + '" title="' + esc(niv.etiqueta + ' (' + niv.valor + ')') + '" ' +
        'onclick="App.elegirNivelRub(' + (i + 1) + ')">' + esc(niv.valor) + '</button>';
    }).join('') +
      '<button type="button" class="pop-nivel-opt vaciar" title="Sin valorar" ' +
      'onclick="App.elegirNivelRub(null)">·</button>';
    pop.hidden = false;
    var rc = td.getBoundingClientRect(), pr = pop.getBoundingClientRect();
    var x = Math.min(Math.max(8, rc.left + rc.width / 2 - pr.width / 2), window.innerWidth - pr.width - 8);
    var y = rc.top - pr.height - 6; if (y < 8) y = rc.bottom + 6;
    pop.style.left = x + 'px'; pop.style.top = y + 'px';
  }

  /** Aplica el nivel elegido a la celda de indicador (null = vaciar ese indicador). */
  function elegirNivelRub(nivel) {
    var td = popNivelTd;
    cerrarSelectorNivel();
    if (!td || !rejilla) return;
    var actId = td.dataset.act, alId = td.dataset.al, k = Number(td.dataset.ind);
    var act = actDe(actId), def = rubDef_(act);
    var prev = valorItem(actId, alId);
    var picks = {};
    if (prev && typeof prev === 'object') Object.keys(prev).forEach(function (kk) { picks[kk] = prev[kk]; });
    if (nivel == null) delete picks[k]; else picks[k] = nivel;
    var vacio = !Object.keys(picks).length;
    fijarValor(actId, alId, vacio ? null : picks);
    var niv = (nivel != null && def) ? (def.niveles || [])[nivel - 1] : null;
    td.className = td.className.replace(/\bg-\w+/g, '').trim();
    if (niv) { var g = gamasNiveles_(def)[nivel - 1]; if (g) td.classList.add(g); }
    td.title = niv ? niv.etiqueta : 'Sin valorar';
    td.textContent = niv ? niv.valor : '·';
    refrescarGlobalRub_(actId, alId); // la nota global de la fila, al momento
    actualizarNotasFila(alId);
    programarGuardadoNotas();
  }

  function pintarRejilla() {
    ajustarAltoRejillas(); // la cabecera ya está pintada: mide el hueco real
    var cont = document.getElementById('rejilla-cont');
    if (!rejilla.actividades.length) {
      cont.innerHTML = '<div class="vacio">Sin actividades. ' +
        'Crea una actividad, asóciale criterios y nº de ítems para empezar.</div>';
      return;
    }
    var verCrit = document.getElementById('ver-criterios').checked;
    var crits = verCrit ? criteriosUsados() : [];

    // Si la unidad tiene alguna columna desplegable (rúbrica o multinota), el alto
    // de cabecera se reserva (más alto) SIEMPRE, para que expandir/plegar no lo cambie.
    var conRubrica = rejilla.actividades.some(esExpandible_);
    var h = '<table class="rejilla' + (conRubrica ? ' con-rubrica' : '') + '"><thead><tr>' +
      '<th class="idx">#</th><th class="esq">Alumno/a</th><th class="al-corto"></th>';
    rejilla.actividades.forEach(function (a) { h += cabeceraAct_(a); });
    h += '<th class="nota sep">NOTA</th>';
    crits.forEach(function (cod) {
      h += '<th class="crit-col" title="' + esc(infoCrit(cod).completo) + '">' + esc(cod) + '</th>';
    });
    h += '</tr></thead><tbody>';

    rejilla.alumnos.forEach(function (al, i) {
      h += '<tr><td class="idx">' + (i + 1) + '</td>' + celdaAlumno(al.nombre);
      rejilla.actividades.forEach(function (a, c) {
        h += celdasAct_(a, c, i, al.id);
      });
      h += celdaNota('nota-' + al.id, notaUnidad(al.id), ' nota sep');
      crits.forEach(function (cod) {
        h += celdaNota('crit-' + al.id + '-' + cod, notaCriterio(al.id, cod), ' crit-col');
      });
      h += '</tr>';
    });
    h += '</tbody></table>';
    cont.innerHTML = h;
    wireRejilla();
  }

  /** Celda de nota calculada: formatea y la colorea por tramos (semáforo). */
  function celdaNota(id, n, extra) {
    var g = claseNota(n);
    return '<td class="num' + (extra || '') + (g ? ' ' + g : '') +
      '" id="' + id + '">' + fmtNota(n, evalActual && evalActual.curso) + '</td>';
  }

  // ---------- reordenar actividades arrastrando su cabecera ----------
  var arrastreAct = null; // { id, th, moved, targetId, despues }

  function actDown(e, actId) {
    if (e.button != null && e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    // El arrastre nace en el asa (⠿); localizamos su cabecera para las clases.
    var th = (e.currentTarget.closest && e.currentTarget.closest('th.act')) || e.currentTarget;
    arrastreAct = { id: actId, th: th, moved: false, targetId: null, despues: false };
    th.classList.add('arrastrando-col');
    document.body.classList.add('reordenando');
    document.addEventListener('pointermove', actMove);
    document.addEventListener('pointerup', actUp, true);
  }
  function actMove(e) {
    if (!arrastreAct) return;
    arrastreAct.moved = true;
    var ths = document.querySelectorAll('#rejilla-cont th.act');
    var destino = null;
    [].forEach.call(ths, function (t) {
      t.classList.remove('soltar-antes', 'soltar-despues');
      var r = t.getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right) destino = t;
    });
    if (!destino || destino === arrastreAct.th) { arrastreAct.targetId = null; return; }
    var r = destino.getBoundingClientRect();
    arrastreAct.despues = e.clientX > (r.left + r.width / 2);
    destino.classList.add(arrastreAct.despues ? 'soltar-despues' : 'soltar-antes');
    arrastreAct.targetId = destino.dataset.act;
  }
  function actUp() {
    document.removeEventListener('pointermove', actMove);
    document.removeEventListener('pointerup', actUp, true);
    var a = arrastreAct; arrastreAct = null;
    document.body.classList.remove('reordenando');
    [].forEach.call(document.querySelectorAll('#rejilla-cont th.act'), function (t) {
      t.classList.remove('arrastrando-col', 'soltar-antes', 'soltar-despues');
    });
    if (!a || !a.moved || !a.targetId || a.targetId === a.id) return;
    var arr = rejilla.actividades;
    var from = idxAct_(arr, a.id);
    if (from < 0) return;
    var item = arr.splice(from, 1)[0];
    var tIdx = idxAct_(arr, a.targetId);
    if (a.despues) tIdx += 1;
    arr.splice(tIdx, 0, item);
    pintarRejilla();
    llamar('reordenarActividades',
      [rejilla.unidad.unidadId, arr.map(function (x) { return x.actividadId; })], function () {});
  }
  function idxAct_(arr, id) {
    for (var i = 0; i < arr.length; i++) if (arr[i].actividadId === id) return i;
    return -1;
  }

  /**
   * Engancha la matriz de navegación 2D y sus eventos (teclado, dictado, pegar).
   * La matriz se construye por ORDEN REAL de columnas en cada fila (no por
   * índice de actividad): así las subcolumnas de una rúbrica o multinota
   * EXPANDIDA entran también en el recorrido de las flechas, junto con los
   * inputs y las celdas-botón (checks, escalas, texto, medias plegadas…), y
   * data-r / data-c se reasignan aquí de forma coherente con ella.
   */
  function wireRejilla() {
    inputs2d = [];
    var filas = document.querySelectorAll('#rejilla-cont table.rejilla tbody tr');
    [].forEach.call(filas, function (tr, r) {
      var fila = inputs2d[r] = [];
      var celdas = tr.querySelectorAll('td.celda input, td.celda[tabindex]');
      [].forEach.call(celdas, function (el, c) {
        el.dataset.r = r; el.dataset.c = c;
        fila[c] = el;
        if (el.tagName === 'INPUT') {
          var sub = el.classList.contains('celda-sub-inp');
          el.addEventListener('change', sub
            ? function () { commitSubInput(el); }
            : function () { commitInput(el); });
          el.addEventListener('keydown', onTeclaRejilla);
          el.addEventListener('input', onDictado);
          el.addEventListener('paste', onPegar);
        } else {
          // Celda-botón: flechas como en los inputs; Intro/espacio la «toca».
          el.addEventListener('keydown', onTeclaCeldaBtn);
        }
      });
    });
  }

  /** Guarda el valor tecleado en una sub-celda de multinota (criterio `data-cod`). */
  function commitSubInput(inp) {
    var actId = inp.dataset.act, alId = inp.dataset.al, cod = inp.dataset.cod, act = actDe(actId);
    var raw = inp.value === '' ? '' : Number(String(inp.value).replace(',', '.'));
    if (raw !== '' && isNaN(raw)) { inp.value = ''; return; }
    if (raw !== '' && raw < 0) { raw = 0; inp.value = fmt(raw); }
    var tope = act ? topeValor(act) : null;
    if (raw !== '' && tope != null && raw > tope) { raw = tope; inp.value = fmt(raw); }
    fijarCod_(actId, alId, cod, raw === '' ? null : raw);
    actualizarNotasFila(alId);
    refrescarMediaDesglose_(actId, alId);
    programarGuardadoNotas();
  }

  /** Tope del valor tecleable según el tipo (null = sin tope). */
  function topeValor(act) {
    switch (tipoDe(act)) {
      case 'nota': return 10;
      case 'items': return act.numItems;
      default: return null;
    }
  }

  /** Línea de tipo/ítems de una columna (nº de ítems máximo o el tipo). */
  function metaTipo_(a) {
    var tipo = tipoDe(a);
    var parte = tipo === 'items' ? a.numItems + ' ítems' :
      tipo === 'nota' ? '0-10' :
      tipo === 'check' ? '✓/✗' :
      tipo === 'escala' ? 'IN-SB' :
      tipo === 'escalaInf' ? 'POC-EXC' :
      tipo === 'texto' ? 'texto' :
      tipo === 'rubrica' ? 'rúbrica' :
      (a.numItems > 0 ? '± /' + a.numItems : '±');
    if (a.desglose) parte += ' · por criterio';
    return parte;
  }
  /** Línea de criterios de una columna (o «informativa» si no cuenta). */
  function metaCrits_(a) {
    return (a.criterios && a.criterios.length) ? a.criterios.join(', ') : 'informativa';
  }

  function tituloDesglose_(a, v) {
    var vals = (v && typeof v === 'object') ? v : {};
    return (a.criterios || []).map(function (cod) {
      return cod + ': ' + (vals[cod] != null ? vals[cod] : '—');
    }).join(' · ');
  }

  /** Celda de valor según el tipo de la actividad. */
  function celdaValor(a, c, r, alId) {
    var v = valorItem(a.actividadId, alId);
    var comun = 'data-r="' + r + '" data-c="' + c + '" data-act="' + a.actividadId +
      '" data-al="' + alId + '"';
    var tipo = tipoDe(a);
    if (tipo === 'rubrica') {
      // Contraída: la nota global /10 con su color (el MISMO que al expandir).
      // La columna se despliega SOLO desde la cabecera; el doble toque en la
      // celda abre el evaluador con la rúbrica completa.
      var ng = notaRubricaGlobal_(a, alId), gr = claseNota(ng);
      return '<td class="celda celda-rubrica' + (ng == null ? ' vacia' : (gr ? ' ' + gr : '')) +
        '" ' + comun + ' tabindex="0" role="button" aria-label="Evaluar con la rúbrica" ' +
        'title="Doble toque: evaluar con la rúbrica completa" ' +
        'onclick="App.tapRubCelda(this)">' +
        (ng == null ? '·' : fmtNota(ng, evalActual && evalActual.curso)) + '</td>';
    }
    if (a.desglose && (a.criterios || []).length) {
      // Contraída: la media /10, sobria (sin semáforo, como las columnas
      // normales); tocar la despliega en subcolumnas.
      var nm = notaActividad(a, alId);
      return '<td class="celda celda-desglose' + (nm == null ? ' vacia' : '') +
        '" ' + comun + ' tabindex="0" role="button" aria-label="Desplegar notas por criterio" ' +
        'title="' + esc(tituloDesglose_(a, v)) + '" ' +
        'onclick="App.toggleRubExpand(event,\'' + a.actividadId + '\')">' +
        (nm == null ? svgUI('expandir') : fmtNota(nm, evalActual && evalActual.curso)) + '</td>';
    }
    // Un objeto residual (la actividad dejó de tener desglose) no se pinta.
    if (v != null && typeof v === 'object') v = null;
    if (tipo === 'check') {
      var cls = v === 1 ? ' si' : (v === 0 ? ' no' : '');
      return '<td class="celda celda-check' + cls + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Alternar check" ' +
        'onclick="App.ciclarCheck(this)">' + iconoCheck_(v) + '</td>';
    }
    if (tipo === 'escala' || tipo === 'escalaInf') {
      var niv = TIPOS_ACT[tipo].niveles[Math.round(v) - 1] || null;
      var g = niv ? claseNota(niv.nota) : '';
      return '<td class="celda celda-escala' + (g ? ' ' + g : '') + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Elegir nivel" ' +
        'title="' + (niv ? esc(niv.nombre) : 'Sin valorar') + '" ' +
        'onclick="App.abrirSelectorNivel(this)">' + (niv ? niv.cod : '·') + '</td>';
    }
    if (tipo === 'texto') {
      var t = v == null ? '' : String(v);
      var corto = t.length > 14 ? t.slice(0, 14) + '…' : t;
      return '<td class="celda celda-texto' + (t ? '' : ' vacia') + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Editar observación" ' +
        'title="' + esc(t) + '" ' +
        'onclick="App.abrirEditorTexto(this)">' + (t ? esc(corto) : svgUI('lapiz')) + '</td>';
    }
    if (tipo === 'contador') {
      return '<td class="celda celda-cont" ' + comun + '>' +
        '<button type="button" class="cont-btn" aria-label="Restar" ' +
        'onclick="App.sumarContador(this,-1)">−</button>' +
        '<span class="cont-val">' + (v == null ? '·' : fmt(v)) + '</span>' +
        '<button type="button" class="cont-btn" aria-label="Sumar" ' +
        'onclick="App.sumarContador(this,1)">+</button></td>';
    }
    return '<td class="celda"><input type="text" inputmode="decimal" ' + comun +
      ' value="' + (v == null ? '' : fmt(v)) + '"></td>';
  }
  function iconoCheck_(v) {
    return v === 1 ? svgUI('check') : (v === 0 ? svgUI('equis') : '·');
  }

  /** Fija (o borra con null) el valor de una celda en el estado local. */
  function fijarValor(actId, alId, v) {
    if (v == null || v === '') {
      if (rejilla.items[actId]) delete rejilla.items[actId][alId];
    } else {
      (rejilla.items[actId] || (rejilla.items[actId] = {}))[alId] = v;
    }
  }

  /** Check de un toque: vacío → ✓ → ✗ → vacío. */
  function ciclarCheck(td) {
    var actId = td.dataset.act, alId = td.dataset.al, cod = td.dataset.cod;
    var v = valorCod_(actId, alId, cod);
    var nuevo = (v === 1) ? 0 : (v === 0 ? null : 1);
    fijarCod_(actId, alId, cod, nuevo);
    td.classList.toggle('si', nuevo === 1);
    td.classList.toggle('no', nuevo === 0);
    td.innerHTML = iconoCheck_(nuevo);
    actualizarNotasFila(alId);
    if (cod) refrescarMediaDesglose_(actId, alId);
    programarGuardadoNotas();
  }

  // ---------- selector flotante de nivel (escalas): cualquier nivel a 2 toques ----------
  var popNivelTd = null; // celda que tiene el selector abierto

  /** Abre junto a la celda los niveles de su escala (+ vaciar). */
  function abrirSelectorNivel(td) {
    var act = actDe(td.dataset.act);
    var niveles = TIPOS_ACT[tipoDe(act)].niveles;
    var v = valorCod_(td.dataset.act, td.dataset.al, td.dataset.cod);
    var pop = document.getElementById('pop-nivel');
    popNivelTd = td;
    pop.innerHTML = niveles.map(function (niv, i) {
      var g = claseNota(niv.nota);
      return '<button type="button" class="pop-nivel-opt' +
        (Math.round(v) === i + 1 ? ' sel' : '') + (g ? ' ' + g : '') +
        '" title="' + esc(niv.nombre) + '" onclick="App.elegirNivel(' + (i + 1) + ')">' +
        niv.cod + '</button>';
    }).join('') +
    '<button type="button" class="pop-nivel-opt vaciar" title="Sin valorar" ' +
      'onclick="App.elegirNivel(null)">·</button>';
    pop.hidden = false;
    // Centrado sobre la celda; si no cabe arriba, debajo; siempre dentro de pantalla.
    var r = td.getBoundingClientRect(), pr = pop.getBoundingClientRect();
    var x = Math.min(Math.max(8, r.left + r.width / 2 - pr.width / 2),
      window.innerWidth - pr.width - 8);
    var y = r.top - pr.height - 6;
    if (y < 8) y = r.bottom + 6;
    pop.style.left = x + 'px';
    pop.style.top = y + 'px';
  }

  function cerrarSelectorNivel() {
    document.getElementById('pop-nivel').hidden = true;
    popNivelTd = null;
  }

  /** Aplica el nivel elegido (null = vaciar) a la celda que abrió el selector. */
  function elegirNivel(nivel) {
    var td = popNivelTd;
    cerrarSelectorNivel();
    if (!td || !rejilla) return;
    var actId = td.dataset.act, alId = td.dataset.al, cod = td.dataset.cod, act = actDe(actId);
    fijarCod_(actId, alId, cod, nivel);
    var niv = nivel != null ? TIPOS_ACT[tipoDe(act)].niveles[nivel - 1] : null;
    td.className = td.className.replace(/\bg-\w+/g, '').trim();
    if (niv) { var g = claseNota(niv.nota); if (g) td.classList.add(g); }
    td.title = niv ? niv.nombre : 'Sin valorar';
    td.textContent = niv ? niv.cod : '·';
    actualizarNotasFila(alId);
    if (cod) refrescarMediaDesglose_(actId, alId);
    programarGuardadoNotas();
  }

  /** Modal para escribir la observación (columna de texto) de un alumno/a. */
  function abrirEditorTexto(td) {
    var actId = td.dataset.act, alId = td.dataset.al;
    var act = actDe(actId);
    var al = null;
    (rejilla.alumnos || []).forEach(function (a) { if (a.id === alId) al = a; });
    var v = valorItem(actId, alId);
    abrirModal(act ? act.nombre : 'Observación',
      (al ? '<p class="ayuda">' + esc(al.nombre) + '</p>' : '') +
      '<label>Observación' +
      '<textarea id="f-obs" rows="4" maxlength="500" ' +
      'placeholder="Escribe la observación…">' +
      (v == null ? '' : esc(String(v))) + '</textarea></label>',
      'Guardar',
      function () {
        var t = document.getElementById('f-obs').value.trim().slice(0, 500);
        fijarValor(actId, alId, t || null);
        var corto = t.length > 14 ? t.slice(0, 14) + '…' : t;
        td.classList.toggle('vacia', !t);
        td.title = t;
        td.innerHTML = t ? esc(corto) : svgUI('lapiz');
        cerrarModal();
        programarGuardadoNotas();
      });
  }

  /** Contador con − y +: parte de 0; con máximo definido, no lo supera. */
  function sumarContador(btn, delta) {
    var td = btn.parentNode;
    var actId = td.dataset.act, alId = td.dataset.al, cod = td.dataset.cod, act = actDe(actId);
    var v = valorCod_(actId, alId, cod);
    v = (v == null ? 0 : v) + delta;
    if (v < 0) v = 0;
    if (act && act.numItems > 0 && v > act.numItems) v = act.numItems;
    fijarCod_(actId, alId, cod, v);
    td.querySelector('.cont-val').textContent = fmt(v);
    actualizarNotasFila(alId);
    if (cod) refrescarMediaDesglose_(actId, alId);
    programarGuardadoNotas();
  }

  /** Aplica el valor de un input al estado local (clamp). Devuelve el cambio o null. */
  function aplicarValor(inp) {
    var actId = inp.dataset.act, alId = inp.dataset.al, act = actDe(actId);
    var v = inp.value === '' ? '' : Number(String(inp.value).replace(',', '.'));
    if (v !== '' && isNaN(v)) return null;
    if (v !== '' && v < 0) { v = 0; inp.value = fmt(v); }
    var tope = act ? topeValor(act) : null;
    if (v !== '' && tope != null && v > tope) { v = tope; inp.value = fmt(v); }
    if (v === '') {
      if (rejilla.items[actId]) delete rejilla.items[actId][alId];
    } else {
      (rejilla.items[actId] || (rejilla.items[actId] = {}))[alId] = v;
    }
    return { actividadId: actId, alumnoId: alId, conseguidos: v === '' ? '' : v };
  }

  // ---------- guardado de notas por unidad (bloque, con debounce) ----------
  var notasDirty = false;    // hay cambios sin guardar en la unidad actual
  var notasTimer = null;     // temporizador del debounce
  var notasEnCurso = false;  // hay un guardado en vuelo
  var notasCola = [];        // callbacks a ejecutar cuando el guardado esté a salvo

  /** Marca cambios y programa el guardado del bloque de la unidad. */
  function programarGuardadoNotas() {
    notasDirty = true;
    clearTimeout(notasTimer);
    notasTimer = setTimeout(function () { flushNotas(); }, 500);
  }

  /**
   * Guarda YA el bloque de notas de la unidad si hay cambios, y ejecuta cb
   * cuando estén persistidas (o de inmediato si no hay nada pendiente). Serializa
   * guardados solapados para que las lecturas posteriores lean datos frescos.
   */
  function flushNotas(cb) {
    clearTimeout(notasTimer);
    if (notasEnCurso) { if (cb) notasCola.push(cb); return; }
    if (!notasDirty || !rejilla || !rejilla.unidad) { if (cb) cb(); return; }
    notasDirty = false;
    notasEnCurso = true;
    if (cb) notasCola.push(cb);
    guardarBloque_(rejilla.unidad.unidadId, rejilla.items, 0);
  }

  /**
   * Envía el bloque de una unidad al servidor. Captura uid+items en cada
   * intento: si el guardado falla y el profe ya está en otra unidad, el
   * reintento sigue apuntando al bloque correcto. Ante un fallo definitivo
   * SIEMPRE se desbloquea la cola (si no, la app quedaría colgada: todas las
   * vistas esperan a flushNotas antes de leer del servidor).
   */
  function guardarBloque_(uid, items, intento) {
    google.script.run
      .withSuccessHandler(function () {
        notasEnCurso = false;
        var cbs = notasCola; notasCola = [];
        cbs.forEach(function (f) { f(); });
        if (notasDirty) flushNotas(); // hubo más ediciones mientras se guardaba
      })
      .withFailureHandler(function (err) {
        if (intento < 2) { // reintenta el MISMO bloque con espera creciente
          setTimeout(function () { guardarBloque_(uid, items, intento + 1); },
            2000 * (intento + 1));
          return;
        }
        notasEnCurso = false;
        // Si seguimos en la misma unidad, re-marca los cambios para que el
        // siguiente flush los reintente; si no, ya solo cabe avisar.
        if (rejilla && rejilla.unidad && rejilla.unidad.unidadId === uid) notasDirty = true;
        var cbs = notasCola; notasCola = [];
        cbs.forEach(function (f) { f(); });
        aviso('No se pudieron guardar las notas (' + ((err && err.message) || 'error de red') +
          '). Comprueba la conexión antes de cerrar.');
      })
      .guardarNotasUnidad(uid, items);
  }

  /** Guarda el valor de un input (una celda): estado local, notas y persistencia. */
  function commitInput(inp) {
    var ch = aplicarValor(inp);
    if (!ch) return;
    actualizarNotasFila(ch.alumnoId);
    programarGuardadoNotas();
  }

  /** Recalcula y actualiza solo las celdas de nota de una fila (sin repintar). */
  function actualizarNotasFila(alId) {
    var verCrit = document.getElementById('ver-criterios').checked;
    pintarCeldaNota(document.getElementById('nota-' + alId), notaUnidad(alId));
    if (verCrit) criteriosUsados().forEach(function (cod) {
      pintarCeldaNota(document.getElementById('crit-' + alId + '-' + cod), notaCriterio(alId, cod));
    });
  }
  function pintarCeldaNota(td, n) {
    if (!td) return;
    td.textContent = fmtNota(n, evalActual && evalActual.curso);
    td.classList.remove('g-top', 'g-alta', 'g-media', 'g-baja', 'g-susp');
    var g = claseNota(n);
    if (g) td.classList.add(g);
  }

  // --- navegación con teclado ---
  function onTeclaRejilla(e) {
    var inp = e.target, r = +inp.dataset.r, c = +inp.dataset.c;
    var k = e.key;
    if (k === 'ArrowUp') { focusCelda(r - 1, c); e.preventDefault(); }
    else if (k === 'ArrowDown' || k === 'Enter') { focusCelda(r + 1, c); e.preventDefault(); }
    else if (k === 'ArrowRight' && inp.selectionStart === inp.value.length) { focusCeldaDir(r, c, 1); e.preventDefault(); }
    else if (k === 'ArrowLeft' && inp.selectionStart === 0) { focusCeldaDir(r, c, -1); e.preventDefault(); }
  }
  /** Flechas sobre una celda-botón (multinota, rúbrica, check…): mismas rutas
      que los inputs; Intro/espacio la «toca». */
  function onTeclaCeldaBtn(e) {
    var td = e.currentTarget, r = +td.dataset.r, c = +td.dataset.c, k = e.key;
    if (k === 'ArrowUp') { focusCelda(r - 1, c); e.preventDefault(); }
    else if (k === 'ArrowDown') { focusCelda(r + 1, c); e.preventDefault(); }
    else if (k === 'ArrowRight') { focusCeldaDir(r, c, 1); e.preventDefault(); }
    else if (k === 'ArrowLeft') { focusCeldaDir(r, c, -1); e.preventDefault(); }
    else if (k === 'Enter' || k === ' ') { td.click(); e.preventDefault(); }
  }
  function focusCelda(r, c) {
    var fila = inputs2d[r], el = fila && fila[c];
    if (el) { el.focus(); if (el.select) el.select(); }
  }
  /** Siguiente celda en esa dirección (salta contadores, sin editor propio). */
  function focusCeldaDir(r, c, dir) {
    var fila = inputs2d[r] || [];
    var n = fila.length;
    var nc = c + dir;
    while (nc >= 0 && nc < n && !fila[nc]) nc += dir;
    if (fila[nc]) { fila[nc].focus(); if (fila[nc].select) fila[nc].select(); }
  }

  // --- dictado (Mac): un número seguido de espacio salta a la celda contigua ---
  function onDictado(e) {
    var inp = e.target;
    if (/\s/.test(inp.value)) {
      var num = inp.value.trim().split(/\s+/)[0];
      inp.value = num;
      (inp.classList.contains('celda-sub-inp') ? commitSubInput : commitInput)(inp);
      focusCeldaDir(+inp.dataset.r, +inp.dataset.c, 1);
    }
  }

  // --- pegar desde una tabla/hoja (TSV): rellena desde la celda actual ---
  function onPegar(e) {
    var texto = (e.clipboardData || window.clipboardData).getData('text');
    if (!texto || (texto.indexOf('\t') < 0 && texto.indexOf('\n') < 0)) return; // valor único
    e.preventDefault();
    var inp = e.target, r0 = +inp.dataset.r, c0 = +inp.dataset.c;
    var lineas = texto.replace(/\r/g, '').replace(/\n+$/, '').split('\n');
    var cambios = [], filas = {};
    lineas.forEach(function (linea, ri) {
      linea.split('\t').forEach(function (cel, ci) {
        var destino = inputs2d[r0 + ri] && inputs2d[r0 + ri][c0 + ci];
        // Solo se pega sobre inputs; las celdas-botón de la matriz se saltan.
        if (!destino || destino.tagName !== 'INPUT') return;
        var val = String(cel).trim();
        destino.value = val === '' ? '' : val.replace(',', '.');
        if (destino.classList.contains('celda-sub-inp')) {
          commitSubInput(destino); // sub-celda multinota: guarda por criterio
          cambios.push(1);
          return;
        }
        var ch = aplicarValor(destino);
        if (ch) { cambios.push(ch); filas[ch.alumnoId] = true; }
      });
    });
    Object.keys(filas).forEach(actualizarNotasFila);   // recalcula notas en pantalla
    if (cambios.length) {
      programarGuardadoNotas();                         // se guarda el bloque de la unidad
      avisoOk('Pegadas ' + cambios.length + ' notas.');
    }
  }

  // --- cálculo en vivo (mismo criterio que Resumen.gs en el servidor) ---
  function valorItem(actividadId, alumnoId) {
    var m = rejilla.items[actividadId];
    return m && m[alumnoId] != null ? m[alumnoId] : null;
  }
  // ---------- tipos de columna (catálogo; espejo del servidor) ----------
  // Añadir un tipo = añadir aquí su entrada y su celda en celdaValor().
  // En las escalas se guarda el Nº DE NIVEL (1-5): el blob sigue siendo
  // numérico y la equivalencia 0-10 vive solo en este catálogo (y su espejo
  // en Resumen.gs).
  var TIPOS_ACT = {
    items:     { etiqueta: 'Ítems' },
    nota:      { etiqueta: 'Nota directa' },
    check:     { etiqueta: 'Check' },
    contador:  { etiqueta: 'Contador' },
    escala:    { etiqueta: 'Escala IN–SB', niveles: [
      { cod: 'IN', nombre: 'Insuficiente',  nota: 2.5 },
      { cod: 'SU', nombre: 'Suficiente',    nota: 5 },
      { cod: 'BI', nombre: 'Bien',          nota: 6 },
      { cod: 'NT', nombre: 'Notable',       nota: 7.5 },
      { cod: 'SB', nombre: 'Sobresaliente', nota: 9.5 } ] },
    escalaInf: { etiqueta: 'Escala Infantil', niveles: [
      { cod: 'POC', nombre: 'Poco',      nota: 2 },
      { cod: 'REG', nombre: 'Regular',   nota: 4 },
      { cod: 'ADE', nombre: 'Adecuado',  nota: 6 },
      { cod: 'BUE', nombre: 'Bueno',     nota: 8 },
      { cod: 'EXC', nombre: 'Excelente', nota: 10 } ] },
    texto:     { etiqueta: 'Observación' }, // texto libre; siempre informativa
    rubrica:   { etiqueta: 'Rúbrica' }      // se evalúa con una rúbrica del banco
  };
  function tipoDe(act) { return act && TIPOS_ACT[act.tipo] ? act.tipo : 'items'; }

  /** Convierte UN valor a nota 0-10 según el tipo (espejo de Resumen.gs). */
  function notaDeValor_(act, v) {
    if (v == null) return null;
    // Cadenas (observaciones) y objetos sueltos (restos de un cambio de
    // configuración) nunca puntúan.
    if (typeof v === 'string' || typeof v === 'object') return null;
    var tipo = tipoDe(act);
    switch (tipo) {
      case 'nota':  return Math.max(0, Math.min(10, v));
      case 'check': return v ? 10 : 0;
      case 'texto': return null;
      case 'escala': case 'escalaInf':
        var niv = TIPOS_ACT[tipo].niveles[Math.round(v) - 1];
        return niv ? niv.nota : null;
      default: // items y contador con máximo: proporción sobre numItems
        if (!(act.numItems > 0)) return null;
        return Math.max(0, Math.min(10, v / act.numItems * 10));
    }
  }
  // ---------- cálculo de columnas rúbrica (picks = {indice: nivel 1-based}) ----------
  /** Definición de la rúbrica enganchada a una columna (o null). */
  function rubDef_(act) { return (rejilla.rubricas || {})[act.rubricaId] || null; }
  /** Máxima puntuación entre los niveles de una rúbrica. */
  function rubMaxPts_(def) {
    var m = 0;
    (def.niveles || []).forEach(function (n) { var v = Number(n.valor) || 0; if (v > m) m = v; });
    return m;
  }
  /**
   * Nota /10 de una selección: media PONDERADA por peso de (puntos/máx)×10 sobre
   * los indicadores que pasan el filtro (filtro null = todos los evaluados). Así
   * la puntuación global de la rúbrica se trasvasa a base 10.
   */
  function notaRubrica_(def, picks, filtro) {
    var maxP = rubMaxPts_(def);
    if (!(maxP > 0)) return null;
    var niveles = def.niveles || [];
    var sumW = 0, sum = 0;
    (def.indicadores || []).forEach(function (ind, i) {
      if (filtro && !filtro(i)) return;
      var lvl = picks[i];
      if (lvl == null) return;
      var niv = niveles[Math.round(lvl) - 1];
      if (!niv) return;
      var w = Number(ind.peso) || 0;
      sum += (Number(niv.valor) || 0) / maxP * w;
      sumW += w;
    });
    return sumW > 0 ? (sum / sumW) * 10 : null;
  }
  function notaRubricaGlobal_(act, alumnoId) {
    var def = rubDef_(act), picks = valorItem(act.actividadId, alumnoId);
    if (!def || !picks || typeof picks !== 'object') return null;
    return notaRubrica_(def, picks, null);
  }
  function notaRubricaCrit_(act, alumnoId, cod) {
    var def = rubDef_(act), picks = valorItem(act.actividadId, alumnoId);
    if (!def || !picks || typeof picks !== 'object') return null;
    var mapa = act.rubMap || [];
    if (mapa.length) { // por indicador: solo los mapeados a ese criterio
      return notaRubrica_(def, picks, function (i) { return (mapa[i] || '') === cod; });
    }
    return notaRubrica_(def, picks, null); // global: la nota alimenta todos sus criterios
  }

  /** Nota de una actividad PARA un criterio (con desglose, el valor de ese cod). */
  function notaActividadCrit(act, alumnoId, cod) {
    if (tipoDe(act) === 'rubrica') return notaRubricaCrit_(act, alumnoId, cod);
    var v = valorItem(act.actividadId, alumnoId);
    if (act.desglose && v != null && typeof v === 'object') {
      v = v[cod] != null ? v[cod] : null;
    }
    return notaDeValor_(act, v);
  }
  /** Nota global de una actividad (con desglose, media de sus criterios). */
  function notaActividad(act, alumnoId) {
    if (tipoDe(act) === 'rubrica') return notaRubricaGlobal_(act, alumnoId);
    if (act.desglose) {
      var notas = [];
      (act.criterios || []).forEach(function (cod) {
        var n = notaActividadCrit(act, alumnoId, cod);
        if (n != null) notas.push(n);
      });
      return media(notas);
    }
    return notaDeValor_(act, valorItem(act.actividadId, alumnoId));
  }
  function notaCriterio(alumnoId, cod) {
    var notas = [];
    rejilla.actividades.forEach(function (a) {
      if (a.criterios.indexOf(cod) < 0) return;
      var n = notaActividadCrit(a, alumnoId, cod);
      if (n != null) notas.push(n);
    });
    return media(notas);
  }
  function notaUnidad(alumnoId) {
    var notas = criteriosUsados().map(function (cod) { return notaCriterio(alumnoId, cod); })
      .filter(function (n) { return n != null; });
    return media(notas);
  }
  function criteriosUsados() {
    var set = {}, out = [];
    rejilla.actividades.forEach(function (a) {
      a.criterios.forEach(function (c) { if (!set[c]) { set[c] = true; out.push(c); } });
    });
    out.sort(cmpCodigo);
    return out;
  }
  function media(arr) {
    if (!arr.length) return null;
    var s = arr.reduce(function (a, b) { return a + b; }, 0);
    return s / arr.length;
  }
  function fmt(n) { return n == null ? '' : (Math.round(n * 100) / 100).toString().replace('.', ','); }
  function actDe(id) {
    return rejilla.actividades.filter(function (a) { return a.actividadId === id; })[0];
  }
  /** Normaliza criteriosInfo[cod] (objeto {texto,descripcion} o texto suelto). */
  function infoCrit(cod) {
    var v = rejilla.criteriosInfo[cod] || {};
    if (typeof v === 'string') v = { texto: v, descripcion: '' };
    var completo = v.descripcion ? (cod + '. ' + v.descripcion) : (cod + '. ' + (v.texto || ''));
    return { texto: v.texto || '', descripcion: v.descripcion || '', completo: completo };
  }
  /** Orden natural de códigos tipo "LCL.4.8.3" (de menor a mayor). */
  function cmpCodigo(a, b) {
    var pa = a.split('.'), pb = b.split('.');
    for (var i = 0; i < Math.max(pa.length, pb.length); i++) {
      var na = parseInt(pa[i], 10), nb = parseInt(pb[i], 10);
      if (isNaN(na) || isNaN(nb)) {
        if ((pa[i] || '') !== (pb[i] || '')) return (pa[i] || '') < (pb[i] || '') ? -1 : 1;
      } else if (na !== nb) return na - nb;
    }
    return 0;
  }

  // ---------- clases ----------
  /**
   * Posición de un nivel para ordenar las secciones de Mis grupos: etapa
   * (Infantil < Primaria < ESO < Diversificación < CFGB < Bachillerato) y,
   * dentro, el número del curso.
   */
  function ordenCurso_(curso) {
    var s = String(curso || '').toLowerCase();
    var num = parseInt((/\d+/.exec(s) || [0])[0], 10) || 0;
    var etapa =
      s.indexOf('años') >= 0 || s.indexOf('infantil') >= 0 ? 0 :
      s.indexOf('primaria') >= 0 ? 1 :
      s.indexOf('diversificación') >= 0 || s.indexOf('diversificacion') >= 0 ? 3 :
      s.indexOf('cfgb') >= 0 || s.indexOf('básico') >= 0 || s.indexOf('basico') >= 0 ? 4 :
      s.indexOf('bachillerato') >= 0 ? 5 :
      s.indexOf('eso') >= 0 ? 2 : 6;
    return etapa * 100 + num;
  }

  /** Tarjeta de grupo: horizontal y clara, distinta de la tarjeta de clase. */
  function tarjetaGrupo_(c, archivada) {
    var col = c.color || colorAvatar(c.nombre);
    return '<div class="grupo-card' + (archivada ? ' archivada' : '') + '" data-id="' + c.claseId +
      '" style="--c:' + col + '" tabindex="0" role="button" ' +
      'onmouseenter="App.prefetchClase(\'' + c.claseId + '\')" ' +
      'onclick="App.abrirClase(\'' + c.claseId + '\')">' +
      '<span class="gc-avatar">' + iconoSvg(c.icono || 'personas') + '</span>' +
      '<div class="gc-info"><h3>' + esc(c.nombre) + '</h3>' +
      '<div class="gc-meta">' + (archivada ? esc(c.curso) + ' · ' : '') + c.numAlumnos + ' alumnos/as</div></div>' +
      (archivada
        ? '<button class="btn btn-restaurar" title="Restaurar (volver a la vista)" ' +
          'onclick="event.stopPropagation();App.restaurarGrupo(\'' + c.claseId + '\')">' +
          svgUI('restaurar') + ' Restaurar</button>'
        : '<span class="cc-grip gc-grip" title="Arrastra para reordenar" ' +
          'onpointerdown="App.dragGrupo(event)" onclick="event.stopPropagation()">⠿</span>') +
      '</div>';
  }

  function pintarClases() {
    var cont = document.getElementById('lista-clases');
    var activos = estado.clases.filter(function (c) { return !c.archivado; });
    var archivados = estado.clases.filter(function (c) { return c.archivado; });
    if (!activos.length && !archivados.length) {
      cont.innerHTML = '<div class="vacio">Aún no tienes grupos. ' +
        'Un grupo es una lista de alumnado que luego reutilizas en varias áreas.</div>';
      return;
    }
    // Secciones por curso (nivel), de menor a mayor; dentro, el orden manual.
    var porCurso = {};
    activos.forEach(function (c) {
      var k = c.curso || 'Sin curso';
      (porCurso[k] || (porCurso[k] = [])).push(c);
    });
    var cursos = Object.keys(porCurso).sort(function (a, b) {
      return ordenCurso_(a) - ordenCurso_(b) || a.localeCompare(b);
    });
    cont.innerHTML = cursos.map(function (curso) {
      return '<h2 class="seccion-curso">' + esc(curso) + '</h2>' +
        '<div class="tarjetas tarjetas-grupos">' +
        porCurso[curso].map(function (c) { return tarjetaGrupo_(c, false); }).join('') + '</div>';
    }).join('') +
      (!activos.length ? '<div class="vacio">No tienes grupos a la vista (están archivados).</div>' : '');
    pintarArchivadas_(cont,
      archivados.map(function (c) { return tarjetaGrupo_(c, true); }),
      'tarjetas tarjetas-grupos');
  }

  /**
   * Crea un grupo. Si se pasa `onCreated`, se llama con el grupo creado en vez
   * de abrir su ficha (lo usa la asociación de grupo a una clase sin grupo).
   */
  function nuevaClase(onCreated) {
    var cursos = cursosDisponibles();
    if (!cursos.length) return aviso('El Mapa Curricular está vacío o sin configurar.');
    copiaAlumnosEnCurso = false; // modal recién abierto: sin copias en vuelo
    var optCursos = '<option value="" selected>— Seleccionar curso —</option>' +
      opcionesCursosHtml('');
    var optCopiar = '<option value="">— No copiar —</option>' +
      estado.clases.map(function (c) {
        return '<option value="' + c.claseId + '">' + esc(c.nombre + ' · ' + c.curso) + '</option>';
      }).join('');

    abrirModal('Nuevo grupo',
      '<label>Nombre del grupo' +
      '<input id="f-nombre" type="text" placeholder="Ej.: 3º A"></label>' +
      '<label>Curso' +
      '<select id="f-curso">' + optCursos + '</select></label>' +
      '<label>Copiar alumnado de otro grupo (opcional)' +
      '<select id="f-copiar" onchange="App.copiarDeClase()">' + optCopiar + '</select></label>' +
      '<label id="f-classroom-lbl">Importar de Google Classroom (opcional)' +
      '<div class="cl-imp-fila">' +
        '<select id="f-classroom"><option value="">— Cargando cursos… —</option></select>' +
        '<button type="button" class="btn" id="f-classroom-btn" onclick="App.importarClassroom()" ' +
          'disabled>Importar</button>' +
      '</div></label>' +
      '<label>Alumnado (uno por línea)' +
      '<textarea id="f-alumnos" rows="8" placeholder="Apellidos, Nombre"></textarea></label>' +
      '<p class="ayuda">Escribe cada línea como <b>Apellidos, Nombre</b>, tal y como aparece en ' +
      'Séneca (lo más cómodo: pegar la lista directamente desde Séneca, o copiarla de otro grupo ' +
      'tuyo). Así, al exportar las notas por criterios, los nombres encajan sin retoques.</p>' +
      '<p class="ayuda">Si quieres, añade un <b>alias entre paréntesis</b>: «Ye, Xin Yi (Sofía)». ' +
      'La app lo usará para mostrar (p. ej. en el móvil se ve el alias en vez del nombre) ' +
      'y al copiar para Séneca se ignora.</p>' +
      '<div class="campo-crit"><span class="etq">Color</span>' + swatchesHtml(COLORES[0]) + '</div>' +
      '<div class="campo-crit"><span class="etq">Icono</span>' + iconosHtml('personas') + '</div>',
      'Crear grupo',
      function () {
        var nombre = val('f-nombre').trim();
        var curso = val('f-curso');
        if (!nombre) return aviso('Pon un nombre al grupo.');
        if (!curso) return aviso('Elige el curso.');
        if (copiaAlumnosEnCurso) {
          return aviso('Un momento: aún se está cargando el alumnado a copiar…');
        }
        var alumnos = parsearLista(val('f-alumnos'));
        botonModalCargando('Creando…');
        llamar('crearClase',
          [{ nombre: nombre, curso: curso, alumnos: alumnos,
             color: colorElegido(), icono: iconoElegido() }],
          function (cl) {
          estado.clases.push({
            claseId: cl.claseId, nombre: cl.nombre, curso: cl.curso,
            numAlumnos: cl.alumnos.length, creado: cl.creado,
            color: cl.color, icono: cl.icono
          });
          claseCache[cl.claseId] = cl;
          cerrarModal();
          if (typeof onCreated === 'function') onCreated(cl);
          else abrirClaseCargada(cl);
        });
      });
    cargarCursosClassroom_();  // rellena el desplegable de Classroom en segundo plano
  }

  /** Carga los cursos de Classroom del profe en el desplegable del modal. */
  function cargarCursosClassroom_() {
    var sel = document.getElementById('f-classroom');
    if (!sel) return;
    google.script.run
      .withSuccessHandler(function (r) {
        var s = document.getElementById('f-classroom');
        var b = document.getElementById('f-classroom-btn');
        if (!s) return;
        if (!r || !r.ok) {
          // Sin permiso o servicio: se oculta la opción (no estorba al flujo normal).
          var lbl = document.getElementById('f-classroom-lbl');
          if (lbl) lbl.hidden = true;
          return;
        }
        if (!r.cursos.length) {
          s.innerHTML = '<option value="">— No tienes cursos en Classroom —</option>';
          return;
        }
        s.innerHTML = '<option value="">— Elige un curso —</option>' +
          r.cursos.map(function (c) {
            var etq = c.nombre + (c.seccion ? ' · ' + c.seccion : '');
            return '<option value="' + esc(c.id) + '">' + esc(etq) + '</option>';
          }).join('');
        if (b) b.disabled = false;
      })
      .withFailureHandler(function () {
        var lbl = document.getElementById('f-classroom-lbl');
        if (lbl) lbl.hidden = true;
      })
      .listarCursosClassroom();
  }

  /** Trae el alumnado del curso de Classroom elegido al cuadro de alumnado. */
  function importarClassroom() {
    var sel = document.getElementById('f-classroom');
    var btn = document.getElementById('f-classroom-btn');
    var courseId = sel && sel.value;
    if (!courseId) return aviso('Elige antes un curso de Classroom.');
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-inline"></span> Importando…'; }
    google.script.run
      .withSuccessHandler(function (r) {
        if (btn) { btn.disabled = false; btn.textContent = 'Importar'; }
        if (!r || !r.ok) return aviso((r && r.error) || 'No se pudo importar de Classroom.');
        if (!r.alumnos.length) return aviso('Ese curso de Classroom no tiene alumnado.');
        // Se vuelca en el cuadro (añadiendo a lo que ya hubiera) para revisarlo
        // antes de crear el grupo: los nombres vienen de Séneca, pero conviene
        // un vistazo por si algún apellido compuesto llega incompleto.
        var ta = document.getElementById('f-alumnos');
        if (!ta) return;
        var prev = ta.value.trim();
        ta.value = (prev ? prev + '\n' : '') + r.alumnos.join('\n');
        avisoOk('Importados ' + r.alumnos.length + ' alumnos/as. Revísalos antes de crear el grupo.');
      })
      .withFailureHandler(function (e) {
        if (btn) { btn.disabled = false; btn.textContent = 'Importar'; }
        aviso('No se pudo importar de Classroom: ' + ((e && e.message) || 'error'));
      })
      .alumnosCursoClassroom(courseId);
  }

  var copiaAlumnosEnCurso = false; // bloquea "Crear grupo" mientras carga la copia

  /** Rellena el textarea con el alumnado de la clase elegida para copiar. */
  function copiarDeClase() {
    var id = val('f-copiar');
    var ta = document.getElementById('f-alumnos');
    if (!id) return;
    function rellenar(cl) {
      ta.value = (cl.alumnos || []).map(function (a) { return a.nombre; }).join('\n');
    }
    if (claseCache[id]) { rellenar(claseCache[id]); return; } // instantáneo
    // Traer el alumnado tarda 1-3 s: mientras, se bloquea el envío del modal
