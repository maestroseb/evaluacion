<script>
/**
 * Lógica de cliente. Habla con el backend Apps Script vía google.script.run.
 *
 * Modelo:
 *   - Clase = lista de alumnado + curso (reutilizable).
 *   - Evaluación = una clase aplicada a un área.
 */
var App = (function () {
  var estado = null;        // {usuario, areas, clases, evaluaciones}
  var claseActual = null;
  var evalActual = null;
  var claseCache = {};      // claseId -> grupo completo (con alumnado)
  var enVuelo = {};         // ids con un prefetch en curso (evita duplicados)

  // ---------- arranque ----------
  function iniciar() {
    setupModalNoScroll();
    setupTeclado();
    restaurarSidebar();
    window.addEventListener('resize', ajustarAltoRejillas); // giro / cambio de tamaño
    // Guardado de última hora: intenta persistir y, si quedan cambios en vuelo,
    // pide confirmación al navegador para dar tiempo a que la petición llegue.
    window.addEventListener('beforeunload', function (e) {
      var pendiente = notasDirty || notasEnCurso;
      flushNotas();
      if (pendiente) { e.preventDefault(); e.returnValue = ''; }
    });
    setupHistorial();
    llamar('getEstadoInicial', [], function (e) {
      estado = e;
      document.getElementById('usuario').textContent = e.usuario;
      document.getElementById('usuario').title = e.usuario;
      document.getElementById('perfil-avatar').textContent = iniciales(e.usuario);
      document.getElementById('cargando').hidden = true;
      pintarSelectorCurso();
      // Si la URL trae una vista (recarga o enlace copiado), se restaura;
      // si no, se abre la lista de clases como siempre.
      try {
        google.script.url.getLocation(function (loc) {
          var p = (loc && loc.parameter) || {};
          if (p.v) { ultimoEstadoHist = claveHist_(p); restaurarVista(p); }
          else irAEvaluaciones();
        });
      } catch (err) { irAEvaluaciones(); }
      precargarEvaluaciones(); // en 2º plano: abrir cada clase será instantáneo
      // Copia de seguridad automática en 2º plano (no retrasa el arranque).
      llamarSilencioso('respaldoAutomatico', [], function () {});
    });
  }

  // ---------- navegación ----------
  var SECCIONES = ['vista-evaluaciones', 'vista-clases', 'vista-clase',
    'vista-evaluacion', 'vista-unidad', 'vista-resumen', 'vista-papelera'];
  var vistaActual = null; // vista visible: descarta respuestas tardías del servidor
  function mostrar(id) {
    flushNotas(); // guarda notas pendientes de la unidad al cambiar de vista
    vistaActual = id;
    SECCIONES.forEach(function (s) { document.getElementById(s).hidden = (s !== id); });
    cerrarSelectorNivel(); // ningún selector flotante entre vistas
    document.getElementById('app').scrollTop = 0; // cada vista empieza arriba
    // (además estabiliza la medición de ajustarAltoRejillas)
    // Resalta la sección activa en barra lateral y tab bar (por data-nav).
    var clave =
      (id === 'vista-clases' || id === 'vista-clase') ? 'clases' :
      (id === 'vista-papelera') ? 'papelera' :
      (id === 'vista-evaluaciones' || id === 'vista-evaluacion' ||
       id === 'vista-unidad' || id === 'vista-resumen') ? 'eval' : '';
    ['eval', 'clases', 'papelera'].forEach(function (k) {
      [].forEach.call(document.querySelectorAll('[data-nav="' + k + '"]'), function (el) {
        el.classList.toggle('activo', k === clave);
      });
    });
    cerrarSidebar(); // en móvil, cierra el panel tras navegar
  }
  function irAEvaluaciones() { registrarHistorial({ v: 'evaluaciones' }); evalActual = null; setTitulo('Clases'); mostrar('vista-evaluaciones'); pintarEvaluaciones(); }
  function irAClases() { registrarHistorial({ v: 'clases' }); claseActual = null; setTitulo('Grupos'); mostrar('vista-clases'); pintarClases(); }

  // ---------- historial del navegador (flechas atrás/adelante) ----------
  // Apps Script corre en un iframe: google.script.history sincroniza el
  // historial y la URL de la página madre. Cada vista registra un estado
  // {v, id, eid}; las flechas del navegador lo restauran, y la URL con
  // parámetros permite recargar la página sin perder la pantalla actual.
  var navegandoHistorial = false; // true mientras restauramos: no re-registrar
  var ultimoEstadoHist = '';      // clave del último estado registrado (dedupe)

  function claveHist_(st) { return [st.v || '', st.id || '', st.eid || ''].join('|'); }

  /** Registra la vista actual en el historial (push; replace la primera vez). */
  function registrarHistorial(st) {
    if (navegandoHistorial) return;
    var clave = claveHist_(st);
    if (clave === ultimoEstadoHist) return; // repintado de la misma vista
    var primera = (ultimoEstadoHist === '');
    ultimoEstadoHist = clave;
    var params = { v: st.v };
    if (st.id) params.id = st.id;
    if (st.eid) params.eid = st.eid;
    try {
      if (primera) google.script.history.replace(st, params, null);
      else google.script.history.push(st, params, null);
    } catch (e) { /* fuera del iframe de Apps Script (pruebas locales) */ }
  }

  /** Engancha las flechas atrás/adelante del navegador. */
  function setupHistorial() {
    try {
      google.script.history.setChangeHandler(function (e) {
        var st = (e && e.state) || {};
        if (!st.v && e && e.location && e.location.parameter) st = e.location.parameter;
        if (!st.v) st = { v: 'evaluaciones' };
        ultimoEstadoHist = claveHist_(st);
        restaurarVista(st);
      });
    } catch (e) { /* sin soporte de historial: la app funciona igual */ }
  }

  /** Reconstruye una vista a partir de un estado del historial. */
  function restaurarVista(st) {
    navegandoHistorial = true;
    try {
      switch (st.v) {
        case 'clases': irAClases(); break;
        case 'papelera': irAPapelera(); break;
        case 'clase':
          if (claseCache[st.id] || claseDe(st.id)) abrirClase(st.id);
          else irAClases(); // ya no existe (borrado / otro curso)
          break;
        case 'evaluacion': abrirEvaluacion(st.id); break;
        case 'unidad': conEvaluacion_(st.eid, function () { abrirUnidad(st.id); }); break;
        case 'resumen': conEvaluacion_(st.id, function () { verResumen(); }); break;
        default: irAEvaluaciones();
      }
    } finally {
      navegandoHistorial = false;
    }
  }

  /** Garantiza que evalActual es la evaluación dada antes de ejecutar cb. */
  function conEvaluacion_(evalId, cb) {
    if (!evalId) { if (evalActual) cb(); else irAEvaluaciones(); return; }
    if (evalActual && evalActual.evalId === evalId) return cb();
    if (evalCache[evalId]) { evalActual = evalCache[evalId]; return cb(); }
    llamarSilencioso('getEvaluacionCompleta', [evalId], function (ev) {
      evalCache[evalId] = ev;
      evalActual = ev;
      cb();
    });
  }

  // ---------- curso académico (multi-curso en un solo cuaderno) ----------
  /** Rellena el selector de curso de la barra superior con los cursos con datos. */
  function pintarSelectorCurso() {
    var sel = document.getElementById('curso-activo');
    if (!sel || !estado.cursos) return;
    var c = estado.cursos;
    sel.innerHTML = (c.lista || []).map(function (x) {
      return '<option value="' + esc(x) + '"' + (x === c.activo ? ' selected' : '') +
        '>' + esc(x) + '</option>';
    }).join('');
  }

  /** Cambia el curso activo: recarga Clases y Grupos ya filtrados del servidor. */
  function cambiarCurso(curso) {
    if (!curso || (estado.cursos && curso === estado.cursos.activo)) return;
    recargarDatosCurso(curso);
  }

  /**
   * Recarga siempre del servidor los datos del curso indicado y repinta. A
   * diferencia de cambiarCurso, no ignora el caso "mismo curso activo" (lo usa
   * la promoción, que puede crear el grupo dentro del curso ya activo).
   */
  function recargarDatosCurso(curso) {
    llamar('cambiarCurso', [curso], function (r) {
      estado.cursos = r.cursos;
      estado.clases = r.clases;
      estado.evaluaciones = r.evaluaciones;
      invalidarCaches();
      pintarSelectorCurso();
      irAEvaluaciones(); // vuelve a la lista de clases del curso elegido
      precargarEvaluaciones();
    });
  }

  /** Siguiente curso académico ("2024-2025" -> "2025-2026"), o '' si no encaja. */
  function siguienteCurso_(acad) {
    var m = /^(\d{4})-(\d{4})$/.exec(acad || '');
    if (!m) return '';
    return (parseInt(m[1], 10) + 1) + '-' + (parseInt(m[2], 10) + 1);
  }

  /** Inicial (mayúscula) de un texto, para los iconos de color. */
  function inicial(s) { return String(s || '?').trim().charAt(0).toUpperCase() || '?'; }

  /** Título visible de una clase: su nombre propio o, si no, el área. */
  function tituloEval(ev) { return (ev && ev.nombre) ? ev.nombre : (ev ? ev.area : ''); }

  function invalidarCaches() { evalCache = {}; rejillaCache = {}; claseCache = {}; enVuelo = {}; }

  /**
   * Descarta de la caché las evaluaciones de una clase (tras editar su nombre
   * o su alumnado): al abrirlas se volverán a pedir ya actualizadas.
   */
  function invalidarEvalsDeClase(claseId) {
    Object.keys(evalCache).forEach(function (id) {
      var ev = evalCache[id];
      if (ev && ev.clase && ev.clase.claseId === claseId) delete evalCache[id];
    });
  }

  // ---------- carga anticipada (prefetch) ----------
  /** Llamada al backend que ignora errores (para prefetch en 2º plano). */
  function llamarSilencioso(fn, args, ok) {
    google.script.run.withSuccessHandler(ok).withFailureHandler(function () {})
      [fn].apply(google.script.run, args || []);
  }
  function prefetch_(id, fn, cache) {
    if (!id || cache[id] || enVuelo[id]) return;
    enVuelo[id] = 1;
    llamarSilencioso(fn, [id], function (r) { cache[id] = r; delete enVuelo[id]; });
  }
  function prefetchEval(id) { prefetch_(id, 'getEvaluacionCompleta', evalCache); }
  function prefetchClase(id) { prefetch_(id, 'obtenerClase', claseCache); }
  function prefetchRejilla(id) { if (!arrastreAct && !arrastre) prefetch_(id, 'getRejilla', rejillaCache); }

  /**
   * Precarga en 2º plano las clases del curso (evaluación + unidades) para que
   * abrirlas sea instantáneo. En el móvil no hay "pasar el ratón", así que el
   * prefetch por hover nunca se dispara: esta precarga escalonada (una petición
   * cada 400 ms, para no acaparar el cupo de llamadas) es la que hace el trabajo.
   */
  function precargarEvaluaciones() {
    var ids = ((estado && estado.evaluaciones) || []).slice(0, 10)
      .map(function (ev) { return ev.evalId; })
      .filter(function (id) { return id && !evalCache[id] && !enVuelo[id]; });
    ids.forEach(function (id, i) {
      setTimeout(function () { prefetchEval(id); }, 400 * i);
    });
  }

  /** Precarga las rejillas de las unidades de la evaluación abierta. */
  function precargarRejillas() {
    var ids = ((evalActual && evalActual.unidades) || []).slice(0, 8)
      .map(function (u) { return u.unidadId; })
      .filter(function (id) { return id && !rejillaCache[id] && !enVuelo[id]; });
    ids.forEach(function (id, i) {
      setTimeout(function () {
        if (!arrastreAct && !arrastre) prefetch_(id, 'getRejilla', rejillaCache);
      }, 400 * i);
    });
  }

  /**
   * Ajusta la altura de las tablas de notas (rejilla y resumen) al hueco REAL
   * de pantalla: desde donde empieza la tabla hasta la tab bar inferior (en
   * móvil) o el borde de la ventana. Así la tabla aprovecha todo el alto
   * disponible aunque la cabecera ocupe una o dos líneas, y el scroll queda
   * dentro de la tabla (con su cabecera sticky), no en la página.
   */
  function ajustarAltoRejillas() {
    [].forEach.call(document.querySelectorAll('.rejilla-cont'), function (el) {
      if (!el.offsetParent) return; // la vista está oculta
      var top = el.getBoundingClientRect().top;
      var tab = document.querySelector('.tabbar');
      var tabAlto = (tab && getComputedStyle(tab).display !== 'none')
        ? tab.getBoundingClientRect().height : 0;
      var alto = window.innerHeight - top - tabAlto - 10; // 10px de respiro
      if (alto > 160) el.style.maxHeight = alto + 'px';
    });
  }

  /** Fija el título de la barra superior y limpia el buscador al cambiar de vista. */
  function setTitulo(t) {
    var e = document.getElementById('topbar-titulo');
    if (e) e.textContent = t;
    var b = document.getElementById('buscador');
    if (b) b.value = '';
  }

  // ---------- barra lateral (expandible / contraíble) ----------
  function esMovil() { return window.matchMedia('(max-width: 820px)').matches; }
  function toggleSidebar() {
    var s = document.getElementById('sidebar');
    if (esMovil()) {
      var abierta = s.classList.toggle('abierta');
      document.getElementById('velo').classList.toggle('visible', abierta);
    } else {
      var col = s.classList.toggle('colapsada');
      try { localStorage.setItem('sidebar-colapsada', col ? '1' : '0'); } catch (e) {}
    }
  }
  function cerrarSidebar() {
    document.getElementById('sidebar').classList.remove('abierta');
    document.getElementById('velo').classList.remove('visible');
  }
  function restaurarSidebar() {
    try {
      if (localStorage.getItem('sidebar-colapsada') === '1' && !esMovil()) {
        document.getElementById('sidebar').classList.add('colapsada');
      }
    } catch (e) {}
  }

  /** Filtra las tarjetas / filas visibles de la sección actual por texto. */
  function filtrar(q) {
    q = String(q || '').toLowerCase().trim();
    var vis = document.querySelector('#app > section:not([hidden])');
    if (!vis) return;
    var items = vis.querySelectorAll('.tarjeta, ol.alumnos li, table.rejilla tbody tr');
    [].forEach.call(items, function (el) {
      el.style.display = (!q || el.textContent.toLowerCase().indexOf(q) >= 0) ? '' : 'none';
    });
  }

  // ---------- papelera ----------
  function irAPapelera() {
    registrarHistorial({ v: 'papelera' });
    setTitulo('Papelera');
    mostrar('vista-papelera');
    document.getElementById('lista-papelera').innerHTML = spinner();
    llamar('listarPapelera', [], pintarPapelera);
  }
  function pintarPapelera(items) {
    var cont = document.getElementById('lista-papelera');
    if (!items.length) { cont.innerHTML = '<div class="vacio">La papelera está vacía.</div>'; return; }
    cont.innerHTML = items.map(function (it) {
      return '<div class="tarjeta tarjeta-color" style="border-left-color:var(--texto-3)">' +
        '<h3>' + esc(it.etiqueta) + '</h3>' +
        '<div class="meta">Borrado: ' + esc(fechaCorta(it.fecha)) + '</div>' +
        '<div style="margin-top:10px"><button class="btn" ' +
        'onclick="App.restaurarItem(\'' + it.papeleraId + '\')">Restaurar</button></div>' +
        '</div>';
    }).join('');
  }
  function restaurarItem(id) {
    llamar('restaurarPapelera', [id], function () {
      invalidarCaches();
      llamar('getEstadoInicial', [], function (e) { estado = e; });
      avisoOk('Restaurado.');
      irAPapelera();
    });
  }
  function vaciarPapeleraUI() {
    confirmar('Vaciar papelera',
      'Se eliminarán definitivamente los elementos de la papelera. ¿Continuar?',
      'Vaciar', function () { llamar('vaciarPapelera', [], function () { irAPapelera(); }); });
  }
  function fechaCorta(iso) {
    try { return new Date(iso).toLocaleString('es-ES'); } catch (e) { return iso; }
  }

  // ---------- copia de seguridad (exportar / importar) y traspaso ----------
  function abrirCopia() {
    abrirModal('Copia de seguridad',
      '<p class="mensaje">La app guarda una <b>copia automática</b> de tus datos a diario en tu Drive ' +
      '(las últimas 7). Además puedes descargar una copia o restaurarla:</p>' +
      '<div class="acciones-modal">' +
      '<button type="button" class="btn" onclick="App.exportarDatos()">' + svgUI('descargar') + ' Descargar copia (JSON)</button>' +
      '<button type="button" class="btn" onclick="App.pedirImportar()">' + svgUI('restaurar') + ' Restaurar desde archivo</button>' +
      '</div>' +
      '<p class="mensaje" style="margin-top:14px"><b>Traspaso entre docentes</b>: pasa grupos elegidos ' +
      '(con sus clases, unidades y notas) a otra persona —p. ej. a quien te sustituya—. ' +
      'Al recibirlos se <b>añaden</b> a su cuaderno sin tocar los grupos que ya tenga.</p>' +
      '<div class="acciones-modal">' +
      '<button type="button" class="btn" onclick="App.compartirGruposUI()">' + svgUI('descargar') + ' Pasar grupos a otra persona</button>' +
      '<button type="button" class="btn" onclick="App.recibirGruposUI()">' + svgUI('restaurar') + ' Recibir grupos</button>' +
      '</div>',
      'Cerrar', cerrarModal);
  }

  /** Descarga un objeto como archivo JSON. */
  function descargarJson_(d, nombre) {
    var blob = new Blob([JSON.stringify(d, null, 1)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nombre;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  /** Pide un archivo .json al usuario y entrega el objeto parseado a cb. */
  function pedirJson_(cb) {
    var inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json,application/json';
    inp.onchange = function () {
      var f = inp.files[0]; if (!f) return;
      var rd = new FileReader();
      rd.onload = function () {
        var datos;
        try { datos = JSON.parse(rd.result); } catch (e) { return aviso('Archivo no válido.'); }
        cb(datos);
      };
      rd.readAsText(f);
    };
    inp.click();
  }

  function exportarDatos() {
    llamar('getExportacion', [], function (d) {
      descargarJson_(d, 'evaluacion-copia-' + String(d.fecha || '').slice(0, 10) + '.json');
      avisoOk('Copia descargada.');
    });
  }
  function pedirImportar() {
    pedirJson_(function (datos) {
      if (datos.tipo === 'traspaso') {
        return aviso('Ese archivo es un traspaso de grupos: usa "Recibir grupos".');
      }
      confirmar('Restaurar copia',
        'Esto SUSTITUIRÁ todos tus datos actuales por los del archivo. Se hace una copia de seguridad antes. ¿Continuar?',
        'Restaurar', function () {
          llamar('importarDatos', [datos], function () {
            invalidarCaches();
            llamar('getEstadoInicial', [], function (e) {
              estado = e; cerrarModal(); irAEvaluaciones(); avisoOk('Datos restaurados.');
            });
          });
        });
    });
  }

  // ---------- traspaso de grupos entre docentes ----------
  /** Elegir grupos propios y descargar el archivo de traspaso. */
  function compartirGruposUI() {
    if (!estado.clases.length) return aviso('No tienes grupos en el curso activo.');
    var lista = estado.clases.map(function (c) {
      return '<label class="crit"><input type="checkbox" value="' + c.claseId + '">' +
        '<span class="crit-txt"><b>' + esc(c.nombre) + '</b> ' + esc(c.curso) +
        ' · ' + c.numAlumnos + ' alumnos/as</span></label>';
    }).join('');
    abrirModal('Pasar grupos a otra persona',
      '<p class="mensaje">Elige los grupos a traspasar. Se descargará un archivo con esos grupos ' +
      'completos (alumnado, clases, unidades, actividades y notas) para que la otra persona lo ' +
      'reciba desde su app con <b>Copia de seguridad → Recibir grupos</b>. ' +
      'Tus datos <b>no se modifican</b>.</p>' +
      '<div class="lista-crit">' + lista + '</div>' +
      '<p class="ayuda">El archivo lleva los nombres del alumnado en claro: entrégalo por un medio ' +
      'seguro (en mano, unidad compartida del centro…) y pide a la otra persona que lo borre al recibirlo.</p>',
      'Descargar traspaso',
      function () {
        var ids = [].slice.call(document.querySelectorAll('.lista-crit input:checked'))
          .map(function (c) { return c.value; });
        if (!ids.length) return aviso('Marca al menos un grupo.');
        botonModalCargando('Preparando…');
        llamar('exportarGrupos', [ids], function (d) {
          descargarJson_(d, 'traspaso-grupos-' + String(d.fecha || '').slice(0, 10) + '.json');
          cerrarModal();
          avisoOk('Traspaso descargado: ' + ids.length + ' grupo(s).');
        });
      });
  }

  /** Recibir un archivo de traspaso: añade sus grupos al cuaderno propio. */
  function recibirGruposUI() {
    pedirJson_(function (datos) {
      if (datos.tipo !== 'traspaso' || !datos.clases || !datos.clases.length) {
        return aviso('Ese archivo no es un traspaso de grupos. Para una copia completa usa "Restaurar desde archivo".');
      }
      var resumen = datos.clases.map(function (c) {
        return '<li><b>' + esc(c.nombre) + '</b> · ' + esc(c.curso) +
          ' · ' + (c.alumnos || []).length + ' alumnos/as' +
          (c.cursoAcademico ? ' · ' + esc(c.cursoAcademico) : '') + '</li>';
      }).join('');
      abrirModal('Recibir grupos',
        '<p class="mensaje">Traspaso de <b>' + esc(datos.de || 'otra persona') + '</b>' +
        (datos.fecha ? ' (' + esc(fechaCorta(datos.fecha)) + ')' : '') + ' con:</p>' +
        '<ol class="pasos">' + resumen + '</ol>' +
        '<p class="mensaje">Se <b>añadirán</b> a tu cuaderno con sus clases, unidades y notas. ' +
        'Tus grupos actuales no se tocan.</p>',
        'Recibir grupos',
        function () {
          botonModalCargando('Recibiendo…');
          llamar('importarGrupos', [datos], function (r) {
            invalidarCaches();
            llamar('getEstadoInicial', [], function (e) {
              estado = e; cerrarModal(); irAEvaluaciones();
              var otroCurso = (r.cursos || []).filter(function (c) {
                return c && estado.cursos && c !== estado.cursos.activo;
              });
              avisoOk('Recibidos ' + r.grupos + ' grupo(s) y ' + r.clases + ' clase(s).' +
                (otroCurso.length ? ' Ojo: alguno está en el curso ' + otroCurso[0] + '.' : ''));
            });
          });
        });
    });
  }

  // ---------- evaluaciones ----------
  function pintarEvaluaciones() {
    var cont = document.getElementById('lista-evaluaciones');
    if (!estado.evaluaciones.length) {
      cont.innerHTML = '<div class="vacio">Aún no tienes clases. ' +
        'Crea una eligiendo un grupo y un área.</div>';
      return;
    }
    cont.innerHTML = estado.evaluaciones.map(function (ev) {
      var col = ev.color || 'var(--acento)';
      return '<div class="clase-card" data-id="' + ev.evalId + '" style="--c:' + col + '" ' +
        'tabindex="0" role="button" ' +

  var evalCache = {}; // evalId -> evaluación (con clase y alumnos)

  function abrirEvaluacion(evalId) {
    evalActiva = evalId;

      // Instantáneo desde caché (precarga o visita anterior), sin ir al servidor.
      abrirEvaluacionCargada(evalCache[evalId]);

    llamar('getEvaluacionCompleta', [evalId], function (ev) {
      evalCache[evalId] = ev;
      // Si ya navegaste a otro sitio (u otra clase), la respuesta tardía solo
      // actualiza la caché: NUNCA debe devolverte a esta vista.
      if (vistaActual !== 'vista-evaluacion' || evalActiva !== evalId) return;

  // ---------- reordenar tarjetas arrastrando (genérico; ratón y táctil) ----------
  // La tarjeta arrastrada se levanta y sigue al puntero; las demás se apartan.
  var arrastre = null; // { el, cont, sel, persist, moved, offX, offY }

  function dragInicio(e, sel, persist) {
    if (e.button != null && e.button !== 0) return; // solo botón principal
    e.preventDefault(); e.stopPropagation();
    var el = e.currentTarget.closest(sel);
    if (!el) return;
    var r = el.getBoundingClientRect();
    arrastre = { el: el, cont: el.parentNode, sel: sel, persist: persist,
      moved: false, offX: e.clientX - r.left, offY: e.clientY - r.top };
    el.classList.add('arrastrando');
    document.body.classList.add('reordenando');
    if (el.setPointerCapture) { try { el.setPointerCapture(e.pointerId); } catch (x) {} }
    document.addEventListener('pointermove', dragMueve);
    document.addEventListener('pointerup', dragFin, true);
  }
  function dragMueve(e) {
    if (!arrastre) return;
    arrastre.moved = true;
    var el = arrastre.el;
    var destino = tarjetaBajoPunto_(arrastre.cont, arrastre.sel, e.clientX, e.clientY, el);
    if (destino) {
      var r = destino.getBoundingClientRect();
      var despues = e.clientX > (r.left + r.width / 2);
      var ref = despues ? destino.nextSibling : destino;
      if (ref !== el && ref !== el.nextSibling) arrastre.cont.insertBefore(el, ref);
    }
    el.style.transform = 'none';
    var nr = el.getBoundingClientRect();
    el.style.transform = 'translate(' + (e.clientX - arrastre.offX - nr.left) + 'px,' +
      (e.clientY - arrastre.offY - nr.top) + 'px)';
  }
  function dragFin() {
    document.removeEventListener('pointermove', dragMueve);
    document.removeEventListener('pointerup', dragFin, true);
    if (!arrastre) return;
    var a = arrastre; arrastre = null;
    a.el.style.transform = '';
    a.el.classList.remove('arrastrando');
    document.body.classList.remove('reordenando');
    if (!a.moved) return;
    // Evita que el "click" posterior al soltar abra la tarjeta.
    var swallow = function (ev) { ev.stopPropagation(); ev.preventDefault(); quitar(); };
    var quitar = function () { document.removeEventListener('click', swallow, true); };
    document.addEventListener('click', swallow, true);
    setTimeout(quitar, 350);
    var ids = [].map.call(a.cont.querySelectorAll(a.sel), function (c) { return c.dataset.id; });
    a.persist(ids);
  }
  /** Tarjeta (del selector) cuyo rectángulo contiene el punto (excluyendo una). */
  function tarjetaBajoPunto_(cont, sel, x, y, excluir) {
    var cards = cont.querySelectorAll(sel);
    for (var i = 0; i < cards.length; i++) {
      if (cards[i] === excluir) continue;
      var r = cards[i].getBoundingClientRect();
      if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return cards[i];
    }
    return null;
  }
  /** Reordena arr (en sitio) para seguir el orden de ids (por la clave dada). */
  function reordenarArray_(arr, ids, clave) {
    var by = {};
    arr.forEach(function (x) { by[x[clave]] = x; });
    var out = ids.map(function (id) { return by[id]; }).filter(Boolean);
    arr.forEach(function (x) { if (ids.indexOf(x[clave]) < 0) out.push(x); });
    arr.length = 0; Array.prototype.push.apply(arr, out);
  }

  // Entradas por tipo de tarjeta (asa ⠿):
  function gripDown(e) { // unidades
    dragInicio(e, '.tarjeta-unidad', function (ids) {
      reordenarArray_(evalActual.unidades = evalActual.unidades || [], ids, 'unidadId');
      pintarUnidades(); // renumera 01, 02…
      llamar('reordenarUnidades', [evalActual.evalId, ids], function () {});
    });
  }
  function dragEval(e) { // tarjetas de clase (evaluaciones)

    });
  }
  function dragGrupo(e) { // tarjetas de grupo
    dragInicio(e, '.clase-card', function (ids) {
      reordenarArray_(estado.clases, ids, 'claseId');
      llamar('reordenarClases', [ids], function () {});
    });
  }

  /** Eliminar desde la tarjeta del listado (optimista: la tarjeta sale ya). */
  function eliminarUnidad(unidadId) {
    var u = (evalActual.unidades || []).filter(function (x) { return x.unidadId === unidadId; })[0];
    confirmar('Eliminar unidad',
      'Se eliminarán la unidad "' + (u ? u.nombre : '') + '", sus actividades y notas. ¿Continuar?',
      'Eliminar', function () {
        delete rejillaCache[unidadId];
        var pos = (evalActual.unidades || []).indexOf(u);
        evalActual.unidades = (evalActual.unidades || []).filter(function (x) { return x.unidadId !== unidadId; });
        pintarUnidades();
        google.script.run
          .withSuccessHandler(function () { avisoOk('Unidad eliminada.'); })
          .withFailureHandler(function (err) {
            if (u) (evalActual.unidades = evalActual.unidades || []).splice(pos < 0 ? 0 : pos, 0, u);
            if (vistaActual === 'vista-evaluacion') pintarUnidades();
            aviso('No se pudo eliminar la unidad: ' + ((err && err.message) || 'error'));
          })
          .eliminarUnidad(unidadId);
      });
  }
  function nuevaUnidad() {

  /** Modal para editar la clase actual: nombre, color e icono. */
  function editarEvaluacionUI() {

    abrirModal('Editar clase',

      '<p class="ayuda">El grupo y el área no se cambian aquí (el área fija los criterios).</p>',
      'Guardar cambios',
      function () {

        botonModalCargando('Guardando…');

  }

  function eliminarEvaluacionActual() {
    confirmar('Eliminar clase',
      '¿Eliminar esta clase? El grupo y su alumnado se conservan.',
      'Eliminar', function () {
        var id = evalActual.evalId;
        // Borrado optimista: se sale YA de la pantalla y el servidor trabaja
        // detrás. Si el borrado falla, se restaura la tarjeta y se avisa.
        var pos = -1, borrada = null;
        estado.evaluaciones.forEach(function (e, i) { if (e.evalId === id) { pos = i; borrada = e; } });
        estado.evaluaciones = estado.evaluaciones.filter(function (e) { return e.evalId !== id; });
        delete evalCache[id];
        irAEvaluaciones();
        google.script.run
          .withSuccessHandler(function () { avisoOk('Clase eliminada.'); })
          .withFailureHandler(function (err) {
            if (borrada) estado.evaluaciones.splice(pos < 0 ? 0 : pos, 0, borrada);
            if (vistaActual === 'vista-evaluaciones') pintarEvaluaciones();
            aviso('No se pudo eliminar la clase: ' + ((err && err.message) || 'error'));
          })
          .eliminarEvaluacion(id);
      });
  }

  // ---------- resumen global de la clase ----------
  var resumenData = null;

  function verResumen() {
    registrarHistorial({ v: 'resumen', id: evalActual.evalId });
    setTitulo('Clases');
    mostrar('vista-resumen');
    document.getElementById('volver-resumen').onclick = function () {
      abrirEvaluacionCargada(evalActual);
    };
    document.getElementById('resumen-titulo').textContent = 'Resumen — ' + tituloEval(evalActual);
    document.getElementById('resumen-meta').textContent = '';
    document.getElementById('resumen-cont').innerHTML = spinner();
    // El resumen lee las notas del servidor: primero guardamos lo pendiente.
    flushNotas(function () {
      llamar('getResumen', [evalActual.evalId], function (r) {
        resumenData = r;
        document.getElementById('resumen-meta').textContent =
          r.claseNombre + ' · ' + r.curso + ' · ' + r.alumnos.length + ' alumnos/as · ' +
          r.unidades.length + ' unidades';
        pintarResumen();
      });
    });
  }

  function pintarResumen() {
    ajustarAltoRejillas(); // la cabecera ya está pintada: mide el hueco real
    var cont = document.getElementById('resumen-cont');
    var R = resumenData;
    if (!R.criterios.length && !R.unidades.length) {
      cont.innerHTML = '<div class="vacio">Aún no hay datos. Crea unidades y evalúa actividades.</div>';
      return;
    }
    var verUds = document.getElementById('ver-unidades-resumen').checked;
    var uds = verUds ? R.unidades : [];

    var h = '<table class="rejilla"><thead><tr>' +
      '<th class="idx">#</th><th class="esq">Alumno/a</th><th class="al-corto"></th>';
    uds.forEach(function (u) {
      h += '<th class="act" title="Nota de la unidad">' +
        '<span class="act-nom">' + esc(u.nombre) + '</span></th>';
    });
    h += '<th class="nota sep">FINAL</th>';
    R.criterios.forEach(function (cod) {
      h += '<th class="crit-col" title="' + esc(infoCritR(cod).completo) + '">' + esc(cod) + '</th>';
    });
    h += '</tr></thead><tbody>';

    R.alumnos.forEach(function (al, i) {
      h += '<tr><td class="idx">' + (i + 1) + '</td>' + celdaAlumno(al.nombre);
      uds.forEach(function (u) {
        h += celdaNum((R.unidadNota[al.id] || {})[u.unidadId]);
      });
      h += celdaNum(R.final[al.id], ' nota sep');
      R.criterios.forEach(function (cod) {
        h += celdaNum((R.critGlobal[al.id] || {})[cod], ' crit-col');
      });
      h += '</tr>';
    });
    h += '</tbody></table>';
    cont.innerHTML = h;
  }

  function celdaNum(n, extra) {
    var g = claseNota(n);
    return '<td class="num' + (extra || '') + (g ? ' ' + g : '') + '">' +
      fmtNota(n, resumenData && resumenData.curso) + '</td>';
  }

  /** ¿El nivel del grupo es de Infantil? (añade etiquetas a las notas). */
  function esInfantil_(curso) {
    return String(curso || '').toLowerCase().indexOf('infantil') >= 0;
  }
  /** Etiqueta de la escala Infantil para una nota 0-10 (cortes entre niveles). */
  function etiquetaInfantil(n) {
    if (n == null) return '';
    return n < 3 ? 'POC' : n < 5 ? 'REG' : n < 7 ? 'ADE' : n < 9 ? 'BUE' : 'EXC';
  }
  /** Nota formateada; en grupos de Infantil añade su etiqueta ("8,2 BUE"). */
  function fmtNota(n, curso) {
    if (n == null) return '';
    return esInfantil_(curso) ? fmt(n) + ' ' + etiquetaInfantil(n) : fmt(n);
  }

  /**
   * Devuelve la clase de color (semáforo) según la nota:
   * top ≥8,5 · alta ≥7 · media ≥6 · baja ≥5 · suspenso <5.
   */
  function claseNota(n) {
    if (n == null) return '';
    if (n < 5) return 'g-susp';
    if (n < 6) return 'g-baja';
    if (n < 7) return 'g-media';
    if (n < 8.5) return 'g-alta';
    return 'g-top';
  }

  /** Iniciales (1-2 letras) a partir de un nombre "Apellidos, Nombre" o email. */
  function iniciales(nombre) {
    var s = String(nombre || '').split('@')[0].replace(/[.,_-]+/g, ' ');
    var p = s.trim().split(/\s+/).filter(Boolean);
    if (!p.length) return '–';
    return (p[0].charAt(0) + (p[1] ? p[1].charAt(0) : '')).toUpperCase();
  }

  /** Color estable (hash → paleta) para el avatar de cada alumno/a. */
  function colorAvatar(nombre) {
    var h = 0, s = String(nombre || '');
    for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
    return COLORES[h % COLORES.length];
  }

  /**
   * Nombre corto para pantallas pequeñas: el alias si lo hay ("Ye, Xin Yi
   * (Sofía)" → "Sofía"), si no el nombre de pila ("García, María" → "María"),
   * y si no hay coma, la primera palabra.
   */
  function nombreCorto(nombre) {
    var s = String(nombre || '');
    var m = /\(([^)]+)\)/.exec(s);
    if (m && m[1].trim()) return m[1].trim();
    var coma = s.indexOf(',');
    if (coma >= 0) return s.slice(coma + 1).replace(/\([^)]*\)/g, '').trim();
    return s.trim().split(/\s+/)[0] || '';
  }

  /** Celda izquierda con avatar de iniciales + nombre (rejilla y resumen). */
  function celdaAlumno(nombre) {
    return '<td class="esq" title="' + esc(nombre) + '"><span class="mini-avatar" style="background:' +
      colorAvatar(nombre) + '">' + esc(iniciales(nombre)) + '</span>' +
      '<span class="al-nom">' + esc(nombre) + '</span></td>' +
      // Columna extra SOLO móvil con el nombre corto. No es sticky a propósito:
      // al hacer scroll horizontal se va con las notas y queda fijo solo el avatar.
      '<td class="al-corto" title="' + esc(nombre) + '">' + esc(nombreCorto(nombre)) + '</td>';
  }
  function infoCritR(cod) {
    var v = (resumenData.criteriosInfo || {})[cod] || {};
    var completo = v.descripcion ? (cod + '. ' + v.descripcion) : (cod + '. ' + (v.texto || ''));
    return { completo: completo };
  }

  /** Copia el resumen (alumno + nota global de cada criterio) para Séneca. */
  function copiarResumenSeneca() {
    var R = resumenData;
    if (!R || !R.criterios.length) return aviso('No hay criterios evaluados todavía.');
    var lineas = [['Alumno'].concat(R.criterios).join('\t')];
    R.alumnos.forEach(function (al) {
      var fila = [nombreSeneca(al.nombre)];
      R.criterios.forEach(function (cod) {
        var n = (R.critGlobal[al.id] || {})[cod];
        fila.push(n == null ? '' : n.toFixed(2).replace('.', ','));
      });
      lineas.push(fila.join('\t'));
    });
    copiarAlPortapapeles(lineas.join('\n'),
      'Resumen copiado: ' + R.alumnos.length + ' alumnos/as y ' + R.criterios.length + ' criterios.');
  }

  // ---------- unidad: rejilla de evaluación ----------
  var rejilla = null;       // {unidad, alumnos, actividades, criteriosInfo, items}
  var rejillaCache = {};    // unidadId -> rejilla (carga instantánea al volver)
  var unidadActiva = null;  // unidad que se está viendo (descarta respuestas tardías)
  var inputs2d = [];        // matriz [fila][colActividad] -> <input>

  function abrirUnidad(unidadId) {
    registrarHistorial({ v: 'unidad', id: unidadId, eid: evalActual ? evalActual.evalId : '' });
    unidadActiva = unidadId;   // marca la unidad que se está abriendo
    setTitulo('Clases');
    mostrar('vista-unidad');
    document.getElementById('volver-unidad').onclick = function () {
      abrirEvaluacionCargada(evalActual);
    };
    var u = (evalActual.unidades || []).filter(function (x) { return x.unidadId === unidadId; })[0];
    document.getElementById('unidad-titulo').textContent = u ? u.nombre : '';

    if (rejillaCache[unidadId]) {            // pinta al instante desde caché
      rejilla = rejillaCache[unidadId];
      pintarUnidadActual();
    } else {
      document.getElementById('unidad-meta').textContent = '';
      document.getElementById('rejilla-cont').innerHTML = spinner();
    }
    // Refresca desde el servidor, pero SOLO tras guardar lo pendiente (para no
    // sobrescribir ediciones sin persistir con datos antiguos).
    flushNotas(function () {
      llamar('getRejilla', [unidadId], function (r) {
        rejillaCache[unidadId] = r;                 // la caché siempre se actualiza
        // Descarta si ya abriste otra unidad O si saliste de la vista de unidad
        // (repintar en diferido cambiaría el título de la barra superior).
        if (unidadId !== unidadActiva || vistaActual !== 'vista-unidad') return;
        rejilla = r;
        pintarUnidadActual();
      });
    });
  }

  function pintarUnidadActual() {
    setTitulo('Clases');
    document.getElementById('unidad-titulo').textContent = rejilla.unidad.nombre;
    document.getElementById('unidad-meta').textContent =
      evalActual.area + ' · ' + rejilla.alumnos.length + ' alumnos/as · ' +
      rejilla.actividades.length + ' actividades';
    pintarRejilla();
  }

  /**
   * Copia al portapapeles (TSV) el alumnado y la nota de cada criterio de la
   * unidad, listo para pegar en Séneca (Autonotas) o en una hoja de cálculo.
   * Formato: Alumno <tab> LCL.x.y.z <tab> ... con 2 decimales y coma.
   */
  function copiarSeneca() {
    if (!rejilla || !rejilla.actividades.length) {
      return aviso('Esta unidad no tiene actividades evaluadas.');
    }
    var crits = criteriosUsados();
    var lineas = [['Alumno'].concat(crits).join('\t')];
    rejilla.alumnos.forEach(function (al) {
      var fila = [nombreSeneca(al.nombre)];
      crits.forEach(function (cod) {
        var n = notaCriterio(al.id, cod);
        fila.push(n == null ? '' : n.toFixed(2).replace('.', ','));
      });
      lineas.push(fila.join('\t'));
    });
    copiarAlPortapapeles(lineas.join('\n'),
      'Copiado para Séneca: ' + rejilla.alumnos.length + ' alumnos/as y ' + crits.length + ' criterios.');
  }

  /** Explica el botón "Copiar para Séneca" y enlaza la extensión Autonotas. */

  }

  /**
   * Nombre "oficial" para Séneca: quita el pseudónimo entre paréntesis.
   * "Ye, Xin Yi (Sofía)" -> "Ye, Xin Yi". No altera el nombre guardado ni el
   * que ve el profe; solo lo que se copia/empareja.
   */
  function nombreSeneca(nombre) {
    return String(nombre || '').replace(/\([^)]*\)/g, '').replace(/\s+/g, ' ').trim();
  }

  function copiarAlPortapapeles(texto, mensajeOk) {
    var ta = document.createElement('textarea');
    ta.value = texto;
    ta.style.position = 'fixed'; ta.style.top = '-1000px'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    if (ok) avisoOk(mensajeOk);
    else copiarManual(texto);
  }

  /** Si el navegador bloquea la copia automática, mostramos el texto para copiar. */
  function copiarManual(texto) {
    abrirModal('Copiar para Séneca',
      '<p class="ayuda">Selecciona todo (Ctrl/Cmd+A) y copia (Ctrl/Cmd+C):</p>' +
      '<textarea id="f-copia" rows="12" readonly></textarea>',
      'Hecho', cerrarModal);
    var t = document.getElementById('f-copia');
    t.value = texto; t.focus(); t.select();
  }


  function nuevaActividad() { modalActividad(null); }
  function editarActividadUI(id) { modalActividad(actDe(id)); }

  /**
   * Construye la lista de criterios con casillas. Marca los que aún NO están
   * asignados a ninguna actividad de ninguna unidad de la clase ("no evaluado").
   */
  function listaCriteriosHtml(sel) {
    sel = sel || [];
    var info = rejilla.criteriosInfo;
    var asignados = rejilla.asignados || [];
    var pendientes = 0;
    var html = Object.keys(info).sort(cmpCodigo).map(function (cod) {
      var c = infoCrit(cod);
      var marcado = sel.indexOf(cod) >= 0 ? ' checked' : '';
      var noAsig = asignados.indexOf(cod) < 0;
      if (noAsig) pendientes++;
      return '<label class="crit' + (noAsig ? ' pendiente' : '') + '" title="' + esc(c.completo) + '">' +
        '<input type="checkbox" value="' + esc(cod) + '"' + marcado + '>' +
        '<span class="crit-txt"><b>' + esc(cod) + '</b> ' + esc(c.texto) +
        (noAsig ? ' <span class="tag-pend">no evaluado</span>' : '') + '</span></label>';
    }).join('');
    return { html: html || '<i>No hay criterios para esta área.</i>', pendientes: pendientes };
  }

  /** Une criterios al conjunto de asignados de la clase (en memoria). */
  function marcarAsignados(criterios) {
    rejilla.asignados = rejilla.asignados || [];
    (criterios || []).forEach(function (c) {
      if (rejilla.asignados.indexOf(c) < 0) rejilla.asignados.push(c);
    });
  }

  function notaPendientes(p) {
    return p > 0
      ? '<p class="ayuda">Quedan <b>' + p + '</b> criterios sin evaluar en la clase (marcados como «no evaluado»).</p>'
      : '<p class="ayuda">' + svgUI('check') + ' Todos los criterios de la clase están ya asignados a alguna actividad.</p>';
  }

  /** Modal compartido para crear o editar una actividad. act=null → crear. */
  function modalActividad(act) {
    var sel = act ? act.criterios : [];
    var lista = listaCriteriosHtml(sel);
    var tipoSel = act ? tipoDe(act) : 'items';
    var esInformativa = !!(act && !(act.criterios || []).length);
    var opcionesTipo = Object.keys(TIPOS_ACT).map(function (id) {
      return '<label class="tipo-opt"><input type="radio" name="f-act-tipo" value="' + id + '"' +
        (id === tipoSel ? ' checked' : '') + ' onchange="App.tipoActCambiado()">' +
        TIPOS_ACT[id].etiqueta + '</label>';
    }).join('');

    var borrar = act
      ? '<div class="acciones-modal">' +
        '<button type="button" class="link" onclick="App.duplicarActividadUI(\'' + act.actividadId + '\')">Duplicar</button>' +
        '<button type="button" class="link-peligro" onclick="App.eliminarActividadUI(\'' + act.actividadId + '\')">Eliminar actividad</button>' +
        '</div>'
      : '';

    abrirModal(act ? 'Editar actividad' : 'Nueva actividad',
      '<label>Nombre de la actividad' +
      '<input id="f-act-nombre" type="text" placeholder="Ej.: Dictado 1" value="' +
        (act ? esc(act.nombre) : '') + '"></label>' +
      '<div class="campo-crit"><span class="etq">Tipo de columna</span>' +
      '<div class="tipos-act">' + opcionesTipo + '</div></div>' +
      '<label id="l-act-items"><span id="l-act-items-txt">Nº de ítems a evaluar</span>' +
      '<input id="f-act-items" type="number" min="0" step="0.5" placeholder="Ej.: 10" value="' +
        (act && act.numItems ? act.numItems : '') + '"></label>' +
      '<label class="check check-suelto"><input type="checkbox" id="f-act-info"' +
        (esInformativa ? ' checked' : '') + ' onchange="App.tipoActCambiado()"> ' +
        'Columna informativa (no cuenta para nota)</label>' +
      '<div id="bloque-crit" class="campo-crit"><span class="etq">Criterios asociados</span>' +
      notaPendientes(lista.pendientes) +
      '<div class="lista-crit">' + lista.html + '</div></div>' +
      borrar,
      act ? 'Guardar cambios' : 'Crear actividad',
      function () {
        var nombre = val('f-act-nombre').trim();
        var tipo = tipoActElegido();
        var informativa = document.getElementById('f-act-info').checked || tipo === 'texto';
        var numItems = Number(val('f-act-items')) || 0;
        var criterios = informativa ? [] : [].slice.call(
          document.querySelectorAll('.lista-crit input:checked')
        ).map(function (c) { return c.value; });
        if (!nombre) return aviso('Pon nombre a la actividad.');
        if (tipo === 'items' && !(numItems > 0)) return aviso('El nº de ítems debe ser mayor que 0.');
        if (!informativa && !criterios.length) {
          return aviso('Marca al menos un criterio, o marca la actividad como informativa.');
        }
        var payload = { nombre: nombre, criterios: criterios, numItems: numItems, tipo: tipo };
        botonModalCargando('Guardando…');
        if (act) {
          llamar('editarActividad', [act.actividadId, payload], function () {
            act.nombre = nombre; act.criterios = criterios;
            act.numItems = numItems; act.tipo = tipo;
            marcarAsignados(criterios);
            cerrarModal(); pintarRejilla();
          });
        } else {
          llamar('crearActividad', [rejilla.unidad.unidadId, payload], function (nueva) {
            rejilla.actividades.push(nueva);
            marcarAsignados(nueva.criterios);
            cerrarModal(); pintarRejilla();
          });
        }
      },
      // Al editar, sin foco inicial: que el móvil no abra el teclado solo.
      { sinFoco: !!act });
    tipoActCambiado(); // ajusta campos visibles al tipo inicial
  }

  function tipoActElegido() {
    var m = document.querySelector('input[name="f-act-tipo"]:checked');
    return m ? m.value : 'items';
  }

  /** Adapta el modal al tipo elegido: campo de ítems/máximo y bloque de criterios. */
  function tipoActCambiado() {
    var tipo = tipoActElegido();
    var lab = document.getElementById('l-act-items');
    var txt = document.getElementById('l-act-items-txt');
    if (lab) lab.hidden = (tipo !== 'items' && tipo !== 'contador');
    if (txt) {
      txt.textContent = (tipo === 'contador')
        ? 'Máximo del contador (opcional: con máximo y criterios cuenta como nota)'
        : 'Nº de ítems a evaluar';
    }
    var info = document.getElementById('f-act-info');
    var bloque = document.getElementById('bloque-crit');
    if (info) {
      // Una observación nunca puntúa: informativa fija y sin desmarcar.
      if (tipo === 'texto') { info.checked = true; info.disabled = true; }
      else info.disabled = false;
    }
    if (bloque && info) bloque.classList.toggle('apagado', info.checked);
  }

  function duplicarActividadUI(id) {
    botonModalCargando('Duplicando…');
    llamar('duplicarActividad', [id], function (nueva) {
      rejilla.actividades.push(nueva);
      marcarAsignados(nueva.criterios);
      cerrarModal(); pintarRejilla();
    });
  }

  function eliminarActividadUI(id) {
    var act = actDe(id);
    confirmar('Eliminar actividad',
      'Se eliminará "' + act.nombre + '" y sus notas. ¿Continuar?', 'Eliminar',
      function () {
        llamar('eliminarActividad', [id], function () {
          rejilla.actividades = rejilla.actividades.filter(function (a) { return a.actividadId !== id; });
          delete rejilla.items[id];
          cerrarModal(); pintarRejilla();
        });
      });
  }

  // ---------- crear varias actividades de golpe ----------
  function variasActividades() {
    var lista = listaCriteriosHtml([]);

    abrirModal('Crear varias actividades',
      '<div class="campo-crit"><span class="etq">Criterios (se aplican a todas)</span>' +
      notaPendientes(lista.pendientes) +
      '<div class="lista-crit">' + lista.html + '</div></div>' +
      '<span class="etq">Actividades</span>' +
      '<div id="filas-act">' + filaActHtml() + filaActHtml() + filaActHtml() + '</div>' +
      '<button type="button" class="link" onclick="App.anadirFilaAct()">+ Añadir fila</button>' +
      '<p class="ayuda">Deja en blanco las filas que no uses. Puedes asignar criterios distintos editando cada actividad después.</p>',
      'Crear todas',
      function () {
        var criterios = [].slice.call(document.querySelectorAll('.lista-crit input:checked'))
          .map(function (c) { return c.value; });
        if (!criterios.length) return aviso('Marca al menos un criterio.');
        var lista = [], error = false;
        [].slice.call(document.querySelectorAll('#filas-act .fila-act')).forEach(function (f) {
          var nombre = f.querySelector('.fa-nombre').value.trim();
          var items = Number(f.querySelector('.fa-items').value);
          if (!nombre && !f.querySelector('.fa-items').value) return; // fila vacía
          if (!nombre) { error = 'Falta el nombre en alguna actividad.'; return; }
          if (!(items > 0)) { error = 'El nº de ítems debe ser mayor que 0 en "' + nombre + '".'; return; }
          lista.push({ nombre: nombre, criterios: criterios, numItems: items });
        });
        if (error) return aviso(error);
        if (!lista.length) return aviso('Añade al menos una actividad (nombre y nº de ítems).');
        botonModalCargando('Creando ' + lista.length + '…');
        llamar('crearActividades', [rejilla.unidad.unidadId, lista], function (nuevas) {
          nuevas.forEach(function (a) { rejilla.actividades.push(a); });
          marcarAsignados(criterios);
          cerrarModal(); pintarRejilla();
        });
      });
  }
  function filaActHtml() {
    return '<div class="fila-act">' +
      '<input class="fa-nombre" type="text" placeholder="Nombre de la actividad">' +
      '<input class="fa-items" type="number" min="1" step="0.5" placeholder="Ítems">' +
      '<button type="button" class="icono peligro" title="Quitar" onclick="App.quitarFilaAct(this)">' + svgUI('equis') + '</button>' +
      '</div>';
  }
  function anadirFilaAct() {
    document.getElementById('filas-act').insertAdjacentHTML('beforeend', filaActHtml());
  }
  function quitarFilaAct(btn) {
    var f = btn.parentNode;
    if (f && f.parentNode.children.length > 1) f.parentNode.removeChild(f);
  }

  /**
   * Pinta la tabla alumnos × actividades. Orden de columnas:
   * # | Alumno | actividades… | Nota (global) | criterios (resumen, a la derecha).
   */
  function pintarRejilla() {
    ajustarAltoRejillas(); // la cabecera ya está pintada: mide el hueco real
    var cont = document.getElementById('rejilla-cont');
    if (!rejilla.actividades.length) {
      cont.innerHTML = '<div class="vacio">Sin actividades. ' +
        'Crea una actividad, asóciale criterios y nº de ítems para empezar.</div>';
      return;
    }
    var verCrit = document.getElementById('ver-criterios').checked;
    var crits = verCrit ? criteriosUsados() : [];

    var h = '<table class="rejilla"><thead><tr>' +
      '<th class="idx">#</th><th class="esq">Alumno/a</th><th class="al-corto"></th>';
    rejilla.actividades.forEach(function (a) {
      h += '<th class="act" data-act="' + a.actividadId + '" ' +
        'title="' + esc(a.criterios.join(', ')) + '" ' +
        'onpointerdown="App.actDown(event,\'' + a.actividadId + '\')">' +
        '<span class="grip-act" title="Arrastra para reordenar">⠿</span>' +
        '<button class="edit-act" title="Editar actividad" onpointerdown="event.stopPropagation()" ' +
        'onclick="App.editarActividadUI(\'' + a.actividadId + '\')">' + svgUI('lapiz') + '</button>' +
        '<span class="act-nom">' + esc(a.nombre) + '</span>' +
        '<small>' + esc(metaColumna(a)) + '</small></th>';
    });
    h += '<th class="nota sep">NOTA</th>';
    crits.forEach(function (cod) {
      h += '<th class="crit-col" title="' + esc(infoCrit(cod).completo) + '">' + esc(cod) + '</th>';
    });
    h += '</tr></thead><tbody>';

    rejilla.alumnos.forEach(function (al, i) {
      h += '<tr><td class="idx">' + (i + 1) + '</td>' + celdaAlumno(al.nombre);
      rejilla.actividades.forEach(function (a, c) {
        h += celdaValor(a, c, i, al.id);
      });
      h += celdaNota('nota-' + al.id, notaUnidad(al.id), ' nota sep');
      crits.forEach(function (cod) {
        h += celdaNota('crit-' + al.id + '-' + cod, notaCriterio(al.id, cod), ' crit-col');
      });
      h += '</tr>';
    });
    h += '</tbody></table>';
    cont.innerHTML = h;
    wireRejilla();
  }

  /** Celda de nota calculada: formatea y la colorea por tramos (semáforo). */
  function celdaNota(id, n, extra) {
    var g = claseNota(n);
    return '<td class="num' + (extra || '') + (g ? ' ' + g : '') +
      '" id="' + id + '">' + fmtNota(n, evalActual && evalActual.curso) + '</td>';
  }

  // ---------- reordenar actividades arrastrando su cabecera ----------
  var arrastreAct = null; // { id, th, moved, targetId, despues }

  function actDown(e, actId) {
    if (e.button != null && e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    arrastreAct = { id: actId, th: e.currentTarget, moved: false, targetId: null, despues: false };
    e.currentTarget.classList.add('arrastrando-col');
    document.body.classList.add('reordenando');
    document.addEventListener('pointermove', actMove);
    document.addEventListener('pointerup', actUp, true);
  }
  function actMove(e) {
    if (!arrastreAct) return;
    arrastreAct.moved = true;
    var ths = document.querySelectorAll('#rejilla-cont th.act');
    var destino = null;
    [].forEach.call(ths, function (t) {
      t.classList.remove('soltar-antes', 'soltar-despues');
      var r = t.getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right) destino = t;
    });
    if (!destino || destino === arrastreAct.th) { arrastreAct.targetId = null; return; }
    var r = destino.getBoundingClientRect();
    arrastreAct.despues = e.clientX > (r.left + r.width / 2);
    destino.classList.add(arrastreAct.despues ? 'soltar-despues' : 'soltar-antes');
    arrastreAct.targetId = destino.dataset.act;
  }
  function actUp() {
    document.removeEventListener('pointermove', actMove);
    document.removeEventListener('pointerup', actUp, true);
    var a = arrastreAct; arrastreAct = null;
    document.body.classList.remove('reordenando');
    [].forEach.call(document.querySelectorAll('#rejilla-cont th.act'), function (t) {
      t.classList.remove('arrastrando-col', 'soltar-antes', 'soltar-despues');
    });
    if (!a || !a.moved || !a.targetId || a.targetId === a.id) return;
    var arr = rejilla.actividades;
    var from = idxAct_(arr, a.id);
    if (from < 0) return;
    var item = arr.splice(from, 1)[0];
    var tIdx = idxAct_(arr, a.targetId);
    if (a.despues) tIdx += 1;
    arr.splice(tIdx, 0, item);
    pintarRejilla();
    llamar('reordenarActividades',
      [rejilla.unidad.unidadId, arr.map(function (x) { return x.actividadId; })], function () {});
  }
  function idxAct_(arr, id) {
    for (var i = 0; i < arr.length; i++) if (arr[i].actividadId === id) return i;
    return -1;
  }

  /** Engancha la matriz de inputs y sus eventos (teclado, dictado, pegar). */
  function wireRejilla() {
    inputs2d = [];
    var inputs = document.querySelectorAll('#rejilla-cont .celda input');
    [].forEach.call(inputs, function (inp) {
      var r = +inp.dataset.r, c = +inp.dataset.c;
      (inputs2d[r] || (inputs2d[r] = []))[c] = inp;
      inp.addEventListener('change', function () { commitInput(inp); });
      inp.addEventListener('keydown', onTeclaRejilla);
      inp.addEventListener('input', onDictado);
      inp.addEventListener('paste', onPegar);
    });
  }

  /** Tope del valor tecleable según el tipo (null = sin tope). */
  function topeValor(act) {
    switch (tipoDe(act)) {
      case 'nota': return 10;
      case 'items': return act.numItems;
      default: return null;
    }
  }

  /** Texto pequeño de la cabecera de columna según el tipo. */
  function metaColumna(a) {
    var tipo = tipoDe(a);
    var parte = tipo === 'items' ? '/' + a.numItems :
      tipo === 'nota' ? '0-10' :
      tipo === 'check' ? '✓/✗' :
      tipo === 'escala' ? 'IN-SB' :
      tipo === 'escalaInf' ? 'POC-EXC' :
      tipo === 'texto' ? 'texto' :
      (a.numItems > 0 ? '± /' + a.numItems : '±');
    return parte + ' · ' + (a.criterios.length ? a.criterios.join(', ') : 'informativa');
  }

  /** Celda de valor según el tipo de la actividad. */
  function celdaValor(a, c, r, alId) {
    var v = valorItem(a.actividadId, alId);
    var comun = 'data-r="' + r + '" data-c="' + c + '" data-act="' + a.actividadId +
      '" data-al="' + alId + '"';
    var tipo = tipoDe(a);
    if (tipo === 'check') {
      var cls = v === 1 ? ' si' : (v === 0 ? ' no' : '');
      return '<td class="celda celda-check' + cls + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Alternar check" ' +
        'onclick="App.ciclarCheck(this)">' + iconoCheck_(v) + '</td>';
    }
    if (tipo === 'escala' || tipo === 'escalaInf') {
      var niv = TIPOS_ACT[tipo].niveles[Math.round(v) - 1] || null;
      var g = niv ? claseNota(niv.nota) : '';
      return '<td class="celda celda-escala' + (g ? ' ' + g : '') + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Elegir nivel" ' +
        'title="' + (niv ? esc(niv.nombre) : 'Sin valorar') + '" ' +
        'onclick="App.abrirSelectorNivel(this)">' + (niv ? niv.cod : '·') + '</td>';
    }
    if (tipo === 'texto') {
      var t = v == null ? '' : String(v);
      var corto = t.length > 14 ? t.slice(0, 14) + '…' : t;
      return '<td class="celda celda-texto' + (t ? '' : ' vacia') + '" ' + comun +
        ' tabindex="0" role="button" aria-label="Editar observación" ' +
        'title="' + esc(t) + '" ' +
        'onclick="App.abrirEditorTexto(this)">' + (t ? esc(corto) : svgUI('lapiz')) + '</td>';
    }
    if (tipo === 'contador') {
      return '<td class="celda celda-cont" ' + comun + '>' +
        '<button type="button" class="cont-btn" aria-label="Restar" ' +
        'onclick="App.sumarContador(this,-1)">−</button>' +
        '<span class="cont-val">' + (v == null ? '·' : fmt(v)) + '</span>' +
        '<button type="button" class="cont-btn" aria-label="Sumar" ' +
        'onclick="App.sumarContador(this,1)">+</button></td>';
    }
    return '<td class="celda"><input type="text" inputmode="decimal" ' + comun +
      ' value="' + (v == null ? '' : fmt(v)) + '"></td>';
  }
  function iconoCheck_(v) {
    return v === 1 ? svgUI('check') : (v === 0 ? svgUI('equis') : '·');
  }

  /** Fija (o borra con null) el valor de una celda en el estado local. */
  function fijarValor(actId, alId, v) {
    if (v == null || v === '') {
      if (rejilla.items[actId]) delete rejilla.items[actId][alId];
    } else {
      (rejilla.items[actId] || (rejilla.items[actId] = {}))[alId] = v;
    }
  }

  /** Check de un toque: vacío → ✓ → ✗ → vacío. */
  function ciclarCheck(td) {
    var actId = td.dataset.act, alId = td.dataset.al;
    var v = valorItem(actId, alId);
    var nuevo = (v === 1) ? 0 : (v === 0 ? null : 1);
    fijarValor(actId, alId, nuevo);
    td.classList.toggle('si', nuevo === 1);
    td.classList.toggle('no', nuevo === 0);
    td.innerHTML = iconoCheck_(nuevo);
    actualizarNotasFila(alId);
    programarGuardadoNotas();
  }

  // ---------- selector flotante de nivel (escalas): cualquier nivel a 2 toques ----------
  var popNivelTd = null; // celda que tiene el selector abierto

  /** Abre junto a la celda los niveles de su escala (+ vaciar). */
  function abrirSelectorNivel(td) {
    var act = actDe(td.dataset.act);
    var niveles = TIPOS_ACT[tipoDe(act)].niveles;
    var v = valorItem(td.dataset.act, td.dataset.al);
    var pop = document.getElementById('pop-nivel');
    popNivelTd = td;
    pop.innerHTML = niveles.map(function (niv, i) {
      var g = claseNota(niv.nota);
      return '<button type="button" class="pop-nivel-opt' +
        (Math.round(v) === i + 1 ? ' sel' : '') + (g ? ' ' + g : '') +
        '" title="' + esc(niv.nombre) + '" onclick="App.elegirNivel(' + (i + 1) + ')">' +
        niv.cod + '</button>';
    }).join('') +
    '<button type="button" class="pop-nivel-opt vaciar" title="Sin valorar" ' +
      'onclick="App.elegirNivel(null)">·</button>';
    pop.hidden = false;
    // Centrado sobre la celda; si no cabe arriba, debajo; siempre dentro de pantalla.
    var r = td.getBoundingClientRect(), pr = pop.getBoundingClientRect();
    var x = Math.min(Math.max(8, r.left + r.width / 2 - pr.width / 2),
      window.innerWidth - pr.width - 8);
    var y = r.top - pr.height - 6;
    if (y < 8) y = r.bottom + 6;
    pop.style.left = x + 'px';
    pop.style.top = y + 'px';
  }

  function cerrarSelectorNivel() {
    document.getElementById('pop-nivel').hidden = true;
    popNivelTd = null;
  }

  /** Aplica el nivel elegido (null = vaciar) a la celda que abrió el selector. */
  function elegirNivel(nivel) {
    var td = popNivelTd;
    cerrarSelectorNivel();
    if (!td || !rejilla) return;
    var actId = td.dataset.act, alId = td.dataset.al, act = actDe(actId);
    fijarValor(actId, alId, nivel);
    var niv = nivel != null ? TIPOS_ACT[tipoDe(act)].niveles[nivel - 1] : null;
    td.className = td.className.replace(/\bg-\w+/g, '').trim();
    if (niv) { var g = claseNota(niv.nota); if (g) td.classList.add(g); }
    td.title = niv ? niv.nombre : 'Sin valorar';
    td.textContent = niv ? niv.cod : '·';
    actualizarNotasFila(alId);
    programarGuardadoNotas();
  }

  /** Modal para escribir la observación (columna de texto) de un alumno/a. */
  function abrirEditorTexto(td) {
    var actId = td.dataset.act, alId = td.dataset.al;
    var act = actDe(actId);
    var al = null;
    (rejilla.alumnos || []).forEach(function (a) { if (a.id === alId) al = a; });
    var v = valorItem(actId, alId);
    abrirModal(act ? act.nombre : 'Observación',
      (al ? '<p class="ayuda">' + esc(al.nombre) + '</p>' : '') +
      '<label>Observación' +
      '<textarea id="f-obs" rows="4" maxlength="500" ' +
      'placeholder="Escribe la observación…">' +
      (v == null ? '' : esc(String(v))) + '</textarea></label>',
      'Guardar',
      function () {
        var t = document.getElementById('f-obs').value.trim().slice(0, 500);
        fijarValor(actId, alId, t || null);
        var corto = t.length > 14 ? t.slice(0, 14) + '…' : t;
        td.classList.toggle('vacia', !t);
        td.title = t;
        td.innerHTML = t ? esc(corto) : svgUI('lapiz');
        cerrarModal();
        programarGuardadoNotas();
      });
  }

  /** Contador con − y +: parte de 0; con máximo definido, no lo supera. */
  function sumarContador(btn, delta) {
    var td = btn.parentNode;
    var actId = td.dataset.act, alId = td.dataset.al, act = actDe(actId);
    var v = valorItem(actId, alId);
    v = (v == null ? 0 : v) + delta;
    if (act && act.numItems > 0 && v > act.numItems) v = act.numItems;
    fijarValor(actId, alId, v);
    td.querySelector('.cont-val').textContent = fmt(v);
    actualizarNotasFila(alId);
    programarGuardadoNotas();
  }

  /** Aplica el valor de un input al estado local (clamp). Devuelve el cambio o null. */
  function aplicarValor(inp) {
    var actId = inp.dataset.act, alId = inp.dataset.al, act = actDe(actId);
    var v = inp.value === '' ? '' : Number(String(inp.value).replace(',', '.'));
    if (v !== '' && isNaN(v)) return null;
    if (v !== '' && v < 0) { v = 0; inp.value = fmt(v); }
    var tope = act ? topeValor(act) : null;
    if (v !== '' && tope != null && v > tope) { v = tope; inp.value = fmt(v); }
    if (v === '') {
      if (rejilla.items[actId]) delete rejilla.items[actId][alId];
    } else {
      (rejilla.items[actId] || (rejilla.items[actId] = {}))[alId] = v;
    }
    return { actividadId: actId, alumnoId: alId, conseguidos: v === '' ? '' : v };
  }

  // ---------- guardado de notas por unidad (bloque, con debounce) ----------
  var notasDirty = false;    // hay cambios sin guardar en la unidad actual
  var notasTimer = null;     // temporizador del debounce
  var notasEnCurso = false;  // hay un guardado en vuelo
  var notasCola = [];        // callbacks a ejecutar cuando el guardado esté a salvo

  /** Marca cambios y programa el guardado del bloque de la unidad. */
  function programarGuardadoNotas() {
    notasDirty = true;
    clearTimeout(notasTimer);
    notasTimer = setTimeout(function () { flushNotas(); }, 500);
  }

  /**
   * Guarda YA el bloque de notas de la unidad si hay cambios, y ejecuta cb
   * cuando estén persistidas (o de inmediato si no hay nada pendiente). Serializa
   * guardados solapados para que las lecturas posteriores lean datos frescos.
   */
  function flushNotas(cb) {
    clearTimeout(notasTimer);
    if (notasEnCurso) { if (cb) notasCola.push(cb); return; }
    if (!notasDirty || !rejilla || !rejilla.unidad) { if (cb) cb(); return; }
    notasDirty = false;
    notasEnCurso = true;
    if (cb) notasCola.push(cb);
    guardarBloque_(rejilla.unidad.unidadId, rejilla.items, 0);
  }

  /**
   * Envía el bloque de una unidad al servidor. Captura uid+items en cada
   * intento: si el guardado falla y el profe ya está en otra unidad, el
   * reintento sigue apuntando al bloque correcto. Ante un fallo definitivo
   * SIEMPRE se desbloquea la cola (si no, la app quedaría colgada: todas las
   * vistas esperan a flushNotas antes de leer del servidor).
   */
  function guardarBloque_(uid, items, intento) {
    google.script.run
      .withSuccessHandler(function () {
        notasEnCurso = false;
        var cbs = notasCola; notasCola = [];
        cbs.forEach(function (f) { f(); });
        if (notasDirty) flushNotas(); // hubo más ediciones mientras se guardaba
      })
      .withFailureHandler(function (err) {
        if (intento < 2) { // reintenta el MISMO bloque con espera creciente
          setTimeout(function () { guardarBloque_(uid, items, intento + 1); },
            2000 * (intento + 1));
          return;
        }
        notasEnCurso = false;
        // Si seguimos en la misma unidad, re-marca los cambios para que el
        // siguiente flush los reintente; si no, ya solo cabe avisar.
        if (rejilla && rejilla.unidad && rejilla.unidad.unidadId === uid) notasDirty = true;
        var cbs = notasCola; notasCola = [];
        cbs.forEach(function (f) { f(); });
        aviso('No se pudieron guardar las notas (' + ((err && err.message) || 'error de red') +
          '). Comprueba la conexión antes de cerrar.');
      })
      .guardarNotasUnidad(uid, items);
  }

  /** Guarda el valor de un input (una celda): estado local, notas y persistencia. */
  function commitInput(inp) {
    var ch = aplicarValor(inp);
    if (!ch) return;
    actualizarNotasFila(ch.alumnoId);
    programarGuardadoNotas();
  }

  /** Recalcula y actualiza solo las celdas de nota de una fila (sin repintar). */
  function actualizarNotasFila(alId) {
    var verCrit = document.getElementById('ver-criterios').checked;
    pintarCeldaNota(document.getElementById('nota-' + alId), notaUnidad(alId));
    if (verCrit) criteriosUsados().forEach(function (cod) {
      pintarCeldaNota(document.getElementById('crit-' + alId + '-' + cod), notaCriterio(alId, cod));
    });
  }
  function pintarCeldaNota(td, n) {
    if (!td) return;
    td.textContent = fmtNota(n, evalActual && evalActual.curso);
    td.classList.remove('g-top', 'g-alta', 'g-media', 'g-baja', 'g-susp');
    var g = claseNota(n);
    if (g) td.classList.add(g);
  }

  // --- navegación con teclado ---
  function onTeclaRejilla(e) {
    var inp = e.target, r = +inp.dataset.r, c = +inp.dataset.c;
    var k = e.key;
    if (k === 'ArrowUp') { focusCelda(r - 1, c); e.preventDefault(); }
    else if (k === 'ArrowDown' || k === 'Enter') { focusCelda(r + 1, c); e.preventDefault(); }
    else if (k === 'ArrowRight' && inp.selectionStart === inp.value.length) { focusCeldaDir(r, c, 1); e.preventDefault(); }
    else if (k === 'ArrowLeft' && inp.selectionStart === 0) { focusCeldaDir(r, c, -1); e.preventDefault(); }
  }
  function focusCelda(r, c) {
    var fila = inputs2d[r];
    if (fila && fila[c]) { fila[c].focus(); fila[c].select(); }
  }
  /** Siguiente celda de texto en esa dirección (salta checks y contadores). */
  function focusCeldaDir(r, c, dir) {
    var fila = inputs2d[r] || [];
    var n = (rejilla && rejilla.actividades.length) || 0;
    var nc = c + dir;
    while (nc >= 0 && nc < n && !fila[nc]) nc += dir;
    if (fila[nc]) { fila[nc].focus(); fila[nc].select(); }
  }

  // --- dictado (Mac): un número seguido de espacio salta a la celda contigua ---
  function onDictado(e) {
    var inp = e.target;
    if (/\s/.test(inp.value)) {
      var num = inp.value.trim().split(/\s+/)[0];
      inp.value = num;
      commitInput(inp);
      focusCeldaDir(+inp.dataset.r, +inp.dataset.c, 1);
    }
  }

  // --- pegar desde una tabla/hoja (TSV): rellena desde la celda actual ---
  function onPegar(e) {
    var texto = (e.clipboardData || window.clipboardData).getData('text');
    if (!texto || (texto.indexOf('\t') < 0 && texto.indexOf('\n') < 0)) return; // valor único
    e.preventDefault();
    var inp = e.target, r0 = +inp.dataset.r, c0 = +inp.dataset.c;
    var lineas = texto.replace(/\r/g, '').replace(/\n+$/, '').split('\n');
    var cambios = [], filas = {};
    lineas.forEach(function (linea, ri) {
      linea.split('\t').forEach(function (cel, ci) {
        var destino = inputs2d[r0 + ri] && inputs2d[r0 + ri][c0 + ci];
        if (!destino) return;
        var val = String(cel).trim();
        destino.value = val === '' ? '' : val.replace(',', '.');
        var ch = aplicarValor(destino);
        if (ch) { cambios.push(ch); filas[ch.alumnoId] = true; }
      });
    });
    Object.keys(filas).forEach(actualizarNotasFila);   // recalcula notas en pantalla
    if (cambios.length) {
      programarGuardadoNotas();                         // se guarda el bloque de la unidad
      avisoOk('Pegadas ' + cambios.length + ' notas.');
    }
  }

  // --- cálculo en vivo (mismo criterio que Resumen.gs en el servidor) ---
  function valorItem(actividadId, alumnoId) {
    var m = rejilla.items[actividadId];
    return m && m[alumnoId] != null ? m[alumnoId] : null;
  }
  // ---------- tipos de columna (catálogo; espejo del servidor) ----------
  // Añadir un tipo = añadir aquí su entrada y su celda en celdaValor().
  // En las escalas se guarda el Nº DE NIVEL (1-5): el blob sigue siendo
  // numérico y la equivalencia 0-10 vive solo en este catálogo (y su espejo
  // en Resumen.gs).
  var TIPOS_ACT = {
    items:     { etiqueta: 'Ítems' },
    nota:      { etiqueta: 'Nota directa' },
    check:     { etiqueta: 'Check' },
    contador:  { etiqueta: 'Contador' },
    escala:    { etiqueta: 'Escala IN–SB', niveles: [
      { cod: 'IN', nombre: 'Insuficiente',  nota: 2.5 },
      { cod: 'SU', nombre: 'Suficiente',    nota: 5 },
      { cod: 'BI', nombre: 'Bien',          nota: 6 },
      { cod: 'NT', nombre: 'Notable',       nota: 7.5 },
      { cod: 'SB', nombre: 'Sobresaliente', nota: 9.5 } ] },
    escalaInf: { etiqueta: 'Escala Infantil', niveles: [
      { cod: 'POC', nombre: 'Poco',      nota: 2 },
      { cod: 'REG', nombre: 'Regular',   nota: 4 },
      { cod: 'ADE', nombre: 'Adecuado',  nota: 6 },
      { cod: 'BUE', nombre: 'Bueno',     nota: 8 },
      { cod: 'EXC', nombre: 'Excelente', nota: 10 } ] },
    texto:     { etiqueta: 'Observación' } // texto libre; siempre informativa
  };
  function tipoDe(act) { return act && TIPOS_ACT[act.tipo] ? act.tipo : 'items'; }

  /** Nota 0-10 de una actividad según su tipo (espejo de Resumen.gs). */
  function notaActividad(act, alumnoId) {
    var v = valorItem(act.actividadId, alumnoId);
    if (v == null) return null;
    // Cadenas = observaciones (o restos de un cambio de tipo): nunca puntúan.
    if (typeof v === 'string') return null;
    var tipo = tipoDe(act);
    switch (tipo) {
      case 'nota':  return Math.max(0, Math.min(10, v));
      case 'check': return v ? 10 : 0;
      case 'texto': return null;
      case 'escala': case 'escalaInf':
        var niv = TIPOS_ACT[tipo].niveles[Math.round(v) - 1];
        return niv ? niv.nota : null;
      default: // items y contador con máximo: proporción sobre numItems
        if (!(act.numItems > 0)) return null;
        return Math.max(0, Math.min(10, v / act.numItems * 10));
    }
  }
  function notaCriterio(alumnoId, cod) {
    var notas = [];
    rejilla.actividades.forEach(function (a) {
      if (a.criterios.indexOf(cod) < 0) return;
      var n = notaActividad(a, alumnoId);
      if (n != null) notas.push(n);
    });
    return media(notas);
  }
  function notaUnidad(alumnoId) {
    var notas = criteriosUsados().map(function (cod) { return notaCriterio(alumnoId, cod); })
      .filter(function (n) { return n != null; });
    return media(notas);
  }
  function criteriosUsados() {
    var set = {}, out = [];
    rejilla.actividades.forEach(function (a) {
      a.criterios.forEach(function (c) { if (!set[c]) { set[c] = true; out.push(c); } });
    });
    out.sort(cmpCodigo);
    return out;
  }
  function media(arr) {
    if (!arr.length) return null;
    var s = arr.reduce(function (a, b) { return a + b; }, 0);
    return s / arr.length;
  }
  function fmt(n) { return n == null ? '' : (Math.round(n * 100) / 100).toString().replace('.', ','); }
  function actDe(id) {
    return rejilla.actividades.filter(function (a) { return a.actividadId === id; })[0];
  }
  /** Normaliza criteriosInfo[cod] (objeto {texto,descripcion} o texto suelto). */
  function infoCrit(cod) {
    var v = rejilla.criteriosInfo[cod] || {};
    if (typeof v === 'string') v = { texto: v, descripcion: '' };
    var completo = v.descripcion ? (cod + '. ' + v.descripcion) : (cod + '. ' + (v.texto || ''));
    return { texto: v.texto || '', descripcion: v.descripcion || '', completo: completo };
  }
  /** Orden natural de códigos tipo "LCL.4.8.3" (de menor a mayor). */
  function cmpCodigo(a, b) {
    var pa = a.split('.'), pb = b.split('.');
    for (var i = 0; i < Math.max(pa.length, pb.length); i++) {
      var na = parseInt(pa[i], 10), nb = parseInt(pb[i], 10);
      if (isNaN(na) || isNaN(nb)) {
        if ((pa[i] || '') !== (pb[i] || '')) return (pa[i] || '') < (pb[i] || '') ? -1 : 1;
      } else if (na !== nb) return na - nb;
    }
    return 0;
  }

  var copiaAlumnosEnCurso = false; // bloquea "Crear grupo" mientras carga la copia

  /** Rellena el textarea con el alumnado de la clase elegida para copiar. */
  function copiarDeClase() {
    var id = val('f-copiar');
    var ta = document.getElementById('f-alumnos');
    if (!id) return;
    function rellenar(cl) {
      ta.value = (cl.alumnos || []).map(function (a) { return a.nombre; }).join('\n');
    }
    if (claseCache[id]) { rellenar(claseCache[id]); return; } // instantáneo
    // Traer el alumnado tarda 1-3 s: mientras, se bloquea el envío del modal
    // para que "Crear grupo" no se dispare con el textarea aún vacío.
    copiaAlumnosEnCurso = true;
    ta.disabled = true;
    ta.placeholder = 'Cargando alumnado…';
    google.script.run
      .withSuccessHandler(function (cl) {
        claseCache[id] = cl;
        copiaAlumnosEnCurso = false;
        ta.disabled = false; ta.placeholder = 'Apellidos, Nombre';
        // Solo si el modal sigue abierto y sigue elegido ese mismo grupo.
        var sel = document.getElementById('f-copiar');
        if (sel && sel.value === id) rellenar(cl);
      })
      .withFailureHandler(function (err) {
        copiaAlumnosEnCurso = false;
        ta.disabled = false; ta.placeholder = 'Apellidos, Nombre';
        aviso('No se pudo cargar el alumnado a copiar: ' + ((err && err.message) || 'error'));
      })
      .obtenerClase(id);
  }

  function abrirClase(claseId) {
    claseActiva = claseId;

    if (claseCache[claseId]) {
      abrirClaseCargada(claseCache[claseId]); // instantáneo desde caché

      claseActual = null;

      var r = claseDe(claseId);
      document.getElementById('clase-titulo').textContent = r ? r.nombre : '';
      document.getElementById('clase-meta').textContent = r ? r.curso : '';
      document.getElementById('num-alumnos').textContent = r ? ('(' + (r.numAlumnos || 0) + ')') : '';

      document.getElementById('lista-alumnos').innerHTML = spinner(); // feedback de carga

    llamar('obtenerClase', [claseId], function (cl) {
      claseCache[claseId] = cl;

      // actualiza la caché: NUNCA debe devolverte a esta vista.

  function eliminarClaseActual() {
    confirmar('Eliminar grupo', '¿Eliminar el grupo "' + claseActual.nombre + '"?',
      'Eliminar', function () {
        var id = claseActual.claseId;
        // Borrado optimista: se sale YA de la pantalla y el servidor trabaja
        // detrás. Si falla (p. ej. el grupo tiene clases asociadas), se
        // restaura la tarjeta y se muestra el motivo.
        var pos = -1, borrado = null;
        estado.clases.forEach(function (c, i) { if (c.claseId === id) { pos = i; borrado = c; } });
        estado.clases = estado.clases.filter(function (c) { return c.claseId !== id; });
        delete claseCache[id];

        google.script.run
          .withSuccessHandler(function () { avisoOk('Grupo eliminado.'); })
          .withFailureHandler(function (err) {
            if (borrado) estado.clases.splice(pos < 0 ? 0 : pos, 0, borrado);
            if (vistaActual === 'vista-clases') pintarClases();
            aviso('No se pudo eliminar el grupo: ' + ((err && err.message) || 'error'));
          })
          .eliminarClase(id);
      });
  }

  /** Etiqueta de etapa de un nivel: "3º Primaria" → "Primaria"; "Infantil" → "Infantil". */
  function etapaDe_(nivel) {
    var e = String(nivel || '').replace(/^\s*\d+\s*º?\s*/, '').trim();
    return e || String(nivel || '').trim();
  }

  /**
   * Siguiente nivel del alumnado ("4º Primaria" → "5º Primaria"), o el mismo.
   * Solo busca DENTRO de la misma etapa: con varias etapas en el mapa, "3º
   * Primaria" no debe saltar a "4º ESO" por compartir dígito.
   */
  function siguienteNivel_(nivel) {
    var m = /^\s*(\d+)/.exec(nivel || '');
    if (!m) return nivel; // Infantil u otros sin número: sin salto automático
    var buscado = String(parseInt(m[1], 10) + 1);
    var etapa = etapaDe_(nivel);
    var niveles = cursosDisponibles();
    for (var i = 0; i < niveles.length; i++) {
      var mm = /^\s*(\d+)/.exec(niveles[i]);
      if (mm && mm[1] === buscado && etapaDe_(niveles[i]) === etapa) return niveles[i];
    }
    return nivel; // no hay nivel superior en la etapa (p. ej. 6º): se queda igual
  }

  /**
   * Opciones de un selector de nivel/curso, agrupadas por etapa (optgroup)
   * cuando el mapa tiene más de una (Infantil/Primaria/ESO/Bachillerato…).
   */
  function opcionesCursosHtml(sel) {
    function opt(c) {
      return '<option value="' + esc(c) + '"' + (c === sel ? ' selected' : '') +
        '>' + esc(c) + '</option>';
    }
    var cursos = cursosDisponibles();
    var etapas = [], por = {};
    cursos.forEach(function (c) {
      var e = etapaDe_(c);
      if (!por[e]) { por[e] = []; etapas.push(e); }
      por[e].push(c);
    });
    if (etapas.length < 2) return cursos.map(opt).join('');
    return etapas.map(function (e) {
      return '<optgroup label="' + esc(e) + '">' + por[e].map(opt).join('') + '</optgroup>';
    }).join('');
  }

    abrirModal('Promocionar grupo',
