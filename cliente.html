  /**
   * Preselección inteligente: en una sesión NUEVA colgada de una unidad, se
   * premarcan las clases del mismo curso/área que la unidad (así salen ya
   * marcadas y sus criterios cargados, sin tener que elegirlas a mano).
   */
  function preseleccionEvals_(s) {
    var pre = {};
    var yaTiene = (s.asignaciones || []).length;
    // Solo para sesiones NUEVAS: en una existente premarcaría clases que el
    // profe no eligió y el autoguardado las persistiría (asignaciones sin
    // fecha de más → la sesión salía repetida en «Sin programar»).
    if (s.sesionId || yaTiene || !s.unidadId) return pre;
    var u = unidadPlanDe_(s.unidadId);
    if (!u) return pre;
    clasesPlanner_().forEach(function (c) {
      var ev = evalDe_(c.id);
      if (ev && (ev.area || '') === (u.area || '') && (ev.curso || '') === (u.curso || '')) {
        pre[c.id] = true;
      }
    });
    return pre;
  }

  /** Botones «retrasar / adelantar» (solo en una sesión de clase ya guardada). */
  function reprogHtml_(s) {
    var existente = s.sesionId && String(s.sesionId).indexOf('tmp_') !== 0;
    if (!existente) return '';
    return '<div class="ses-reprog" id="ses-reprog">' +
      '<button type="button" class="btn ses-reprog-btn" title="Adelantar un día lectivo ' +
        '(a una fecha anterior; empuja las contiguas)" ' +
        'onclick="App.desplazarSesionUI(\'' + s.sesionId + '\',-1)">◀ Adelantar</button>' +
      '<span class="ses-reprog-etq">Reprogramar</span>' +
      '<button type="button" class="btn ses-reprog-btn" title="Retrasar un día lectivo ' +
        '(a una fecha posterior; empuja las contiguas)" ' +
        'onclick="App.desplazarSesionUI(\'' + s.sesionId + '\',1)">Retrasar ▶</button>' +
    '</div>';
  }

  /** HTML del formulario de sesión (reutilizado por el modal y el panel de PC). */
  function sesionFormHtml_(s) {
    var tipoActual = s.tipo || 'clase';
    var eventoFecha = (tipoActual !== 'clase' && s.asignaciones && s.asignaciones[0])
      ? (s.asignaciones[0].fecha || '') : '';
    var asigDe = {};
    (s.asignaciones || []).forEach(function (a) { asigDe[a.evalId] = a; });
    var pre = preseleccionEvals_(s);
    var filas = clasesPlanner_().map(function (c) {
      var a = asigDe[c.id];
      var marcada = a || pre[c.id];
      // Preseleccionada (sesión nueva de una unidad): fecha sugerida a partir de
      // la sesión anterior de la unidad, según horario o siguiente día lectivo.
      var fecha = (a && a.fecha) || (pre[c.id] ? fechaSugerida_(c.id, s.unidadId || '') : '');
      var pico = icoClase_(c);
      return '<div class="planner-asig-fila' + (marcada ? ' activa' : '') + '">' +
        '<label class="check planner-asig-nom"><input type="checkbox" class="planner-asig-chk" data-eval="' +
          c.id + '"' + (marcada ? ' checked' : '') +
          ' onchange="App.asigChkCambiada(this)"> ' + pico +
          '<span class="planner-asig-nom-txt">' + esc(etiquetaClase_(c.id)) + '</span></label>' +
        '<input type="date" class="planner-asig-fecha" data-eval="' + c.id + '" value="' +
          esc(fecha) + '" title="Fecha para este grupo">' +
        '<input type="text" class="planner-asig-obs" data-eval="' + c.id + '" ' +
          'placeholder="Obs." title="Observaciones para este grupo (opcional)" value="' +
          esc((a && a.observaciones) || '') + '">' +
      '</div>';
    }).join('');
    var izq = '<div class="ses-col ses-col-izq">' +
      '<label>Título' +
        '<input id="ses-titulo" type="text" placeholder="Ej.: Los ecosistemas: salida al parque" value="' +
        esc(s.titulo) + '"></label>' +
      '<label>Descripción / desarrollo (opcional)</label>' +
      '<div class="rt-editor">' +
        '<div class="rt-toolbar" onmousedown="event.preventDefault()">' +
          '<button type="button" title="Negrita" onclick="App.rtCmd(\'bold\')"><b>B</b></button>' +
          '<button type="button" title="Cursiva" onclick="App.rtCmd(\'italic\')"><i>i</i></button>' +
          '<button type="button" title="Lista" onclick="App.rtCmd(\'insertUnorderedList\')">•</button>' +
          '<button type="button" title="Lista numerada" onclick="App.rtCmd(\'insertOrderedList\')">1.</button>' +
          '<button type="button" title="Enlace" onclick="App.rtLink()">' + svgUI('enlace') + '</button>' +
        '</div>' +
        '<div id="ses-desc-body" class="rt-body" contenteditable="true" ' +
          'data-ph="Qué se hace, materiales, deberes… (pega un enlace y se vuelve clicable)">' +
          descInicialHtml_(s.descripcion) + '</div>' +
      '</div>' +
      '<label id="ses-sec-unidad">Unidad de planificación (opcional)' +
        '<select id="ses-unidad">' + opcionesUnidadesPlan_(s.unidadId || '') + '</select></label>' +
      '<div id="ses-sec-evento"' + (tipoActual === 'clase' ? ' hidden' : '') + '>' +
        '<label>Fecha' +
          '<input id="ses-evento-fecha" type="date" value="' + esc(eventoFecha) + '"></label>' +
      '</div>' +
      '<p class="ayuda ayuda-tipo" id="ses-tipo-ayuda"></p>' +
    '</div>';
    // Reprogramar vive junto a las fechas que modifica: cabecera del bloque de clases.
    var dcha = '<div class="ses-col ses-col-dcha" id="ses-col-dcha">' +
      '<div class="campo-crit"><span class="etq">Clases donde se dará la sesión</span>' +
        '<p class="ayuda">La misma planificación sirve para varios grupos; cada uno lleva su ' +
          'fecha y su estado.</p>' +
        reprogHtml_(s) +
        '<div class="planner-asigs">' + (filas ||
          '<div class="vacio">Aún no tienes clases: añade una con su nombre desde el botón ' +
          '«Horario» del planificador.</div>') + '</div></div>' +
      '<div class="campo-crit"><span class="etq">Criterios trabajados</span>' +
        '<div id="ses-crit-lista" class="lista-crit planner-crit"></div>' +
      '</div>' +
    '</div>';
    return '<div class="ses-form">' + izq + dcha + '</div>';
  }

  /** Cablea el editor recién pintado (modal o panel): secciones, criterios, pegado. */
  function montarEditorSesion_() {
    sesTipoCambiado();            // ajusta secciones, ayuda y título al tipo actual
    refrescarCriteriosSesion_();  // pinta las casillas según las clases ya marcadas
    var ed = document.getElementById('ses-desc-body');
    if (ed) ed.addEventListener('paste', function (e) {
      e.preventDefault();
      var t = ((e.clipboardData || window.clipboardData).getData('text')) || '';
      try { document.execCommand('insertHTML', false, plainToHtmlConLinks_(t)); } catch (x) {}
    });
    // Tabulador dentro de una lista: anida un nivel (sublista); Mayús+Tab lo saca.
    if (ed) ed.addEventListener('keydown', function (e) {
      if (e.key !== 'Tab') return;
      var sel = window.getSelection();
      var n = sel && sel.anchorNode, enLista = false;
      while (n && n !== ed) {
        if (n.nodeType === 1 && n.tagName === 'LI') { enLista = true; break; }
        n = n.parentNode;
      }
      if (!enLista) return;   // fuera de una lista, el Tab sigue su comportamiento normal
      e.preventDefault();
      try { document.execCommand(e.shiftKey ? 'outdent' : 'indent', false, null); } catch (x) {}
    });
    // Intro en el título pasa el foco a la descripción (seguir escribiendo).
    var tit = document.getElementById('ses-titulo');
    if (tit) tit.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        var d = document.getElementById('ses-desc-body');
        if (d) d.focus();
      }
    });
    ajustarAnchoNombresAsig_();  // fechas alineadas: nombre = el de la clase más larga
    // Firma de partida: el autoguardado solo persiste si algo cambia respecto a esto.
    editorFirmaInicial = firmaEditorSesion_();
  }

  /**
   * Da a la columna del nombre de clase el ancho del nombre MÁS LARGO, para que
   * todas las fechas queden alineadas y no sobre aire. Con un mínimo (para que
   * quepa un nombre corto) y un máximo (para no comerse la columna). En móvil la
   * fila se apila, así que se deja el ancho flexible del CSS.
   */
  function ajustarAnchoNombresAsig_() {
    if (esMovil()) return;
    var noms = document.querySelectorAll('#ses-col-dcha .planner-asig-nom-txt');
    if (!noms.length) return;
    var maxCh = 0;
    [].forEach.call(noms, function (n) { maxCh = Math.max(maxCh, (n.textContent || '').length); });
    // ~7.8 px por carácter (14px) + checkbox, punto de color y separaciones (~46).
    var w = Math.min(240, Math.max(96, Math.round(maxCh * 7.8) + 46));
    [].forEach.call(document.querySelectorAll('#ses-col-dcha .planner-asig-nom'), function (l) {
      l.style.flex = '0 0 ' + w + 'px'; l.style.width = w + 'px';
    });
  }

  /** Prepara el estado del editor para la sesión s (criterios marcados, id). */
  function prepararEditorSesion_(s, id) {
    sesionCritSel = {};
    sesModalId = id;
    (s.criterios || []).forEach(function (c) { sesionCritSel[c] = true; });
  }

  function abrirModalSesion_(textoAceptar, id, s) {
    prepararEditorSesion_(s, id);
    editorSesionCtx = { id: id, enPanel: false };
    // Al editar, papelera abajo, a la izquierda del botón «Cerrar».
    var acc = id ? '<button type="button" class="btn peligro" title="Eliminar sesión" ' +
      'onclick="App.eliminarSesionDesdeEditor_(\'' + id + '\')">' + svgUI('papelera') +
      '<span class="btn-txt-movil"> Eliminar</span></button>' : '';
    abrirModal(tituloSesion_(id, s.tipo || 'clase'), sesionFormHtml_(s),
      textoAceptar, function () { guardarSesion_(id); },
      { sinFoco: !!id, ancho: true, textoCancelar: 'Cerrar',
        cabExtra: tipoSelectorHtml_(s.tipo || 'clase'), accionExtra: acc });
    montarEditorSesion_();
  }

  /** Papelera del editor: guarda lo pendiente y pide confirmación de borrado. */
  function eliminarSesionDesdeEditor_(id) {
    autoguardarSesion_();
    editorSesionCtx = null; // la confirmación reutiliza el modal: sin editor ya
    eliminarSesionUI(id);
  }

  function sesTipoElegido_() {
    var r = document.querySelector('input[name="f-ses-tipo"]:checked');
    return r ? r.value : 'clase';
  }
  /** Muestra la sección de clases (tipo clase) o la de fecha (evento/aviso). */
  function sesTipoCambiado() {
    var t = sesTipoElegido_();
    var clase = (t === 'clase');
    var secUnidad = document.getElementById('ses-sec-unidad');
    var colDcha = document.getElementById('ses-col-dcha');
    var secEvento = document.getElementById('ses-sec-evento');
    var reprog = document.getElementById('ses-reprog');
    if (secUnidad) secUnidad.hidden = !clase;
    if (colDcha) colDcha.hidden = !clase;
    if (secEvento) secEvento.hidden = clase;
    if (reprog) reprog.hidden = !clase;
    // Resalta la opción activa del segmentado de Tipo.
    [].forEach.call(document.querySelectorAll('.ses-tipo-opt'), function (o) {
      var inp = o.querySelector('input');
      o.classList.toggle('activo', !!(inp && inp.checked));
    });
    var ayuda = document.getElementById('ses-tipo-ayuda');
    if (ayuda) ayuda.textContent =
      t === 'clase' ? ''
      : t === 'evento' ? 'Evento sin grupo (reunión, examen, guardia…): aparece en la fila «Otros».'
      : 'Recordatorio de la semana: aparece en la banda «No olvidar».';
    // El título del modal sigue al tipo (una sesión no es un aviso).
    var tit = document.getElementById('modal-titulo');
    if (tit) tit.textContent = tituloSesion_(sesModalId, t);
  }

  /** Al (des)marcar una clase: sugiere fecha y recalcula los criterios del área. */
  function asigChkCambiada(chk) {
    // Resalta (o no) la fila de la clase marcada.
    var fila = chk.closest('.planner-asig-fila');
    if (fila) fila.classList.toggle('activa', chk.checked);
    horChkCambiada(chk);
    refrescarCriteriosSesion_();
  }

  /** Carga (si hace falta) y pinta los criterios de las áreas de las clases marcadas. */
  function refrescarCriteriosSesion_() {
    var cont = document.getElementById('ses-crit-lista');
    if (!cont) return;
    var pares = {};
    [].forEach.call(document.querySelectorAll('.planner-asig-chk:checked'), function (chk) {
      var ev = evalDe_(chk.dataset.eval);
      if (ev && ev.area && ev.curso) pares[ev.curso + '||' + ev.area] = { curso: ev.curso, area: ev.area };
    });
    var claves = Object.keys(pares);
    var faltan = claves.filter(function (k) { return !criteriosAreaCache[k]; });
    if (!faltan.length) return pintarCriteriosSesion_(claves);
    cont.innerHTML = spinner();
    var pend = faltan.length;
    function hecho() { if (--pend === 0) pintarCriteriosSesion_(Object.keys(pares)); }
    faltan.forEach(function (k) {
      var p = pares[k];
      google.script.run
        .withSuccessHandler(function (lista) { criteriosAreaCache[k] = lista || []; hecho(); })
        .withFailureHandler(function () { criteriosAreaCache[k] = []; hecho(); })
        .getCriterios(p.curso, p.area);
    });
  }

  function pintarCriteriosSesion_(claves) {
    var cont = document.getElementById('ses-crit-lista');
    if (!cont) return;
    var vistos = {}, bloques = '';
    var varias = claves.length > 1;
    claves.forEach(function (k) {
      var lista = criteriosAreaCache[k] || [];
      if (!lista.length) return;
      var items = lista.map(function (c) {
        vistos[c.codigo] = true;
        return critChkSesion_(c.codigo, c.texto, !!sesionCritSel[c.codigo]);
      }).join('');
      bloques += (varias ? '<div class="planner-crit-area">' + esc(k.split('||')[1]) + '</div>' : '') + items;
    });
    // Códigos ya marcados que no están en ninguna área cargada: se conservan.
    var otros = Object.keys(sesionCritSel).filter(function (cod) { return !vistos[cod]; });
    if (otros.length) {
      bloques += '<div class="planner-crit-area">Otros</div>' +
        otros.map(function (cod) { return critChkSesion_(cod, '', true); }).join('');
    }
    // Sin criterios: dejamos el contenedor vacío (·:empty lo oculta) para no
    // mostrar un recuadro vacío cuando aún no hay ninguna clase con área marcada.
    cont.innerHTML = bloques;
  }

  function critChkSesion_(cod, texto, marcado) {
    return '<label class="crit"><input type="checkbox" value="' + esc(cod) + '"' +
      (marcado ? ' checked' : '') + ' onchange="App.critSesionCambiado(this)">' +
      '<span class="crit-txt"><b>' + esc(cod) + '</b> ' + esc(texto) + '</span></label>';
  }
  function critSesionCambiado(input) {
    if (input.checked) sesionCritSel[input.value] = true;
    else delete sesionCritSel[input.value];
  }

  function guardarSesion_(id, opts) {
    opts = opts || {};
    var enPanel = opts.enPanel;
    var tituloEl = document.getElementById('ses-titulo');
    if (!tituloEl) return;
    var titulo = tituloEl.value.trim();
    if (!titulo) {
      if (opts.auto) return;             // autoguardado: sin título, no molesta
      return aviso('Pon un título a la sesión.');
    }
    // Al salir de la sesión, ya no hay cambios pendientes que autoguardar.
    editorSesionCtx = null;
    var tipo = sesTipoElegido_();
    var previa = id && (sesionesCache || []).filter(function (x) { return x.sesionId === id; })[0];
    var estadoDe = {};
    if (previa) (previa.asignaciones || []).forEach(function (a) { estadoDe[a.evalId] = a.estado; });
    var asignaciones = [];
    if (tipo === 'clase') {
      [].forEach.call(document.querySelectorAll('.planner-asig-chk'), function (chk) {
        if (!chk.checked) return;
        var evalId = chk.dataset.eval;
        var f = document.querySelector('.planner-asig-fecha[data-eval="' + evalId + '"]');
        var o = document.querySelector('.planner-asig-obs[data-eval="' + evalId + '"]');
        asignaciones.push({ evalId: evalId, fecha: (f && f.value) || '',
          estado: estadoDe[evalId] || 'pendiente', // conserva el estado al editar
          observaciones: (o && o.value) || '' });
      });
    } else {
      // Evento / aviso: una asignación general (sin grupo), con su fecha.
      var prevA = previa && (previa.asignaciones || [])[0];
      asignaciones = [{ evalId: '', fecha: val('ses-evento-fecha') || '',
        estado: (prevA && prevA.estado) || 'pendiente', observaciones: '' }];
    }
    var payload = {
      titulo: titulo, tipo: tipo, descripcion: descEditorValor_(),
      criterios: tipo === 'clase' ? Object.keys(sesionCritSel) : [],
      asignaciones: asignaciones,
      unidadId: tipo === 'clase' ? (val('ses-unidad') || '') : '',
      paginas: '', deberes: ''
    };
    // Guardado OPTIMISTA (como las notas de la rejilla): se cierra el modal y se
    // pinta ya con lo introducido; la persistencia va por detrás y reconcilia.
    // En el panel de PC no hay modal: se queda mostrando la sesión guardada.
    if (!enPanel && !opts.noCerrar) cerrarModal();
    if (id) {
      var optimista = {
        sesionId: id, titulo: payload.titulo, descripcion: payload.descripcion, tipo: tipo,
        criterios: payload.criterios.slice(), asignaciones: payload.asignaciones,
        unidadId: payload.unidadId, paginas: payload.paginas, deberes: payload.deberes,
        creado: previa ? previa.creado : '', orden: previa ? previa.orden : 0
      };
      actualizarSesionCache_(optimista);
      // Persistir antes de repintar (un fallo de render no debe perder el guardado).
      // Id temporal = la CREACIÓN aún viaja al servidor: solo se actualiza en
      // local (editar un tmp en el servidor fallaba y descuadraba la cache).
      if (String(id).indexOf('tmp_') !== 0) {
        llamarConFallo_('editarSesion', [id, payload],
          function (r) { actualizarSesionCache_(r); if (!opts.noPintar) pintarPlanner(); },
          function (err) { recargarSesionesTrasError_('No se pudo guardar la sesión: ' + err); });
      }
      if (!opts.silencioso) avisoOk('Sesión guardada.');
      if (!opts.noPintar) pintarPlanner();
    } else {
      var tmpId = 'tmp_' + (++sesionTmpSeq);
      var nueva = {
        sesionId: tmpId, titulo: payload.titulo, descripcion: payload.descripcion, tipo: tipo,
        criterios: payload.criterios.slice(), asignaciones: payload.asignaciones,
        unidadId: payload.unidadId, paginas: payload.paginas, deberes: payload.deberes,
        creado: new Date().toISOString(), orden: 1e9
      };
      sesionesCache = (sesionesCache || []).concat([nueva]);
      if (enPanel) { sesUnidadSel = tmpId; panelNuevoUid = ''; } // el panel sigue mostrando la nueva
      // Persistir antes de repintar (un fallo de render no debe perder el alta).
      // Reconciliación por ID (no por identidad de objeto): si el array de
      // sesiones se hubiera reemplazado entre medias (un reorden, una recarga
      // tras error…), buscar por identidad fallaba y añadía la real SIN quitar
      // la temporal → duplicado. reconciliarCreacion_ localiza el tmp por su id.
      llamarConFallo_('crearSesion', [payload],
        function (r) {
          reconciliarCreacion_(tmpId, r, payload);
          if (!opts.noPintar) pintarPlanner();
        },
        function (err) {
          sesionesCache = (sesionesCache || []).filter(function (x) { return x.sesionId !== tmpId; });
          if (sesUnidadSel === tmpId) sesUnidadSel = '';
          if (editorSesionCtx && editorSesionCtx.id === tmpId) editorSesionCtx = null;
          pintarPlanner();
          aviso('No se pudo crear la sesión: ' + err);
        });
      if (!opts.silencioso) avisoOk('Sesión creada.');
      if (!opts.noPintar) pintarPlanner();
    }
  }
  var sesionTmpSeq = 0; // ids temporales para las sesiones aún sin confirmar del servidor

  /** google.script.run con éxito y fallo explícitos (para el guardado optimista). */
  function llamarConFallo_(fn, args, ok, fallo) {
    google.script.run.withSuccessHandler(ok)
      .withFailureHandler(function (e) { fallo((e && e.message) || 'error'); })
      [fn].apply(google.script.run, args || []);
  }
  /** Tras un fallo al persistir, recarga las sesiones del servidor para no quedar descuadrado. */
  function recargarSesionesTrasError_(msg) {
    aviso(msg);
    llamarSilencioso('listarSesiones', [], function (l) { sesionesCache = l || []; pintarPlanner(); });
  }

  function actualizarSesionCache_(s) {
    if (!sesionesCache) { sesionesCache = [s]; return; }
    for (var i = 0; i < sesionesCache.length; i++) {
      if (sesionesCache[i].sesionId === s.sesionId) { sesionesCache[i] = s; return; }
    }
    sesionesCache.push(s);
  }

  function duplicarSesionUI(id) {
    llamar('duplicarSesion', [id], function (r) {
      actualizarSesionCache_(r); pintarPlanner();
      avisoOk('Sesión duplicada (sin asignaciones): edítala para programarla.');
    });
  }

  function eliminarSesionUI(id) {
    var s = (sesionesCache || []).filter(function (x) { return x.sesionId === id; })[0];
    confirmar('Eliminar sesión',
      'La sesión «' + ((s && s.titulo) || '') + '» irá a la papelera (con todas sus ' +
      'asignaciones). ¿Continuar?',
      'Eliminar', function () {
        // Optimista: desaparece ya de la pantalla; el borrado va por detrás.
        var quitada = (sesionesCache || []).filter(function (x) { return x.sesionId === id; });
        var eliminada = quitada[0];
        sesionesCache = (sesionesCache || []).filter(function (x) { return x.sesionId !== id; });
        // Si era la sesión abierta en el panel de Unidades, seleccionamos una
        // vecina de la misma unidad para que el editor no se quede en blanco.
        if (sesUnidadSel === id) {
          sesUnidadSel = '';
          editorSesionCtx = null;
          if (plannerConPanel_() && eliminada && eliminada.unidadId) {
            var hermanas = (sesionesCache || []).filter(function (s) {
              return s.unidadId === eliminada.unidadId;
            }).sort(function (a, b) { return (a.orden || 0) - (b.orden || 0); });
            if (hermanas.length) {
              // La que ahora ocupa su posición (o la última si borró la última).
              var pos = 0;
              hermanas.forEach(function (s, i) { if ((s.orden || 0) < (eliminada.orden || 0)) pos = i + 1; });
              sesUnidadSel = (hermanas[pos] || hermanas[hermanas.length - 1]).sesionId;
            }
          }
        }
        pintarPlanner();
        avisoOk('Sesión movida a la papelera.');
        if (String(id).indexOf('tmp_') === 0) return; // aún sin confirmar: solo local
        llamarConFallo_('eliminarSesion', [id],
          function () {},
          function (err) {
            sesionesCache = (sesionesCache || []).concat(quitada); // deshacer si falla
            pintarPlanner();
            aviso('No se pudo eliminar: ' + err);
          });
      });
  }

  // ---------- exportar (Markdown al portapapeles) ----------
  // Texto plano estructurado: sirve igual para imprimir, para pegar en la
  // programación de aula o como contexto para pedirle sesiones a una IA.
  function exportarPlanner() {
    if (!sesionesCache) return;
    var lineas = [];
    function bloque(en) {
      var s = en.ses, a = en.asig;
      var l = '- [' + (a && a.estado === 'hecha' ? 'x' : ' ') + '] **' + s.titulo + '**';
      var tipo = s.tipo || 'clase';
      var meta = [];
      if (a && a.evalId) meta.push(etiquetaClase_(a.evalId));
      else if (tipo !== 'clase') meta.push(tipo === 'evento' ? 'Evento' : 'Aviso');
      if (a && a.fecha) meta.push(a.fecha);
      if ((s.criterios || []).length) meta.push('criterios: ' + s.criterios.join(', '));
      if (a && a.estado === 'aplazada') meta.push('APLAZADA');
      if (meta.length) l += ' (' + meta.join(' · ') + ')';
      lineas.push(l);
      var desc = htmlAtexto_(s.descripcion);
      if (desc) lineas.push('  ' + desc.replace(/\n/g, '\n  '));
      if (a && a.observaciones) lineas.push('  _Obs.: ' + a.observaciones.replace(/\n/g, ' ') + '_');
    }
    if (plannerModoActual === 'dia') {
      // La vista Día se abre como PDF (para WhatsApp, imprimir…).
      return exportarDiaPdf_();
    } else if (plannerModoActual === 'semana') {
      // La vista Semana se abre como PDF apaisado (rejilla grupos × días).
      return exportarSemanaPdf_();
    } else if (plannerModoActual === 'mes') {
      var y = plannerMes.getFullYear(), m = plannerMes.getMonth();
      lineas.push('# Planificación · ' + MESES_LARGO[m] + ' ' + y);
      var diasMes = new Date(y, m + 1, 0).getDate();
      for (var dm = 1; dm <= diasMes; dm++) {
        var isoM = isoLocal_(new Date(y, m, dm));
        var delM = entradasPlanner_().filter(function (en) { return en.asig && en.asig.fecha === isoM; });
        if (!delM.length) continue;
        lineas.push('', '## ' + fechaCorta_(isoM), '');
        delM.forEach(bloque);
      }
    } else {
      // Unidades: contenido por unidad de planificación (sin fechas).
      lineas.push('# Planificación · unidades', '');
      var sinAsig = function (s) { return { ses: s, asig: (s.asignaciones || [])[0] || null }; };
      (planUnidadesCache || []).forEach(function (u) {
        var sesU = (sesionesCache || []).filter(function (s) { return s.unidadId === u.unidadId; })
          .sort(function (a, b) { return (a.orden || 0) - (b.orden || 0); });
        if (!sesU.length) return;
        lineas.push('', '## ' + u.nombre + (u.curso ? ' · ' + u.curso : '') +
          (u.area ? ' · ' + u.area : ''), '');
        sesU.forEach(function (s) { bloque(sinAsig(s)); });
      });
      var sueltas = (sesionesCache || []).filter(function (s) { return !s.unidadId; });
      if (sueltas.length) {
        lineas.push('', '## Sin unidad', '');
        sueltas.forEach(function (s) { bloque(sinAsig(s)); });
      }
    }
    if (lineas.length <= 2) return aviso('No hay nada que exportar en esta vista.');
    copiarAlPortapapeles(lineas.join('\n'),
      'Planificación copiada en Markdown: pégala donde quieras (documento, IA…).');
  }

  /** Nombre del docente para el PDF y el nombre de archivo (perfil o correo). */
  function docenteNombre_() {
    return ((estado && (estado.nombre || estado.usuario)) || '').trim();
  }
  /** Color hex válido para el Doc (los CSS var / vacíos caen al acento). */
  function hexColor_(c) {
    return /^#[0-9a-f]{3,8}$/i.test(c || '') ? c : '#5b5bd6';
  }
  var PDF_ESTILO_ = 'body{font-family:Arial,Helvetica,sans-serif;color:#111;margin:24px 28px}' +
    'h1{font-size:21px;margin:0 0 3px;letter-spacing:-.2px}' +
    '.meta{color:#6b7280;font-size:12px;margin:0 0 14px;padding-bottom:12px;' +
      'border-bottom:2px solid #eceef2}' +
    'ul,ol{margin:4px 0;padding-left:20px}p{margin:0 0 4px}a{color:#5b5bd6}';

  /**
   * Tarjeta de sesión para el PDF. El color de la sesión se marca con un BORDE
   * IZQUIERDO grueso y con el subtítulo en ese color: la conversión HTML→PDF de
   * Google descarta los fondos (CSS background y bgcolor), pero respeta los
   * bordes y el color del texto —por eso antes salía sin color—.
   */
  /** Tarjeta de la vista Día: espina de color, título + hora (a la derecha,
      en color), clase debajo en color, y descripción/obs cuidadas. */
  function tarjetaDiaPdf_(en, col, hora, clase) {
    var s = en.ses, a = en.asig;
    col = col || '#5b5bd6';
    var desc = descInicialHtml_(s.descripcion || '');
    var obs = (a && a.observaciones)
      ? '<div style="margin-top:6px;font-style:italic;color:#666;font-size:12px">Obs.: ' +
          esc(a.observaciones) + '</div>' : '';
    var cuerpo = (desc || obs)
      ? '<div style="margin-top:7px;font-size:13px;color:#333;line-height:1.45">' + desc + obs + '</div>' : '';
    var cab = '<table width="100%" cellspacing="0" cellpadding="0"><tr>' +
      '<td style="font-weight:700;font-size:15px;color:#111">' + esc(s.titulo || 'Sin título') + '</td>' +
      (hora ? '<td align="right" valign="top" style="font-size:12px;font-weight:700;color:' + col +
        ';white-space:nowrap;padding-left:10px">' + esc(hora) + '</td>' : '') +
      '</tr></table>';
    var claseLn = clase ? '<div style="font-size:12px;font-weight:600;color:' + col +
      ';margin-top:1px">' + esc(clase) + '</div>' : '';
    return '<table width="100%" cellspacing="0" cellpadding="0" ' +
      'style="border-collapse:collapse;margin:0 0 12px">' +
      '<tr><td style="border:1px solid #e5e7eb;border-left:7px solid ' + col + ';padding:10px 14px">' +
        cab + claseLn + cuerpo +
      '</td></tr></table>';
  }

  /** Tarjeta compacta para las celdas de la vista Semana (espina de color). */
  function tarjetaSemPdf_(en, col, descTexto) {
    var s = en.ses;
    col = col || '#5b5bd6';
    return '<table width="100%" cellspacing="0" cellpadding="0" ' +
      'style="border-collapse:collapse;margin:0 0 6px">' +
      '<tr><td style="border:1px solid #e5e7eb;border-left:5px solid ' + col + ';padding:5px 4px 5px 8px">' +
        '<div style="font-weight:700;font-size:12px;color:#111">' + esc(s.titulo || 'Sin título') + '</div>' +
        (descTexto ? '<div style="font-size:10px;color:#555;margin-top:2px">' + esc(descTexto) + '</div>' : '') +
      '</td></tr></table>';
  }

  function avisosPdf_(avisos) {
    if (!avisos.length) return '';
    return '<table width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;margin:0 0 14px">' +
      '<tr><td style="border:1px solid #f0c000;border-left:6px solid #f0c000;padding:9px 12px">' +
      '<div style="font-weight:700;font-size:13px;margin-bottom:4px;color:#8a6d10">No olvidar</div>' +
      avisos.map(function (en) {
        return '<div style="font-size:13px">• ' + esc(en.ses.titulo || 'Aviso') +
          (en.ses.descripcion ? ' — ' + esc(htmlAtexto_(en.ses.descripcion).replace(/\n/g, ' ')) : '') + '</div>';
      }).join('') + '</td></tr></table>';
  }

  /** Abre lo planificado un día como PDF (en pestaña nueva). */
  function exportarDiaPdf_() {
    var iso = isoLocal_(plannerDia), idx = diaSemanaIso_(iso);
    var porClase = {}, eventos = [], avisos = [];
    entradasPlanner_().forEach(function (en) {
      var a = en.asig;
      if (!a || a.fecha !== iso) return;
      var tipo = en.ses.tipo || 'clase';
      if (tipo === 'aviso') { avisos.push(en); return; }
      if (tipo === 'evento' || !a.evalId) { eventos.push(en); return; }
      (porClase[a.evalId] = porClase[a.evalId] || []).push(en);
    });
    var bloques = [];
    clasesPlanner_().forEach(function (c) {
      (porClase[c.id] || []).forEach(function (en) {
        bloques.push({ hora: horaDia_(c, idx) || '', col: c.color || '#5b5bd6',
          clase: etiquetaClase_(c.id), en: en });
      });
    });
    eventos.forEach(function (en) { bloques.push({ hora: '~', col: '#6b7280', clase: 'Evento', en: en }); });
    bloques.sort(function (a, b) { return (a.hora || '~') < (b.hora || '~') ? -1 : 1; });
    if (!bloques.length && !avisos.length) return aviso('Ese día no tiene nada planificado.');

    var cuerpo = bloques.map(function (b) {
      return tarjetaDiaPdf_(b.en, b.col, (b.hora && b.hora !== '~') ? b.hora : '', b.clase);
    }).join('');
    var titulo = (DIAS_SEM[idx].charAt(0).toUpperCase() + DIAS_SEM[idx].slice(1)) + ', ' + fechaConAnio_(iso);
    var doc = docenteNombre_();
    var meta = (doc ? doc + ' · ' : '') + nombreApp_() + ' · Planificación del día';
    // HTML de respaldo (conversor viejo: bordes, sin relleno).
    var html = '<html><head><meta charset="utf-8"><style>' + PDF_ESTILO_ + '</style></head><body>' +
      '<h1>' + esc(titulo) + '</h1>' +
      '<div class="meta">' + esc(meta) + '</div>' +
      avisosPdf_(avisos) + cuerpo + '</body></html>';
    // Payload para el Doc (bandas de color rellenas, método principal).
    var payload = { tipo: 'dia', orientacion: 'portrait', titulo: titulo, meta: meta,
      avisos: avisos.map(function (en) {
        return { titulo: en.ses.titulo || 'Aviso',
          texto: htmlAtexto_(en.ses.descripcion || '').replace(/\n/g, ' ') };
      }),
      tarjetas: bloques.map(function (b) {
        return { color: hexColor_(b.col), titulo: b.en.ses.titulo || 'Sin título',
          hora: (b.hora && b.hora !== '~') ? b.hora : '', clase: b.clase,
          desc: htmlAtexto_(b.en.ses.descripcion || ''),
          obs: (b.en.asig && b.en.asig.observaciones) || '' };
      }) };
    abrirPdfDoc_(payload, html, nombreArchivoPdf_(doc, iso));
  }

  /** Nombre de archivo: «Docente - fecha» (o rango); el servidor lo sanea. */
  function nombreArchivoPdf_(doc, fecha) {
    return [doc, fecha].filter(Boolean).join(' - ') || 'Planificacion';
  }

  /** Abre lo planificado una semana como PDF apaisado (rejilla grupos × días). */
  function exportarSemanaPdf_() {
    var ctx = semanaCtx_();
    var clases = clasesPlanner_();
    var hayAlgo = Object.keys(ctx.porClaseFecha).length || Object.keys(ctx.eventos).length ||
      ctx.avisos.length;
    if (!hayAlgo) return aviso('Esa semana no tiene nada planificado.');

    var anchoCol = Math.floor(100 / (ctx.isos.length + 1));
    var cab = '<tr><td style="width:' + anchoCol + '%"></td>' +
      ctx.isos.map(function (iso, i) {
        return '<td style="padding:4px 6px;font-size:12px;font-weight:700;color:#374151;' +
          'border-bottom:2px solid #e5e7eb">' + esc(DIAS_SEM[i].slice(0, 3)) +
          ' <span style="color:#9ca3af;font-weight:500">' + esc(fechaCorta_(iso)) + '</span></td>';
      }).join('') + '</tr>';

    var celda = function (ens) {
      if (!ens || !ens.length) return '<td style="border:1px solid #f0f1f4"></td>';
      return '<td valign="top" style="padding:5px;border:1px solid #f0f1f4">' +
        ens.map(function (en) {
          var a = en.asig, tipo = en.ses.tipo || 'clase';
          var col = (tipo === 'clase' && a && a.evalId) ? colorClase_(a.evalId) : '#6b7280';
          var desc = htmlAtexto_(en.ses.descripcion || '').replace(/\n/g, ' ');
          return tarjetaSemPdf_(en, col, desc);
        }).join('') + '</td>';
    };

    var filas = clases.map(function (c) {
      var celdas = ctx.isos.map(function (iso) { return celda(ctx.porClaseFecha[c.id + '|' + iso]); }).join('');
      return '<tr><td valign="top" style="padding:6px 8px 6px 0;font-size:12px;font-weight:600;' +
        'border:1px solid #f0f1f4">' + esc(etiquetaClase_(c.id)) + '</td>' + celdas + '</tr>';
    }).join('');
    // Fila «Otros» (eventos sin grupo) si los hay esa semana.
    var hayEv = ctx.isos.some(function (iso) { return (ctx.eventos[iso] || []).length; });
    if (hayEv) {
      filas += '<tr><td valign="top" style="padding:6px 8px 6px 0;font-size:12px;font-weight:600;' +
        'font-style:italic;color:#6b7280;border:1px solid #f0f1f4">Otros</td>' +
        ctx.isos.map(function (iso) { return celda(ctx.eventos[iso]); }).join('') + '</tr>';
    }

    var rangoCorto = fechaCorta_(ctx.isos[0]) + ' al ' + fechaCorta_(ctx.isos[ctx.isos.length - 1]);
    var titulo = 'Semana del ' + rangoCorto;
    var doc = docenteNombre_();
    var meta = (doc ? doc + ' · ' : '') + nombreApp_() + ' · Planificación semanal';
    var html = '<html><head><meta charset="utf-8"><style>' + PDF_ESTILO_ +
      '@page{size:landscape;margin:1cm}' + '</style></head><body>' +
      '<h1>' + esc(titulo) + '</h1>' +
      '<div class="meta">' + esc(meta) + '</div>' +
      avisosPdf_(ctx.avisos) +
      '<table width="100%" cellspacing="0" cellpadding="0" style="table-layout:fixed">' +
        cab + filas + '</table></body></html>';
    // Payload para el Doc apaisado (celdas de color rellenas).
    var cardsDe = function (ens) {
      return (ens || []).map(function (en) {
        var a = en.asig, tipo = en.ses.tipo || 'clase';
        var col = (tipo === 'clase' && a && a.evalId) ? colorClase_(a.evalId) : '#6b7280';
        return { color: hexColor_(col), titulo: en.ses.titulo || 'Sin título',
          desc: htmlAtexto_(en.ses.descripcion || '').replace(/\n/g, ' ') };
      });
    };
    var pFilas = clases.map(function (c) {
      return { etq: etiquetaClase_(c.id),
        celdas: ctx.isos.map(function (iso) { return cardsDe(ctx.porClaseFecha[c.id + '|' + iso]); }) };
    });
    if (hayEv) {
      pFilas.push({ etq: 'Otros',
        celdas: ctx.isos.map(function (iso) { return cardsDe(ctx.eventos[iso]); }) });
    }
    var payload = { tipo: 'semana', orientacion: 'landscape', titulo: titulo, meta: meta,
      dias: ctx.isos.map(function (iso, i) { return DIAS_SEM[i].slice(0, 3) + ' ' + fechaCorta_(iso); }),
      avisos: ctx.avisos.map(function (en) {
        return { titulo: en.ses.titulo || 'Aviso',
          texto: htmlAtexto_(en.ses.descripcion || '').replace(/\n/g, ' ') };
      }),
      filas: pFilas };
    abrirPdfDoc_(payload, html, nombreArchivoPdf_(doc, rangoCorto));
  }

  /**
   * Genera el PDF y lo abre en PESTAÑA NUEVA (solo PC). Método principal: Google
   * Doc con celdas de color rellenas (estilo Planboard); si falla (p. ej. antes
   * de reautorizar el nuevo permiso), cae al conversor HTML de bordes para no
   * dejar sin exportación.
   *
   * En móvil NO se abre pestaña: en iOS, salir a otra pestaña recarga la web app
   * al volver; allí se usa el compartir nativo (que además va bien para
   * WhatsApp). La pestaña de PC se abre YA (en el clic) con un «generando…»
   * para que el bloqueador no la corte; al llegar el PDF se navega a su blob.
   */
  function abrirPdfDoc_(payload, htmlFallback, nombre) {
    var win = null;
    if (!esMovil()) {
      try { win = window.open('', '_blank'); } catch (e) {}
      if (win) {
        win.document.write('<!doctype html><meta charset="utf-8"><title>Generando PDF…</title>' +
          '<body style="font-family:Arial,sans-serif;color:#555;padding:28px">Generando PDF…</body>');
      }
    }
    var btn = document.querySelector('#vista-planner .acciones-seccion .btn');
    var prev = btn ? btn.innerHTML : '';
    if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-inline"></span>'; }
    var fin = function () { if (btn) { btn.disabled = false; btn.innerHTML = prev; } };
    var alRespaldo = function (motivo) {
      // Respaldo: conversor HTML (bordes, sin relleno) si el Doc no se pudo.
      aviso('PDF a color no disponible (' + (motivo || 'error') + '). Se usa el formato básico.');
      llamarConFallo_('generarPdf', [htmlFallback, nombre],
        function (r) { fin(); entregarPdf_(r.b64, r.nombre, win); },
        function (err) { fin(); if (win) win.close(); aviso('No se pudo generar el PDF: ' + err); });
    };
    llamarConFallo_('generarPdfDoc', [payload, nombre],
      function (r) {
        if (r && r.ok) { fin(); entregarPdf_(r.b64, r.nombre, win); }
        else alRespaldo((r && r.error) || 'desconocido');
      },
      function (err) { alRespaldo(err); });
  }

  /** Lleva el PDF a la pestaña abierta; si no la hay (bloqueada), comparte/descarga. */
  function entregarPdf_(b64, nombre, win) {
    var bin = atob(b64), arr = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    var blob = new Blob([arr], { type: 'application/pdf' });
    var url = URL.createObjectURL(blob);
    if (win && !win.closed) {
      win.location.href = url;
      setTimeout(function () { URL.revokeObjectURL(url); }, 60000);
      return;
    }
    // Pestaña bloqueada: en móvil se ofrece compartir; si no, se descarga.
    try {
      var file = new File([blob], nombre, { type: 'application/pdf' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'Planificación' }).catch(function () {});
        setTimeout(function () { URL.revokeObjectURL(url); }, 60000);
        return;
      }
    } catch (e) {}
    var a = document.createElement('a');
    a.href = url; a.download = nombre; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
    avisoOk('PDF descargado.');
  }

  return {

    setVistaDefecto: setVistaDefecto, togglePlannerConfig: togglePlannerConfig,
    plannerMatCursoSel: plannerMatCursoSel,
    togglePlanUnidad: togglePlanUnidad,
    nuevaPlanUnidad: nuevaPlanUnidad, editarPlanUnidadUI: editarPlanUnidadUI,
    eliminarPlanUnidadUI: eliminarPlanUnidadUI,
    nuevaSesionEnUnidad: nuevaSesionEnUnidad, dragSesionUnidad: dragSesionUnidad,
    abrirSesionUnidad: abrirSesionUnidad, guardarSesionPanel_: guardarSesionPanel_,
    nuevaSesion: nuevaSesion, editarSesionUI: editarSesionUI, editarSesionDesde_: editarSesionDesde_,
    duplicarSesionUI: duplicarSesionUI, eliminarSesionUI: eliminarSesionUI,
    eliminarSesionDesdeEditor_: eliminarSesionDesdeEditor_,
    estadoSesionUI: estadoSesionUI, desplazarSesionUI: desplazarSesionUI,
    exportarPlanner: exportarPlanner,
    dragSesionIni: dragSesionIni, dragSesionFin: dragSesionFin, gripSesionDown: gripSesionDown,
