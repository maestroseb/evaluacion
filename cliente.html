    var prev = !esMovil(); // previsualización solo en PC (en móvil la semana no cabe)
    var cel = ['<div class="pl-esq pl-cab"></div>'];
    ctx.isos.forEach(function (iso, i) {
      var fest = festivoNombre_(iso);
      cel.push('<div class="pl-cab' + (iso === ctx.hoy ? ' pl-hoy' : '') +
        (fest ? ' pl-nolect' : '') + '"' + (fest ? ' title="' + esc(fest) + '"' : '') + '>' +
        DIAS_SEM[i].slice(0, 3) + ' <span>' + fechaCorta_(iso) + (fest ? ' · ' + esc(fest) : '') +
        '</span></div>');
    });
    clases.forEach(function (c) {
      // Icono de la clase, en su color, en la etiqueta de la fila.
      cel.push('<div class="pl-esq pl-fila-lbl">' + icoClase_(c) + esc(etiquetaClase_(c.id)) + '</div>');
      ctx.isos.forEach(function (iso, i) {
        var ens = ctx.porClaseFecha[c.id + '|' + iso] || [];
        if (ens.length) {
          // El blanco sobrante de la celda también abre la (primera) sesión.
          cel.push('<div class="pl-celda"' + dropAttrs_(c.id, iso) +
            ' onclick="App.editarSesionDesde_(event,\'' + ens[0].ses.sesionId + '\')">' +
            ens.map(function (en) { return chipSesion_(en, false, prev); }).join('') + '</div>');
        } else {
          // Celda vacía: TODA la celda planifica (con clase y fecha ya puestas).
          // Un «+» marca los días de horario; el resto también es clicable.
          var esHor = c.horario.some(function (h) { return h.dia === i; });
          cel.push('<div class="pl-celda pl-celda-nueva" title="Planificar aquí"' +
            dropAttrs_(c.id, iso) +
            ' onclick="App.nuevaSesion(\'' + c.id + '\',\'' + iso + '\')">' +
            (esHor ? '<span class="pl-celda-mas">+</span>' : '') + '</div>');
        }
      });
    });
    // Fila «Otros»: eventos sin grupo (reuniones, exámenes…) por día.
    if (hayEventos_(ctx)) {
      cel.push('<div class="pl-esq pl-fila-lbl pl-fila-otros">Otros</div>');
      ctx.isos.forEach(function (iso) {
        var evs = ctx.eventos[iso] || [];
        cel.push('<div class="pl-celda"' + dropAttrs_('', iso) + '>' +
          evs.map(function (en) { return chipSesion_(en, false, prev); }).join('') + '</div>');
      });
    }
    return '<div class="pl-scroll"><div class="pl-grid" style="--cols:' + DIAS_LECTIVOS + '">' +
      cel.join('') + '</div></div>';
  }

  /** Vista por horario: cada día, sus clases (sesión o hueco) ordenadas por hora. */
  function htmlSemanaHorario_(ctx) {
    var clases = clasesPlanner_();
    var prev = !esMovil(); // previsualización solo en PC
    var cols = ctx.isos.map(function (iso, i) {
      var bloques = [];
      clases.forEach(function (c) {
        var ens = ctx.porClaseFecha[c.id + '|' + iso] || [];
        var hora = horaDia_(c, i);
        if (ens.length) {
          ens.forEach(function (en) { bloques.push({ hora: hora, html: chipSesion_(en, true, prev) }); });
        } else if (c.horario.some(function (h) { return h.dia === i; })) {
          bloques.push({ hora: hora, html: huecoCelda_(c.id, iso, true) });
        }
      });
      // Eventos sin grupo del día: al final de la columna (no tienen hora).
      (ctx.eventos[iso] || []).forEach(function (en) {
        bloques.push({ hora: '99:98', html: chipSesion_(en, true, prev) });
      });
      bloques.sort(function (a, b) {
        var ha = a.hora || '99:99', hb = b.hora || '99:99';
        return ha < hb ? -1 : ha > hb ? 1 : 0;
      });
      var fest = festivoNombre_(iso);
      return '<div class="pl-col">' +
        '<div class="pl-col-cab' + (iso === ctx.hoy ? ' pl-hoy' : '') + (fest ? ' pl-nolect' : '') + '"' +
          (fest ? ' title="' + esc(fest) + '"' : '') + '>' +
          DIAS_SEM[i].slice(0, 3) + ' <span>' + fechaCorta_(iso) + (fest ? ' · ' + esc(fest) : '') +
          '</span></div>' +
        (bloques.length ? bloques.map(function (b) { return b.html; }).join('')
          : '<div class="planner-vacio">—</div>') +
      '</div>';
    }).join('');
    return '<div class="pl-scroll"><div class="pl-cols">' + cols + '</div></div>';
  }

  // ---------- vista mensual ----------
  var MESES_LARGO = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio',
    'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];

  function htmlMes_() {
    var y = plannerMes.getFullYear(), m = plannerMes.getMonth();
    var etq = document.getElementById('planner-mes-etq');
    if (etq) etq.textContent = MESES_LARGO[m] + ' ' + y;
    var primero = new Date(y, m, 1);
    var inicio = lunesDe_(primero); // lunes de la semana en que cae el día 1
    var offset = (primero.getDay() + 6) % 7; // 0 = lunes
    var diasMes = new Date(y, m + 1, 0).getDate();
    var semanas = Math.ceil((offset + diasMes) / 7);
    // Sesiones del mes visible por fecha.
    var porFecha = {};
    entradasPlanner_().forEach(function (en) {
      var a = en.asig;
      if (a && a.fecha) (porFecha[a.fecha] = porFecha[a.fecha] || []).push(en);
    });
    var hoyIso = isoLocal_(new Date());
    // Solo días lectivos (L–V): en el finde no hay clase.
    var cabs = DIAS_SEM.slice(0, DIAS_LECTIVOS).map(function (d) {
      return '<div class="pl-mes-cab">' + d.slice(0, 3) + '</div>';
    }).join('');
    var celdas = '';
    for (var w = 0; w < semanas; w++) {
      for (var dd = 0; dd < DIAS_LECTIVOS; dd++) {
        var d = new Date(inicio); d.setDate(d.getDate() + w * 7 + dd);
        var iso = isoLocal_(d);
        var fuera = (d.getMonth() !== m);
        var fest = festivoNombre_(iso);
        var ens = porFecha[iso] || [];
        celdas += '<div class="pl-mes-dia' + (fuera ? ' pl-mes-fuera' : '') +
            (fest ? ' pl-nolect' : '') + (iso === hoyIso ? ' pl-hoy' : '') + '"' +
            dropAttrs_('@keep', iso) +
            (fest ? ' title="' + esc(fest) + '"' : '') + '>' +
          '<div class="pl-mes-num">' + d.getDate() +
            (fest ? '<span class="pl-mes-fest">' + esc(fest) + '</span>' : '') + '</div>' +
          ens.map(chipMes_).join('') +
        '</div>';
      }
    }
    return '<div class="pl-scroll"><div class="pl-mes">' +
      '<div class="pl-mes-cabs">' + cabs + '</div>' +
      '<div class="pl-mes-grid">' + celdas + '</div></div></div>';
  }

  /** Chip de sesión en la vista mensual (compacto, coloreado por estado/tipo). */
  function chipMes_(en) {
    var s = en.ses, a = en.asig, tipo = s.tipo || 'clase';
    var est = a ? a.estado : 'pendiente';
    var cls = 'pl-mes-chip ' + est +
      (tipo === 'evento' ? ' pl-chip-evento' : '') + (tipo === 'aviso' ? ' pl-mes-aviso' : '');
    var lab = (tipo === 'clase' && a && a.evalId) ? etiquetaClase_(a.evalId) + ': ' : '';
    var col = (tipo === 'clase' && a && a.evalId) ? colorClase_(a.evalId) : '';
    var estilo = col ? ' style="border-left-color:' + col + '"' : '';
    var arr = (tipo !== 'aviso')
      ? ' ondragstart="App.dragSesionIni(event,\'' + s.sesionId + '\',\'' +
        ((a && a.evalId) || '') + '\')" ondragend="App.dragSesionFin(event)"'
      : '';
    var grip = (tipo !== 'aviso')
      ? '<span class="pl-chip-grip pl-mes-grip" title="Arrastrar" onpointerdown="App.gripSesionDown(event)">⠿</span>'
      : '';
    return '<div class="' + cls + '"' + estilo + arr + ' onclick="App.editarSesionUI(\'' + s.sesionId + '\')" ' +
      'title="' + esc(lab + (s.titulo || 'Sin título')) + '">' + grip +
      '<span class="pl-mes-chip-tit">' + esc(s.titulo || '—') + '</span></div>';
  }

  // ---------- vista Unidades (unidades de planificación por materia + curso) ----------
  var plannerMatCurso = null; // 'area||curso' seleccionado en la vista Unidades
  // Unidades desplegadas en la vista Unidades (id → 1). Se recuerda entre
  // visitas: con muchas unidades, plegadas por defecto se llega a la 12 sin
  // scroll infinito.
  var plUniAbiertas = null;
  function plUniAbiertas_() {
    if (!plUniAbiertas) {
      plUniAbiertas = {};
      try { plUniAbiertas = JSON.parse(localStorage.getItem('planner-uni-abiertas')) || {}; }
      catch (e) {}
    }
    return plUniAbiertas;
  }
  function togglePlanUnidad(id) {
    var ab = plUniAbiertas_();
    if (ab[id]) delete ab[id]; else ab[id] = 1;
    try { localStorage.setItem('planner-uni-abiertas', JSON.stringify(ab)); } catch (e) {}
    // Solo se pliega/despliega la tarjeta tocada: sin repintar (conserva el scroll).
    var card = document.getElementById('pl-uni-' + id);
    if (card) card.classList.toggle('plegada', !ab[id]);
  }
  var sesUnidadSel = '';      // sesión mostrada en el panel de detalle (PC)
  var panelNuevoUid = '';     // unidad para la que el panel muestra una sesión nueva

  /** En PC hay panel de detalle a la derecha; en móvil se edita en el modal. */
  function plannerConPanel_() { return !esMovil(); }

  /** Abre una sesión: en PC la muestra en el panel; en móvil, en el modal. */
  function abrirSesionUnidad(id) {
    if (plannerConPanel_()) {
      autoguardarSesion_();            // guarda la que estabas editando antes de saltar
      sesUnidadSel = id; panelNuevoUid = ''; pintarPlanner();
    } else editarSesionUI(id);
  }
  /** Guarda desde el panel (sin modal): edición o alta según haya sesión nueva. */
  function guardarSesionPanel_() {
    guardarSesion_(panelNuevoUid ? null : sesUnidadSel, { enPanel: true });
  }
  /** HTML del panel de detalle (editor de la sesión seleccionada o alta nueva). */
  function htmlDetalleSesion_() {
    var nueva = !!panelNuevoUid;
    var s = nueva
      ? { titulo: '', descripcion: '', criterios: [], asignaciones: [], unidadId: panelNuevoUid, tipo: 'clase' }
      : (sesUnidadSel ? (sesionesCache || []).filter(function (x) { return x.sesionId === sesUnidadSel; })[0] : null);
    if (!s) {
      editorSesionCtx = null;
      return '<div class="pl-detail-vacio">Selecciona una sesión de la izquierda para editarla aquí, ' +
        'o pulsa «+ Nueva sesión» en una unidad.</div>';
    }
    prepararEditorSesion_(s, nueva ? null : s.sesionId);
    editorSesionCtx = { id: nueva ? null : s.sesionId, enPanel: true };
    // Arriba solo duplicar; la papelera va abajo, a la izquierda del Guardar.
    var acc = nueva ? '' :
      '<span class="pl-detail-acc">' +
        '<button class="btn btn-icono" title="Duplicar" onclick="App.duplicarSesionUI(\'' + s.sesionId + '\')">' +
          svgUI('duplicar') + '</button>' +
      '</span>';
    var papelera = nueva ? '' :
      '<button class="btn peligro" title="Eliminar" onclick="App.eliminarSesionUI(\'' + s.sesionId + '\')">' +
        svgUI('papelera') + ' Eliminar</button>';
    return '<div class="pl-detail-head"><strong>' + (nueva ? 'Nueva sesión' : 'Editar') + '</strong>' +
        tipoSelectorHtml_(s.tipo || 'clase') + acc + '</div>' +
      sesionFormHtml_(s) +
      '<div class="pl-detail-guardar">' + papelera +
        '<button class="btn primario" onclick="App.guardarSesionPanel_()">' +
        (nueva ? 'Crear sesión' : 'Guardar') + '</button></div>';
  }

  function matCursoKey_(area, curso) { return (area || '') + '||' + (curso || ''); }
  /** Etiqueta legible de una materia+curso ('' → «General»). */
  function etqMatCurso_(area, curso) {
    var a = area || 'General';
    return curso ? a + ' · ' + curso : a;
  }
  /** Combinaciones materia+curso: de tus clases y de las unidades ya creadas. */
  function materiasCursoPlanner_() {
    var set = {};
    (estado.evaluaciones || []).forEach(function (e) { if (e.area) set[matCursoKey_(e.area, e.curso)] = true; });
    (planUnidadesCache || []).forEach(function (u) { if (u.area || u.curso) set[matCursoKey_(u.area, u.curso)] = true; });
    return Object.keys(set).sort().map(function (k) {
      var p = k.split('||'); return { area: p[0], curso: p[1], key: k };
    });
  }
  /** Opciones de un <select> de materia+curso (con «General» al final). */
  function opcionesMatCurso_(sel, combos) {
    return combos.map(function (c) {
      return '<option value="' + esc(c.key) + '"' + (c.key === sel ? ' selected' : '') + '>' +
        esc(etqMatCurso_(c.area, c.curso)) + '</option>';
    }).join('') +
      '<option value="||"' + (sel === '||' ? ' selected' : '') + '>General (sin materia)</option>';
  }

  function htmlUnidades_() {
    var combos = materiasCursoPlanner_();
    if (plannerMatCurso == null ||
        (plannerMatCurso !== '||' && !combos.some(function (c) { return c.key === plannerMatCurso; }))) {
      plannerMatCurso = combos.length ? combos[0].key : '||';
    }
    // La barra de materia + «Nueva unidad» vive en la línea de navegación del
    // planificador (como la fecha en Día/Semana/Mes): a la izquierda en PC,
    // con el selector de vistas a la derecha.
    var nav = document.getElementById('planner-nav-unidades');
    if (nav) nav.innerHTML = '<label class="pl-uni-materia">Materia y curso ' +
        '<select onchange="App.plannerMatCursoSel(this.value)">' +
        opcionesMatCurso_(plannerMatCurso, combos) + '</select></label>' +
      '<button class="btn primario" onclick="App.nuevaPlanUnidad()">+ Nueva unidad</button>';
    var barra = '';
    var p = plannerMatCurso.split('||'), area = p[0], curso = p[1];
    var unidades = (planUnidadesCache || []).filter(function (u) {
      return (u.area || '') === area && (u.curso || '') === curso;
    });
    var cuerpo = unidades.length
      ? unidades.map(tarjetaPlanUnidad_).join('')
      : '<div class="vacio">No hay unidades de planificación en «' + esc(etqMatCurso_(area, curso)) +
        '». Crea una y luego asígnale sesiones.</div>';
    // En PC: dos columnas (lista + panel de detalle). En móvil: solo la lista.
    if (plannerConPanel_()) {
      return barra + '<div class="pl-uni-layout"><div class="pl-uni-list">' + cuerpo + '</div>' +
        '<aside class="pl-uni-detail">' + htmlDetalleSesion_() + '</aside></div>';
    }
    return barra + cuerpo;
  }

  function tarjetaPlanUnidad_(u) {
    var ses = (sesionesCache || []).filter(function (s) { return s.unidadId === u.unidadId; });
    // Secuencia de la unidad: por 'orden' (se reordena arrastrando). El nº de
    // sesión es la posición en esta lista (automático).
    ses.sort(function (a, b) { return (a.orden || 0) - (b.orden || 0); });
    // Criterios programados = unión de los criterios de sus sesiones. Cada uno
    // se marca según si ya está asignado a alguna actividad de evaluación.
    var crit = {}; ses.forEach(function (s) { (s.criterios || []).forEach(function (c) { crit[c] = true; }); });
    var evalSet = {}; (critEvaluadosCache || []).forEach(function (c) { evalSet[c] = true; });
    var codes = Object.keys(crit).sort();
    var nEval = codes.filter(function (c) { return evalSet[c]; }).length;
    var chips = codes.map(function (c) {
      var ok = !!evalSet[c];
      return '<span class="pl-uni-crit ' + (ok ? 'pl-uni-crit-ok' : 'pl-uni-crit-no') + '" title="' +
        (ok ? 'Ya evaluado (en alguna actividad del cuaderno)' : 'Programado pero aún sin evaluar') +
        '">' + esc(c) + (ok ? ' ' + svgUI('check') : '') + '</span>';
    }).join('');
    var cobertura = codes.length
      ? '<span class="pl-uni-cob">' + nEval + '/' + codes.length + ' evaluados</span>' : '';
    var filas = ses.length
      ? ses.map(function (s, idx) {
          var f = primeraFecha_(s);
          var info = [];
          if (f !== '9999') info.push(fechaConAnio_(f));
          return '<div class="pl-uni-ses" data-id="' + s.sesionId + '">' +
            '<span class="pl-uni-grip" title="Arrastrar para reordenar" ' +
              'onpointerdown="App.dragSesionUnidad(event)">⠿</span>' +
            '<span class="pl-uni-num">' + ('0' + (idx + 1)).slice(-2) + '</span>' +
            '<button class="pl-uni-ses-cuerpo' + (s.sesionId === sesUnidadSel ? ' pl-uni-ses-sel' : '') +
              '" onclick="App.abrirSesionUnidad(\'' + s.sesionId + '\')">' +
              '<span class="pl-uni-ses-tit">' + esc(s.titulo || 'Sin título') + '</span>' +
              (info.length ? '<span class="pl-uni-ses-info">' + esc(info.join(' · ')) + '</span>' : '') +
            '</button>' +
          '</div>';
        }).join('')
      : '<div class="planner-vacio">Sin sesiones todavía.</div>';
    // Abierta si el profe la desplegó o si contiene la sesión en edición (PC).
    var abierta = !!plUniAbiertas_()[u.unidadId] ||
      (sesUnidadSel && ses.some(function (s) { return s.sesionId === sesUnidadSel; }));
    return '<div class="pl-uni-card' + (abierta ? '' : ' plegada') + '" id="pl-uni-' + u.unidadId + '">' +
      '<div class="pl-uni-head">' +
        '<button type="button" class="pl-uni-tog" onclick="App.togglePlanUnidad(\'' + u.unidadId + '\')">' +
          '<span class="pl-uni-flecha">' + svgUI('chevron') + '</span>' +
          '<h3>' + esc(u.nombre) + '</h3>' +
          '<span class="pl-uni-meta">' + ses.length + ' sesión(es)</span>' +
        '</button>' +
        '<span class="pl-uni-acc">' +
          '<button class="btn btn-icono" title="Editar" onclick="App.editarPlanUnidadUI(\'' + u.unidadId + '\')">' +
            svgUI('lapiz') + '</button>' +
          '<button class="btn peligro btn-icono" title="Eliminar" onclick="App.eliminarPlanUnidadUI(\'' + u.unidadId + '\')">' +
            svgUI('papelera') + '</button>' +
        '</span></div>' +
      '<div class="pl-uni-cuerpo">' +
        (chips ? '<div class="pl-uni-crits"><span class="etq">Criterios programados ' + cobertura +
          '</span>' + chips + '</div>' : '') +
        '<div class="pl-uni-sesiones">' + filas + '</div>' +
        '<button class="btn pl-uni-add" onclick="App.nuevaSesionEnUnidad(\'' + u.unidadId + '\')">' +
          '+ Nueva sesión</button>' +
      '</div>' +
    '</div>';
  }

  /** Nueva sesión ya colgada de esta unidad (panel en PC, modal en móvil). */
  function nuevaSesionEnUnidad(unidadId) {
    if (plannerConPanel_()) {
      autoguardarSesion_();
      // La sesión se crea YA (aparece en la lista al momento) con las clases del
      // curso premarcadas y su fecha sugerida; el panel queda editándola.
      var pre = preseleccionEvals_({ unidadId: unidadId, asignaciones: [] });
      var asignaciones = Object.keys(pre).map(function (evalId) {
        return { evalId: evalId, fecha: fechaSugerida_(evalId, unidadId),
          estado: 'pendiente', observaciones: '' };
      });
      var payload = { titulo: 'Sin título', tipo: 'clase', descripcion: '', criterios: [],
        asignaciones: asignaciones, unidadId: unidadId, paginas: '', deberes: '' };
      var tmpId = 'tmp_' + (++sesionTmpSeq);
      sesionesCache = (sesionesCache || []).concat([{
        sesionId: tmpId, titulo: payload.titulo, tipo: 'clase', descripcion: '',
        criterios: [], asignaciones: asignaciones, unidadId: unidadId,
        paginas: '', deberes: '', creado: new Date().toISOString(), orden: 1e9
      }]);
      sesUnidadSel = tmpId; panelNuevoUid = '';
      llamarConFallo_('crearSesion', [payload],
        function (r) { reconciliarCreacion_(tmpId, r, payload); },
        function (err) {
          sesionesCache = (sesionesCache || []).filter(function (x) { return x.sesionId !== tmpId; });
          if (sesUnidadSel === tmpId) sesUnidadSel = '';
          pintarPlanner();
          aviso('No se pudo crear la sesión: ' + err);
        });
      pintarPlanner();
      var t = document.getElementById('ses-titulo'); // foco directo para escribir
      if (t) { t.focus(); t.select(); }
      return;
    }
    abrirModalSesion_('Crear', null,
      { titulo: '', descripcion: '', criterios: [], asignaciones: [], unidadId: unidadId, tipo: 'clase' });
  }

  /** Forma canónica de una sesión para comparar/sincronizar con el servidor. */
  function payloadDeSesion_(s) {
    return { titulo: s.titulo || '', tipo: s.tipo || 'clase', descripcion: s.descripcion || '',
      criterios: (s.criterios || []).slice(), asignaciones: s.asignaciones || [],
      unidadId: s.unidadId || '', paginas: '', deberes: '' };
  }
  /**
   * La creación confirma: el tmp pasa al id real CONSERVANDO lo que se haya
   * editado en local mientras viajaba; si difiere de lo enviado, se sincroniza
   * el servidor con una edición silenciosa (nada se pierde por ir deprisa).
   */
  function reconciliarCreacion_(tmpId, r, payloadOriginal) {
    var local = (sesionesCache || []).filter(function (x) { return x.sesionId === tmpId; })[0];
    if (!local) { actualizarSesionCache_(r); finReordenDiferido_(tmpId, r.sesionId); return; }
    local.sesionId = r.sesionId;
    local.creado = r.creado;
    local.orden = r.orden;
    if (sesUnidadSel === tmpId) sesUnidadSel = r.sesionId;
    if (editorSesionCtx && editorSesionCtx.id === tmpId) editorSesionCtx.id = r.sesionId;
    var p = payloadDeSesion_(local);
    if (JSON.stringify(p) !== JSON.stringify(payloadDeSesion_(payloadOriginal))) {
      // Persistir la edición ANTES del reorden diferido (ambos tocan las
      // asignaciones; encadenado para que no se pisen).
      llamarSilencioso('editarSesion', [r.sesionId, p], function () {
        finReordenDiferido_(tmpId, r.sesionId);
      });
    } else {
      finReordenDiferido_(tmpId, r.sesionId);
    }
  }

  var reordenPendiente = null; // ids de un reorden que espera a que confirme un tmp

  /** Siguiente fecha que le toca a la clase: por horario o el siguiente lectivo. */
  function siguienteFechaClaseCli_(iso, dias) {
    var p = iso.split('-'), d = new Date(+p[0], +p[1] - 1, +p[2]), lim = 0;
    do {
      d.setDate(d.getDate() + 1);
      var it = isoLocal_(d);
      if (esLectivo_(it) && (!dias.length || dias.indexOf(diaSemanaIso_(it)) >= 0)) return it;
    } while (++lim < 400);
    return iso;
  }
  /**
   * Recalcula, por clase, las fechas sobre la nueva secuencia (igual que el
   * servidor): ancladas en la más temprana, las siguientes por horario o
   * siguiente día lectivo. Optimista: el resultado se ve ya, sin esperar al
   * servidor y sin «salto» cuando este responde.
   */
  function repartirFechasUnidad_(sesiones) {
    var horarios = {}, ancla = {};
    sesiones.forEach(function (s) {
      (s.asignaciones || []).forEach(function (a) {
        if (!a.evalId || !a.fecha) return;
        if (!(a.evalId in horarios)) {
          var c = clasePlannerDe_(a.evalId);
          horarios[a.evalId] = ((c && c.horario) || []).map(function (h) { return h.dia; });
        }
        if (!ancla[a.evalId] || a.fecha < ancla[a.evalId]) ancla[a.evalId] = a.fecha;
      });
    });
    var cursor = {};
    sesiones.forEach(function (s) {
      (s.asignaciones || []).forEach(function (a) {
        if (!a.evalId || !a.fecha) return;
        var g = a.evalId;
        a.fecha = (cursor[g] == null) ? ancla[g] : siguienteFechaClaseCli_(cursor[g], horarios[g] || []);
        cursor[g] = a.fecha;
      });
    });
  }

  /** Arrastrar una fila de sesión para reordenar la secuencia de la unidad. */
  function dragSesionUnidad(e) {
    dragInicio(e, '.pl-uni-ses', function (ids) {
      var byId = {};
      (sesionesCache || []).forEach(function (s) { byId[s.sesionId] = s; });
      var sesiones = ids.map(function (id) { return byId[id]; }).filter(Boolean);
      sesiones.forEach(function (s, i) { s.orden = i + 1; }); // renumera 01, 02…
      // Si hay alguna sesión recién creada (id temporal), NO tocamos fechas ni
      // llamamos al servidor: crear y reordenar competirían y descuadran las
      // fechas. Se difiere hasta que la creación confirme (reconciliarCreacion_).
      if (ids.some(function (id) { return String(id).indexOf('tmp_') === 0; })) {
        reordenPendiente = ids.slice();
        pintarPlanner();
        return;
      }
      repartirFechasUnidad_(sesiones); // feedback inmediato (aprox.); el servidor recalcula
      var curso = (estado.cursos && estado.cursos.activo) || '';
      llamarConFallo_('reordenarSesionesUnidad', ['', ids, curso],
        function (r) { if (r) { sesionesCache = r; pintarPlanner(); } },
        function () { recargarSesionesTrasError_('No se pudo reordenar.'); });
      pintarPlanner();
    });
  }
  /** Ejecuta el reorden diferido cuando ya no quedan ids temporales. */
  function finReordenDiferido_(tmpId, realId) {
    if (!reordenPendiente) return;
    reordenPendiente = reordenPendiente.map(function (id) { return id === tmpId ? realId : id; });
    if (reordenPendiente.some(function (id) { return String(id).indexOf('tmp_') === 0; })) return;
    var ids = reordenPendiente; reordenPendiente = null;
    var curso = (estado.cursos && estado.cursos.activo) || '';
    // El servidor recalcula las fechas sobre un estado ya consistente y devuelve la lista.
    llamarSilencioso('reordenarSesionesUnidad', ['', ids, curso], function (r) {
      if (r) { sesionesCache = r; pintarPlanner(); }
    });
  }

  /** Primera fecha asignada de una sesión ('9999' si ninguna), para ordenar. */
  function primeraFecha_(s) {
    var min = '9999';
    (s.asignaciones || []).forEach(function (a) { if (a.fecha && a.fecha < min) min = a.fecha; });
    return min;
  }

  function plannerMatCursoSel(k) {
    autoguardarSesion_();
    // Al cambiar de materia, el panel de detalle vuelve a vacío (no deja abierta
    // la edición de una sesión de otra materia).
    sesUnidadSel = ''; panelNuevoUid = '';
    plannerMatCurso = k; pintarPlanner();
  }

  function nuevaPlanUnidad() {
    var p = (plannerMatCurso || '||').split('||');
    modalPlanUnidad_(null, { nombre: '', area: p[0], curso: p[1] });
  }
  function editarPlanUnidadUI(id) {
    var u = unidadPlanDe_(id);
    if (u) modalPlanUnidad_(id, u);
  }
  function modalPlanUnidad_(id, u) {
    var combos = materiasCursoPlanner_().slice();
    var uKey = matCursoKey_(u.area, u.curso);
    // Asegura que la materia+curso de la propia unidad está entre las opciones.
    if (uKey !== '||' && !combos.some(function (c) { return c.key === uKey; })) {
      combos.push({ area: u.area || '', curso: u.curso || '', key: uKey });
    }
    abrirModal(id ? 'Editar unidad' : 'Nueva unidad de planificación',
      '<label>Nombre<input id="pu-nombre" type="text" placeholder="Ej.: U1 · Los ecosistemas" value="' +
        esc(u.nombre) + '"></label>' +
      '<label>Materia y curso<select id="pu-matcurso">' +
        opcionesMatCurso_(uKey, combos) + '</select></label>',
      id ? 'Guardar' : 'Crear unidad',
      function () {
        var nombre = val('pu-nombre').trim();
        if (!nombre) return aviso('Pon nombre a la unidad.');
        var kk = val('pu-matcurso').split('||'), area = kk[0], curso = kk[1];
        botonModalCargando('Guardando…');
        llamar(id ? 'editarPlanUnidad' : 'crearPlanUnidad',
          id ? [id, nombre, area, curso] : [nombre, area, curso], function (r) {
            if (id) {
              planUnidadesCache = (planUnidadesCache || []).map(function (x) {
                return x.unidadId === id
                  ? { unidadId: id, area: r.area, nombre: r.nombre, curso: r.curso, orden: x.orden } : x;
              });
            } else {
              planUnidadesCache = (planUnidadesCache || []).concat([r]);
            }
            plannerMatCurso = matCursoKey_(area, curso);
            cerrarModal(); pintarPlanner(); avisoOk(id ? 'Unidad guardada.' : 'Unidad creada.');
          });
      }, { sinFoco: !!id });
  }
  function eliminarPlanUnidadUI(id) {
    var u = unidadPlanDe_(id);
    confirmar('Eliminar unidad',
      'Se eliminará «' + ((u && u.nombre) || '') + '». Sus sesiones se conservan, pero quedan ' +
      'sin unidad. ¿Continuar?',
      'Eliminar', function () {
        llamar('eliminarPlanUnidad', [id], function () {
          planUnidadesCache = (planUnidadesCache || []).filter(function (x) { return x.unidadId !== id; });
          // Las sesiones que la usaban quedan sin unidad (reflejo local).
          (sesionesCache || []).forEach(function (s) { if (s.unidadId === id) s.unidadId = ''; });
          pintarPlanner(); avisoOk('Unidad eliminada.');
        });
      });
  }

  /** Una línea de sesión: estado (clicable), contenido y acciones. */
  function lineaSesion_(en, conFecha) {
    var s = en.ses, a = en.asig;
    var ESTADO_TXT = { pendiente: 'Pendiente', hecha: 'Hecha', aplazada: 'Aplazada' };
    var estadoBtn = a
      ? '<button class="planner-estado ' + a.estado + '" title="Cambiar estado" ' +
          'onclick="App.estadoSesionUI(\'' + s.sesionId + '\',\'' + a.evalId + '\')">' +
          ESTADO_TXT[a.estado] + '</button>'
      : '<span class="planner-estado borrador">Borrador</span>';
    var tipo = s.tipo || 'clase';
    var meta = [];
    if (a && a.evalId) meta.push(esc(etiquetaClase_(a.evalId)));
    else if (tipo !== 'clase') meta.push(tipo === 'evento' ? 'Evento' : 'Aviso');
    if (conFecha && a && a.fecha) meta.push(fechaCorta_(a.fecha));
    if ((s.criterios || []).length) meta.push(s.criterios.join(', '));
    var obs = (a && a.observaciones)
      ? '<span class="planner-sesion-obs">' + svgUI('lapiz') + ' ' + esc(a.observaciones) + '</span>'
      : '';
    // Arrastrable desde el grip: soltar en un día de la semana la programa.
    var arr = (tipo !== 'aviso')
      ? ' ondragstart="App.dragSesionIni(event,\'' + s.sesionId + '\',\'' +
        ((a && a.evalId) || '') + '\')" ondragend="App.dragSesionFin(event)"'
      : '';
    var grip = (tipo !== 'aviso')
      ? '<span class="pl-chip-grip planner-sesion-grip" title="Arrastrar a un día" ' +
        'onpointerdown="App.gripSesionDown(event)">⠿</span>'
      : '';
    return '<div class="planner-sesion' + (a && a.estado === 'hecha' ? ' hecha' : '') + '"' + arr + '>' +
      grip +
      estadoBtn +
      '<div class="planner-sesion-txt">' +
        '<span class="planner-sesion-tit">' + esc(s.titulo) + '</span>' +
        (meta.length ? '<span class="planner-sesion-meta">' + meta.join(' · ') + '</span>' : '') +
        obs +
      '</div>' +
      '<span class="planner-sesion-acc">' +
        '<button class="btn btn-icono" title="Editar" onclick="App.editarSesionUI(\'' +
          s.sesionId + '\')">' + svgUI('lapiz') + '</button>' +
        '<button class="btn btn-icono" title="Duplicar (para reutilizarla en otras clases o fechas)" ' +
          'onclick="App.duplicarSesionUI(\'' + s.sesionId + '\')">' + svgUI('duplicar') + '</button>' +
        '<button class="btn peligro btn-icono" title="Eliminar" onclick="App.eliminarSesionUI(\'' +
          s.sesionId + '\')">' + svgUI('papelera') + '</button>' +
      '</span>' +
    '</div>';
  }

  // ---------- estado por asignación ----------
  function estadoSesionUI(sesionId, evalId) {
    var s = (sesionesCache || []).filter(function (x) { return x.sesionId === sesionId; })[0];
    var a = s && (s.asignaciones || []).filter(function (x) { return x.evalId === evalId; })[0];
    if (!a) return;
    var CICLO = { pendiente: 'hecha', hecha: 'aplazada', aplazada: 'pendiente' };
    var nuevo = CICLO[a.estado] || 'hecha';
    a.estado = nuevo; // optimista: se repinta ya y se persiste detrás
    pintarPlanner();
    // Sesión aún sin confirmar del servidor (id temporal): solo local; su estado
    // ya viaja en la creación en curso.
    if (String(sesionId).indexOf('tmp_') === 0) return;
    llamar('estadoSesion', [sesionId, evalId, nuevo, null], function (r) {
      actualizarSesionCache_(r);
    });
  }

  /** Adelanta (+1) o retrasa (-1) la sesión un día lectivo, con cascada. */
  function desplazarSesionUI(sesionId, dir) {
    var s0 = (sesionesCache || []).filter(function (x) { return x.sesionId === sesionId; })[0];
    var tieneFecha = s0 && (s0.asignaciones || []).some(function (a) { return a.evalId && a.fecha; });
    if (!tieneFecha) return aviso('Primero ponle una fecha a la sesión en algún grupo.');
    var curso = (estado.cursos && estado.cursos.activo) || '';
    var btns = document.querySelectorAll('#ses-reprog button');
    [].forEach.call(btns, function (b) { b.disabled = true; });
    llamarConFallo_('desplazarSesion', [sesionId, dir, curso],
      function (r) {
        if (r) sesionesCache = r;
        var s = (sesionesCache || []).filter(function (x) { return x.sesionId === sesionId; })[0];
        var modalAbierto = !document.getElementById('modal-fondo').hidden;
        // Repinta ya el calendario/panel de fondo con las fechas nuevas.
        pintarPlanner();
        if (modalAbierto && s) {
          // Además refresca las fechas del editor abierto sin re-renderizarlo.
          (s.asignaciones || []).forEach(function (a) {
            var f = document.querySelector('.planner-asig-fecha[data-eval="' + a.evalId + '"]');
            if (f) f.value = a.fecha || '';
          });
          [].forEach.call(btns, function (b) { b.disabled = false; });
        }
        avisoOk(dir > 0 ? 'Sesión retrasada.' : 'Sesión adelantada.');
      },
      function (err) {
        [].forEach.call(btns, function (b) { b.disabled = false; });
        aviso('No se pudo reprogramar: ' + err);
      });
  }

  // ---------- arrastrar sesiones entre días/clases (vista Semana por grupo) ----------
  var arrastreSesion = null; // { sesionId, evalId } de la sesión en curso

  /** El arrastre solo arranca desde el grip (6 puntitos): lo activamos al pulsarlo. */
  function gripSesionDown(ev) {
    ev.stopPropagation();
    var el = ev.currentTarget.closest('.pl-chip, .pl-mes-chip, .planner-sesion');
    if (el) el.setAttribute('draggable', 'true');
  }
  function dragSesionIni(ev, sesionId, evalId) {
    arrastreSesion = { sesionId: sesionId, evalId: evalId || '' };
    try {
      ev.dataTransfer.effectAllowed = 'move';
      ev.dataTransfer.setData('text/plain', sesionId);
    } catch (e) {}
    if (ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.add('pl-chip-arrastrando');
  }
  function dragSesionFin(ev) {
    arrastreSesion = null;
    if (ev && ev.currentTarget) {
      ev.currentTarget.classList.remove('pl-chip-arrastrando');
      ev.currentTarget.setAttribute('draggable', 'false');
    }
    [].forEach.call(document.querySelectorAll('.pl-drop-ok'), function (el) {
      el.classList.remove('pl-drop-ok');
    });
  }
  function dragSesionSobre(ev) {
    if (!arrastreSesion) return;
    ev.preventDefault();
    try { ev.dataTransfer.dropEffect = 'move'; } catch (e) {}
    if (ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.add('pl-drop-ok');
  }
  function dragSesionFuera(ev) {
    if (ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.remove('pl-drop-ok');
  }
  function dragSesionSuelta(ev, evalIdDest, iso) {
    ev.preventDefault();
    if (ev.currentTarget && ev.currentTarget.classList) ev.currentTarget.classList.remove('pl-drop-ok');
    if (!arrastreSesion) return;
    var a = arrastreSesion; arrastreSesion = null;
    // '@keep' = destino sin grupo propio (mes, columna por horario): se conserva
    // la clase de origen y solo cambia la fecha.
    var dest = (evalIdDest === '@keep') ? a.evalId : (evalIdDest || '');
    moverSesionA_(a.sesionId, a.evalId, dest, iso);
  }
  /** Mueve una asignación en el cliente (optimista) y lo persiste detrás. */
  function moverSesionA_(sesionId, evalIdOrig, evalIdDest, iso) {
    var s = (sesionesCache || []).filter(function (x) { return x.sesionId === sesionId; })[0];
    if (!s) return;
    var asigs = s.asignaciones || (s.asignaciones = []);
    var found = null;
    for (var i = 0; i < asigs.length; i++) {
      if (String(asigs[i].evalId || '') === String(evalIdOrig || '')) { found = asigs[i]; break; }
    }
    // Sin cambios: mismo grupo y misma fecha.
    if (found && String(found.evalId || '') === String(evalIdDest || '') && found.fecha === iso) return;
    if (found) { found.evalId = evalIdDest; found.fecha = iso; }
    else { found = { evalId: evalIdDest, fecha: iso, estado: 'pendiente', observaciones: '' }; asigs.push(found); }
    // Funde duplicados por evalId: la asignación movida gana sobre la que hubiera.
    var byEval = {};
    asigs.forEach(function (x) { if (x !== found) byEval[String(x.evalId || '')] = x; });
    byEval[String(evalIdDest || '')] = found;
    s.asignaciones = Object.keys(byEval).map(function (k) { return byEval[k]; });
    // Persistir ANTES de repintar: si el re-render fallara (p. ej. al cambiar de
    // vista justo tras soltar), el cambio ya viaja al servidor de todos modos.
    if (String(sesionId).indexOf('tmp_') !== 0) {
      llamarConFallo_('moverSesion', [sesionId, evalIdOrig || '', evalIdDest || '', iso],
        function (r) { actualizarSesionCache_(r); },
        function () { recargarSesionesTrasError_('No se pudo mover la sesión.'); });
    }
    pintarPlanner();
  }

  // ---------- crear / editar ----------
  /** evalId y fecha opcionales: los pasa el «+ Planificar» de un hueco del horario. */
  function nuevaSesion(evalId, fecha) {
    abrirModalSesion_('Crear', null,
      { titulo: '', descripcion: '', criterios: [],
        asignaciones: evalId
          ? [{ evalId: evalId, fecha: fecha || '', estado: 'pendiente' }] : [] });
  }

  function editarSesionUI(id) {
    var s = (sesionesCache || []).filter(function (x) { return x.sesionId === id; })[0];
    if (s) abrirModalSesion_('Guardar', id, s);
  }
  /** Editar desde la tarjeta (cabecera o previsualización), salvo si es un enlace. */
  function editarSesionDesde_(ev, id) {
    if (ev && ev.target && ev.target.closest('a')) return; // deja funcionar los enlaces
    if (ev && ev.stopPropagation) ev.stopPropagation(); // la celda de detrás no re-abre
    editarSesionUI(id);
  }

  var sesModalId = null; // id de la sesión abierta en el modal (null = nueva)
  /** Título del modal según el tipo (una sesión no es un aviso). */
  function tituloSesion_(id, tipo) {
    if (tipo === 'evento') return id ? 'Editar evento' : 'Nuevo evento';
    if (tipo === 'aviso') return id ? 'Editar aviso' : 'Nuevo aviso';
    return id ? 'Editar sesión' : 'Nueva sesión';
  }

  var sesionCritSel = {};        // códigos de criterio marcados en el modal abierto
  var criteriosAreaCache = {};   // 'curso||area' -> [{codigo,texto,…}] (cacheado del mapa)
  var editorSesionCtx = null;    // { id, enPanel } del editor de sesión abierto (o null)
  var editorFirmaInicial = '';   // firma del editor al abrirlo, para autoguardar solo si cambió

  /** Firma del contenido actual del editor de sesión (para detectar cambios). */
  function firmaEditorSesion_() {
    if (!document.getElementById('ses-titulo')) return '';
    var p = [];
    p.push(val('ses-titulo') || '');
    p.push(sesTipoElegido_());
    p.push(descEditorValor_());
    var u = document.getElementById('ses-unidad'); p.push(u ? u.value : '');
    var ev = document.getElementById('ses-evento-fecha'); p.push(ev ? ev.value : '');
    p.push(Object.keys(sesionCritSel).sort().join(','));
    var asigs = [];
    [].forEach.call(document.querySelectorAll('.planner-asig-chk'), function (chk) {
      if (!chk.checked) return;
      var id = chk.dataset.eval;
      var f = document.querySelector('.planner-asig-fecha[data-eval="' + id + '"]');
      var o = document.querySelector('.planner-asig-obs[data-eval="' + id + '"]');
      asigs.push(id + '|' + ((f && f.value) || '') + '|' + ((o && o.value) || ''));
    });
    p.push(asigs.sort().join(';'));
    return p.join('||');
  }
  /** ¿Hay un editor de sesión visible ahora mismo? */
  function hayEditorSesion_() { return !!document.getElementById('ses-titulo'); }
  /**
   * Guarda el editor de sesión abierto si cambió algo (al salir: fuera, otra
   * sesión…). Con cfg.pintar repinta el planificador para que la previsualización
   * refleje el cambio ya (al cerrar el modal); en las transiciones del panel se
   * omite porque el flujo que sigue ya repinta.
   */
  function autoguardarSesion_(cfg) {
    if (!editorSesionCtx || !hayEditorSesion_()) return;
    if (firmaEditorSesion_() === editorFirmaInicial) return; // sin cambios: no persiste
    var ctx = editorSesionCtx;
    guardarSesion_(ctx.id, { enPanel: ctx.enPanel, auto: true, silencioso: true,
      noCerrar: true, noPintar: !(cfg && cfg.pintar) });
  }

  // ---------- editor de texto enriquecido (descripción de la sesión) ----------
  var RT_TAGS = { B: 1, STRONG: 1, I: 1, EM: 1, U: 1, A: 1, UL: 1, OL: 1, LI: 1, P: 1, BR: 1 };
  /** Limpia HTML a una lista blanca de etiquetas (negrita, listas, enlaces…). */
  function sanitizarHtml_(html) {
    var doc = new DOMParser().parseFromString(String(html || ''), 'text/html');
    return limpiarNodos_(doc.body);
  }
  function limpiarNodos_(node) {
    var out = '';
    [].forEach.call(node.childNodes, function (n) {
      if (n.nodeType === 3) { out += esc(n.nodeValue); return; }   // texto
      if (n.nodeType !== 1) return;
      var tag = n.tagName;
      if (!RT_TAGS[tag]) { out += limpiarNodos_(n); return; }       // etiqueta no permitida: solo su texto
      if (tag === 'BR') { out += '<br>'; return; }
      if (tag === 'A') {
        var href = n.getAttribute('href') || '';
        if (/^(https?:|mailto:)/i.test(href)) {
          out += '<a href="' + esc(href) + '" target="_blank" rel="noopener">' + limpiarNodos_(n) + '</a>';
        } else { out += limpiarNodos_(n); }
        return;
      }
      out += '<' + tag.toLowerCase() + '>' + limpiarNodos_(n) + '</' + tag.toLowerCase() + '>';
    });
    return out;
  }
  /** Contenido inicial del editor: HTML saneado, o texto plano legado (con saltos). */
  function descInicialHtml_(desc) {
    desc = String(desc || '');
    if (/<[a-z][\s\S]*>/i.test(desc)) return sanitizarHtml_(desc);
    return esc(desc).replace(/\n/g, '<br>');
  }
  /** Texto plano → HTML con las URLs convertidas en enlaces y saltos en <br>. */
  function plainToHtmlConLinks_(text) {
    return esc(text)
      .replace(/(https?:\/\/[^\s<]+)/g, function (u) {
        return '<a href="' + u + '" target="_blank" rel="noopener">' + u + '</a>';
      })
      .replace(/\n/g, '<br>');
  }
  /** Valor actual del editor (HTML saneado) para guardar. */
  function descEditorValor_() {
    var ed = document.getElementById('ses-desc-body');
    return ed ? sanitizarHtml_(ed.innerHTML) : '';
  }
  function rtCmd(cmd) {
    var ed = document.getElementById('ses-desc-body');
    if (ed) ed.focus();
    try { document.execCommand(cmd, false, null); } catch (e) {}
  }
  function rtLink() {
    var ed = document.getElementById('ses-desc-body');
    if (ed) ed.focus();
    var url = prompt('Dirección del enlace (https://…):', 'https://');
    if (!url) return;
    url = url.trim();
    if (!/^(https?:|mailto:)/i.test(url)) url = 'https://' + url;
    try { document.execCommand('createLink', false, url); } catch (e) {}
  }
  /** HTML de la descripción → texto plano (para la exportación en Markdown). */
  function htmlAtexto_(html) {
    html = String(html || '');
    if (!/<[a-z][\s\S]*>/i.test(html)) return html;
    var pre = html.replace(/<li[^>]*>/gi, '\n• ')
      .replace(/<\/(p|div|li)>/gi, '\n').replace(/<br\s*\/?>/gi, '\n');
    var doc = new DOMParser().parseFromString(pre, 'text/html');
    return (doc.body.textContent || '').replace(/\n{3,}/g, '\n\n').replace(/^\n+|\n+$/g, '');
  }

  /** Opciones del selector de unidad de planificación (agrupadas por materia+curso). */
  function opcionesUnidadesPlan_(sel) {
    var porGrupo = {};
    (planUnidadesCache || []).forEach(function (u) {
      var k = matCursoKey_(u.area, u.curso);
      (porGrupo[k] = porGrupo[k] || []).push(u);
    });
    var html = '<option value="">— Sin unidad —</option>';
    Object.keys(porGrupo).sort().forEach(function (k) {
      var p = k.split('||');
      html += '<optgroup label="' + esc(etqMatCurso_(p[0], p[1])) + '">' +
        porGrupo[k].map(function (u) {
          return '<option value="' + u.unidadId + '"' + (u.unidadId === sel ? ' selected' : '') + '>' +
            esc(u.nombre) + '</option>';

  }

  /** Selector de Tipo (segmentado compacto) para la barra de título del editor.
      Solo Sesión y Evento (excursiones, talleres…); los avisos antiguos se
      siguen mostrando, pero ya no se crean nuevos. */
  function tipoSelectorHtml_(tipoActual) {
    var tipos = tipoActual === 'aviso' ? ['clase', 'evento', 'aviso'] : ['clase', 'evento'];
    return '<span class="ses-tipo-seg">' +
      tipos.map(function (t) {

        return '<label class="ses-tipo-opt' + (t === tipoActual ? ' activo' : '') + '">' +

      }).join('') + '</span>';
