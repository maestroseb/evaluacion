<style>
  /* La fuente se carga con <link> desde ui.html (más rápido que @import). */

  :root {
    --acento: #5b5bd6;        /* índigo Linear-ish */
    --acento-fuerte: #4a4ac4;
    --acento-suave: #eef0ff;
    --bg: #f6f7fb;
    --surface: #ffffff;
    --borde: #e9eaee;
    --borde-fuerte: #dcdee3;
    --texto: #1c1e24;
    --texto-2: #6b7280;
    --texto-3: #9aa0ab;
    --peligro: #d1453b;
    --peligro-bg: #fdeceb;
    --ok: #2e7d57;
    --radio: 12px;
    --sombra-1: 0 1px 2px rgba(16,18,24,.04), 0 1px 3px rgba(16,18,24,.06);
    --sombra-2: 0 4px 16px rgba(16,18,24,.08);
    --sombra-3: 0 10px 30px rgba(16,18,24,.10);
    /* Escala de notas tipo semáforo (como el mockup) */
    --g-top-bg: #d6f3e3;   --g-top-tx: #14653f;
    --g-alta-bg: #e3f6dd;  --g-alta-tx: #2e6b1f;
    --g-media-bg: #fdf4d3; --g-media-tx: #8a6d10;
    --g-baja-bg: #fde7cf;  --g-baja-tx: #9a5410;
    --g-susp-bg: #fbdcd6;  --g-susp-tx: #b23227;
    /* Sidebar */
    --lat-ancho: 248px;
    --lat-ancho-min: 72px;
    --topbar-alto: 60px;
  }

  * { box-sizing: border-box; }
  [hidden] { display: none !important; }

  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    font-feature-settings: 'cv02','cv03','cv04','ss01';
    color: var(--texto);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  /* ===================================================================
     SHELL: sidebar + área principal
     =================================================================== */
  .app-shell { display: flex; height: 100vh; overflow: hidden; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: var(--lat-ancho); flex: 0 0 var(--lat-ancho);
    background: var(--surface); border-right: 1px solid var(--borde);
    display: flex; flex-direction: column; gap: 4px;
    padding: 14px 12px; position: sticky; top: 0; height: 100vh;
    transition: width .18s ease, flex-basis .18s ease;
    z-index: 40;
  }
  .sidebar.colapsada { width: var(--lat-ancho-min); flex-basis: var(--lat-ancho-min); }

  .sidebar-head { display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px 10px; }
  .marca { display: flex; align-items: center; gap: 10px; cursor: pointer; min-width: 0; }
  .marca-icono {
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center; font-size: 18px;
    background: linear-gradient(135deg, var(--acento), #059669); color: #fff;
    box-shadow: var(--sombra-1);
  }
  /* Logotipo tipográfico (sidebar y topbar móvil): Outfit 800 con un único
     degradado que recorre toda la palabra, del índigo del acento (--acento) al
     verde "Andalucía", igual que el icono. decorarMarca() sigue envolviendo la
     última sílaba en .marca-acento, pero aquí esa parte es transparente para
     que el degradado del contenedor fluya sin cortes por todo el nombre. */
  .marca-txt { font-family: 'Outfit', 'Inter', sans-serif; font-weight: 800;
    font-size: 24px; letter-spacing: -.02em;
    white-space: nowrap; overflow: hidden;
    background: linear-gradient(90deg, var(--acento) 0%, #059669 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .marca-acento { color: transparent; }

  .perfil {
    display: flex; align-items: center; gap: 10px; padding: 8px;
    margin: 2px 2px 8px; border-radius: 10px; background: var(--bg);
  }
  .perfil .avatar {
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, var(--acento), #8a8af2);
  }
  .perfil-info { display: flex; flex-direction: column; min-width: 0; }
  .perfil-nombre { font-size: 13px; font-weight: 600; color: var(--texto);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .perfil-rol { font-size: 11px; color: var(--texto-3);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .menu-lat { display: flex; flex-direction: column; gap: 3px; }
  .menu-lat-pie { margin-top: auto; padding-top: 8px; border-top: 1px solid var(--borde); }
  .item-lat {
    display: flex; align-items: center; gap: 12px; padding: 9px 11px; border-radius: 9px;
    color: var(--texto-2); cursor: pointer; font-size: 14px; font-weight: 550;
    white-space: nowrap; transition: background .12s, color .12s; user-select: none;
  }
  .item-lat:hover { background: var(--bg); color: var(--texto); }
  .item-lat.activo { background: var(--acento-suave); color: var(--acento-fuerte); }
  .item-lat.activo .item-ico { transform: none; }
  .item-ico { width: 22px; flex: 0 0 22px; text-align: center; font-size: 17px; line-height: 1; }
  .item-txt { overflow: hidden; }

  /* Estado colapsado: solo iconos */
  .sidebar.colapsada .marca-txt,
  .sidebar.colapsada .perfil-info,
  .sidebar.colapsada .item-txt { display: none; }
  .sidebar.colapsada .sidebar-head { justify-content: center; }
  .sidebar.colapsada .perfil { justify-content: center; }
  .sidebar.colapsada .item-lat { justify-content: center; padding: 10px; }

  /* ---------- Área principal ---------- */
  .area-principal { flex: 1 1 auto; min-width: 0; height: 100vh;
    display: flex; flex-direction: column; }

  .topbar {
    height: var(--topbar-alto); flex: 0 0 var(--topbar-alto);
    display: flex; align-items: center; gap: 14px; padding: 0 22px;
    background: rgba(255,255,255,.82); backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 30;
  }
  .hamburguesa { display: none; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer;
    font-size: 19px; color: var(--texto-2); padding: 6px 8px; border-radius: 8px; }
  .hamburguesa:hover { background: var(--bg); color: var(--texto); }
  .topbar-titulo { font-size: 17px; font-weight: 650; letter-spacing: -.02em; margin: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .buscador { margin-left: auto; position: relative; display: flex; align-items: center;
    width: min(340px, 42vw); }
  .buscador-ico { position: absolute; left: 12px; font-size: 13px; color: var(--texto-3);
    pointer-events: none; }
  .buscador input {
    width: 100%; padding: 9px 12px 9px 34px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--borde-fuerte); border-radius: 10px; background: var(--surface);
    color: var(--texto); transition: border-color .12s, box-shadow .12s;
  }
  .buscador input:focus { outline: none; border-color: var(--acento);
    box-shadow: 0 0 0 3px var(--acento-suave); }
  /* Lupa que colapsa el buscador (solo móvil; en escritorio se oculta). */
  .buscador-toggle { display: none; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer; color: var(--texto-2);
    padding: 6px 8px; border-radius: 8px; margin-left: auto; }
  .buscador-toggle:hover { background: var(--bg); color: var(--texto); }
  .buscador-toggle .ico-cerrar { display: none; }
  /* El curso académico no aplica en Rúbricas ni Papelera (una rúbrica se
     reutiliza entre cursos): se oculta el selector en ambas plataformas. */
  .topbar.sin-curso > .curso-chip,
  .topbar.sin-curso > .curso-editar { display: none; }

  /* Marca de la app en la barra superior: solo se ve en móvil (en escritorio
     la marca vive en la barra lateral). Misma tipografía de logo que .marca-txt. */
  .topbar-marca { display: none; font-family: 'Outfit', 'Inter', sans-serif;
    font-weight: 800; font-size: 23px; letter-spacing: -.02em;
    white-space: nowrap;
    background: linear-gradient(90deg, var(--acento) 0%, #059669 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent; }

  /* Selector de curso académico en la barra superior */
  .curso-chip { display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px 5px 11px; border: 1px solid var(--borde-fuerte); border-radius: 999px;
    background: var(--surface); cursor: pointer; transition: border-color .12s, box-shadow .12s; }
  .curso-chip:focus-within { border-color: var(--acento); box-shadow: 0 0 0 3px var(--acento-suave); }
  .curso-chip-ico { font-size: 13px; line-height: 1; }
  .curso-chip select { border: none; background: transparent; font-family: inherit;
    font-size: 13px; font-weight: 600; color: var(--texto); cursor: pointer;
    padding: 0 2px; margin: 0; outline: none; }
  /* Botón «Editar curso», junto al selector en la barra superior. */
  .curso-editar { display: inline-flex; align-items: center; justify-content: center;
    padding: 7px 9px; }
  .curso-editar .svg-ico { width: 15px; height: 15px; }
  .acciones-seccion { display: flex; align-items: center; gap: 10px; }

  /* Velo para sidebar en móvil */
  .velo { display: none; position: fixed; inset: 0; background: rgba(20,22,28,.4);
    z-index: 39; }

  /* Barra de pestañas inferior (solo móvil) */
  .tabbar { display: none; }
  .tab { display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; flex: 1 1 0; padding: 7px 2px; border-radius: 12px; cursor: pointer;
    color: var(--texto-3); font-size: 11px; font-weight: 600; text-decoration: none;
    text-align: center; user-select: none; transition: color .12s, background .12s; }
  .tab .tab-ico { font-size: 20px; line-height: 1; }
  .tab.activo { color: var(--acento-fuerte); }
  .tab.activo .tab-ico { transform: translateY(-1px); }
  .tab:active { background: var(--bg); }

  main { flex: 1 1 auto; min-height: 0; padding: 22px 24px 28px; overflow: auto; }
  .aviso { padding: 56px; text-align: center; color: var(--texto-3); font-size: 14px; }

  .cabecera-seccion {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px 16px; flex-wrap: wrap;
  }
  h1 { font-size: 23px; font-weight: 700; letter-spacing: -.025em; margin: 0; }
  main section > p.meta { margin: 2px 0 16px; }
  h2 { font-size: 16px; font-weight: 600; letter-spacing: -.01em; margin: 0; }

  /* ---------- Tarjetas ---------- */
  .tarjetas { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); }
  .tarjeta {
    background: var(--surface); border: 1px solid var(--borde); border-radius: var(--radio);
    padding: 18px; cursor: pointer; box-shadow: var(--sombra-1);
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s;
  }
  .tarjeta:hover { transform: translateY(-3px); box-shadow: var(--sombra-3); border-color: var(--borde-fuerte); }
  .tarjeta h3 { margin: 0 0 8px; font-size: 15px; font-weight: 650; letter-spacing: -.01em; }
  .tarjeta .meta { color: var(--texto-2); font-size: 13px; line-height: 1.5; }
  .tarjeta-color { border-left: 4px solid transparent; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px var(--borde); transition: transform .1s; }
  .swatch:hover { transform: scale(1.1); }
  .swatch.sel { box-shadow: inset 0 0 0 2px #fff, 0 0 0 2px var(--texto); }
  /* Tarjeta de unidad: baldosa en rejilla, todo en una fila alineada:
     asa ⠿ · número LCD · título · acciones. Se reordena arrastrando por el asa. */
  .tarjeta-unidad { display: flex; align-items: center; gap: 12px; padding: 15px 16px;
    position: relative; }
  .tarjeta-unidad.arrastrando { z-index: 5; opacity: .97; cursor: grabbing;
    box-shadow: 0 14px 30px rgba(16,18,24,.20); border-color: var(--borde-fuerte);
    transition: none; }
  body.reordenando { user-select: none; cursor: grabbing; }
  .u-grip { flex: 0 0 auto; cursor: grab; color: var(--texto-3); font-size: 14px; line-height: 1;
    padding: 2px 3px; border-radius: 6px; touch-action: none; user-select: none; }
  .u-grip:hover { background: var(--bg); color: var(--texto-2); }
  .u-grip:active { cursor: grabbing; }
  /* Número de la unidad en monoespaciado (Roboto Mono) sobre fondo gris claro;
     los dígitos toman el color de la clase (por style inline). */
  .u-num {
    flex: 0 0 auto; min-width: 42px; height: 32px; padding: 0 9px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #eef0f4; color: var(--acento);
    font-family: 'Roboto Mono', ui-monospace, 'Courier New', monospace;
    font-size: 16px; font-weight: 700; letter-spacing: .5px;
  }
  /* Título de la unidad. Se escoge con más especificidad que ".tarjeta h3"
     (que tenía margin-bottom) para que quede centrado verticalmente. */
  .tarjeta-unidad .u-nom { flex: 1 1 auto; min-width: 0; margin: 0; font-size: 15px;
    font-weight: 600; line-height: 1.2; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  /* Acciones a la derecha; aparecen al pasar el ratón (absolutas, no roban ancho
     al título) y siempre visibles en táctil. */
  .acciones-tarjeta {
    position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
    display: flex; gap: 6px; opacity: 0; transition: opacity .12s;
    padding-left: 30px;
    background: linear-gradient(90deg, rgba(255,255,255,0), var(--surface) 42%);
  }
  .tarjeta-unidad:hover .acciones-tarjeta { opacity: 1; }
  @media (hover: none) { .acciones-tarjeta { opacity: 1; } }
  .icono {
    border: 1px solid var(--borde); background: var(--surface); border-radius: 7px;
    width: 28px; height: 28px; cursor: pointer; font-size: 13px; line-height: 1;
    color: var(--texto-2); display: inline-flex; align-items: center; justify-content: center;
    box-shadow: var(--sombra-1); transition: background .12s, color .12s, border-color .12s;
  }
  .icono:hover { background: var(--bg); color: var(--texto); }
  .icono.peligro:hover { background: var(--peligro-bg); color: var(--peligro); border-color: #f3c6c2; }
  .vacio {
    grid-column: 1 / -1; color: var(--texto-3); padding: 48px 24px; text-align: center;
    font-size: 14px; background: var(--surface); border: 1px dashed var(--borde-fuerte);
    border-radius: var(--radio);
  }

  /* ---------- Tarjeta de clase (con cabecera de color e icono) ---------- */
  .clase-card {
    position: relative;
    display: flex; flex-direction: column; overflow: hidden; cursor: pointer;
    background: var(--surface); border: 1px solid var(--borde); border-radius: var(--radio);
    box-shadow: var(--sombra-1);
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s;
  }
  .clase-card:hover { transform: translateY(-3px); box-shadow: var(--sombra-3); border-color: var(--borde-fuerte); }
  .clase-card.arrastrando { z-index: 5; opacity: .97; cursor: grabbing;
    box-shadow: 0 14px 30px rgba(16,18,24,.20); transition: none; }
  /* Asa de reordenar en la cabecera de color de la tarjeta. */
  .cc-grip { position: absolute; top: 8px; right: 10px; z-index: 1;
    color: rgba(255,255,255,.7); cursor: grab; font-size: 13px; line-height: 1;
    padding: 2px 5px; border-radius: 6px; touch-action: none; user-select: none;
    transition: color .12s, background .12s; }
  .cc-grip:hover { color: #fff; background: rgba(255,255,255,.18); }
  .cc-grip:active { cursor: grabbing; }
  .clase-card-head {
    display: flex; align-items: center; gap: 12px; padding: 15px 16px;
    background: var(--c, var(--acento)); color: #fff;
  }
  .clase-card-ico {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,.22);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .clase-card-ico svg { width: 23px; height: 23px; stroke: #fff; fill: none; }
  .clase-card-head h3 { margin: 0; font-size: 15.5px; font-weight: 650; color: #fff;
    letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clase-card-body { flex: 1 1 auto; padding: 14px 16px 16px;
    display: flex; flex-direction: column; gap: 5px; }
  .cc-meta { font-size: 13px; color: var(--texto-2); }
  .cc-meta b { color: var(--texto); font-weight: 600; }

  /* ---------- Tarjeta de grupo (horizontal y clara; ≠ tarjeta de clase) ---------- */
  .grupo-card {
    position: relative; display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; cursor: pointer;
    background: var(--surface); border: 1px solid var(--borde);
    border-left: 5px solid var(--c, var(--acento));
    border-radius: var(--radio); box-shadow: var(--sombra-1);
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s;
  }
  .grupo-card:hover { transform: translateY(-2px); box-shadow: var(--sombra-3);
    border-color: var(--borde-fuerte); border-left-color: var(--c, var(--acento)); }
  .grupo-card.arrastrando { z-index: 5; opacity: .97; cursor: grabbing;
    box-shadow: 0 14px 30px rgba(16,18,24,.20); transition: none; }
  .gc-avatar { flex: 0 0 auto; width: 38px; height: 38px; border-radius: 50%;
    background: var(--c, var(--acento)); color: #fff;
    display: inline-flex; align-items: center; justify-content: center; }
  .gc-avatar svg { width: 20px; height: 20px; stroke: #fff; fill: none; }
  .gc-info { flex: 1 1 auto; min-width: 0; }
  .gc-info h3 { margin: 0; font-size: 15px; font-weight: 650; letter-spacing: -.01em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gc-meta { font-size: 12.5px; color: var(--texto-3); }
  /* El asa en línea (no flotando sobre cabecera de color como en clase-card). */
  .gc-grip { position: static; color: var(--texto-3); }
  .gc-grip:hover { color: var(--texto); background: var(--bg); }
  /* ---------- Archivados: sección plegable al pie, tarjetas atenuadas ---------- */
  .bloque-archivados { margin-top: 30px; }
  .bloque-archivados summary { cursor: pointer; user-select: none; display: inline-flex;
    align-items: center; gap: 8px; font-size: 12.5px; font-weight: 600;
    color: var(--texto-3); text-transform: uppercase; letter-spacing: .07em;
    padding: 4px 2px; }
  .bloque-archivados summary:hover { color: var(--texto-2); }
  .bloque-archivados summary .svg-ico { width: 15px; height: 15px; }
  .bloque-archivados > .tarjetas { margin-top: 12px; }
  .grupo-card.archivada, .clase-card.archivada { opacity: .8; filter: grayscale(.45); }
  .grupo-card.archivada:hover, .clase-card.archivada:hover { opacity: 1; filter: none; }
  .btn-restaurar { display: inline-flex; align-items: center; gap: 6px; flex: 0 0 auto;
    font-size: 12px; padding: 6px 10px; }
  .btn-restaurar .svg-ico { width: 13px; height: 13px; }
  /* En la tarjeta de clase (cabecera de color), el botón va sobre el color. */
  .clase-card .btn-restaurar { position: absolute; top: 8px; right: 10px; z-index: 1; }
  /* Título de cada sección de curso en Mis grupos. */
  .seccion-curso { margin: 24px 0 10px; font-size: 12.5px; font-weight: 600;
    color: var(--texto-3); text-transform: uppercase; letter-spacing: .07em; }
  #lista-clases > .seccion-curso:first-child { margin-top: 0; }

  /* ---------- Selector de iconos (modal) ---------- */
  .iconos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
    gap: 8px; max-height: 176px; overflow: auto; padding: 2px; }
  .icono-opt {
    display: inline-flex; align-items: center; justify-content: center; padding: 9px;
    border: 1px solid var(--borde-fuerte); border-radius: 10px; background: var(--surface);
    color: var(--texto-2); cursor: pointer;
    transition: background .12s, color .12s, border-color .12s, box-shadow .12s;
  }
  .icono-opt svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }
  .icono-opt:hover { background: var(--bg); color: var(--texto); }
  .icono-opt.sel { border-color: var(--acento); color: var(--acento-fuerte);
    background: var(--acento-suave); box-shadow: 0 0 0 2px var(--acento-suave); }

  /* ---------- Iconos SVG de interfaz (sustituyen a los emojis) ----------
     El trazo y el tamaño base van aquí para que el marcado sea compacto;
     cada contexto ajusta solo el tamaño. */
  .svg-ico {
    width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
    vertical-align: -2.5px; flex: 0 0 auto;
  }
  .marca-icono .svg-ico { width: 18px; height: 18px; }
  .item-ico .svg-ico { width: 17px; height: 17px; vertical-align: middle; }
  .tab-ico .svg-ico { width: 20px; height: 20px; }
  .hamburguesa .svg-ico { width: 19px; height: 19px; }
  .buscador-ico .svg-ico, .curso-chip-ico .svg-ico { width: 14px; height: 14px; display: block; }
  .volver-icono .svg-ico { width: 17px; height: 17px; }
  .icono .svg-ico { width: 14px; height: 14px; }
  .btn-info .svg-ico { width: 11px; height: 11px; }
  .edit-act .svg-ico { width: 11px; height: 11px; display: block; }

  /* ---------- Botones ---------- */
  .btn {
    border: 1px solid var(--borde-fuerte); border-radius: 9px; padding: 8px 14px;
    font-size: 14px; font-weight: 550; font-family: inherit; cursor: pointer;
    background: var(--surface); color: var(--texto); box-shadow: var(--sombra-1);
    transition: background .12s, border-color .12s, transform .06s;
  }
  .btn:hover { background: var(--bg); border-color: var(--borde-fuerte); }
  .btn:active { transform: translateY(1px); }
  .btn.primario { background: var(--acento); border-color: var(--acento); color: #fff;
    box-shadow: 0 1px 2px rgba(91,91,214,.25), 0 2px 8px rgba(91,91,214,.18); }
  .btn.primario:hover { background: var(--acento-fuerte); }
  .btn.peligro { background: #fff; border-color: var(--borde-fuerte); color: var(--peligro); }
  .btn.peligro:hover { background: var(--peligro-bg); border-color: #f3c6c2; }
  .btn:disabled { opacity: .55; cursor: default; }

  /* Botón cuadrado de solo icono (p. ej. la papelera roja de las cabeceras). */
  .btn-icono { padding: 8px 10px; line-height: 0; }
  .btn-icono .svg-ico { width: 16px; height: 16px; vertical-align: 0; }

  /* Botón partido: acción principal + segmento con icono para la variante
     (p. ej. "+ Nueva actividad" | crear varias). Se ven como un solo botón. */
  .btn-split { display: inline-flex; align-items: stretch; }
  .btn-split .btn:first-child { border-top-right-radius: 0; border-bottom-right-radius: 0; }
  .btn-split .btn-split-extra {
    border-top-left-radius: 0; border-bottom-left-radius: 0;
    padding: 8px 11px; display: inline-flex; align-items: center;
  }
  .btn-split .btn.primario.btn-split-extra { border-left: 1px solid rgba(255,255,255,.4); }
  .btn-split .btn-split-extra svg { width: 17px; height: 17px; display: block; }

  /* ---------- Detalle ---------- */
  .contador { color: var(--texto-3); font-weight: 400; font-size: 15px; }
  .meta { color: var(--texto-2); font-size: 14px; }
  /* Alumnado: una sola tarjeta con filas separadas por divisores (compacto). */
  ol.alumnos { margin: 0; padding: 0; list-style: none; counter-reset: al;
    background: var(--surface); border: 1px solid var(--borde);
    border-radius: var(--radio); box-shadow: var(--sombra-1); overflow: hidden; }
  ol.alumnos li { padding: 8px 14px; font-size: 14px; display: flex; align-items: center;
    gap: 12px; counter-increment: al; border-bottom: 1px solid var(--borde); }
  ol.alumnos li:last-child { border-bottom: none; }
  ol.alumnos li:nth-child(even) { background: #fafbfc; }
  ol.alumnos li:hover { background: #f3f4fd; }
  ol.alumnos li::before { content: counter(al); color: var(--texto-3);
    font-variant-numeric: tabular-nums; font-size: 12px; min-width: 22px; text-align: right; }
  ol.alumnos li .mini-avatar { width: 26px; height: 26px; flex-basis: 26px; font-size: 10px; }

  /* ---------- Avatares con iniciales ---------- */
  .mini-avatar {
    width: 28px; height: 28px; flex: 0 0 28px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; letter-spacing: .02em;
  }

  /* ---------- Modal ---------- */
  .modal-fondo {
    position: fixed; inset: 0; background: rgba(20,22,28,.45);
    display: flex; align-items: center; justify-content: center; padding: 16px;
    z-index: 1000; backdrop-filter: blur(2px);
  }
  .modal-fondo[hidden] { display: none; }
  .modal {
    background: var(--surface); border-radius: 16px; padding: 24px;
    width: 100%; max-width: 480px; max-height: 90vh; overflow: hidden;
    box-shadow: 0 12px 40px rgba(16,18,24,.22); animation: modal-in .16s ease;
    /* Columna: cabecera y acciones fijas; solo el cuerpo hace scroll. Así los
       botones (Guardar/Cancelar…) quedan siempre a la vista sin bajar. */
    display: flex; flex-direction: column;
  }
  .modal-cab { flex: 0 0 auto; }
  #modal-cuerpo { flex: 0 1 auto; min-height: 0; overflow-y: auto; }
  .modal-acciones { flex: 0 0 auto; }
  @keyframes modal-in { from { opacity: 0; transform: translateY(8px) scale(.99); } to { opacity: 1; } }
  .modal h2 { margin: 0; font-size: 18px; }
  .modal-cab { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    flex-wrap: wrap; margin: 0 0 18px; }
  #modal-cab-extra:empty { display: none; }
  /* Selector de Tipo (segmentado compacto) en la barra de título del editor. */
  .ses-tipo-seg { display: inline-flex; align-items: stretch; padding: 3px; background: var(--borde);
    border-radius: 9px; gap: 2px; }
  .ses-tipo-seg .ses-tipo-opt { display: inline-flex; align-items: center; justify-content: center;
    margin: 0; padding: 6px 14px; border-radius: 7px; font-size: 13px; font-weight: 600;
    color: var(--texto-2); cursor: pointer; white-space: nowrap; }
  /* Radio nativo oculto (gana a .modal input[type=radio] con más especificidad). */
  .ses-tipo-seg .ses-tipo-opt input { position: absolute; width: 1px; height: 1px; opacity: 0;
    margin: 0; padding: 0; pointer-events: none; }
  .ses-tipo-seg .ses-tipo-opt.activo { background: var(--surface); color: var(--acento);
    box-shadow: var(--sombra-1); }
  /* Editor de sesión: dos columnas en pantallas anchas. */
  .ses-form { display: grid; grid-template-columns: 1fr; gap: 0 22px; }
  @media (min-width: 760px) { .ses-form { grid-template-columns: 1fr 1fr; } }
  .ses-col { min-width: 0; }
  .planner-asig-color { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
    margin: 0 5px 0 2px; vertical-align: 1px; flex: 0 0 auto; }
  .modal label, .ses-form label { display: block; margin-bottom: 14px; font-size: 13px; font-weight: 600; color: var(--texto); }
  .modal input, .modal select, .modal textarea,
  .ses-form input, .ses-form select, .ses-form textarea {
    width: 100%; margin-top: 6px; padding: 10px 11px; font-size: 14px; font-weight: 400;
    border: 1px solid var(--borde-fuerte); border-radius: 8px; font-family: inherit;
    color: var(--texto); background: var(--surface); transition: border-color .12s, box-shadow .12s;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus,
  .ses-form input:focus, .ses-form select:focus, .ses-form textarea:focus {
    outline: none; border-color: var(--acento); box-shadow: 0 0 0 3px var(--acento-suave);
  }
  /* Checks y radios: controles nativos. El ancho 100%, el relleno y el halo de
     foco de los campos de texto los deformaban y hacían «parpadear» la casilla
     al tocarla (halo animado + resaltado de toque de iOS). */
  .modal input[type="checkbox"], .modal input[type="radio"],
  .ses-form input[type="checkbox"], .ses-form input[type="radio"] {
    width: auto; margin: 0; padding: 0; box-shadow: none; transition: none;
    flex: 0 0 auto; accent-color: var(--acento);
  }
  .modal input[type="checkbox"]:focus, .modal input[type="radio"]:focus { box-shadow: none; }
  .modal input[type="checkbox"]:focus-visible, .modal input[type="radio"]:focus-visible {
    outline: 2px solid var(--acento); outline-offset: 2px;
  }
  .modal label, .modal .check { -webkit-tap-highlight-color: transparent; }
  .modal textarea { resize: vertical; }
  /* Campos numéricos cortos (nº de ítems): con 2-3 dígitos basta, nada de
     ocupar el modal entero. display:block para que no herede el ancho del label. */
  .modal input.campo-corto { display: block; width: 96px; }
  /* Editor de nota por criterio: texto del criterio atenuado junto al código. */
  .ayuda-inline { font-weight: 400; color: var(--texto-3); font-size: 12px; }
  .modal p.mensaje { margin: 0 0 4px; font-size: 14px; line-height: 1.5; color: var(--texto); }
  .modal p.aviso-peligro { color: var(--peligro); font-weight: 600; }
  /* Alcance de archivar/eliminar (solo esta clase / el grupo entero): radios en columna. */
  .alcance-modal { display: flex; flex-direction: column; gap: 10px; margin: 12px 0 14px; }
  .alcance-modal label { display: flex; align-items: flex-start; gap: 9px; margin: 0;
    font-weight: 500; font-size: 13px; line-height: 1.45; cursor: pointer; }
  .alcance-modal input[type="radio"] { margin-top: 2px; }
  .ayuda { font-size: 12px; color: var(--texto-3); margin: -8px 0 4px; }
  /* Dos párrafos de ayuda seguidos: el margen negativo del segundo los pegaba. */
  .ayuda + .ayuda { margin-top: 8px; }
  .acciones-modal { display: flex; gap: 16px; }
  /* Variante en columna para menús (pestaña "Más", Acerca de): botones a lo
     ancho, alineados a la izquierda y con el icono delante. */
  .acciones-mas { flex-direction: column; gap: 10px; }
  .acciones-mas .btn { display: flex; align-items: center; gap: 10px;
    justify-content: flex-start; text-decoration: none; }
  .link, .link-peligro { background: none; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; padding: 4px 0; }
  .link { color: var(--acento-fuerte); }
  .link-peligro { color: var(--peligro); }
  .link:hover, .link-peligro:hover { text-decoration: underline; }
  .modal-acciones { display: flex; align-items: center; justify-content: flex-end; gap: 10px;
    margin-top: 10px; }
  /* Acción extra (papelera de la sesión): a la izquierda, empuja los botones a la derecha. */
  #modal-acc-extra:not(:empty) { margin-right: auto; }
  #modal-acc-extra:empty { display: none; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: #23252b; color: #fff; padding: 12px 18px; border-radius: 10px;
    font-size: 14px; max-width: 90%; box-shadow: var(--sombra-2); z-index: 1100;
    animation: modal-in .16s ease;
  }
  .toast.error { background: var(--peligro); }

  /* Spinner de carga */
  .spinner-wrap { display: flex; justify-content: center; padding: 48px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--borde-fuerte);
    border-top-color: var(--acento); border-radius: 50%; animation: girar .7s linear infinite; }
  @keyframes girar { to { transform: rotate(360deg); } }
  /* Spinner en línea (dentro de un botón mientras trabaja). */
  .spinner-inline { display: inline-block; width: 13px; height: 13px; vertical-align: -2px;
    border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%;
    animation: girar .7s linear infinite; }
  /* Categorías de la papelera. */
  .papelera-cat { margin-bottom: 22px; }
  .papelera-cat-tit { font-size: 15px; font-weight: 700; margin: 0 0 10px;
    display: flex; align-items: center; gap: 8px; }
  .papelera-cat-num { font-size: 12px; font-weight: 600; color: var(--texto-2);
    background: var(--bg); border: 1px solid var(--borde); border-radius: 999px; padding: 1px 8px; }

  /* ---------- Cabeceras (rejilla compacta / tarjeta de clase) ----------
     Una fila: icono volver · [icono color] · título+meta · acciones dcha. */
  .cabecera-rejilla, .cabecera-clase {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .cabecera-rejilla { margin-bottom: 12px; }
  /* La cabecera de clase/grupo es una tarjeta que agrupa la identidad. */
  .cabecera-clase {
    background: var(--surface); border: 1px solid var(--borde);
    border-radius: var(--radio); box-shadow: var(--sombra-1);
    padding: 16px 18px; margin-bottom: 18px;
  }
  /* flex-basis 0 (no auto): con base "auto", un subtítulo largo hacía saltar el
     bloque a la línea siguiente en pantallas estrechas; con base 0 el título se
     queda SIEMPRE en la misma fila que la flecha de volver y encoge/envuelve. */
  .titulo-bloque { flex: 1 1 0; min-width: 0; }
  .cabecera-rejilla h1, .cabecera-clase h1 { font-size: 20px; line-height: 1.15; }
  /* Título de la unidad ("Clase | Unidad"): SIEMPRE en una línea, recortado
     con puntos suspensivos si no cabe (el bloque ya cede ancho con min-width:0). */
  #unidad-titulo { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sep-titulo { color: var(--texto-3); font-weight: 400; padding: 0 2px; }
  .cabecera-rejilla .meta, .cabecera-clase .meta { margin: 2px 0 0; font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* Icono cuadrado de color con la inicial (identidad de la clase/grupo). */
  .clase-ico {
    flex: 0 0 auto; width: 42px; height: 42px; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: .01em;
    background: var(--acento); box-shadow: var(--sombra-1);
  }
  .clase-ico svg { width: 23px; height: 23px; stroke: #fff; fill: none; }
  .volver-icono {
    flex: 0 0 auto; width: 34px; height: 34px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--borde-fuerte); background: var(--surface);
    color: var(--texto-2); cursor: pointer; font-size: 18px; line-height: 1;
    text-decoration: none; box-shadow: var(--sombra-1);
    transition: background .12s, color .12s, border-color .12s;
  }
  .volver-icono:hover { background: var(--bg); color: var(--acento-fuerte); }

  /* ---------- Acciones de unidad ---------- */
  .acciones-unidad { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
  .grupo-btn { position: relative; display: inline-flex; }
  .btn-info {
    position: absolute; top: -7px; right: -7px; z-index: 1;
    width: 18px; height: 18px; padding: 0; border-radius: 50%;
    border: 1px solid var(--borde-fuerte); background: var(--surface); color: var(--texto-2);
    cursor: pointer; font-size: 11px; line-height: 1; display: inline-flex;
    align-items: center; justify-content: center; box-shadow: var(--sombra-1);
    transition: background .12s, color .12s, border-color .12s;
  }
  .btn-info:hover { background: var(--acento); color: #fff; border-color: var(--acento); }
  .pasos { margin: 4px 0 10px; padding-left: 20px; font-size: 14px; color: var(--texto); line-height: 1.6; }
  .enlace-ext { color: var(--acento-fuerte); font-weight: 600; font-size: 14px; text-decoration: none; }
  .enlace-ext:hover { text-decoration: underline; }
  .check { font-size: 13px; color: var(--texto-2); cursor: pointer; user-select: none;
    display: inline-flex; align-items: center; gap: 6px; }
  .check input { accent-color: var(--acento); }

  /* ---------- Filas de "crear varias actividades" ---------- */
  .fila-act { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .fila-act .fa-nombre { flex: 1 1 auto; margin-top: 0; }
  .fila-act .fa-items { width: 80px; flex: 0 0 auto; margin-top: 0; }
  .fila-act .icono { flex: 0 0 auto; }

  /* ---------- Criterios en modal ---------- */
  .campo-crit { margin-bottom: 14px; }
  .campo-crit .etq { font-size: 13px; font-weight: 600; display: block; margin-bottom: 8px; }
  .lista-crit { max-height: 240px; overflow: auto; border: 1px solid var(--borde-fuerte);
    border-radius: 8px; padding: 4px; }
  label.crit { display: flex; align-items: center; gap: 10px; font-weight: 400;
    font-size: 13px; padding: 8px 10px; border-radius: 7px; margin: 0; cursor: pointer;
    transition: background .1s; }
  label.crit:hover { background: var(--bg); }
  label.crit input { flex: 0 0 auto; width: auto; margin: 0; accent-color: var(--acento); }
  label.crit .crit-txt { flex: 1 1 auto; line-height: 1.4; color: var(--texto-2); }
  label.crit .crit-txt b { color: var(--texto); font-weight: 600; }
  label.crit.pendiente { background: #fff8e9; }
  label.crit.pendiente:hover { background: #fdf1d6; }
  /* Sin margen izquierdo: en la misma línea separa el espacio normal del texto,
     y si salta de línea queda alineada con el título de su criterio. */
  .tag-pend { display: inline-block; margin: 2px 0 0; font-size: 10px; font-weight: 600;
    color: #9a6a00; background: #fde8b8; border-radius: 5px; padding: 1px 6px;
    vertical-align: middle; }

  /* ---------- Rúbricas (banco) ---------- */
  .rubrica-card { background: var(--surface); border: 1px solid var(--borde);
    border-radius: var(--radio); padding: 14px 16px; display: flex; flex-direction: column;
    gap: 10px; transition: transform .1s, box-shadow .12s, border-color .12s; }
  .rubrica-card:hover { border-color: var(--borde-fuerte); box-shadow: var(--sombra-3); }
  .rubrica-card.arrastrando { z-index: 5; opacity: .97; cursor: grabbing;
    box-shadow: 0 14px 30px rgba(16,18,24,.20); border-color: var(--borde-fuerte); }
  .rc-head { display: flex; align-items: center; gap: 10px; }
  .rc-head h3 { margin: 0; font-size: 15px; font-weight: 650; flex: 1 1 auto; min-width: 0;
    letter-spacing: -.01em; }
  .rc-grip { flex: 0 0 auto; cursor: grab; color: var(--texto-3); font-size: 14px;
    padding: 2px 6px; border-radius: 6px; line-height: 1; }
  .rc-grip:hover { background: var(--bg); color: var(--texto-2); }
  .rc-grip:active { cursor: grabbing; }
  .rc-meta { color: var(--texto-2); font-size: 13px; }
  .rc-acciones { display: flex; gap: 8px; margin-top: 2px; }
  .rc-acciones .btn { padding: 6px 10px; font-size: 13px; }

  /* Editor de rúbrica (modal) */
  .rub-editor { display: flex; flex-direction: column; gap: 14px; }
  .mini-x { flex: 0 0 auto; border: 1px solid var(--borde); background: var(--surface);
    color: var(--texto-2); border-radius: 7px; min-width: 30px; height: 30px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; font-size: 15px; }
  .mini-x:hover { background: var(--bg); color: var(--texto); }
  .rub-add { align-self: flex-start; }
  /* Interruptor de modo de criterios. Se resetea el ancho del radio porque
     .modal input lo pone al 100% (deformaba la fila). */
  .rub-modo { display: flex; gap: 8px 20px; margin: 8px 0 12px; flex-wrap: wrap; }
  .modal .rub-modo label { display: inline-flex; align-items: center; gap: 7px; margin: 0;
    width: auto; font-size: 13px; font-weight: 600; color: var(--texto-2); cursor: pointer; }
  .modal .rub-modo input[type="radio"] { width: auto; margin: 0; flex: 0 0 auto; }
  .rubrica-grid .ind-crit { display: block; margin-top: 6px; width: 100%; max-width: 240px;
    border: 1px solid var(--borde); border-radius: 6px; padding: 4px 6px;
    background: var(--surface); color: var(--texto); }
  /* La caja de criterios y los chips no aparecen hasta que hay contenido
     (es decir, hasta que se elige curso + área). */
  .lista-crit:empty { display: none; }

  /* Editor de rúbrica: estado sin datos y barra superior */
  .rub-vacio { color: var(--texto-3); padding: 22px; text-align: center; font-size: 14px;
    background: var(--surface); border: 1px dashed var(--borde-fuerte); border-radius: var(--radio); }
  .rg-top { display: flex; align-items: center; justify-content: space-between; margin: 10px 0 6px; }
  .rub-limpiar { padding: 5px 10px; font-size: 13px; }

  /* Modal ancho (editor de rúbricas) en pantallas grandes */
  .modal.modal-ancho { max-width: 760px; }

  /* Rejilla editable (indicadores × niveles). Estética tipo RubricApp: las celdas
     parecen texto normal y solo revelan que son editables al enfocarlas. La altura
     de cada fila se adapta sola (contenteditable, sin textarea de altura fija). */
  .rg-scroll { overflow-x: auto; margin: 4px 0 8px; border: 1px solid var(--borde);
    border-radius: var(--radio); }
  .rubrica-grid { border-collapse: collapse; width: 100%; font-size: 13px; }
  .rubrica-grid thead th { background: var(--bg); text-align: left; font-weight: 600;
    color: var(--texto); padding: 10px 12px; vertical-align: bottom;
    border-bottom: 1px solid var(--borde-fuerte); }
  .rubrica-grid tbody th, .rubrica-grid tbody td { padding: 6px 8px; vertical-align: top;
    text-align: left; border-bottom: 1px solid var(--borde); }
  .rubrica-grid tbody tr:last-child th, .rubrica-grid tbody tr:last-child td { border-bottom: none; }
  .rubrica-grid tbody tr:nth-child(even) th,
  .rubrica-grid tbody tr:nth-child(even) td { background: var(--bg); }
  .rubrica-grid .rg-corner { min-width: 150px; color: var(--texto-3); font-weight: 600; }
  .rubrica-grid .rg-nivel { min-width: 160px; }
  .rubrica-grid .rg-ind { min-width: 160px; }
  .rubrica-grid .rg-add { width: 40px; text-align: center; vertical-align: middle; }
  /* Editable pero con aspecto de texto: borde transparente en reposo. */
  .rubrica-grid .celda, .rubrica-grid .ind-txt, .rubrica-grid .nivel-etq {
    min-width: 130px; min-height: 22px; border: 1px solid transparent; border-radius: 7px;
    padding: 6px 8px; font: inherit; color: var(--texto); background: transparent; outline: none;
    white-space: pre-wrap; overflow-wrap: anywhere; cursor: text;
    transition: background .1s, border-color .1s, box-shadow .1s; }
  .rubrica-grid .nivel-etq { width: 100%; min-width: 0; font-weight: 600; }
  .rubrica-grid .ind-txt { font-weight: 600; }
  .rubrica-grid .celda:hover, .rubrica-grid .ind-txt:hover, .rubrica-grid .nivel-etq:hover {
    background: var(--surface); border-color: var(--borde); }
  .rubrica-grid .celda:focus, .rubrica-grid .ind-txt:focus, .rubrica-grid .nivel-etq:focus {
    background: var(--surface); border-color: var(--acento); box-shadow: 0 0 0 2px var(--acento-suave); }
  .rubrica-grid .celda:empty::before { content: 'Descripción'; color: var(--texto-3); }
  .rubrica-grid .ind-txt:empty::before { content: 'Indicador'; color: var(--texto-3); }
  .rg-sub { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  /* Peso por indicador en % (sin la palabra "peso"): cajita + % + × discreta. */
  .ind-peso-wrap { display: inline-flex; align-items: center; gap: 2px; }
  .rubrica-grid .ind-peso { width: 44px; text-align: center; padding: 4px 2px;
    border: 1px solid var(--borde); border-radius: 6px; font: inherit; color: var(--texto-2);
    background: var(--surface); -moz-appearance: textfield; appearance: textfield; }
  .rubrica-grid .ind-peso::-webkit-outer-spin-button,
  .rubrica-grid .ind-peso::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .ind-peso-pct { font-size: 12px; color: var(--texto-3); }
  .rg-total-row th, .rg-total-row td { border-bottom: none; }
  .peso-total { font-size: 12px; font-weight: 600; }
  .peso-total-val.ok { color: var(--acento-fuerte); }
  .peso-total-val.err { color: #d1453b; }
  /* Cabecera de nivel compacta: nombre + cajita de puntos + × pequeña, en una línea. */
  .rg-nivel-row { display: flex; align-items: center; gap: 5px; }
  .rg-nivel-row .nivel-etq { flex: 1 1 auto; min-width: 0; }
  .rubrica-grid .nivel-val { flex: 0 0 auto; width: 38px; text-align: center; padding: 4px 2px;
    border: 1px solid var(--borde); border-radius: 6px; font: inherit; color: var(--texto-2);
    background: var(--surface); -moz-appearance: textfield; appearance: textfield; }
  .rubrica-grid .nivel-val::-webkit-outer-spin-button,
  .rubrica-grid .nivel-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .rg-x { flex: 0 0 auto; width: 20px; height: 20px; border: 0; background: transparent;
    color: var(--texto-3); cursor: pointer; font-size: 17px; line-height: 1; border-radius: 5px;
    padding: 0; }
  .rg-x:hover { background: var(--bg); color: var(--texto); }
  /* Vista de solo lectura de una rúbrica (previsualizar): celdas como texto. */
  .rubrica-ver td { white-space: pre-wrap; overflow-wrap: anywhere; color: var(--texto); }
  .rubrica-ver th { white-space: normal; }
  .ver-pts { color: var(--texto-3); font-weight: 400; }
  /* Evaluador de rúbrica (doble toque en la celda de la rejilla): las casillas
     se tocan para elegir el nivel de cada indicador, como en RubricApp. */
  .rubrica-evaluar td.rub-eval-celda { cursor: pointer; user-select: none;
    touch-action: manipulation; transition: background .12s, box-shadow .12s; }
  .rubrica-evaluar td.rub-eval-celda:hover { background: var(--acento-suave); }
  /* Cabecera con la tinta plena de su gama (y un subrayado de su color). Las
     casillas van neutras y SOLO la marcada se tiñe (sin borde); el hover
     anticipa la gama con un lavado suave. */
  .rubrica-evaluar thead th.g-top   { background: var(--g-top-bg);   color: var(--g-top-tx);
    box-shadow: inset 0 -3px 0 var(--g-top-tx); }
  .rubrica-evaluar thead th.g-alta  { background: var(--g-alta-bg);  color: var(--g-alta-tx);
    box-shadow: inset 0 -3px 0 var(--g-alta-tx); }
  .rubrica-evaluar thead th.g-media { background: var(--g-media-bg); color: var(--g-media-tx);
    box-shadow: inset 0 -3px 0 var(--g-media-tx); }
  .rubrica-evaluar thead th.g-baja  { background: var(--g-baja-bg);  color: var(--g-baja-tx);
    box-shadow: inset 0 -3px 0 var(--g-baja-tx); }
  .rubrica-evaluar thead th.g-susp  { background: var(--g-susp-bg);  color: var(--g-susp-tx);
    box-shadow: inset 0 -3px 0 var(--g-susp-tx); }
  .rubrica-evaluar td.rub-eval-celda.g-top:hover   { background: color-mix(in srgb, var(--g-top-bg) 38%, var(--surface)); }
  .rubrica-evaluar td.rub-eval-celda.g-alta:hover  { background: color-mix(in srgb, var(--g-alta-bg) 38%, var(--surface)); }
  .rubrica-evaluar td.rub-eval-celda.g-media:hover { background: color-mix(in srgb, var(--g-media-bg) 38%, var(--surface)); }
  .rubrica-evaluar td.rub-eval-celda.g-baja:hover  { background: color-mix(in srgb, var(--g-baja-bg) 38%, var(--surface)); }
  .rubrica-evaluar td.rub-eval-celda.g-susp:hover  { background: color-mix(in srgb, var(--g-susp-bg) 38%, var(--surface)); }
  .rubrica-evaluar td.sel.g-top,   .rubrica-evaluar td.sel.g-top:hover   { background: var(--g-top-bg);   color: var(--g-top-tx); }
  .rubrica-evaluar td.sel.g-alta,  .rubrica-evaluar td.sel.g-alta:hover  { background: var(--g-alta-bg);  color: var(--g-alta-tx); }
  .rubrica-evaluar td.sel.g-media, .rubrica-evaluar td.sel.g-media:hover { background: var(--g-media-bg); color: var(--g-media-tx); }
  .rubrica-evaluar td.sel.g-baja,  .rubrica-evaluar td.sel.g-baja:hover  { background: var(--g-baja-bg);  color: var(--g-baja-tx); }
  .rubrica-evaluar td.sel.g-susp,  .rubrica-evaluar td.sel.g-susp:hover  { background: var(--g-susp-bg);  color: var(--g-susp-tx); }
  .rubrica-evaluar td.rub-eval-celda.sel { font-weight: 600; }
  /* Columna de indicadores más contenida; los descriptores respiran más. */
  .rubrica-evaluar .rg-corner, .rubrica-evaluar .rg-ind {
    min-width: 96px; max-width: 130px; font-size: 12px; }
  .rubrica-evaluar td.rub-eval-celda { min-width: 150px; }
  /* Barra de alumno del evaluador: anterior / nombre / siguiente. */
  .rub-eval-nav { display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin: 0 0 10px; }
  .rub-eval-nav .rub-eval-alumno { font-weight: 700; font-size: 14px; text-align: center;
    flex: 1 1 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rub-eval-nav .btn { flex: 0 0 auto; }
  .rub-eval-nav .btn[disabled] { opacity: .45; cursor: default; }
  /* Criterio por indicador al crear una actividad de rúbrica. */
  .rub-ind-fila { display: flex; align-items: center; gap: 10px; margin: 6px 0; }
  .rub-ind-nom { flex: 1 1 auto; min-width: 0; font-size: 13px; font-weight: 600; color: var(--texto-2); }
  .rub-ind-fila select { flex: 0 0 auto; max-width: 55%; }

  /* ---------- Rejilla ---------- */
  .rejilla-cont { overflow: auto; background: var(--surface);
    max-height: calc(100vh - var(--topbar-alto) - 96px);
    border: 1px solid var(--borde); border-radius: var(--radio); box-shadow: var(--sombra-1); }
  table.rejilla { border-collapse: separate; border-spacing: 0; width: auto; font-size: 13px; }
  table.rejilla th, table.rejilla td {
    border-bottom: 1px solid var(--borde); border-right: 1px solid var(--borde);
    padding: 7px 9px; text-align: center; white-space: nowrap;
  }
  table.rejilla thead th {
    background: #f3f4f7; position: sticky; top: 0; z-index: 2;
    font-weight: 600; color: var(--texto); border-bottom: 1px solid var(--borde-fuerte);
    font-size: 12px;
  }
  table.rejilla tbody tr:last-child td { border-bottom: none; }

  table.rejilla .idx { width: 36px; min-width: 36px; max-width: 36px;
    color: var(--texto-3); font-variant-numeric: tabular-nums;
    position: sticky; left: 0; z-index: 1; font-size: 12px; }
  /* iOS deja una rendija subpixel entre las dos columnas fijas al hacer scroll
     horizontal (se ve pasar el contenido por debajo). Se tapa pintando 2px de
     más, con el MISMO fondo de la celda, justo tras su borde derecho. */
  table.rejilla .idx::after { content: ''; position: absolute; top: 0; bottom: 0;
    right: -2px; width: 2px; background: inherit; }
  table.rejilla thead .idx { z-index: 3; }
  table.rejilla .esq { text-align: left; position: sticky; left: 36px; z-index: 1;
    font-weight: 500; color: var(--texto); }
  table.rejilla thead .esq { z-index: 3; }
  /* Columna del nombre corto: solo existe en móvil (ver bloque responsive). */
  table.rejilla .al-corto { display: none; }
  table.rejilla td.esq .mini-avatar { width: 24px; height: 24px; flex-basis: 24px;
    font-size: 10px; vertical-align: middle; margin-right: 9px; }

  /* position sticky (y no relative): si no, esta regla —más específica— anularía
     el sticky de "thead th" y las columnas de actividades no se quedarían fijas
     al hacer scroll. Sticky también sirve de contenedor para grip/edit (absolute). */
  table.rejilla th.act { position: sticky; cursor: default; font-weight: 600; padding: 7px 22px; }
  table.rejilla th.act.act-rub-col { cursor: pointer; } /* la cabecera de rúbrica se toca para expandir */
  table.rejilla th.act.arrastrando-col { opacity: .45; }
  table.rejilla th.act.soltar-antes { box-shadow: inset 3px 0 0 var(--acento); }
  table.rejilla th.act.soltar-despues { box-shadow: inset -3px 0 0 var(--acento); }
  /* Asa de arrastre: SIEMPRE visible e interactiva (el arrastre nace solo aquí). */
  table.rejilla .grip-act { position: absolute; top: 2px; left: 3px; color: var(--texto-3);
    touch-action: none; user-select: none; font-size: 11px; line-height: 1; opacity: .4;
    transition: opacity .12s; pointer-events: auto; cursor: grab; padding: 2px; z-index: 1; }
  table.rejilla th.act:hover .grip-act { opacity: 1; }
  table.rejilla .grip-act:active { cursor: grabbing; }
  /* Chevron que indica que una columna rúbrica se puede desplegar. */
  table.rejilla .rub-exp-ico { position: absolute; bottom: 3px; right: 5px; color: var(--acento);
    opacity: .7; pointer-events: none; }
  table.rejilla .rub-exp-ico .svg-ico { width: 11px; height: 11px; display: block; }
  table.rejilla th.act .act-nom { display: block; }
  table.rejilla th.act small { display: block; font-weight: 400; color: var(--texto-3); font-size: 10px; }
  /* Cabecera en 3 líneas: título · (ítems/tipo) · criterios (abajo del todo). */
  table.rejilla th.act .act-meta { margin-top: 2px; }
  table.rejilla th.act .act-crits { margin-top: 2px; color: var(--texto-2); font-weight: 600; }
  /* Animación al desplegar: las sub-columnas se DESLIZAN desde la columna
     principal hacia la derecha, escalonadas (--rub-d = retardo por columna).
     La principal no se anima: existe antes y después de expandir, y animarla
     se percibía como un parpadeo. */
  @keyframes rub-deslizar { from { opacity: 0; transform: translateX(-18px); } to { opacity: 1; transform: none; } }
  table.rejilla th.act.act-sub, table.rejilla td.celda-rub-ind,
  table.rejilla td.celda-sub { animation: rub-deslizar .24s ease both;
    animation-delay: var(--rub-d, 0ms); }
  /* Plegado: un ÚNICO movimiento de abanico hacia la principal. El contenido
     de cada celda (envuelto al vuelo en .cel-anim) estrecha a 0 mientras se
     funde, y el ancho de la columna —que sigue a su contenido— se cierra
     fotograma a fotograma; la celda suelta a la vez su relleno, su mínimo y
     sus bordes. --rub-dc invierte el escalonado: la rama de fuera cierra
     primero. El repintado final no cambia nada visible. */
  table.rejilla .cel-anim { display: inline-block; vertical-align: middle; white-space: nowrap; }
  table.rejilla .rub-plegando { pointer-events: none;
    transition: padding .18s ease, min-width .18s ease, border-width .18s ease;
    transition-delay: var(--rub-dc, 0ms);
    padding-left: 0 !important; padding-right: 0 !important; min-width: 0 !important;
    border-left-width: 0 !important; border-right-width: 0 !important; }
  table.rejilla .rub-plegando .cel-anim { overflow: hidden;
    transition: width .18s ease, opacity .14s ease;
    transition-delay: var(--rub-dc, 0ms);
    width: 0 !important; opacity: 0; }
  /* Al plegar, la banda de la principal se desvanece con la última rama (el
     retardo se fija inline, sincronizado con el escalonado del plegado). */
  table.rejilla th.act.act-rub-prim { transition: border-top-color .18s ease; }
  table.rejilla th.act.act-rub-prim.rub-plegando-prim { border-top-color: transparent; }
  table.rejilla .edit-act { position: absolute; top: 4px; right: 4px; border: none;
    background: transparent; color: var(--texto-3); cursor: pointer; font-size: 12px;
    padding: 2px; line-height: 1; z-index: 1; border-radius: 4px; }
  table.rejilla .edit-act:hover { color: var(--acento); background: var(--acento-suave); }

  table.rejilla td.celda { padding: 4px; }
  /* ---------- celdas por tipo de columna ---------- */
  table.rejilla td.celda-check { cursor: pointer; min-width: 44px; user-select: none;
    color: var(--texto-3); }
  /* Check/cruz grandes y gruesos: que se vean como los números de las otras celdas. */
  table.rejilla td.celda-check .svg-ico { width: 20px; height: 20px; vertical-align: -4px;
    stroke-width: 3; }
  table.rejilla td.celda-check.si { color: var(--g-top-tx); }
  table.rejilla td.celda-check.no { color: var(--peligro); }
  table.rejilla td.celda-cont { white-space: nowrap; padding: 4px 6px; }
  table.rejilla td.celda-escala { cursor: pointer; min-width: 46px; user-select: none;
    font-weight: 600; font-size: 11px; letter-spacing: .02em; color: var(--texto-3); }
  /* Rúbrica: celda contraída (nota global) y celdas de indicador (expandida).
     touch-action manipulation: el doble toque abre el evaluador, no hace zoom. */
  table.rejilla td.celda-rubrica { cursor: pointer; user-select: none; text-align: center;
    font-weight: 600; color: var(--acento); touch-action: manipulation; }
  table.rejilla td.celda-rub-global { touch-action: manipulation; }
  table.rejilla td.celda-rubrica.vacia .svg-ico { width: 14px; height: 14px; vertical-align: -2px;
    color: var(--texto-3); }
  table.rejilla td.celda-rub-ind { cursor: pointer; min-width: 32px; padding: 4px 2px;
    user-select: none; font-weight: 600; font-size: 12px; color: var(--texto-2);
    font-variant-numeric: tabular-nums; }
  /* Rúbrica expandida (árbol, estilo iDoceo): columna principal con la nota
     global + sub-columnas de indicador con el nombre en VERTICAL (estrechas).
     La cabecera de las columnas desplegables lleva SIEMPRE el mismo fondo
     (plegada o expandida): así no "cambia de color" al desplegar. */
  /* La cabecera desplegable reserva ya el hueco del borde superior (transparente)
     para que al desplegar —cuando se pinta en color— la altura no salte. */
  table.rejilla th.act.act-rub-col { background: #e6e8fb; border-top: 3px solid transparent; }
  /* Marco en «L invertida» del bloque expandido: banda superior CONTINUA que
     nace en la propia columna principal y baja por el borde derecho de la
     última rama. Sin separadores verticales entre ramas (partían la banda);
     el texto vertical ya separa visualmente cada una. */
  table.rejilla th.act.act-rub-prim { border-top: 3px solid var(--acento); }
  table.rejilla th.act.act-sub { background: var(--acento-suave);
    border-top: 3px solid var(--acento); border-right: none;
    padding: 7px 4px; min-width: 32px; }
  table.rejilla th.act.act-sub-fin { border-right: 3px solid var(--acento); }
  table.rejilla th.act.act-sub small { color: var(--acento-fuerte); }
  table.rejilla .rub-rama-vert { writing-mode: vertical-rl; transform: rotate(180deg);
    display: inline-block; white-space: nowrap; max-height: 92px; overflow: hidden;
    font-weight: 600; }
  table.rejilla td.celda-rub-global { cursor: pointer; user-select: none; text-align: center;
    font-weight: 700; font-variant-numeric: tabular-nums; }
  /* Alto de cabecera reservado cuando la unidad tiene rúbricas: constante al
     expandir/plegar (a costa de ser algo más alto). */
  table.rejilla.con-rubrica thead th { height: 118px; vertical-align: bottom; }
  /* Observación (texto libre): extracto con puntos suspensivos; tocar para editar. */
  table.rejilla td.celda-texto { cursor: pointer; user-select: none; max-width: 140px;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    text-align: left; font-size: 12px; padding: 4px 8px; }
  table.rejilla td.celda-texto.vacia { text-align: center; color: var(--texto-3); }
  table.rejilla td.celda-texto.vacia .svg-ico { width: 13px; height: 13px; vertical-align: -2px; }
  /* Multinota (desglose): la media /10 va SOBRIA (sin semáforo ni acento),
     como una columna normal; el color queda para NOTA y las rúbricas. */
  table.rejilla td.celda-desglose { cursor: pointer; user-select: none; text-align: center;
    font-weight: 600; color: var(--texto-2); font-variant-numeric: tabular-nums; }
  table.rejilla td.celda-des-prim { color: var(--texto-2); font-weight: 600; }
  table.rejilla td.celda-desglose.vacia .svg-ico { width: 14px; height: 14px; vertical-align: -2px;
    color: var(--texto-3); }
  /* Multinota expandida: sub-celdas por criterio (banda de árbol, estrechas). */
  table.rejilla td.celda-sub { border-left: 1px dashed var(--borde); min-width: 40px; }
  table.rejilla td.celda-sub input.celda-sub-inp { width: 40px; text-align: center;
    border: 1px solid var(--borde); border-radius: 6px; padding: 4px 2px; background: var(--bg);
    font-size: 16px; font-variant-numeric: tabular-nums; }
  /* Selector flotante de nivel (escalas): los 5 niveles + vaciar, a un toque. */
  .pop-nivel { position: fixed; z-index: 60; display: flex; gap: 4px; padding: 6px;
    background: var(--surface); border: 1px solid var(--borde-fuerte);
    border-radius: 10px; box-shadow: var(--sombra-3); }
  .pop-nivel-opt { min-width: 42px; height: 36px; border: 1px solid var(--borde);
    border-radius: 8px; background: var(--bg); font-weight: 700; font-size: 11px;
    letter-spacing: .02em; cursor: pointer; padding: 0 8px; color: var(--texto-2); }
  .pop-nivel-opt.g-susp  { background: var(--g-susp-bg);  color: var(--g-susp-tx); }
  .pop-nivel-opt.g-baja  { background: var(--g-baja-bg);  color: var(--g-baja-tx); }
  .pop-nivel-opt.g-media { background: var(--g-media-bg); color: var(--g-media-tx); }
  .pop-nivel-opt.g-alta  { background: var(--g-alta-bg);  color: var(--g-alta-tx); }
  .pop-nivel-opt.g-top   { background: var(--g-top-bg);   color: var(--g-top-tx); }
  .pop-nivel-opt.sel { outline: 2px solid var(--acento); outline-offset: 1px; }
  .pop-nivel-opt.vaciar { color: var(--texto-3); }
  .cont-btn { width: 26px; height: 26px; border: 1px solid var(--borde-fuerte); border-radius: 7px;
    background: var(--surface); cursor: pointer; font-size: 15px; line-height: 1;
    color: var(--texto-2); padding: 0; vertical-align: middle; }
  .cont-btn:hover { background: var(--bg); color: var(--texto); }
  .cont-val { display: inline-block; min-width: 28px; text-align: center;
    font-variant-numeric: tabular-nums; }
  /* selector de tipo en el modal de actividad */
  .tipos-act { display: flex; flex-wrap: wrap; gap: 6px; }
  label.tipo-opt { display: inline-flex; align-items: center; gap: 6px; margin: 0;
    border: 1px solid var(--borde-fuerte); border-radius: 8px; padding: 6px 10px;
    font-size: 13px; font-weight: 500; cursor: pointer; }
  label.tipo-opt input { width: auto; margin: 0; accent-color: var(--acento); }
  label.tipo-opt:has(input:checked) { border-color: var(--acento);
    background: var(--acento-suave); color: var(--acento-fuerte); }
  label.check-suelto { display: flex; margin: 10px 0 14px; }
  label.check-suelto input { width: auto; }
  #bloque-crit.apagado { opacity: .45; pointer-events: none; }
  table.rejilla td input { width: 46px; text-align: center; border: 1px solid var(--borde-fuerte);
    border-radius: 7px; padding: 5px 2px; font-size: 13px; font-family: inherit;
    transition: border-color .1s, box-shadow .1s; }
  table.rejilla td input:focus { outline: none; border-color: var(--acento);
    box-shadow: 0 0 0 2px var(--acento-suave); }

  table.rejilla .num { font-variant-numeric: tabular-nums; color: var(--texto-2); min-width: 48px; }
  table.rejilla .crit-col { color: var(--texto-2); font-weight: 600; font-size: 11px; }
  /* Columna NOTA destacada */
  table.rejilla th.nota { font-weight: 700; color: var(--acento-fuerte); background: #e6e8fb;
    letter-spacing: .03em; }
  table.rejilla td.nota { font-weight: 700; }
  /* Separador visual antes de la columna Nota */
  table.rejilla .sep { border-left: 2px solid var(--acento); }

  /* Celdas de nota coloreadas tipo semáforo (mockup) */
  table.rejilla td.g-top  { background: var(--g-top-bg)  !important; color: var(--g-top-tx); }
  table.rejilla td.g-alta { background: var(--g-alta-bg) !important; color: var(--g-alta-tx); }
  table.rejilla td.g-media{ background: var(--g-media-bg)!important; color: var(--g-media-tx); }
  table.rejilla td.g-baja { background: var(--g-baja-bg) !important; color: var(--g-baja-tx); }
  table.rejilla td.g-susp { background: var(--g-susp-bg) !important; color: var(--g-susp-tx); }
  table.rejilla td.nota.g-top,
  table.rejilla td.nota.g-alta,
  table.rejilla td.nota.g-media,
  table.rejilla td.nota.g-baja,
  table.rejilla td.nota.g-susp { font-weight: 700; }

  /* Zebra solo en celdas sin color de nota */
  table.rejilla tbody tr:nth-child(odd) td:not([class*="g-"]) { background: #fafbfc; }
  table.rejilla tbody tr:nth-child(even) td:not([class*="g-"]) { background: var(--surface); }
  table.rejilla tbody tr:hover td:not([class*="g-"]) { background: #f3f4fd; }

  /* ===================================================================
     RESPONSIVE
     =================================================================== */
  @media (max-width: 820px) {
    /* En móvil: fuera la barra lateral y la hamburguesa; manda la tab bar. */
    .sidebar, .velo, .hamburguesa { display: none !important; }
    .area-principal { height: 100dvh; }

    /* Editor de rúbricas: en móvil los criterios se apilan para que el modal
       no tenga scroll horizontal (los radios y los selects no caben en fila). */
    .rub-modo { flex-direction: column; gap: 8px; }
    /* Evaluador de rúbrica: solo las flechas ‹ › (el nombre necesita el sitio). */
    .rub-eval-nav .rub-nav-txt { display: none; }

    /* Barra superior: la MARCA fija a la izquierda + buscador. El título de
       sección lo da la tab bar, y el curso baja a las listas de Clases/Grupos
       (solo hace falta al elegir grupo o clase). */
    .topbar { padding: 0 16px; gap: 8px; }
    .topbar-marca { display: block; margin-right: auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; }
    .topbar-titulo { display: none; }
    .curso-chip { padding: 5px 8px; }
    .curso-chip-ico { display: none; }
    /* El buscador se colapsa en la lupa: oculto salvo cuando está «buscando»,
       y entonces se despliega ocupando la barra (encima de marca y curso). */
    .buscador-toggle { display: inline-flex; margin-left: 0; }
    .buscador { display: none; }
    .topbar.buscando .buscador {
      display: flex; position: absolute; left: 12px; right: 52px; width: auto;
      z-index: 5; }
    .topbar.buscando .buscador input { width: 100%; }
    .topbar.buscando .ico-lupa { display: none; }
    .topbar.buscando .ico-cerrar { display: block; }

    /* Cabecera de las listas (Mis clases / Mis grupos) en UNA sola línea:
       título compacto que cede espacio y acciones que no se parten. */
    .cabecera-seccion { flex-wrap: nowrap; }
    .cabecera-seccion h1 { font-size: 19px; flex: 0 1 auto; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .acciones-seccion { flex: 0 0 auto; gap: 8px; }
    .acciones-seccion .btn { padding: 8px 10px; white-space: nowrap; }

    main { padding: 16px 16px calc(74px + env(safe-area-inset-bottom, 0px)); }

    /* Tab bar inferior fija */
    .tabbar {
      display: flex; position: fixed; left: 0; right: 0; bottom: 0; z-index: 45;
      gap: 2px; padding: 5px 6px calc(5px + env(safe-area-inset-bottom, 0px));
      background: rgba(255,255,255,.94); backdrop-filter: saturate(180%) blur(10px);
      border-top: 1px solid var(--borde); box-shadow: 0 -2px 14px rgba(16,18,24,.07);
    }

    /* La rejilla deja hueco para la tab bar */
    .rejilla-cont { max-height: calc(100dvh - var(--topbar-alto) - 168px); }

    /* La cabecera compacta apila acciones bajo el título sin apretar */
    .cabecera-rejilla, .cabecera-clase { gap: 10px 12px; }
    .cabecera-rejilla h1, .cabecera-clase h1 { font-size: 19px; }
    .cabecera-rejilla .meta, .cabecera-clase .meta { white-space: normal; } /* envuelve en móvil */
    /* Las acciones envuelven a varias líneas en vez de salirse */
    .acciones-unidad { flex-wrap: wrap; width: 100%; }
    .acciones-unidad .btn { flex: 1 1 auto; justify-content: center; }
    /* En las cabeceras de detalle: la papelera no estira (queda cuadrada) y
       el botón destacado (Resumen) domina la fila frente a Editar. */
    .acciones-unidad .btn-icono { flex: 0 0 auto; }
    .acciones-unidad .btn-destacado { flex-grow: 2; }

    /* Botón partido a lo ancho: la acción principal estira, el icono no. */
    .btn-split { flex: 1 1 auto; }
    .btn-split .btn:first-child { flex: 1 1 auto; }
    .btn-split .btn-split-extra { flex: 0 0 auto; }

    /* Columna fija de alumno: solo el avatar (el nombre va en el title).
       Así se libera espacio horizontal para las columnas de notas. */
    table.rejilla .esq { text-align: center; }
    table.rejilla th.esq { font-size: 0; }            /* oculta "Alumno/a", deja la celda mínima */
    table.rejilla td.esq .al-nom { display: none; }
    table.rejilla td.esq .mini-avatar { margin-right: 0; }
    /* Junto al avatar, el nombre corto (nombre de pila o alias) en una columna
       normal, NO sticky: al hacer scroll horizontal se va con las notas. */
    table.rejilla .al-corto { display: table-cell; text-align: left;
      font-weight: 500; color: var(--texto);
      max-width: 96px; overflow: hidden; text-overflow: ellipsis; }
    /* Sombra suave en el borde de la columna fija: al hacer scroll, el nombre
       se desliza "por debajo" del avatar en vez de cortarse en seco. */
    table.rejilla td.esq, table.rejilla th.esq {
      box-shadow: 6px 0 8px -6px rgba(16,18,24,.20);
    }
  }

  /* "Copiar para Séneca" solo existe en escritorio (la extensión Autonotas es
     de Chrome de escritorio): se oculta por TIPO de dispositivo (táctil), no
     por ancho, para que tampoco aparezca en tablets grandes. */
  @media (hover: none), (pointer: coarse) {
    .solo-escritorio { display: none !important; }

    /* iOS Safari hace zoom automático al enfocar campos con letra <16px:
       en táctil, todos los campos de texto van a 16px para evitarlo. */
    .modal input, .modal select, .modal textarea,
    .buscador input, .curso-chip select,
    table.rejilla td input,
    .rubrica-grid .celda, .rubrica-grid .ind-txt { font-size: 16px; }
  }

  /* ---------- Planificador (tras la bandera FLAGS.planner) ---------- */
  .planner-barra { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    margin: 0 0 16px; }
  /* Selector de modo tipo control segmentado (como Planboard). */
  .planner-modos { display: inline-flex; align-items: stretch; padding: 3px;
    background: var(--fondo-2, var(--borde)); border: 1px solid var(--borde);
    border-radius: 10px; gap: 2px; }
  .planner-modo { appearance: none; border: 0; background: transparent; color: var(--texto-2);
    font: inherit; font-size: 14px; font-weight: 600; padding: 6px 14px; border-radius: 7px;
    cursor: pointer; white-space: nowrap; transition: background .12s, color .12s; }
  .planner-modo:hover { color: var(--texto); }
  .planner-modo.activo { background: var(--surface); color: var(--acento);
    box-shadow: var(--sombra-1); }
  /* Menú de configuración del planificador (popover bajo el botón ⚙). */
  .planner-config-wrap { position: relative; }
  /* Texto que solo se ve en PC (móvil: iconos más compactos). */
  .solo-movil-inline { display: none; }
  @media (max-width: 820px) {
    .btn-txt-movil { display: none; }           /* Configuración/Exportar: solo icono */
    .solo-pc-inline { display: none; }
    .solo-movil-inline { display: inline; }
    /* Selector de modos a todo el ancho. */
    .planner-modos { display: flex; width: 100%; }
    .planner-modo { flex: 1; padding: 6px 4px; }
    /* Navegación de fecha a todo el ancho: fecha ancha y «Hoy» a la derecha. */
    .planner-nav { display: flex; width: 100%; align-items: center; }
    .planner-nav .planner-semana-etq { flex: 1; min-width: 0; }
  }
  .planner-config-menu { position: absolute; top: calc(100% + 6px); right: 0; z-index: 40;
    min-width: 230px; padding: 6px; background: var(--surface); border: 1px solid var(--borde);
    border-radius: 12px; box-shadow: var(--sombra-2, var(--sombra-1)); display: flex;
    flex-direction: column; gap: 2px; }
  .pcfg-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    padding: 8px 10px; border: 0; background: transparent; color: var(--texto); font: inherit;
    font-size: 14px; border-radius: 8px; cursor: pointer; }
  .pcfg-item:hover { background: var(--acento-suave); }
  .pcfg-sep { height: 1px; background: var(--borde); margin: 5px 4px; }
  .pcfg-group { padding: 6px 8px 8px; }
  .pcfg-tit { display: block; font-size: 12px; font-weight: 600; color: var(--texto-3);
    text-transform: uppercase; letter-spacing: .03em; margin-bottom: 6px; }
  .pcfg-radios { display: inline-flex; padding: 3px; background: var(--borde);
    border-radius: 9px; gap: 2px; width: 100%; }
  .pcfg-opt { flex: 1; border: 0; background: transparent; color: var(--texto-2); font: inherit;
    font-size: 13px; font-weight: 600; padding: 5px 8px; border-radius: 7px; cursor: pointer;
    white-space: nowrap; }
  .pcfg-opt:hover { color: var(--texto); }
  .pcfg-opt.activo { background: var(--surface); color: var(--acento); box-shadow: var(--sombra-1); }
  /* Vista diaria: una jornada en columna, a lo ancho. */
  .pl-dia { display: flex; flex-direction: column; gap: 8px; max-width: 720px; }
  .pl-dia.pl-nolect { opacity: .85; }
  .planner-nav { display: inline-flex; align-items: center; gap: 6px; }
  .planner-semana-etq { font-weight: 600; font-size: 14px; min-width: 190px;
    text-align: center; }
  .planner-dia { background: var(--surface); border: 1px solid var(--borde);
    border-radius: var(--radio); box-shadow: var(--sombra-1); padding: 12px 14px;
    margin-bottom: 12px; }
  .planner-dia h3 { margin: 0 0 8px; font-size: 14px; text-transform: capitalize; }
  .planner-vacio { color: var(--texto-3); font-size: 13px; padding: 2px 0 4px; }
  .planner-sesion { display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-top: 1px solid var(--borde); }
  .planner-sesion:first-of-type { border-top: 0; }
  .planner-sesion.hecha .planner-sesion-tit { text-decoration: line-through;
    color: var(--texto-2); }
  .planner-sesion-txt { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .planner-sesion-tit { font-weight: 600; font-size: 14px; }
  .planner-sesion-meta { color: var(--texto-2); font-size: 12px; }
  .planner-sesion-acc { display: inline-flex; gap: 4px; }
  .planner-estado { border: 0; border-radius: 999px; padding: 4px 10px; font: inherit;
    font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .planner-estado.pendiente { background: var(--acento-suave); color: var(--acento-fuerte); }
  .planner-estado.hecha { background: var(--g-top-bg); color: var(--g-top-tx); }
  .planner-estado.aplazada { background: var(--g-baja-bg); color: var(--g-baja-tx); }
  .planner-estado.borrador { background: var(--bg); color: var(--texto-3); cursor: default; }
  .planner-asigs { max-height: 240px; overflow-y: auto; border: 1px solid var(--borde);
    border-radius: 8px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  /* Hint bajo los botones de tipo: sin el margen superior negativo de .ayuda
     (que lo montaba encima de los botones). */
  .ayuda-tipo { margin-top: 6px; }
  /* Fila clase + fecha + observaciones: en una sola línea que se reparte a lo
     ancho; si no cabe (móvil), los campos bajan de línea sin partir el nombre. */
  /* Clase + fecha + observaciones en una línea; si no caben (panel estrecho),
     las observaciones bajan a la segunda. */
  .planner-asig-fila { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 8px;
    padding: 8px; border-radius: 10px; }
  /* Clase marcada: tarjeta resaltada, separada de la siguiente (gap del contenedor). */
  .planner-asig-fila.activa { background: var(--acento-suave); border: 1px solid var(--borde); }
  /* Sin marcar: no se muestran su fecha ni sus observaciones (aún no aplican). */
  .planner-asig-fila:not(.activa) .planner-asig-fecha,
  .planner-asig-fila:not(.activa) .planner-asig-obs { display: none; }
  /* Nombre de la clase con ancho fijo para que fecha y observaciones alineen. */
  .ses-form .planner-asig-nom { flex: 0 0 145px; width: 145px; min-width: 0; margin: 0; display: flex;
    align-items: center; gap: 4px; line-height: 1.3; }
  .planner-asig-nom-txt { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Reprogramar: Adelantar (izq) · Reprogramar (centro) · Retrasar (der). */
  .ses-reprog { display: flex; align-items: stretch; gap: 8px; margin-bottom: 14px; }
  .ses-reprog-btn { flex: 1 1 0; font-size: 13px; justify-content: center; }
  .ses-reprog-etq { flex: 0 0 auto; display: inline-flex; align-items: center; padding: 0 12px;
    font-size: 13px; font-weight: 600; color: var(--texto-2); background: var(--bg);
    border: 1px solid var(--borde); border-radius: 8px; white-space: nowrap; }
  /* Fecha con el ancho justo de dd/mm/aaaa; empujada a la derecha (margin-left
     auto) para que su borde derecho coincida con el de las observaciones. */
  .ses-form .planner-asig-fecha { flex: 0 0 auto; width: 125px; max-width: 100%; box-sizing: border-box;
    margin: 0 0 0 auto; padding: 6px 8px; -webkit-appearance: none; appearance: none; overflow: hidden;
    border: 1px solid var(--borde-fuerte); border-radius: 8px; font: inherit; font-size: 15px; }
  /* Observaciones siempre en su propia línea, a todo el ancho de la fila. */
  .ses-form .planner-asig-obs { flex: 1 1 100%; box-sizing: border-box; margin: 0;
    padding: 6px 8px;
    border: 1px solid var(--borde-fuerte); border-radius: 8px; font: inherit; font-size: 13px; }
  /* Marca de observaciones en el chip de la rejilla y en la línea de la lista. */
  .pl-chip-obs { display: inline-flex; vertical-align: -1px; margin-left: 4px; color: var(--texto-2); }
  .pl-chip-obs .svg-ico { width: 12px; height: 12px; }
  .planner-sesion-obs { display: inline-flex; align-items: center; gap: 4px; margin-top: 2px;
    font-size: 12px; color: var(--texto-2); font-style: italic; }
  .planner-sesion-obs .svg-ico { width: 12px; height: 12px; }
  /* Criterios como casillas (igual que en las actividades del cuaderno) */
  .planner-crit { max-height: 220px; overflow-y: auto; }
  .planner-crit-area { font-size: 12px; font-weight: 700; color: var(--texto-2);
    text-transform: uppercase; letter-spacing: .02em; margin: 8px 0 4px; }
  .planner-crit-area:first-child { margin-top: 0; }
  /* Editor de horario (modal) */
  .planner-hor-clase { padding: 10px 0; border-top: 1px solid var(--borde); }
  .planner-hor-clase:first-of-type { border-top: 0; }
  .planner-hor-cab { display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 6px; }
  .planner-hor-nombre { font-weight: 600; font-size: 14px; }
  .planner-prov-add { display: flex; gap: 8px; margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--borde); }
  .planner-prov-add input { flex: 1; min-width: 0; padding: 7px 10px;
    border: 1px solid var(--borde-fuerte); border-radius: 8px; font: inherit; font-size: 14px; }
  .planner-prov-add .btn { white-space: nowrap; }
  /* Tarjeta de clase todavía sin grupo asociado (se completa al pulsarla). */
  .cc-sin-grupo { color: var(--texto-3); font-style: italic; }

  /* ---------- Rejilla semanal del planificador (grupos × días / por horario) ---------- */
  .pl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 6px; }
  /* Layout "por grupo": rejilla con 1ª columna fija (etiqueta de clase). */
  .pl-grid { display: grid; grid-template-columns: 132px repeat(var(--cols), minmax(120px, 1fr));
    gap: 6px; min-width: 640px; align-items: stretch; }
  .pl-cab { font-size: 12px; font-weight: 700; color: var(--texto-2); text-transform: capitalize;
    padding: 2px 2px 6px; }
  .pl-cab span, .pl-col-cab span { color: var(--texto-3); font-weight: 500; }
  .pl-esq { position: sticky; left: 0; background: var(--bg); z-index: 1; }
  .pl-fila-lbl { display: flex; align-items: center; font-size: 13px; font-weight: 600;
    padding: 6px 8px 6px 0; }
  /* Celda con sesión: la tarjeta la llena por completo (sin marco gris). El
     cuadro blanco con borde solo se ve en los días vacíos (.pl-celda-nueva). */
  .pl-celda { min-height: 44px; border-radius: 8px; display: flex; flex-direction: column; gap: 4px; }
  /* Layout "por horario": columnas apiladas por día. */
  .pl-cols { display: flex; gap: 8px; min-width: 680px; align-items: flex-start; }
  .pl-col { flex: 1; min-width: 148px; display: flex; flex-direction: column; gap: 6px; }
  .pl-col-cab { font-size: 12px; font-weight: 700; color: var(--texto-2); text-transform: capitalize;
    padding: 2px 2px 2px; }
  .pl-hoy { color: var(--acento); }
  /* Tarjeta de sesión (celda), estilo Planboard: cabecera de color + cuerpo. */
  .pl-chip { display: flex; flex-direction: column; background: var(--surface);
    border: 1px solid var(--borde); border-left: 4px solid var(--acento); border-radius: 6px;
    overflow: hidden; }
  /* En la rejilla grupo×días, las tarjetas llenan el alto de la celda. */
  .pl-celda > .pl-chip { flex: 1 1 auto; }
  .pl-chip-cab { display: flex; gap: 6px; align-items: flex-start; padding: 5px 7px; cursor: pointer;
    color: #fff; }
  .pl-chip-cab .pl-chip-sub { color: rgba(255, 255, 255, .88); }
  .pl-chip-cab .pl-chip-grip { color: rgba(255, 255, 255, .75); }
  .pl-chip-cab .pl-chip-obs { color: rgba(255, 255, 255, .9); }
  .pl-chip-desc { padding: 4px 8px 6px; border-top: 1px solid var(--borde); font-size: 11.5px;
    color: var(--texto-2); line-height: 1.35; overflow-wrap: anywhere; cursor: pointer; }
  .pl-chip-arrastrando { opacity: .45; }
  /* Punto con el color de la clase junto a la etiqueta de fila. */
  .pl-fila-color { display: inline-block; width: 9px; height: 9px; border-radius: 50%;
