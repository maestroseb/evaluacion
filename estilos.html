<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  /* DSEG7: display de 7 segmentos tipo LCD Casio (para los números de unidad). */
  @import url('https://cdn.jsdelivr.net/npm/dseg@0.46.0/css/dseg.css');

  :root {
    --acento: #5b5bd6;        /* índigo Linear-ish */
    --acento-fuerte: #4a4ac4;
    --acento-suave: #eef0ff;
    --bg: #f6f7fb;
    --surface: #ffffff;
    --borde: #e9eaee;
    --borde-fuerte: #dcdee3;
    --texto: #1c1e24;
    --texto-2: #6b7280;
    --texto-3: #9aa0ab;
    --peligro: #d1453b;
    --peligro-bg: #fdeceb;
    --ok: #2e7d57;
    --radio: 12px;
    --sombra-1: 0 1px 2px rgba(16,18,24,.04), 0 1px 3px rgba(16,18,24,.06);
    --sombra-2: 0 4px 16px rgba(16,18,24,.08);
    --sombra-3: 0 10px 30px rgba(16,18,24,.10);
    /* Escala de notas tipo semáforo (como el mockup) */
    --g-top-bg: #d6f3e3;   --g-top-tx: #14653f;
    --g-alta-bg: #e3f6dd;  --g-alta-tx: #2e6b1f;
    --g-media-bg: #fdf4d3; --g-media-tx: #8a6d10;
    --g-baja-bg: #fde7cf;  --g-baja-tx: #9a5410;
    --g-susp-bg: #fbdcd6;  --g-susp-tx: #b23227;
    /* Sidebar */
    --lat-ancho: 248px;
    --lat-ancho-min: 72px;
    --topbar-alto: 60px;
  }

  * { box-sizing: border-box; }
  [hidden] { display: none !important; }

  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    font-feature-settings: 'cv02','cv03','cv04','ss01';
    color: var(--texto);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
  }

  /* ===================================================================
     SHELL: sidebar + área principal
     =================================================================== */
  .app-shell { display: flex; height: 100vh; overflow: hidden; }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: var(--lat-ancho); flex: 0 0 var(--lat-ancho);
    background: var(--surface); border-right: 1px solid var(--borde);
    display: flex; flex-direction: column; gap: 4px;
    padding: 14px 12px; position: sticky; top: 0; height: 100vh;
    transition: width .18s ease, flex-basis .18s ease;
    z-index: 40;
  }
  .sidebar.colapsada { width: var(--lat-ancho-min); flex-basis: var(--lat-ancho-min); }

  .sidebar-head { display: flex; align-items: center; justify-content: space-between;
    padding: 6px 8px 10px; }
  .marca { display: flex; align-items: center; gap: 10px; cursor: pointer; min-width: 0; }
  .marca-icono {
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center; font-size: 18px;
    background: linear-gradient(135deg, var(--acento), #7a7af0); color: #fff;
    box-shadow: var(--sombra-1);
  }
  .marca-txt { font-weight: 700; font-size: 16px; letter-spacing: -.02em; color: var(--texto);
    white-space: nowrap; overflow: hidden; }

  .perfil {
    display: flex; align-items: center; gap: 10px; padding: 8px;
    margin: 2px 2px 8px; border-radius: 10px; background: var(--bg);
  }
  .perfil .avatar {
    width: 34px; height: 34px; flex: 0 0 34px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
    background: linear-gradient(135deg, var(--acento), #8a8af2);
  }
  .perfil-info { display: flex; flex-direction: column; min-width: 0; }
  .perfil-nombre { font-size: 13px; font-weight: 600; color: var(--texto);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .perfil-rol { font-size: 11px; color: var(--texto-3); }

  .menu-lat { display: flex; flex-direction: column; gap: 3px; }
  .menu-lat-pie { margin-top: auto; padding-top: 8px; border-top: 1px solid var(--borde); }
  .item-lat {
    display: flex; align-items: center; gap: 12px; padding: 9px 11px; border-radius: 9px;
    color: var(--texto-2); cursor: pointer; font-size: 14px; font-weight: 550;
    white-space: nowrap; transition: background .12s, color .12s; user-select: none;
  }
  .item-lat:hover { background: var(--bg); color: var(--texto); }
  .item-lat.activo { background: var(--acento-suave); color: var(--acento-fuerte); }
  .item-lat.activo .item-ico { transform: none; }
  .item-ico { width: 22px; flex: 0 0 22px; text-align: center; font-size: 17px; line-height: 1; }
  .item-txt { overflow: hidden; }

  /* Estado colapsado: solo iconos */
  .sidebar.colapsada .marca-txt,
  .sidebar.colapsada .perfil-info,
  .sidebar.colapsada .item-txt { display: none; }
  .sidebar.colapsada .sidebar-head { justify-content: center; }
  .sidebar.colapsada .perfil { justify-content: center; }
  .sidebar.colapsada .item-lat { justify-content: center; padding: 10px; }

  /* ---------- Área principal ---------- */
  .area-principal { flex: 1 1 auto; min-width: 0; height: 100vh;
    display: flex; flex-direction: column; }

  .topbar {
    height: var(--topbar-alto); flex: 0 0 var(--topbar-alto);
    display: flex; align-items: center; gap: 14px; padding: 0 22px;
    background: rgba(255,255,255,.82); backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--borde); position: sticky; top: 0; z-index: 30;
  }
  .hamburguesa { display: none; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer;
    font-size: 19px; color: var(--texto-2); padding: 6px 8px; border-radius: 8px; }
  .hamburguesa:hover { background: var(--bg); color: var(--texto); }
  .topbar-titulo { font-size: 17px; font-weight: 650; letter-spacing: -.02em; margin: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .buscador { margin-left: auto; position: relative; display: flex; align-items: center;
    width: min(340px, 42vw); }
  .buscador-ico { position: absolute; left: 12px; font-size: 13px; color: var(--texto-3);
    pointer-events: none; }
  .buscador input {
    width: 100%; padding: 9px 12px 9px 34px; font-size: 14px; font-family: inherit;
    border: 1px solid var(--borde-fuerte); border-radius: 10px; background: var(--surface);
    color: var(--texto); transition: border-color .12s, box-shadow .12s;
  }
  .buscador input:focus { outline: none; border-color: var(--acento);
    box-shadow: 0 0 0 3px var(--acento-suave); }

  /* Velo para sidebar en móvil */
  .velo { display: none; position: fixed; inset: 0; background: rgba(20,22,28,.4);
    z-index: 39; }

  /* Barra de pestañas inferior (solo móvil) */
  .tabbar { display: none; }
  .tab { display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; flex: 1 1 0; padding: 7px 2px; border-radius: 12px; cursor: pointer;
    color: var(--texto-3); font-size: 11px; font-weight: 600; text-decoration: none;
    text-align: center; user-select: none; transition: color .12s, background .12s; }
  .tab .tab-ico { font-size: 20px; line-height: 1; }
  .tab.activo { color: var(--acento-fuerte); }
  .tab.activo .tab-ico { transform: translateY(-1px); }
  .tab:active { background: var(--bg); }

  main { flex: 1 1 auto; min-height: 0; padding: 22px 24px 28px; overflow: auto; }
  .aviso { padding: 56px; text-align: center; color: var(--texto-3); font-size: 14px; }

  .cabecera-seccion {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px 16px; flex-wrap: wrap;
  }
  h1 { font-size: 23px; font-weight: 700; letter-spacing: -.025em; margin: 0; }
  main section > p.meta { margin: 2px 0 16px; }
  .volver { margin-bottom: 10px; }
  h2 { font-size: 16px; font-weight: 600; letter-spacing: -.01em; margin: 0; }

  /* ---------- Tarjetas ---------- */
  .tarjetas { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); }
  .tarjeta {
    background: var(--surface); border: 1px solid var(--borde); border-radius: var(--radio);
    padding: 18px; cursor: pointer; box-shadow: var(--sombra-1);
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s;
  }
  .tarjeta:hover { transform: translateY(-3px); box-shadow: var(--sombra-3); border-color: var(--borde-fuerte); }
  .tarjeta h3 { margin: 0 0 8px; font-size: 15px; font-weight: 650; letter-spacing: -.01em; }
  .tarjeta .meta { color: var(--texto-2); font-size: 13px; line-height: 1.5; }
  .tarjeta-color { border-left: 4px solid transparent; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    box-shadow: inset 0 0 0 2px #fff, 0 0 0 1px var(--borde); transition: transform .1s; }
  .swatch:hover { transform: scale(1.1); }
  .swatch.sel { box-shadow: inset 0 0 0 2px #fff, 0 0 0 2px var(--texto); }
  /* Tarjeta de unidad: baldosa en rejilla, todo en una fila alineada:
     asa ⠿ · número LCD · título · acciones. Se reordena arrastrando por el asa. */
  .tarjeta-unidad { display: flex; align-items: center; gap: 12px; padding: 15px 16px;
    position: relative; }
  .tarjeta-unidad.arrastrando { opacity: .9; box-shadow: var(--sombra-3); transform: scale(1.02);
    cursor: grabbing; }
  .u-grip { flex: 0 0 auto; cursor: grab; color: var(--texto-3); font-size: 14px; line-height: 1;
    padding: 2px 3px; border-radius: 6px; touch-action: none; user-select: none; }
  .u-grip:hover { background: var(--bg); color: var(--texto-2); }
  .u-grip:active { cursor: grabbing; }
  /* Número en display de 7 segmentos (tipo Casio) sobre fondo gris claro; los
     dígitos toman el color de la clase (por style inline). Degrada a monospace. */
  .u-num {
    flex: 0 0 auto; min-width: 44px; height: 32px; padding: 0 9px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #eef0f4; color: var(--acento);
    font-family: 'DSEG7 Classic', ui-monospace, 'Courier New', monospace;
    font-size: 15px; font-weight: 400; letter-spacing: 1px;
  }
  /* Título de la unidad. Se escoge con más especificidad que ".tarjeta h3"
     (que tenía margin-bottom) para que quede centrado verticalmente. */
  .tarjeta-unidad .u-nom { flex: 1 1 auto; min-width: 0; margin: 0; font-size: 15px;
    font-weight: 600; line-height: 1.2; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  /* Acciones a la derecha; aparecen al pasar el ratón (absolutas, no roban ancho
     al título) y siempre visibles en táctil. */
  .acciones-tarjeta {
    position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
    display: flex; gap: 6px; opacity: 0; transition: opacity .12s;
    padding-left: 30px;
    background: linear-gradient(90deg, rgba(255,255,255,0), var(--surface) 42%);
  }
  .tarjeta-unidad:hover .acciones-tarjeta { opacity: 1; }
  @media (hover: none) { .acciones-tarjeta { opacity: 1; } }
  .icono {
    border: 1px solid var(--borde); background: var(--surface); border-radius: 7px;
    width: 28px; height: 28px; cursor: pointer; font-size: 13px; line-height: 1;
    color: var(--texto-2); display: inline-flex; align-items: center; justify-content: center;
    box-shadow: var(--sombra-1); transition: background .12s, color .12s, border-color .12s;
  }
  .icono:hover { background: var(--bg); color: var(--texto); }
  .icono.peligro:hover { background: var(--peligro-bg); color: var(--peligro); border-color: #f3c6c2; }
  .vacio {
    grid-column: 1 / -1; color: var(--texto-3); padding: 48px 24px; text-align: center;
    font-size: 14px; background: var(--surface); border: 1px dashed var(--borde-fuerte);
    border-radius: var(--radio);
  }

  /* ---------- Tarjeta de clase (con cabecera de color e icono) ---------- */
  .clase-card {
    display: flex; flex-direction: column; overflow: hidden; cursor: pointer;
    background: var(--surface); border: 1px solid var(--borde); border-radius: var(--radio);
    box-shadow: var(--sombra-1);
    transition: transform .14s ease, box-shadow .14s ease, border-color .14s;
  }
  .clase-card:hover { transform: translateY(-3px); box-shadow: var(--sombra-3); border-color: var(--borde-fuerte); }
  .clase-card-head {
    display: flex; align-items: center; gap: 12px; padding: 15px 16px;
    background: var(--c, var(--acento)); color: #fff;
  }
  .clase-card-ico {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,.22);
    display: inline-flex; align-items: center; justify-content: center;
  }
  .clase-card-ico svg { width: 23px; height: 23px; stroke: #fff; fill: none; }
  .clase-card-head h3 { margin: 0; font-size: 15.5px; font-weight: 650; color: #fff;
    letter-spacing: -.01em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .clase-card-body { flex: 1 1 auto; padding: 14px 16px 4px;
    display: flex; flex-direction: column; gap: 5px; }
  .cc-meta { font-size: 13px; color: var(--texto-2); }
  .cc-meta b { color: var(--texto); font-weight: 600; }
  .cc-btn { margin: 12px 16px 16px; text-align: center; }

  /* ---------- Selector de iconos (modal) ---------- */
  .iconos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(46px, 1fr));
    gap: 8px; max-height: 176px; overflow: auto; padding: 2px; }
  .icono-opt {
    display: inline-flex; align-items: center; justify-content: center; padding: 9px;
    border: 1px solid var(--borde-fuerte); border-radius: 10px; background: var(--surface);
    color: var(--texto-2); cursor: pointer;
    transition: background .12s, color .12s, border-color .12s, box-shadow .12s;
  }
  .icono-opt svg { width: 22px; height: 22px; stroke: currentColor; fill: none; }
  .icono-opt:hover { background: var(--bg); color: var(--texto); }
  .icono-opt.sel { border-color: var(--acento); color: var(--acento-fuerte);
    background: var(--acento-suave); box-shadow: 0 0 0 2px var(--acento-suave); }

  /* ---------- Botones ---------- */
  .btn {
    border: 1px solid var(--borde-fuerte); border-radius: 9px; padding: 8px 14px;
    font-size: 14px; font-weight: 550; font-family: inherit; cursor: pointer;
    background: var(--surface); color: var(--texto); box-shadow: var(--sombra-1);
    transition: background .12s, border-color .12s, transform .06s;
  }
  .btn:hover { background: var(--bg); border-color: var(--borde-fuerte); }
  .btn:active { transform: translateY(1px); }
  .btn.primario { background: var(--acento); border-color: var(--acento); color: #fff;
    box-shadow: 0 1px 2px rgba(91,91,214,.25), 0 2px 8px rgba(91,91,214,.18); }
  .btn.primario:hover { background: var(--acento-fuerte); }
  .btn.peligro { background: #fff; border-color: var(--borde-fuerte); color: var(--peligro); }
  .btn.peligro:hover { background: var(--peligro-bg); border-color: #f3c6c2; }
  .btn:disabled { opacity: .55; cursor: default; }

  /* ---------- Detalle ---------- */
  .volver { display: inline-flex; align-items: center; gap: 4px; margin-bottom: 12px;
    color: var(--texto-2); cursor: pointer; font-size: 13px; font-weight: 500; }
  .volver:hover { color: var(--acento-fuerte); }
  .contador { color: var(--texto-3); font-weight: 400; font-size: 15px; }
  .meta { color: var(--texto-2); font-size: 14px; }
  ol.alumnos { margin: 0; padding: 0; list-style: none; counter-reset: al; }
  ol.alumnos li { background: var(--surface); border: 1px solid var(--borde);
    border-radius: 10px; margin: 8px 0; padding: 10px 14px; font-size: 14px;
    display: flex; align-items: center; gap: 12px; counter-increment: al; }
  ol.alumnos li::before { content: counter(al); color: var(--texto-3);
    font-variant-numeric: tabular-nums; font-size: 12px; min-width: 18px; }
  .nota-fase { margin-top: 24px; color: var(--texto-3); font-size: 13px; }

  /* ---------- Avatares con iniciales ---------- */
  .mini-avatar {
    width: 28px; height: 28px; flex: 0 0 28px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: #fff; letter-spacing: .02em;
  }

  /* ---------- Modal ---------- */
  .modal-fondo {
    position: fixed; inset: 0; background: rgba(20,22,28,.45);
    display: flex; align-items: center; justify-content: center; padding: 16px;
    z-index: 1000; backdrop-filter: blur(2px);
  }
  .modal-fondo[hidden] { display: none; }
  .modal {
    background: var(--surface); border-radius: 16px; padding: 24px;
    width: 100%; max-width: 480px; max-height: 90vh; overflow: auto;
    box-shadow: 0 12px 40px rgba(16,18,24,.22); animation: modal-in .16s ease;
  }
  @keyframes modal-in { from { opacity: 0; transform: translateY(8px) scale(.99); } to { opacity: 1; } }
  .modal h2 { margin: 0 0 18px; font-size: 18px; }
  .modal label { display: block; margin-bottom: 14px; font-size: 13px; font-weight: 600; color: var(--texto); }
  .modal input, .modal select, .modal textarea {
    width: 100%; margin-top: 6px; padding: 10px 11px; font-size: 14px; font-weight: 400;
    border: 1px solid var(--borde-fuerte); border-radius: 8px; font-family: inherit;
    color: var(--texto); background: var(--surface); transition: border-color .12s, box-shadow .12s;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    outline: none; border-color: var(--acento); box-shadow: 0 0 0 3px var(--acento-suave);
  }
  .modal textarea { resize: vertical; }
  .modal p.mensaje { margin: 0 0 4px; font-size: 14px; line-height: 1.5; color: var(--texto); }
  .ayuda { font-size: 12px; color: var(--texto-3); margin: -8px 0 4px; }
  .acciones-modal { display: flex; gap: 16px; }
  .link, .link-peligro { background: none; border: none; cursor: pointer;
    font-size: 13px; font-weight: 500; padding: 4px 0; }
  .link { color: var(--acento-fuerte); }
  .link-peligro { color: var(--peligro); }
  .link:hover, .link-peligro:hover { text-decoration: underline; }
  .modal-acciones { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
    background: #23252b; color: #fff; padding: 12px 18px; border-radius: 10px;
    font-size: 14px; max-width: 90%; box-shadow: var(--sombra-2); z-index: 1100;
    animation: modal-in .16s ease;
  }
  .toast.error { background: var(--peligro); }

  /* Spinner de carga */
  .spinner-wrap { display: flex; justify-content: center; padding: 48px; }
  .spinner { width: 28px; height: 28px; border: 3px solid var(--borde-fuerte);
    border-top-color: var(--acento); border-radius: 50%; animation: girar .7s linear infinite; }
  @keyframes girar { to { transform: rotate(360deg); } }

  /* ---------- Cabeceras (rejilla compacta / tarjeta de clase) ----------
     Una fila: icono volver · [icono color] · título+meta · acciones dcha. */
  .cabecera-rejilla, .cabecera-clase {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .cabecera-rejilla { margin-bottom: 12px; }
  /* La cabecera de clase/grupo es una tarjeta que agrupa la identidad. */
  .cabecera-clase {
    background: var(--surface); border: 1px solid var(--borde);
    border-radius: var(--radio); box-shadow: var(--sombra-1);
    padding: 16px 18px; margin-bottom: 18px;
  }
  .titulo-bloque { flex: 1 1 auto; min-width: 0; }
  .cabecera-rejilla h1, .cabecera-clase h1 { font-size: 20px; line-height: 1.15; }
  .cabecera-rejilla .meta, .cabecera-clase .meta { margin: 2px 0 0; font-size: 13px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* Icono cuadrado de color con la inicial (identidad de la clase/grupo). */
  .clase-ico {
    flex: 0 0 auto; width: 42px; height: 42px; border-radius: 12px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff; letter-spacing: .01em;
    background: var(--acento); box-shadow: var(--sombra-1);
  }
  .clase-ico svg { width: 23px; height: 23px; stroke: #fff; fill: none; }
  .volver-icono {
    flex: 0 0 auto; width: 34px; height: 34px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--borde-fuerte); background: var(--surface);
    color: var(--texto-2); cursor: pointer; font-size: 18px; line-height: 1;
    text-decoration: none; box-shadow: var(--sombra-1);
    transition: background .12s, color .12s, border-color .12s;
  }
  .volver-icono:hover { background: var(--bg); color: var(--acento-fuerte); }

  /* ---------- Acciones de unidad ---------- */
  .acciones-unidad { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
  .grupo-btn { position: relative; display: inline-flex; }
  .btn-info {
    position: absolute; top: -7px; right: -7px; z-index: 1;
    width: 18px; height: 18px; padding: 0; border-radius: 50%;
    border: 1px solid var(--borde-fuerte); background: var(--surface); color: var(--texto-2);
    cursor: pointer; font-size: 11px; line-height: 1; display: inline-flex;
    align-items: center; justify-content: center; box-shadow: var(--sombra-1);
    transition: background .12s, color .12s, border-color .12s;
  }
  .btn-info:hover { background: var(--acento); color: #fff; border-color: var(--acento); }
