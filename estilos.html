    margin-right: 6px; vertical-align: 1px; flex: 0 0 auto; }
  /* Celda resaltada mientras se arrastra una sesión encima (con o sin marco). */
  .pl-celda.pl-drop-ok { box-shadow: inset 0 0 0 2px var(--acento); }
  .pl-chip-txt { min-width: 0; display: flex; flex-direction: column; }
  .pl-chip-tit { font-size: 12.5px; font-weight: 600; line-height: 1.25; word-break: break-word; }
  .pl-chip-sub { font-size: 11px; color: var(--texto-2); font-weight: 500; }
  /* Render de texto enriquecido (previsualización de la descripción). */
  .rt-render p { margin: 0 0 4px; }
  .rt-render p:last-child { margin-bottom: 0; }
  .rt-render ul, .rt-render ol { margin: 2px 0; padding-left: 18px; }
  .rt-render li { margin: 1px 0; }
  .rt-render a { color: var(--acento); }
  .rt-render b, .rt-render strong { font-weight: 700; }
  /* Hueco "+ Planificar" compacto */
  .pl-hueco { width: 100%; text-align: left; border: 1px dashed var(--borde-fuerte);
    background: transparent; color: var(--texto-3); border-radius: 6px; padding: 4px 6px;
    font: inherit; font-size: 12px; cursor: pointer; }
  .pl-hueco:hover { border-color: var(--acento); color: var(--acento); }
  .pl-sueltas { margin-top: 14px; }
  /* Celda vacía de la rejilla por grupo: cuadro blanco con borde; toda ella
     planifica al pulsarla (el marco solo aparece en los días sin sesión). */
  .pl-celda-nueva { background: var(--surface); border: 1px solid var(--borde); border-radius: 8px;
    padding: 4px; cursor: pointer; align-items: flex-start; justify-content: flex-start; }
  .pl-celda-nueva:hover { border-color: var(--acento); background: var(--acento-suave); }
  .pl-celda-mas { color: var(--texto-3); font-weight: 700; font-size: 14px; line-height: 1; }
  .pl-celda-nueva:hover .pl-celda-mas { color: var(--acento); }
  /* Días no lectivos (festivos / fuera del curso) */
  .pl-cab.pl-nolect, .pl-col-cab.pl-nolect { color: var(--peligro); }
  .pl-mes-dia.pl-nolect { background: var(--peligro-bg); }
  .pl-mes-fest { display: block; font-size: 10px; font-weight: 600; color: var(--peligro);
    line-height: 1.1; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* Calendario del curso (modal). Inicio/fin destacados en una tarjeta propia
     (fondo acento) y cada festivo en su tarjeta, para separar bien las zonas. */
  .cal-rango { display: flex; flex-wrap: wrap; gap: 10px 14px; background: var(--acento-suave);
    border: 1px solid var(--borde); border-radius: 12px; padding: 12px 14px 14px;
    margin-bottom: 18px; }
  .cal-rango label { flex: 1 1 150px; min-width: 0; margin-bottom: 0; }
  .opcional { font-weight: 400; color: var(--texto-3); }
  /* Tarjetas del módulo «Criterios propios». */
  .tarjeta-crit { display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--borde); border-radius: var(--radio);
    box-shadow: var(--sombra-1); }
  .tarjeta-crit .tc-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
  .tarjeta-crit .tc-info b { font-size: 15px; }
  /* Columnas de nota por RA en el resumen (FP): fondo suave para distinguirlas. */
  .rejilla th.ra-col, .rejilla td.ra-col { background: var(--acento-suave); }
  /* Los input date de iOS traen un ancho mínimo intrínseco que les hacía
     sobresalir de la tarjeta (y pegarse entre sí). Sin apariencia nativa y con
     min-width 0 encogen de verdad con su columna. */
  .cal-rango input { background: var(--surface); min-width: 0; max-width: 100%;
    width: 100%; -webkit-appearance: none; appearance: none; overflow: hidden; }
  /* Festivo en UNA línea: nombre + desde + hasta. Prefijo .cal-fest-fila para
     ganar a «.modal input { width:100% }» (que si no los apila a lo ancho).
     Cada festivo es una tarjeta propia: se distingue bien del siguiente. */
  .cal-fest-fila { display: flex; flex-wrap: nowrap; align-items: center; gap: 6px 8px;
    padding: 10px; background: var(--bg); border: 1px solid var(--borde);
    border-radius: 10px; margin-bottom: 8px; }
  .cal-fest-fila input { background: var(--surface); }
  .cal-fest-fila .cal-fest-desde, .cal-fest-fila .cal-fest-hasta { flex: 0 0 auto; width: 140px;
    box-sizing: border-box; margin: 0; padding: 6px 8px;
    border: 1px solid var(--borde-fuerte); border-radius: 8px; font: inherit; font-size: 13px; }
