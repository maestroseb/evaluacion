<style>
  :root {
    --azul: #1565c0;
    --gris: #f4f6f8;
    --borde: #e0e0e0;
    --texto: #222;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, "Segoe UI", Arial, sans-serif;
    color: var(--texto);
    background: var(--gris);
  }
  .barra {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--azul); color: #fff;
    padding: 12px 20px;
  }
  .logo { font-weight: 600; }
  .nav { display: flex; align-items: center; gap: 18px; }
  .nav a { color: #fff; opacity: .8; cursor: pointer; font-size: 14px; padding: 4px 2px; }
  .nav a:hover { opacity: 1; }
  .nav a.activo { opacity: 1; border-bottom: 2px solid #fff; }
  .usuario { font-size: 13px; opacity: .9; margin-left: 6px; }
  main { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .aviso { padding: 40px; text-align: center; color: #666; }
  .cabecera-seccion {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  h1 { font-size: 22px; margin: 0; }
  .tarjetas { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .tarjeta {
    background: #fff; border: 1px solid var(--borde); border-radius: 10px;
    padding: 16px; cursor: pointer; transition: box-shadow .15s;
  }
  .tarjeta:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .tarjeta h3 { margin: 0 0 6px; font-size: 16px; }
  .tarjeta .meta { color: #666; font-size: 13px; }
  .vacio { color: #888; padding: 30px; text-align: center; }
  .btn {
    border: none; border-radius: 8px; padding: 9px 14px;
    font-size: 14px; cursor: pointer; background: #e9eef5; color: var(--azul);
  }
  .btn.primario { background: var(--azul); color: #fff; }
  .btn.peligro { background: #fdecea; color: #c62828; }
  .btn:hover { filter: brightness(.97); }
  .btn:disabled { opacity: .6; cursor: default; }

  /* Detalle de grupo */
  .volver { display: inline-block; margin-bottom: 8px; color: var(--azul);
    cursor: pointer; font-size: 14px; }
  .volver:hover { text-decoration: underline; }
  h2 { font-size: 18px; margin: 0; }
  .contador { color: #888; font-weight: 400; font-size: 15px; }
  ol.alumnos { margin: 0; padding-left: 28px; }
  ol.alumnos li { background: #fff; border: 1px solid var(--borde);
    border-radius: 6px; margin: 6px 0; padding: 8px 10px; }
  .nota-fase { margin-top: 24px; color: #999; font-style: italic; font-size: 13px; }

  /* Modal */
  .modal-fondo {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  /* El display:flex de arriba anula el atributo [hidden]; lo restauramos. */
  .modal-fondo[hidden] { display: none; }
  .modal {
    background: #fff; border-radius: 12px; padding: 22px;
    width: 100%; max-width: 460px; max-height: 90vh; overflow: auto;
  }
  .modal h2 { margin: 0 0 14px; }
  .modal label { display: block; margin-bottom: 12px; font-size: 14px; font-weight: 600; }
  .modal input, .modal select, .modal textarea {
    width: 100%; margin-top: 5px; padding: 9px; font-size: 14px;
    border: 1px solid var(--borde); border-radius: 8px; font-family: inherit;
    font-weight: 400;
  }
  .modal textarea { resize: vertical; }
  .ayuda { font-size: 12px; color: #888; margin: -6px 0 4px; }
  .modal-acciones { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
</style>
