<style>
  :root {
    --azul: #1565c0;
    --gris: #f4f6f8;
    --borde: #e0e0e0;
    --texto: #222;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body {
    margin: 0;
    font-family: -apple-system, Roboto, "Segoe UI", Arial, sans-serif;
    color: var(--texto);
    background: var(--gris);
  }
  .barra {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--azul); color: #fff;
    padding: 12px 20px;
  }
  .logo { font-weight: 600; }
  .nav { display: flex; align-items: center; gap: 18px; }
  .nav a { color: #fff; opacity: .8; cursor: pointer; font-size: 14px; padding: 4px 2px; }
  .nav a:hover { opacity: 1; }
  .nav a.activo { opacity: 1; border-bottom: 2px solid #fff; }
  .usuario { font-size: 13px; opacity: .9; margin-left: 6px; }
  main { max-width: 1100px; margin: 0 auto; padding: 20px; }
  .aviso { padding: 40px; text-align: center; color: #666; }
  .cabecera-seccion {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  h1 { font-size: 22px; margin: 0; }
  .tarjetas { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  .tarjeta {
    background: #fff; border: 1px solid var(--borde); border-radius: 10px;
    padding: 16px; cursor: pointer; transition: box-shadow .15s;
  }
  .tarjeta:hover { box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .tarjeta h3 { margin: 0 0 6px; font-size: 16px; }
  .tarjeta .meta { color: #666; font-size: 13px; }
  .vacio { color: #888; padding: 30px; text-align: center; }
  .btn {
    border: none; border-radius: 8px; padding: 9px 14px;
    font-size: 14px; cursor: pointer; background: #e9eef5; color: var(--azul);
  }
  .btn.primario { background: var(--azul); color: #fff; }
  .btn.peligro { background: #fdecea; color: #c62828; }
  .btn:hover { filter: brightness(.97); }
  .btn:disabled { opacity: .6; cursor: default; }

  /* Detalle de grupo */
  .volver { display: inline-block; margin-bottom: 8px; color: var(--azul);
    cursor: pointer; font-size: 14px; }
  .volver:hover { text-decoration: underline; }
  h2 { font-size: 18px; margin: 0; }
  .contador { color: #888; font-weight: 400; font-size: 15px; }
  ol.alumnos { margin: 0; padding-left: 28px; }
  ol.alumnos li { background: #fff; border: 1px solid var(--borde);
    border-radius: 6px; margin: 6px 0; padding: 8px 10px; }
  .nota-fase { margin-top: 24px; color: #999; font-style: italic; font-size: 13px; }

  /* Modal */
  .modal-fondo {
    position: fixed; inset: 0; background: rgba(0,0,0,.4);
    display: flex; align-items: center; justify-content: center; padding: 16px;
  }
  /* El display:flex de arriba anula el atributo [hidden]; lo restauramos. */
  .modal-fondo[hidden] { display: none; }
  .modal {
    background: #fff; border-radius: 12px; padding: 22px;
    width: 100%; max-width: 460px; max-height: 90vh; overflow: auto;
  }
  .modal h2 { margin: 0 0 14px; }
  .modal label { display: block; margin-bottom: 12px; font-size: 14px; font-weight: 600; }
  .modal input, .modal select, .modal textarea {
    width: 100%; margin-top: 5px; padding: 9px; font-size: 14px;
    border: 1px solid var(--borde); border-radius: 8px; font-family: inherit;
    font-weight: 400;
  }
  .modal textarea { resize: vertical; }
  .ayuda { font-size: 12px; color: #888; margin: -6px 0 4px; }
  .link-peligro { background: none; border: none; color: #c62828; cursor: pointer;
    font-size: 13px; padding: 4px 0; text-decoration: underline; }
  .modal-acciones { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
  .modal p.mensaje { margin: 0 0 4px; font-size: 15px; line-height: 1.45; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: #323232; color: #fff; padding: 12px 18px; border-radius: 8px;
    font-size: 14px; max-width: 90%; box-shadow: 0 3px 12px rgba(0,0,0,.3);
    z-index: 10;
  }
  .toast.error { background: #c62828; }

  /* Acciones de unidad */
  .acciones-unidad { display: flex; align-items: center; gap: 12px; }
  .check { font-size: 13px; color: #555; cursor: pointer; user-select: none; }
  .check input { vertical-align: middle; margin-right: 4px; }

  /* Criterios en el modal de actividad */
  .campo-crit { margin-bottom: 12px; }
  .campo-crit .etq { font-size: 14px; font-weight: 600; display: block; margin-bottom: 6px; }
  .lista-crit { max-height: 220px; overflow: auto; border: 1px solid var(--borde);
    border-radius: 8px; padding: 6px; }
  label.crit { display: flex; align-items: center; gap: 8px; font-weight: 400;
    font-size: 13px; padding: 7px 8px; border-radius: 6px; margin: 0; cursor: pointer; }
  label.crit:hover { background: var(--gris); }
  label.crit input { flex: 0 0 auto; margin: 0; }
  label.crit .crit-txt { flex: 1 1 auto; }

  /* Rejilla */
  .rejilla-cont { overflow: auto; border: 1px solid var(--borde); border-radius: 12px;
    background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  table.rejilla { border-collapse: separate; border-spacing: 0; width: auto; font-size: 13px; }
  table.rejilla th, table.rejilla td {
    border-bottom: 1px solid #eef1f4; border-right: 1px solid #eef1f4;
    padding: 6px 8px; text-align: center; white-space: nowrap;
  }
  table.rejilla thead th {
    background: #f4f6f9; position: sticky; top: 0; z-index: 2;
    font-weight: 600; color: #37474f; border-bottom: 2px solid #e0e4e8;
  }

  /* Columna número */
  table.rejilla .idx { width: 34px; color: #9aa7b2; font-variant-numeric: tabular-nums;
    position: sticky; left: 0; z-index: 1; }
  table.rejilla thead .idx { z-index: 3; }

  /* Columna nombre (fija) */
  table.rejilla .esq { text-align: left; position: sticky; left: 34px; z-index: 1;
    font-weight: 500; color: #263238; }
  table.rejilla thead .esq { z-index: 3; }

  /* Cabecera de actividad: compacta */
  table.rejilla th.act { font-weight: 600; position: relative; }
  table.rejilla th.act .act-nom { display: block; }
  table.rejilla th.act small { display: block; font-weight: 400; color: #9aa7b2; font-size: 10px; }
  table.rejilla .edit-act {
    position: absolute; top: 3px; right: 3px; border: none; background: transparent;
    color: #b0bec5; cursor: pointer; font-size: 12px; padding: 2px; line-height: 1;
  }
  table.rejilla .edit-act:hover { color: var(--azul); }

  /* Celdas de entrada: estrechas */
  table.rejilla td.celda { padding: 3px; }
  table.rejilla td input { width: 44px; text-align: center; border: 1px solid #dfe3e8;
    border-radius: 6px; padding: 4px 2px; font-size: 13px; }
  table.rejilla td input:focus { outline: none; border-color: var(--azul);
    box-shadow: 0 0 0 2px rgba(21,101,192,.15); }

  table.rejilla .num { font-variant-numeric: tabular-nums; color: #455a64; min-width: 46px; }
  table.rejilla .crit-col { background: #fafbfc; color: #607d8b; font-weight: 600; }
  table.rejilla td.nota, table.rejilla th.nota { font-weight: 700; background: #eef4ff; color: #1565c0; }

  /* Filas alternas (zebra), respetando las columnas fijas */
  table.rejilla tbody tr:nth-child(odd) td { background: #fbfcfd; }
  table.rejilla tbody tr:nth-child(even) td { background: #fff; }
  table.rejilla tbody tr:nth-child(odd) td.nota { background: #e8f0fe; }
  table.rejilla tbody tr:nth-child(even) td.nota { background: #eef4ff; }
  table.rejilla tbody tr:hover td { background: #f0f6ff; }
</style>
