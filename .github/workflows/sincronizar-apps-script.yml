# Sincroniza el código con el proyecto de Apps Script en cada merge a main.
#
# Con esto, probar desde el móvil es: fusionar el PR → esperar ~1 min → abrir
# la app (la URL /dev sirve el último código; si además se define
# GAS_DEPLOYMENT_ID, también se actualiza la implementación de producción).
#
# Necesita tres secretos del repositorio (ver docs/despliegue-automatico.md):
#   CLASPRC_JSON      contenido de ~/.clasprc.json tras `npx @google/clasp@2.4.2 login`
#   GAS_SCRIPT_ID     ID del proyecto de Apps Script
#   GAS_DEPLOYMENT_ID (opcional) ID de la implementación a actualizar
# Sin secretos, el workflow termina sin hacer nada (no falla).
#
# IMPORTANTE: el login que genera CLASPRC_JSON debe hacerse con la MISMA
# versión de clasp que este workflow instala (ver CLASP_VERSION más abajo).
# clasp cambió el formato de sus credenciales entre versiones mayores; si el
# login se hizo con otra versión, clasp-push falla con un error de token
# aunque los secretos estén bien copiados.
name: Sincronizar con Apps Script

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  # Única fuente de verdad de la versión de clasp: úsala también al hacer
  # login en local (npx @google/clasp@<esta versión> login) para que el
  # formato de las credenciales coincida con el de aquí.
  CLASP_VERSION: '2.4.2'

jobs:
  # Los tests del motor de notas, Cripto y promoción corren SIEMPRE antes de
  # sincronizar: si el cálculo cliente/servidor deja de coincidir (o el
  # cifrado/remapeo se rompe), el código no llega a Apps Script.
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node tests/tests.js

  clasp-push:
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Push (y despliegue opcional) con clasp
        env:
          CLASPRC: ${{ secrets.CLASPRC_JSON }}
          SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
          DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
        run: |
          if [ -z "$CLASPRC" ] || [ -z "$SCRIPT_ID" ]; then
            echo "Secretos CLASPRC_JSON / GAS_SCRIPT_ID sin configurar: se omite."
            exit 0
          fi
          npm install -g "@google/clasp@${CLASP_VERSION}"
          printf '%s' "$CLASPRC" > ~/.clasprc.json

          # Valida el formato ANTES de llamar a clasp: si el login se hizo con
          # otra versión, sale un mensaje claro en vez del error críptico de
          # Node ("Cannot read properties of undefined (reading
          # 'access_token')") que da clasp cuando no reconoce el formato.
          # En fichero aparte (no inline) para no pelear con el escapado de
          # comillas del bloque `run` de YAML.
          node .github/workflows/validar-clasprc.js

          printf '{"scriptId":"%s","rootDir":"."}' "$SCRIPT_ID" > .clasp.json
          clasp push -f
          echo "Código subido al proyecto (la URL /dev ya lo sirve)."
          if [ -n "$DEPLOYMENT_ID" ]; then
            clasp deploy --deploymentId "$DEPLOYMENT_ID" \
              --description "Auto ${GITHUB_SHA::7}"
            echo "Implementación de producción actualizada."
          fi
