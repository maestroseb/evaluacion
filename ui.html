<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('estilos') ?>
</head>
<body>
  <header class="barra">
    <span class="logo" onclick="App.irAEvaluaciones()" style="cursor:pointer">📊 Evaluación por Criterios</span>
    <nav class="nav">
      <a id="nav-eval" onclick="App.irAEvaluaciones()">Clases</a>
      <a id="nav-clases" onclick="App.irAClases()">Grupos</a>
      <span id="usuario" class="usuario">…</span>
    </nav>
  </header>

  <main id="app">
    <div id="cargando" class="aviso">Cargando tu cuaderno…</div>

    <!-- CLASES (clase = grupo aplicado a un área) -->
    <section id="vista-evaluaciones" hidden>
      <div class="cabecera-seccion">
        <h1>Mis clases</h1>
        <button class="btn primario" onclick="App.nuevaEvaluacion()">+ Nueva clase</button>
      </div>
      <div id="lista-evaluaciones" class="tarjetas"></div>
    </section>

    <!-- GRUPOS (lista de alumnado reutilizable) -->
    <section id="vista-clases" hidden>
      <div class="cabecera-seccion">
        <h1>Mis grupos</h1>
        <button class="btn primario" onclick="App.nuevaClase()">+ Nuevo grupo</button>
      </div>
      <div id="lista-clases" class="tarjetas"></div>
    </section>

    <!-- DETALLE GRUPO -->
    <section id="vista-clase" hidden>
      <a class="volver" onclick="App.irAClases()">← Mis grupos</a>
      <div class="cabecera-seccion">
        <h1 id="clase-titulo"></h1>
        <button class="btn peligro" onclick="App.eliminarClaseActual()">Eliminar grupo</button>
      </div>
      <p id="clase-meta" class="meta"></p>
      <div class="cabecera-seccion">
        <h2>Alumnado <span id="num-alumnos" class="contador"></span></h2>
        <button class="btn" onclick="App.editarAlumnos()">Editar lista</button>
      </div>
      <ol id="lista-alumnos" class="alumnos"></ol>
    </section>

    <!-- DETALLE EVALUACIÓN: lista de unidades -->
    <section id="vista-evaluacion" hidden>
      <a class="volver" onclick="App.irAEvaluaciones()">← Mis clases</a>
      <div class="cabecera-seccion">
        <h1 id="eval-titulo"></h1>
        <button class="btn peligro" onclick="App.eliminarEvaluacionActual()">Eliminar clase</button>
      </div>
      <p id="eval-meta" class="meta"></p>
      <div class="cabecera-seccion">
        <h2>Unidades</h2>
        <button class="btn primario" onclick="App.nuevaUnidad()">+ Nueva unidad</button>
      </div>
      <div id="lista-unidades" class="tarjetas"></div>
    </section>

    <!-- REJILLA DE UNA UNIDAD -->
    <section id="vista-unidad" hidden>
      <a class="volver" id="volver-unidad">← Unidades</a>
      <div class="cabecera-seccion">
        <h1 id="unidad-titulo"></h1>
        <div class="acciones-unidad">
          <label class="check"><input type="checkbox" id="ver-criterios" checked onchange="App.pintarRejilla()"> Notas por criterio</label>
          <button class="btn" onclick="App.copiarSeneca()">📋 Copiar para Séneca</button>
          <button class="btn" onclick="App.variasActividades()">+ Varias</button>
          <button class="btn primario" onclick="App.nuevaActividad()">+ Nueva actividad</button>
        </div>
      </div>
      <p id="unidad-meta" class="meta"></p>
      <div id="rejilla-cont" class="rejilla-cont"></div>
    </section>
  </main>

  <!-- MODAL -->
  <div id="modal-fondo" class="modal-fondo" hidden onclick="App.cerrarModalFuera(event)">
    <div class="modal">
      <h2 id="modal-titulo"></h2>
      <div id="modal-cuerpo"></div>
      <div class="modal-acciones">
        <button class="btn" onclick="App.cerrarModal()">Cancelar</button>
        <button class="btn primario" id="modal-aceptar"></button>
      </div>
    </div>
  </div>

  <!-- TOAST (avisos) -->
  <div id="toast" class="toast" hidden></div>

  <?!= include('cliente') ?>
</body>
</html>
