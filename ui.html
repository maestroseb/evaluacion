<!DOCTYPE html>
<html>
<head>
  <base target="_top">

<body>
  <header class="barra">

  <main id="app">

    <!-- EVALUACIONES -->
    <section id="vista-evaluaciones" hidden>
      <div class="cabecera-seccion">

      <div id="lista-evaluaciones" class="tarjetas"></div>
    </section>

    <!-- CLASES -->
    <section id="vista-clases" hidden>
      <div class="cabecera-seccion">
        <h1>Mis clases</h1>
        <button class="btn primario" onclick="App.nuevaClase()">+ Nueva clase</button>
      </div>
      <div id="lista-clases" class="tarjetas"></div>

    <!-- DETALLE CLASE -->
    <section id="vista-clase" hidden>
      <a class="volver" onclick="App.irAClases()">← Mis clases</a>

      <a class="volver" onclick="App.irAEvaluaciones()">← Mis evaluaciones</a>
      <div class="cabecera-seccion">
        <h1 id="eval-titulo"></h1>
        <button class="btn peligro" onclick="App.eliminarEvaluacionActual()">Eliminar evaluación</button>

      <p id="eval-meta" class="meta"></p>
      <ol id="eval-alumnos" class="alumnos"></ol>
